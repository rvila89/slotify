  <text x="40" y="44" fill="#ffffff" font-size="27" font-weight="700">US-009 - Registrar resultado de visita - cliente interesado (2.v a 2.b)</text>
  <text x="40" y="74" fill="#e0e7ff" font-size="15">Proceso del harness: SDD - Gate - Contrato - TDD RED - Impl - QA - Code-review - Docs - Gate - Archive/PR    Slotify MVP</text>
  <g transform="translate(40,112)">
    <rect x="0" y="0" width="1160" height="118" rx="10" fill="#ffffff" filter="url(#sh)"/>
    <rect x="0" y="0" width="6" height="118" rx="3" fill="#4f46e5"/>
    <text x="22" y="26" font-size="15" font-weight="700" fill="#3730a3">RESUMEN EJECUTIVO</text>
    <text x="22" y="50" font-size="13" fill="#334155">Transicion de la maquina de estados de la Reserva: el gestor marca la visita como realizada con resultado cliente interesado y la consulta</text>
    <text x="22" y="68" font-size="13" fill="#334155">vuelve a 2.b con un TTL fresco. En UNA transaccion atomica (SELECT ... FOR UPDATE): Reserva (visita_realizada=true, sub_estado=2b, ttl fresco)</text>
    <text x="22" y="86" font-size="13" fill="#334155">mas Fecha_Bloqueada (UPDATE del mismo TTL, sigue blando) mas Audit_Log. Tras el commit, email E7 no bloqueante. Endpoint PATCH visita.</text>
    <text x="22" y="106" font-size="12.5" fill="#64748b">Orquestado por harness-orchestrator delegando en 7 subagentes. 2 gates humanos respetados. 3 tramos paralelizados. Resultado: PR 36, master intacta.</text>
  </g>
