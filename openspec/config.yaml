# Configuración de OpenSpec — Slotify
# Fuente de verdad de los pasos obligatorios de cada change.
# Consistente con docs/openspec-tasks-mandatory-steps.md.

project: slotify
language: es

branching:
  # Step 0 obligatorio: crear branch ANTES de cualquier cambio.
  pattern: "feature/{change-name}"
  base: master

changes:
  dir: openspec/changes
  artifacts:
    - proposal.md      # qué cambia y por qué (trazable a US y UC)
    - tasks.md         # pasos en orden, con los obligatorios de abajo
    - design.md        # opcional, solo decisiones técnicas no triviales
  reports_dir: "openspec/changes/{change-name}/reports"

specs:
  dir: openspec/specs

# Pasos obligatorios que TODO tasks.md debe incluir, en orden.
# El agente DEBE ejecutar las pruebas él mismo; nunca delegar al usuario.
mandatory_steps:
  - id: step-0
    title: "Crear feature branch"
    required: true
    first: true
  - id: review-gate-sdd
    title: "GATE revisión humana: aprobar proposal + spec-delta + design ANTES de implementar"
    required: true
    human_review: true   # el agente DEBE detenerse y devolver los artefactos; no avanza sin OK explícito del humano
  - id: tdd-first
    title: "Tests primero (concurrencia del bloqueo, máquina de estados, tarifas)"
    required: true
  - id: step-N
    title: "Revisar y actualizar tests unitarios existentes"
    required: true
  - id: step-N+1
    title: "Ejecutar unit tests + verificar estado BD + report"
    required: true
    agent_must_execute: true
    report: "YYYY-MM-DD-step-N+1-unit-test-and-db-verification.md"
  - id: step-N+2
    title: "Pruebas manuales de endpoints con curl (restaurar BD)"
    required: true
    agent_must_execute: true
    report: "YYYY-MM-DD-step-N+2-curl-endpoint-tests.md"
  - id: step-N+3
    title: "E2E con Playwright MCP (si hay cambios de frontend)"
    required: false
    agent_must_execute: true
    report: "YYYY-MM-DD-step-N+3-e2e-playwright.md"
  - id: step-N+4
    title: "Actualizar documentación técnica"
    required: true
  - id: code-review
    title: "Code review del diff contra guardrails (informe con veredicto APTO/NO APTO)"
    required: true
    agent_must_execute: true
    report: "YYYY-MM-DD-step-review-code-review.md"
    # Convención del informe: incluir una línea literal `Veredicto: APTO` o `Veredicto: NO APTO`.
    # El hook require-code-review.py la lee para permitir/bloquear el archivado y el PR.
  - id: review-gate-final
    title: "GATE revisión humana: aprobar (code-review APTO + validación manual) ANTES de archive/PR"
    required: true
    human_review: true
  - id: archive
    title: "Archivar change + abrir PR (solo tras gate final y code-review APTO)"
    required: true

quality_gates:
  pre_commit: ["pnpm lint", "pnpm typecheck", "pnpm test"]
  contract_validation: ["spectral lint docs/api-spec.yml"]
  pre_archive:
    - "informe de code-review con veredicto APTO en openspec/changes/<change>/reports/"
    - "aprobación humana del gate final"
