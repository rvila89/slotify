services:
  postgres:
    image: postgres:15
    container_name: slotify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: slotify_dev
    ports:
      - "5432:5432"
    volumes:
      - slotify-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d slotify_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  slotify-pgdata:
