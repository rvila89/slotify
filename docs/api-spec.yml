          application/json:
            schema: { $ref: '#/components/schemas/RegistrarCobroFianzaRequest' }
      responses:
        '200':
          description: |
            Resultado del registro. **Dos formas discriminadas por el campo `resultado`**:
            - `resultado='cobrado'` (`RegistrarCobroFianzaCobrado`): el cobro se registrĆ³. La fianza queda
              en `estado='cobrada'` y `fianzaStatus='cobrada'`. Devuelve el `PAGO` creado, la
              `FACTURA (fianza)` actualizada, el `fianzaStatus`, `fianzaEur` y `fianzaCobradaFecha`.
            - `resultado='confirmacion_requerida'` (`RegistrarCobroFianzaConfirmacionRequerida`): polĆ­tica
              "Negociable" ā `fianzaStatus='pendiente'` sin `confirmarSinRecibo=true`. **NO se creĆ³ PAGO
              ni FACTURA** ni se cambiĆ³ el estado. Devuelve `codigo=RECIBO_FIANZA_NO_ENVIADO`, un `mensaje`
              para el diĆ”logo y `reintentarCon` indicando el flag a enviar. El frontend confirma y reintenta.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarCobroFianzaResponse' }
        '400':
          description: |
            ValidaciĆ³n de entrada. El `importe` no es Decimal(10,2) positivo (`> 0`) o `fechaCobro` no es
            una fecha vĆ”lida `<= RESERVA.fechaEvento` (posterior al evento o mal formada): `COBRO_INVALIDO`.
            No se crea `PAGO` ni cambia el estado. Cuerpo = envelope estĆ”ndar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroFianzaError' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS), no tiene recibo de fianza cuando se esperaba
            (`FACTURA_FIANZA_NO_ENCONTRADA`), o el `justificanteDocId` indicado no existe en el tenant
            (`JUSTIFICANTE_NO_ENCONTRADO`). No se muta nada. Cuerpo + `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroFianzaError' }
        '409':
          description: |
            Conflicto de precondiciĆ³n de estado (doble cobro), sin efectos, releĆ­do bajo
            `SELECT ... FOR UPDATE`:
            - `FIANZA_YA_COBRADA` ā la fianza ya estĆ” `cobrada` (**doble cobro**, incl. dos peticiones
              concurrentes: solo la primera registra el PAGO). "La fianza ya estĆ” marcada como cobrada".
            Cuerpo = envelope estĆ”ndar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroFianzaError' }

