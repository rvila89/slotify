openapi: 3.0.0
info:
  title: Slotify API
  description: |
    API REST de **Slotify**, la plataforma SaaS de gestión integral para espacios
    boutique de eventos privados (masías, fincas, villas).

    La reserva es el agregado raíz: recorre toda la máquina de estados, desde los
    sub-estados de consulta (2.a–2.z) hasta `reserva_completada`. El bloqueo atómico
    de fecha se garantiza con la restricción `UNIQUE(tenant_id, fecha)` en PostgreSQL
    y transacciones `SELECT ... FOR UPDATE`.

    La API sigue arquitectura hexagonal + DDD sobre NestJS, es multi-tenant (RLS) y
    expone este contrato OpenAPI como fuente de verdad para generar el cliente HTTP
    type-safe del frontend.

    ## Convenciones
    - Lenguaje ubicuo del dominio en español (reservas, presupuestos, fianza…).
    - Autenticación JWT Bearer (access token de vida corta) + refresh token en cookie httpOnly.
    - Identificadores en formato UUID.
    - [F2-01] Importes monetarios como `string` decimal de 2 decimales (Decimal(10,2)), NUNCA coma flotante,
      para evitar errores de redondeo en facturación; porcentajes como `string` Decimal(4,2).
    - Todas las operaciones están aisladas por tenant (derivado del JWT, no del path).

    ## Salud / documentación
    - [DECISIÓN F1-03] `GET /api/health` y `GET /api/docs` son endpoints operativos/infra (US-000) y
      quedan FUERA de este contrato de negocio a propósito. Confirma si prefieres documentarlos aquí.

  version: 1.2.0
  contact:
    name: Equipo Slotify
  license:
    name: UNLICENSED

servers:
  # [DECISIÓN F5-06] Dominios no respaldados por ninguna fuente; confirma las URLs reales antes de publicar.
  - url: http://localhost:3000/api
    description: Servidor de desarrollo (backend NestJS)
  - url: https://api.slotify.app/api
    description: Servidor de producción

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autenticación y sesión (UC-01, UC-02)
  - name: Reservas
    description: Ciclo de vida de la reserva y transiciones de estado (UC-03 a UC-10, UC-23 a UC-28)
  - name: Cola
    description: Cola de espera de fechas bloqueadas (UC-11 a UC-13)
  - name: Presupuestos
    description: Pre-reserva, tarifas y presupuestos (UC-14 a UC-16)
  - name: Confirmacion
    description: Confirmación de reserva, pagos, facturas y condiciones particulares (UC-17 a UC-19)
  - name: Subprocesos
    description: Sub-procesos paralelos pre-evento, liquidación y fianza (UC-20 a UC-22, UC-26, UC-27)
  - name: Facturas
    description: Emisión de facturas y registro de pagos (UC-18, UC-21)
  - name: Facturacion
    description: >-
      Ciclo de vida de la FACTURA como agregado raíz (borrador → enviada → cobrada): factura
      de señal (US-022 / UC-18), aprobación, rechazo y regeneración de PDF. La creación de la
      factura de señal NO es un endpoint público: es efecto post-commit de la confirmación de
      la reserva (US-021).
  - name: FichaOperativa
    description: Briefing operativo del evento (UC-20, UC-24)
  - name: Calendario
    description: Disponibilidad, bloqueo y liberación de fechas (UC-29 a UC-31)
  - name: Clientes
    description: Datos de contacto y fiscales de clientes (atributo de la reserva, no entidad de navegación)
  - name: Historico
    description: Búsqueda y exportación del histórico (UC-32, UC-33)
  - name: Dashboard
    description: >-
      Vista de lectura agregada operativa: 7 widgets del estado de las reservas del tenant
      (UC-34 / US-044). No incluye el dashboard financiero ni KPIs avanzados (§7.2, fuera de MVP).
  - name: Comunicaciones
    description: Envío y log de emails E1–E8 y manuales (UC-35, UC-36)
  - name: Documentos
    description: Subida y descarga de documentos polimórficos (UC-19, UC-24)
  - name: DocumentacionEvento
    description: >-
      Captura de la documentación obligatoria del evento (DNI anverso/reverso, cláusula de
      responsabilidad firmada) y su checklist en tiempo real (UC-24 / US-033). La subida solo se
      admite con `RESERVA.estado='evento_en_curso'`; el checklist es consultable también en
      `post_evento`.
  - name: Cron
    description: Endpoint protegido de barrido periódico (TTLs, cola, recordatorios)

paths:
  # ============================ AUTH ============================
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión (UC-01)
      description: Valida credenciales y devuelve un access token JWT. El refresh token se entrega en una cookie httpOnly.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación correcta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          # [US-001 FA-01] 401 genérico anti-enumeration: credenciales inválidas y cuenta
          # deshabilitada (activo=false) devuelven EXACTAMENTE el mismo shape y mensaje, para
          # no revelar si un email existe o está deshabilitado. NO se usa 403 ni un mensaje
          # distinto que permita distinguir ambos casos.
          description: |
            Autenticación fallida. Cubre tanto **credenciales inválidas** como **cuenta
            deshabilitada** (`activo=false`) con idéntico cuerpo de error (decisión
            anti-enumeration deliberada). El cliente no puede distinguir ambos casos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa el refresh token de la cookie httpOnly para emitir un nuevo access token.
      # [F3-01] La autenticación de este endpoint es la cookie de refresh, no el bearer.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Nuevo access token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión (UC-02)
      description: |
        Cierra la sesión del **dispositivo actual**: limpia la cookie httpOnly de
        refresh. Es **best-effort / stateless** — no hay invalidación server-side
        persistente del refresh token (decisión US-002 §1); el riesgo residual está
        acotado por la cookie httpOnly + TTL del refresh (~7 días).

        **Idempotente**: responde 200/204 SIEMPRE, también en un segundo logout cuando
        la cookie de refresh está ausente, expirada o es inválida; NUNCA devuelve 401
        por falta de cookie. Por eso la cookie de refresh es seguridad **opcional**.

        **No anónimo**: actúa únicamente sobre la cookie de refresh del propio llamante.
        No acepta un identificador de usuario de destino (ni en body ni en parámetros),
        por lo que no puede cerrar la sesión de otro usuario.

        **Auditoría (efecto de servidor)**: cuando el refresh token identifica a un
        usuario, el servidor registra en AUDIT_LOG `accion = logout`, `entidad = USUARIO`,
        `usuario_id` y `tenant_id` (bajo contexto RLS del tenant). Si no hay usuario
        identificable (doble logout sin cookie válida), NO se audita.

        El **access token previo no se revoca** activamente: sigue siendo válido hasta su
        expiración natural (~15 min); es el frontend quien lo elimina de memoria.
        [F1-09] Se autentica con la cookie de refresh (no con el access token), para
        permitir el logout aunque el access token ya haya expirado (US-002).
      # [US-002 §2] Cookie de refresh OPCIONAL para preservar la idempotencia del doble
      # logout: la ausencia de cookie NO produce 401. El `{}` declara "sin autenticación"
      # como alternativa válida a `cookieAuth`, en lugar del `bearerAuth` global.
      security:
        - {}
        - cookieAuth: []
      responses:
        '200':
          description: Sesión cerrada de forma idempotente (cuerpo vacío).
        '204':
          description: Sesión cerrada (sin contenido).

  /auth/me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      description: '[F1-08] Soporte de restauración de sesión del shell (US-000A/US-001).'
      responses:
        '200':
          description: Datos del usuario en sesión
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================ RESERVAS ============================
  /reservas:
    get:
      tags: [Reservas]
      operationId: listarReservas
      summary: Listar reservas (pipeline)
      description: Lista paginada de reservas del tenant con filtros por estado, sub-estado, fecha y canal.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - in: query
          name: estado
          schema: { $ref: '#/components/schemas/EstadoReserva' }
        - in: query
          name: subEstado
          schema: { $ref: '#/components/schemas/SubEstadoConsulta' }
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
          description: Búsqueda por código, nombre de cliente o notas
      responses:
        '200':
          description: Reservas recuperadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Reservas]
      summary: Dar de alta un nuevo lead/consulta (UC-03)
      description: |
        Crea una reserva en estado `consulta`. El sub-estado resultante depende de `fechaEvento`:
        - SIN `fechaEvento` (US-003, alta exploratoria) → nace en `2a`, `ttlExpiracion = null`,
          SIN `FechaBloqueada`.
        - CON `fechaEvento` (estrictamente futura) y fecha LIBRE (US-004) → nace en `2b`, dispara
          el bloqueo blando atómico (`FechaBloqueada` con `tipoBloqueo = blando`),
          `ttlExpiracion = now() + ttl_consulta_dias`. La respuesta incluye `tipoBloqueo = blando`.
        - CON `fechaEvento` bloqueada por una consulta en `2b` → nace en `2d` (cola), con
          `posicionCola` y `consultaBloqueanteId`, SIN nueva `FechaBloqueada`.
        - CON `fechaEvento` bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores
          → nace en `2a` exploratoria (`fechaDisponible = false` + `avisoDisponibilidad`
          informativo), sin bloqueo ni cola.

        El CLIENTE se crea/reutiliza de forma idempotente por `(tenant_id, email)`. El campo
        `comentarios` decide el flujo del email E1 (ver su descripción en `CreateReservaRequest`).
        Si hay `fechaEvento` + nº de invitados + horas, E1 incorpora la `tarifaEstimada` (motor
        UC-16); es tolerante: si la tarifa no puede calcularse, E1 sale sin precio y el alta no se
        bloquea.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaRequest'
      responses:
        '201':
          description: |
            Reserva creada (`CreateReservaResponse`). En el alta exploratoria sin fecha (US-003) el
            recurso tiene `estado = 'consulta'`, `subEstado = '2a'`, `ttlExpiracion = null` y los
            campos transitorios ausentes. Con fecha aparecen los campos derivados según el
            sub-estado: `tipoBloqueo`+`ttlExpiracion` (2b), `posicionCola`+`consultaBloqueanteId`
            (2d), `fechaDisponible`+`avisoDisponibilidad` (2a por fecha no disponible), y
            `tarifaEstimada` cuando E1 la incluye.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservaResponse'
        '400':
          # Validación de entrada (class-validator → exception filter de NestJS). El cuerpo es
          # ErrorResponse con `message` como array de strings (un mensaje por campo afectado).
          # Casos: obligatorios faltantes (cliente.nombre/apellidos/email/telefono), email mal
          # formado, canalEntrada fuera del enum, y [US-004] `fechaEvento` = hoy o fecha pasada
          # (debe ser estrictamente futura, > hoy). En cualquiera de ellos NO se crea RESERVA ni
          # FechaBloqueada.
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /reservas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Reservas]
      summary: Detalle de reserva
      responses:
        '200':
          description: Reserva recuperada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaDetalle'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reservas]
      summary: Actualizar datos de la reserva
      description: |
        Actualización parcial de los campos editables (invitados, duración, tipo de evento, notas…).
        No cambia el estado. [F1-07] El nº de invitados (US-007) y datos núcleo del lead; la fecha de
        evento NO se asigna aquí sino vía /transiciones (ver [F1-01]).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservaRequest'
      responses:
        '200':
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/transiciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Ejecutar una transición de estado (UC-04, UC-06, UC-10, UC-23, UC-25, UC-28)
      description: |
        Aplica una transición de la máquina de estados de la reserva. El backend valida la
        transición contra la tabla declarativa de transiciones y sus guardas. Cubre, entre otras:
        2.b→2.c (pendiente invitados), →2.z (descartar por cliente), iniciar evento, finalizar
        evento y archivar. NOTA [US-005]: la asignación de fecha (transición 2.a→2.b/2.d) NO se
        hace aquí, sino en el endpoint dedicado `POST /reservas/{id}/fecha` (design.md §D-2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransicionRequest'
      responses:
        '200':
          description: Transición aplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: Transición no permitida o guarda no satisfecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservas/{id}/fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Asignar fecha a una consulta exploratoria — transición 2.a→2.b/2.d (UC-04 / US-005)
      description: |
        [US-005] Transición de un agregado RESERVA **existente** en sub-estado `2a` (consulta
        exploratoria) hacia `2b` (consulta con fecha + bloqueo blando) o `2d` (cola), asignando
        `fechaEvento` y disparando el bloqueo atómico de fecha en la **misma transacción**
        (`SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos).

        Difiere de `POST /reservas` (US-003/004, alta de un lead nuevo): aquí se **muta** un
        agregado ya en `2a`; el núcleo de determinación de sub-estado, bloqueo y cola se reutiliza
        (`determinarAltaConFecha` + `bloquearEnTx`, US-004/US-040).

        Determinación del sub-estado destino:
        - fecha **LIBRE** → `2b`, crea `FechaBloqueada` blanda, `ttlExpiracion = now() + ttl_consulta_dias`.
        - fecha bloqueada por una consulta en `2b` → se **ofrece cola**: `409` con
          `colaDisponible=true`; el cliente reenvía con `aceptarCola=true` para entrar en `2d`
          (`posicionCola`, `consultaBloqueanteId`). La RESERVA permanece en `2a` hasta confirmar.
        - fecha bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores → `409`
          con `colaDisponible=false` (no disponible, sin cola). La RESERVA permanece en `2a`.
        - **carrera D4** (otra transición ganó el bloqueo, `P2002`) → se re-deriva a oferta de cola
          (`409 colaDisponible=true`); con `aceptarCola=true` el reintento entra directo a `2d`.

        Flujo interactivo de la cola (FA-01) SIN estado servidor intermedio: la 1ª llamada informa
        (`409` + `colaDisponible`), la 2ª con `aceptarCola=true` confirma `2d`.

        Tras el COMMIT de `2a→2b` se registra/envía (post-commit, **no bloqueante**) la comunicación
        de confirmación de bloqueo provisional (extensión de E1, motor US-045): un fallo de envío no
        revierte la transición ni el bloqueo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarFechaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada:
            - `2b`: `subEstado='2b'`, `fechaEvento`, `ttlExpiracion` (bloqueo blando creado).
            - `2d`: `subEstado='2d'`, `fechaEvento`, `posicionCola`, `consultaBloqueanteId`
              (entrada en cola; requiere `aceptarCola=true`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          # fechaEvento ausente, mal formada o NO estrictamente futura (= hoy o pasada). Regla
          # unificada `> hoy` (D-1, coherente con US-004/US-040). No se muta la RESERVA.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Fecha no asignable de inmediato; la RESERVA permanece en `2a`. El cuerpo añade
            `colaDisponible` y `motivo` al envelope de error estándar:
            - `colaDisponible=true` → bloqueada por una consulta en `2b` (o carrera D4): se ofrece
              cola; reintentar con `aceptarCola=true` para entrar en `2d`.
            - `colaDisponible=false` → bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+:
              no disponible, sin cola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignarFechaConflictoError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO está en sub-estado `2a` (p. ej. ya tiene
            fecha, está en cola, en un estado terminal `2x/2y/2z` o más avanzada). No se muta
            (F5-02: 409 = concurrencia, 422 = transición/guarda inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # [US-051 §D-2.1] Cambio ATÓMICO de una fecha YA bloqueada. Endpoint DEDICADO (NO reutiliza
  # POST /reservas/{id}/fecha, que solo asigna la PRIMERA fecha 2a→2b/2d): aquí la RESERVA ya
  # tiene fecha bloqueada (sub-estados 2b/2c/2v) y se pide moverla a otra fecha.
  /reservas/{id}/cambiar-fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Cambiar la fecha de una RESERVA — operación atómica; origen con fecha bloqueada (2b/2c/2v) o en cola (2d)
      description: |
        Cambia la `fechaEvento` de una RESERVA por otra fecha, en una **única transacción
        atómica** (`SELECT … FOR UPDATE` sobre la RESERVA y sobre `FECHA_BLOQUEADA(tenant_id,
        fecha_nueva)`; `UNIQUE(tenant_id, fecha)`; **sin Redis ni locks distribuidos** —
        `CLAUDE.md §Regla crítica: bloqueo atómico de fecha`). El origen válido es una RESERVA
        con fecha **YA bloqueada** (sub-estados `2b`/`2c`/`2v`) o una consulta **en cola de
        espera** (`2d`). El comportamiento se ramifica **por el origen** (mismo esquema de
        request/response en ambos casos):

        **A) Origen `2b`/`2c`/`2v` (fecha ya bloqueada)** [US-051 §D-2.1]:

        1. Si la fecha nueva está **LIBRE** → `bloquearFecha(tenant_id, fecha_nueva)`, actualiza
           `RESERVA.fecha_evento`, `liberarFecha(tenant_id, fecha_antigua)` y, si la fecha antigua
           tenía cola, dispara la **promoción FIFO** (mecánica A15) del primero en cola. No cambia
           estado ni sub-estado (`subEstado` intacto).
        2. Si la fecha nueva está **OCUPADA** por otra RESERVA → **rechaza con 409 sin tocar nada**
           (rollback total: la RESERVA conserva su fecha antigua y su bloqueo). A diferencia del
           alta/asignación (`POST /reservas/{id}/fecha`), aquí **NO se ofrece cola** para la fecha
           nueva: el conflicto es terminal para esta operación (por eso NO lleva `colaDisponible`).

        **B) Origen `2d` (consulta en cola de espera)** [change `cambiar-fecha-consulta-en-cola`]:

        1. Si la fecha nueva está **LIBRE** → la consulta **SALE de la cola** y transiciona
           **`2d → 2b`**: `bloquearFecha(tenant_id, fecha_nueva)` (INSERTA un bloqueo nuevo, blando,
           con TTL; la `2d` no poseía bloqueo propio), `RESERVA.fecha_evento = fecha_nueva`,
           `posicionCola → null`, `consultaBloqueanteId → null`, y **reordena la cola vieja**
           cerrando el hueco (mecánica de *Salida de cola con reordenación al descartar desde 2.d*,
           US-013). La RESERVA bloqueante de la fecha antigua **no se toca** y su bloqueo **no se
           libera**, por lo que **NO** se dispara ninguna promoción de cola. Se crea un **borrador
           E1** de transición de fecha (no autoenviado, `fechaEnvio = null`) para revisión del
           gestor con el flujo existente (US-046).
        2. Si la fecha nueva está **OCUPADA** por otra RESERVA → **409 terminal sin re-encolar**
           (rollback total: la consulta conserva su posición en la cola actual; mismo shape que A2,
           solo `motivo`, sin `colaDisponible`).

        En ambos orígenes registra `AUDIT_LOG` (`accion='actualizar'`,
        `entidad='RESERVA'`) con la fecha anterior y la nueva (en la rama `2d`, `datos_nuevos`
        refleja además la salida de cola: `sub_estado`, `posicion_cola`, `consulta_bloqueante_id`). La fecha NUNCA se muta por
        `PATCH /reservas/{id}` (§D-1): esa vía es solo para campos simples; toda mutación de bloqueo
        pasa por aquí o por `POST /reservas/{id}/fecha`. El esquema de request/response no cambia
        entre orígenes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarFechaRequest'
      responses:
        '200':
          description: |
            Cambio aplicado. Devuelve la RESERVA actualizada con la nueva `fechaEvento`. Desde
            origen `2b`/`2c`/`2v` el `subEstado` se conserva; desde origen `2d` la consulta sale
            de la cola y transiciona a `subEstado='2b'` (`posicionCola`/`consultaBloqueanteId`
            quedan a `null`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            La fecha destino no está disponible: está bloqueada por otra RESERVA. El cambio se
            rechaza SIN efectos (rollback total): desde origen `2b`/`2c`/`2v` la RESERVA conserva su
            fecha antigua y su bloqueo; desde origen `2d` la consulta conserva su posición en la
            cola actual (NO se re-encola en la fecha nueva). Conflicto **terminal** para esta
            operación en ambos orígenes: NO se ofrece cola para la fecha nueva (por eso el cuerpo
            no lleva `colaDisponible`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CambiarFechaConflictoError'
        '422':
          description: |
            Guarda no satisfecha, sin mutar la RESERVA (F5-02: 409 = concurrencia/ocupación, 422 =
            guarda inválida):
            - la RESERVA NO está en un origen válido para cambiar fecha: los orígenes válidos son
              `2b`/`2c`/`2v` (con fecha bloqueada) y `2d` (en cola de espera). Se rechazan p. ej.
              `2a` (sin fecha; usar `POST /reservas/{id}/fecha`), terminales `2x/2y/2z`, o
              `pre_reserva`+;
            - o `fechaEvento` no es estrictamente futura (`> hoy`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/pendiente-invitados:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Marcar consulta como pendiente de invitados — transición 2.b→2.c (UC-06 / US-007)
      description: |
        [US-007] Transición de un agregado RESERVA **existente** en sub-estado `2b` (consulta con
        fecha + bloqueo blando vigente) hacia `2c` (pendiente de número de invitados). En una
        **única transacción** (`SELECT … FOR UPDATE` sobre la fila bloqueante + `UNIQUE(tenant_id,
        fecha)`; sin Redis ni locks distribuidos) ejecuta las **cuatro** operaciones, all-or-nothing:
        1. RESERVA → `subEstado='2c'` y `ttlExpiracion = ttlExpiracion_actual + ttl_consulta_dias`
           (extensión derivada de `TENANT_SETTINGS.ttl_consulta_dias`, **nunca hardcodeada**;
           reutiliza la primitiva atómica `resolverPlanBloqueo({ fase: '2.c' }) → extend`, US-040).
        2. **UPDATE** del `ttl_expiracion` de la fila de `FechaBloqueada` de esa RESERVA al mismo
           nuevo valor (no inserta; la fila ya existe, a diferencia de US-005).
        3. **Vaciado atómico de la cola (A16)**: todas las RESERVA con
           `consultaBloqueanteId = id de esta RESERVA` y `subEstado='2d'` pasan a `subEstado='2y'`
           (descartada por cola, **terminal**), con `posicionCola=null` y `consultaBloqueanteId=null`.
           Si la cola está vacía afecta a 0 filas y la transición se completa igualmente.
        4. `AUDIT_LOG accion='transicion'` de la principal (`2b→2c`) y de cada descartada (`2d→2y`).

        El cuerpo es vacío (`{}`): la acción no toma parámetros; el TTL se deriva del setting del
        tenant. Los **emails automáticos** de descarte de cola (A16) y el email de solicitud de
        invitados de UC-06 paso 7 quedan **fuera de alcance en MVP** (📐 solo diseñados / gap de
        spec sin E-code); solo se implementa la mecánica de la transición.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PendienteInvitadosRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada (`subEstado='2c'`, `ttlExpiracion`
            extendido) y `consultasDescartadas`: recuento de RESERVA de cola pasadas a `2y`
            (feedback para la UI; 0 si no había cola).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendienteInvitadosResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Bloqueo no vigente: la RESERVA NO tiene una fila activa en `FechaBloqueada` para
            `(tenant_id, fechaEvento)`, o su `ttl_expiracion < ahora` (bloqueo expirado). La RESERVA
            no se modifica. El cuerpo añade `motivo` al envelope de error estándar (F5-02: 409 =
            conflicto/precondición de bloqueo; 422 = guarda de transición inválida).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BloqueoNoVigenteError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO está en sub-estado `2b` (p. ej. `2a`, `2c`,
            `2v` o un estado terminal `2x/2y/2z`/`reserva_cancelada`/`reserva_completada`, inmutables).
            No se muta la RESERVA, ni su `FechaBloqueada`, ni ninguna RESERVA de cola (F5-02: 409 =
            concurrencia/precondición, 422 = transición/guarda inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/extender-bloqueo:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Extender plazo del bloqueo blando — prórroga pura del TTL (UC-05 / US-006)
      operationId: extenderBloqueo
      description: |
        [US-006] **Override manual del Gestor** que extiende el `ttlExpiracion` del **bloqueo
        blando vigente** de un agregado RESERVA **existente** antes de que expire, **sin liberar la
        fecha** ni disparar la promoción de cola. Aplica cuando hay bloqueo blando activo:
        `subEstado ∈ {2b, 2c, 2v}` O `estado = 'pre_reserva'`, con `ttlExpiracion > ahora` y **fila
        activa en `FechaBloqueada`** (`tipoBloqueo = 'blando'`).

        A diferencia de US-005/007/008 —que son **transiciones de máquina de estados** (cambian
        `subEstado`)— esta operación es una **prórroga pura del TTL**: **NO** cambia `estado`,
        `subEstado`, `tipoBloqueo` ni `fecha`. En una **única transacción** (`SELECT … FOR UPDATE`
        sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos)
        ejecuta, all-or-nothing:
        1. RESERVA → `ttlExpiracion = ttlExpiracion_actual + dias` (la base es el `ttlExpiracion`
           **actual**, no `now()`; `dias` lo indica el gestor, **no** se deriva de
           `ttl_consulta_dias`).
        2. **UPDATE** del `ttl_expiracion` de la fila de `FechaBloqueada` de esa RESERVA al **mismo
           nuevo valor** (no inserta; la fila ya existe).
        3. `AUDIT_LOG accion='actualizar'`, `entidad='RESERVA'`, con
           `datos_anteriores.ttl_expiracion` (valor previo) y `datos_nuevos.ttl_expiracion` (nuevo).

        Los recordatorios automáticos (A3/A4/A5) se **reprograman implícitamente**: se derivan del
        `ttlExpiracion` y los dispara el barrido periódico (patrón estado-en-fila + barrido,
        `architecture.md §2.5`; barrido US-012). No se introduce ni se toca ningún scheduler. No se
        envía email al cliente al extender (UC-05 no lo describe).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtenderBloqueoRequest'
      responses:
        '200':
          description: |
            Extensión aplicada. Devuelve la RESERVA actualizada con el **nuevo** `ttlExpiracion`
            (= `ttlExpiracion` anterior + `dias`); `estado`, `subEstado`, `tipoBloqueo` y `fecha`
            permanecen sin cambios.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            **Conflicto con el estado del bloqueo en BD** (D-3); la RESERVA no se modifica. El cuerpo
            añade `motivo` al envelope de error estándar. Casos:
            - **TTL ya expirado** (`ttlExpiracion < ahora`): el bloqueo ya caducó; una extensión no
              puede "deshacer" una expiración ya ejecutada por el barrido.
            - **Bloqueo firme** (`estado = 'reserva_confirmada'`, `tipoBloqueo = 'firme'`, **sin
              TTL**): no hay TTL que extender.
            - **Sin fila bloqueante blanda vigente**: la RESERVA no tiene una fila activa en
              `FechaBloqueada` para `(tenant_id, fechaEvento)`.
            (F5-02: 409 = conflicto/precondición de bloqueo; 422 = guarda de estado / validación.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtenderBloqueoConflictoError'
        '422':
          description: |
            **Precondición de estado no extensible o cuerpo inválido** (D-3); la RESERVA no se muta.
            Casos:
            - **Estado sin bloqueo activo extensible**: `subEstado = '2a'` (sin fecha bloqueada) o un
              estado terminal (`2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`). El predicado
              declarativo `esEstadoConBloqueoBlandoExtensible` rechaza estos estados antes de tocar BD.
            - **`dias` inválido**: `0`, negativo o no entero (validación de cuerpo defensiva en
              servidor): "El número de días de extensión debe ser un entero positivo (≥ 1)".
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/visita:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Programar visita al espacio — transición 2.a/2.b/2.c→2.v (UC-07 / US-008)
      operationId: programarVisita
      description: |
        [US-008] Transición de un agregado RESERVA **existente** en sub-estado `2a`
        (exploratoria con `fechaEvento` definida), `2b` (con fecha + bloqueo blando) o `2c`
        (pendiente de invitados) hacia `2v` (visita programada). En una **única transacción**
        (`SELECT … FOR UPDATE` sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis
        ni locks distribuidos) ejecuta, all-or-nothing:
        1. RESERVA → `subEstado='2v'`, `visitaProgramadaFecha=fecha`, `visitaProgramadaHora=hora`,
           `visitaRealizada=false`.
        2. **INSERT-o-UPDATE** (upsert por `UNIQUE(tenant_id, fechaEvento)`) de `FechaBloqueada`
           con `ttlExpiracion = visitaProgramadaFecha + 1 día (23:59:59)` y `tipoBloqueo='blando'`:
           si venía de `2b`/`2c` (fila existente) se **actualiza** el TTL; si venía de `2a` (sin
           bloqueo) se **crea** la fila. El TTL deriva de la fecha de visita, **no** del setting
           `ttl_consulta_dias` (reutiliza la primitiva `resolverPlanBloqueo({ fase: '2.v' })`,
           US-040). El setting `TENANT_SETTINGS.max_dias_programar_visita` solo acota la **ventana
           de entrada** de `fecha`, no el TTL.
        3. `AUDIT_LOG accion='transicion'` (`datos_anteriores.sub_estado` ∈ {2a,2b,2c},
           `datos_nuevos.sub_estado='2v'`, `datos_nuevos.visita_programada_fecha`).

        Tras el COMMIT se dispara (post-commit, **no bloqueante**, motor de email US-045) el email
        **E6** de confirmación de visita y se registra en `COMUNICACION` (`codigo_email='E6'`,
        `estado='enviado'`, `reservaId`, `clienteId`): un fallo de envío **no** revierte la
        transición ni el bloqueo (design.md §D-6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramarVisitaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada: `subEstado='2v'`,
            `visitaProgramadaFecha`, `visitaProgramadaHora`, `visitaRealizada=false` y el nuevo
            `ttlExpiracion` del bloqueo (= fecha de visita + 1 día 23:59:59).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          # Cuerpo mal formado: `fecha`/`hora` ausentes o con formato inválido (no `date` / `HH:mm`).
          # La validación de dominio (ventana de fecha / guarda de origen) se reporta como 422.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Consulta en cola (`subEstado='2d'`): no es posible programar una visita directamente;
            la consulta debe ser **promovida primero** (`POST /reservas/{id}/promover`, UC-12). La
            RESERVA no se modifica. El cuerpo añade `motivo` al envelope de error estándar (F5-02:
            409 = conflicto/precondición de estado; 422 = guarda de transición/validación inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramarVisitaConflictoError' }
        '422':
          description: |
            No se puede transicionar a `2v`. Casos (la RESERVA NO se modifica):
            - **Guarda de origen**: el sub-estado de origen no es `2a`/`2b`/`2c` (p. ej. `2v` ya
              programada, o un terminal `2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`,
              inmutables).
            - **`2a` sin `fechaEvento`**: debe introducirse la fecha del evento antes de programar
              la visita.
            - **Fecha fuera de ventana**: `fecha ≤ hoy` (debe ser futura) o
              `fecha > hoy + TENANT_SETTINGS.max_dias_programar_visita` (fuera del límite).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Reservas]
      summary: Registrar resultado de visita — "interesado" (2.v→2.b) / "reserva inmediata" (2.v→pre_reserva) (UC-08/UC-14 · US-009/US-010)
      operationId: registrarResultadoVisita
      description: |
        Endpoint **polimórfico** que registra el **resultado de una visita** sobre un agregado RESERVA
        **existente** en sub-estado `2v` (visita programada) y marca la visita como realizada. El
        desenlace se selecciona por el enum `resultado` (`ResultadoVisita`). Estado de implementación:

        - `interesado` — **[US-009, implementado]** el cliente sigue interesado; la consulta vuelve a
          `2b` (con fecha + bloqueo blando) con un TTL **fresco** y se envía E7.
        - `reserva_inmediata` — **[US-010, implementado]** el cliente confirma en la visita; la consulta
          transiciona directamente a `pre_reserva` (sin pasar por `2b`).
        - `descarta` — **[US-011, RESERVADO]** aún no implementado; el servidor lo **rechaza con 422**
          hasta US-011. La forma polimórfica evita romper el contrato al añadirlo (solo se levanta la guarda).

        ---
        **`resultado='interesado'` (US-009 · 2.v→2.b)** — en una **única transacción** (`SELECT … FOR
        UPDATE` sobre la fila bloqueante; sin Redis ni locks distribuidos), all-or-nothing:
        1. RESERVA → `subEstado='2b'`, `visitaRealizada=true`,
           `ttlExpiracion = now + TENANT_SETTINGS.ttl_consulta_dias` (default 3). El TTL es **fresco**:
           se calcula desde el instante de la transición (`now`), **no** se acumula sobre el
           `ttlExpiracion` previo ni deriva de `visitaProgramadaFecha` (informativa). Reutiliza la
           primitiva `resolverPlanBloqueo({ fase: '2.b' })` (US-040).
        2. **UPDATE** del `ttlExpiracion` de la fila **existente** de `FechaBloqueada` de esa RESERVA
           al **mismo valor** que `RESERVA.ttlExpiracion`. La fila siempre existe (proviene de `2v`,
           US-008): es un UPDATE puro, sin INSERT ni DELETE. `tipoBloqueo` **permanece** `'blando'`.
        3. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'`
           (`datos_anteriores.sub_estado='2v'`, `datos_anteriores.visita_realizada=false`,
           `datos_nuevos.sub_estado='2b'`, `datos_nuevos.visita_realizada=true`).

        Tras el COMMIT se dispara (post-commit, **no bloqueante**, motor de email US-045) el email
        **E7** de confirmación de bloqueo post-visita (plazo de 3 días para decidir) y se registra en
        `COMUNICACION` (`codigo_email='E7'`, `estado='enviado'`, `reservaId`, `clienteId`): un fallo
        del proveedor **no** revierte la transición y queda trazado con `estado='fallido'` para
        reintento (design.md §D-4). Idempotencia `(reservaId, codigo_email)` de US-045.

        ---
        **`resultado='reserva_inmediata'` (US-010 · 2.v→pre_reserva)** — el cliente decide reservar en
        la propia visita. **Requiere datos completos** (validación UC-14, ver 422). En una **única
        transacción** (`SELECT … FOR UPDATE` sobre la fila bloqueante; sin Redis ni locks distribuidos),
        all-or-nothing:
        1. RESERVA → `estado='pre_reserva'`, `subEstado=null`, `visitaRealizada=true`,
           `ttlExpiracion = now + TENANT_SETTINGS.ttl_prereserva_dias` (default **7 días**, nunca
           hardcodeado). TTL **fresco** desde `now`.
        2. **UPDATE** de la fila **existente** de `FechaBloqueada` de esa RESERVA:
           `tipoBloqueo='blando'` y `ttlExpiracion` al **mismo valor** que `RESERVA.ttlExpiracion`
           (7 días). La fila siempre existe (proviene de `2v`, US-008): UPDATE puro, **sin INSERT ni
           DELETE**.
        3. **Vaciado de la cola A16** en la misma transacción: las RESERVA en `2d` cuyo
           `consultaBloqueanteId` apunta a esta pasan a `subEstado='2y'` (`posicionCola=null`,
           `consultaBloqueanteId=null`). Válido con **0 filas** en cola. Los emails A16 a la cola están
           **solo diseñados y NO se envían** en MVP.
        4. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'` para la principal
           (`datos_anteriores.sub_estado='2v'`, `datos_nuevos.estado='pre_reserva'`) + una entrada por
           cada consulta descartada de la cola (`2d→2y`).

        A diferencia de `interesado`, `reserva_inmediata` **NO envía email propio** (no dispara E7 ni
        E2). La atomicidad es all-or-nothing: nunca queda `pre_reserva` sin la `FechaBloqueada`
        actualizada ni la cola a medio vaciar, ni viceversa.

        ---
        El registro se permite **aunque `visitaProgramadaFecha > hoy`** (la fecha de visita es
        informativa, no una precondición estricta), para ambos desenlaces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultadoVisitaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada. El estado resultante depende del
            `resultado` enviado:
            - `interesado` (US-009): `estado='consulta'`, `subEstado='2b'`, `visitaRealizada=true` y el
              nuevo `ttlExpiracion` fresco (`now + TENANT_SETTINGS.ttl_consulta_dias`), idéntico al de
              su fila de `FechaBloqueada`.
            - `reserva_inmediata` (US-010): `estado='pre_reserva'`, `subEstado=null`,
              `visitaRealizada=true` y `ttlExpiracion` fresco (`now + TENANT_SETTINGS.ttl_prereserva_dias`,
              7 días por defecto), idéntico al de su fila de `FechaBloqueada` (ya en `tipoBloqueo='blando'`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          # Cuerpo mal formado: `resultado` ausente o no es string. La guarda de origen (estado) y el
          # valor de resultado no soportado se reportan como 422.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: |
            No se puede registrar el resultado. Casos (la RESERVA NO se modifica — rollback total):
            - **Guarda de origen**: el sub-estado de origen no es `2v` (p. ej. `2a`/`2b`/`2c`/`2d`, o
              un terminal `2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`, inmutables). Ambos
              desenlaces (`interesado`, `reserva_inmediata`) solo son válidos desde `2v`; validación
              defensiva en servidor, re-evaluada bajo el lock (`FOR UPDATE`).
            - **Datos obligatorios incompletos (solo `reserva_inmediata`, validación UC-14)**: para
              transicionar a `pre_reserva` la RESERVA y su CLIENTE deben tener datos completos. Faltan
              datos fiscales del CLIENTE (`dniNif`, `direccion`, `codigoPostal`, `poblacion`,
              `provincia`) y/o de la RESERVA (`fechaEvento`, `duracionHoras`, `numAdultosNinosMayores4`,
              `tipoEvento`). El cuerpo enumera los que faltan en `camposFaltantes` (schema
              `PresupuestoDatosFiscalesError`, `codigo='DATOS_FISCALES_INCOMPLETOS'`, reutilizado de
              UC-14). La RESERVA permanece en `2v` sin cambios.
            - **Resultado no soportado**: `resultado='descarta'` (US-011, aún no implementado). Solo
              `interesado` (US-009) y `reserva_inmediata` (US-010) se aceptan.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'

  # ============================ COLA ============================
  /reservas/{id}/cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Cola]
      summary: Visualizar cola de espera de la fecha de una reserva bloqueante (UC-11 / US-017)
      description: |
        Vista de **solo lectura** (US-017) que proyecta, para la RESERVA **bloqueante** `{id}`
        (la que posee la `FECHA_BLOQUEADA` activa), un read model con dos secciones:
        - **`bloqueante`**: cliente, `subEstado` (`2b`/`2c`/`2v`), `ttlExpiracion` (instante crudo)
          y `ttlRestante` (legible derivado en backend), más `visitaProgramadaFecha` cuando está
          en `2v`.
        - **`cola`**: RESERVA en `subEstado='2d'` cuyo `consultaBloqueanteId` apunta a la
          bloqueante, ordenadas **ASC por `posicionCola`** (FIFO), con `fechaCreacion` (instante
          crudo) y `tiempoEnCola` (legible derivado en backend).

        NO muta estado (no promueve, no saca de cola, no registra AUDIT_LOG). Los derivados
        temporales (`ttlRestante = ttlExpiracion − now()`, `tiempoEnCola = now() − fechaCreacion`)
        se calculan en backend sobre instantes `timestamptz`, nunca formateando fechas.

        **FA-04** — si la reserva `{id}` existe en el tenant pero **no** posee una
        `FECHA_BLOQUEADA` activa (no bloquea ninguna fecha), la respuesta es **200** con
        `estaBloqueada=false`, `bloqueante=null` y `cola=[]` (la UI muestra "Fecha disponible").
        El **404 se reserva exclusivamente** para reserva inexistente o de otro tenant (RLS).
      responses:
        '200':
          description: |
            Read model de la cola. Incluye tanto el caso con bloqueante activa (con o sin cola)
            como el caso FA-04 "fecha disponible" (`estaBloqueada=false`, `bloqueante=null`,
            `cola=[]`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ColaEsperaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/promover:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Promover una consulta de la cola a bloqueante (UC-12 — automática US-018 / manual US-019)
      operationId: promoverConsultaCola
      description: |
        Promueve una consulta en cola (`2.d → 2.b`) a bloqueante de su fecha. Dos modos que
        comparten operación de dominio y superficie HTTP, discriminados por el body/actor
        (decisión de contrato D-1, US-019):

        - **Automática (US-018, actor Sistema, SIN body)**: encadenamiento FIFO cuando la
          bloqueante se libera (`liberarFecha()`). El `{id}` es la **primera** de la cola
          (`posicionCola = 1`). No expira ninguna bloqueante (la fecha ya está libre).
        - **Manual (US-019, actor Gestor, body `PromoverManualRequest` con `confirmado: true`)**:
          acción DELIBERADA y DESTRUCTIVA disparada desde la vista de cola (US-017). El `{id}`
          es la RESERVA en `2.d` que el Gestor elige, **cualquier `posicionCola`** (no solo la
          primera). Como parte indivisible de la operación: (1) **expira forzosamente** la
          bloqueante activa a `2.x` (`ttlExpiracion → NULL`) si sigue viva; (2) promueve la
          elegida a `2.b` (`posicionCola`/`consultaBloqueanteId → NULL`, `ttlExpiracion → now() +
          tenant_settings.ttl_consulta_dias`); (3) **re-asigna** la fila de `FECHA_BLOQUEADA` a
          la promovida (una sola fila activa por `(tenant, fecha)` en todo momento); (4)
          **reordena la cola cerrando el hueco** (posiciones contiguas desde 1); (5) audita cada
          RESERVA modificada con `origen: 'promocion_manual'` y el `usuarioId` del Gestor.

        Todo en **una transacción** serializada por `SELECT … FOR UPDATE` sobre la fila de
        `FECHA_BLOQUEADA`, bajo el contexto **RLS del tenant** del JWT (nunca del path). La
        garantía anti-doble-promoción reside **exclusivamente en PostgreSQL** (`UNIQUE(tenant_id,
        fecha)` + `FOR UPDATE`), NUNCA en locks distribuidos.

        **Arbitraje (D-4, FIFO estricto + "gana quien toma el lock primero", decisión heredada de
        US-018 §D-6, sin cesión al Gestor)**: si el barrido automático de US-018 —u otro Gestor—
        adquiere el lock primero y ya promovió, la promoción manual **aborta sin cambios** con
        **409** ("La cola ya fue actualizada automáticamente, por favor recarga la vista").

        La promoción manual requiere **rol Gestor** del tenant (autorización por JWT); un actor
        sin rol suficiente recibe **403**.
      requestBody:
        # Opcional para preservar la compatibilidad con la promoción AUTOMÁTICA de US-018 (sin
        # body). Presente y con `confirmado: true` para la promoción MANUAL del Gestor (US-019).
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoverManualRequest' }
      responses:
        '200':
          description: |
            Consulta promovida a bloqueante (`2.b`). En la promoción manual, además, la bloqueante
            anterior quedó expirada a `2.x` y la cola reordenada; el cuerpo devuelve la RESERVA
            promovida.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # [US-019 D-4] Autenticado pero sin rol Gestor del tenant para la promoción manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # Reserva `{id}` inexistente o de otro tenant (RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de concurrencia/estado (mapeo F5-02: 409 = carrera perdida):
            - **Carrera perdida (US-019 D-4)**: el barrido automático (US-018) u otro Gestor ya
              actualizó la cola bajo el lock — "La cola ya fue actualizada automáticamente, por
              favor recarga la vista".
            - **Inconsistencia de bloqueo**: no existe una `FECHA_BLOQUEADA` activa para la fecha
              de la consulta elegida (una consulta en `2.d` sin fecha bloqueada).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: |
            Guarda de negocio inviolada (mapeo F5-02: 422 = transición/guarda inválida) sin efectos:
            - **Consulta ya no en cola (FA-05)**: la RESERVA `{id}` no está en `sub_estado = '2d'`
              (expiró, es terminal `2x`/`2y`/`2z`, o es la propia bloqueante) — "La consulta
              seleccionada ya no está en cola".
            - **Confirmación ausente**: la promoción manual llegó sin `confirmado: true`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/salir-cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Salir voluntariamente de la cola (UC-13)
      responses:
        '200':
          description: Reserva retirada de la cola
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ US-013: DESCARTE POR CLIENTE → 2z ============================
  # [US-013 / UC-10 · A17] Endpoint de ACCIÓN dedicado (Opción A confirmada en el Gate SDD, design.md
  # §D-5), calcado del patrón de las demás transiciones de RESERVA (POST /reservas/{id}/finalizar-evento,
  # /archivar): acción MANUAL del Gestor (JWT del usuario, RLS del tenant del JWT — NUNCA X-Cron-Token:
  # no es el barrido de TTL de US-012 que produce `2x`). Transiciona una única RESERVA en
  # `estado='consulta'` con `subEstado ∈ {2a,2b,2c,2d,2v}` (no terminal) a `subEstado='2z'` (descartada
  # por cliente, terminal e inmutable). Los efectos secundarios por origen (liberar FECHA_BLOQUEADA vía
  # `liberarFecha()`, promoción FIFO A15 vía `promoverPrimeroEnCola` en 2b/2v con cola, reordenación de
  # cola en 2d) son INTERNOS al backend (seams US-018/US-040/US-041) y NO se exponen en el contrato: el
  # contrato solo declara la acción y devuelve la RESERVA resultante. El `{id}` identifica la ÚNICA
  # RESERVA a descartar; `tenant_id` y `usuario_id` DERIVAN SIEMPRE del JWT, nunca del path ni del body.
  /reservas/{id}/descartar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Descartar una RESERVA — despacha por fase (consulta→2z / pre_reserva→reserva_cancelada) (UC-10 / US-013 + workstream B)
      operationId: descartarConsultaPorCliente
      description: |
        Acción única de negocio "descartar una RESERVA" cuyo efecto **depende de la fase actual de la
        RESERVA** (D-2, presupuesto-prereserva-cta-descarte-y-e2: se REUTILIZA este endpoint de US-013,
        NO se crea uno dedicado). El endpoint **despacha por el `estado` actual**:
        - `estado='consulta'` (`subEstado ∈ {2a,2b,2c,2d,2v}`) → **comportamiento US-013** (sin
          cambios): transición a `subEstado='2z'` (descartada por cliente, terminal).
        - `estado='pre_reserva'` (`subEstado=null`) → **transición nueva** (workstream B): la RESERVA
          pasa a `estado='reserva_cancelada'` (`subEstado=null`, `ttlExpiracion=null`, terminal).
        - cualquier otro estado (`reserva_confirmada` y posteriores) → **422** (origen inválido, sin
          efectos); una RESERVA ya terminal (`2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`) o
          una carrera perdida bajo el lock → **409**.

        El despacho por fase vive en un **use-case orquestador** en el backend (no en condicionales de
        negocio dispersos en el controller): el controller elige el caso de uso según `reserva.estado` y
        mapea los errores de dominio a HTTP. El body `{ motivo? }`, `@Roles('gestor')` y el
        `tenant_id`/`usuario_id` derivados del JWT se **conservan** para ambas fases; la firma HTTP no
        cambia (solo se amplía la semántica). El `{id}` identifica la ÚNICA RESERVA a descartar.

        ── Fase `consulta` (US-013) ──
        El **Gestor** (JWT de usuario, RLS del tenant del JWT — NUNCA `X-Cron-Token`) marca
        **en nombre del cliente** (no hay portal de cliente en el MVP) una RESERVA en
        `estado='consulta'` con `subEstado ∈ {2a,2b,2c,2d,2v}` como **descartada por cliente**,
        transicionándola a `subEstado='2z'` (terminal e **inmutable**). `2z` es un terminal
        semánticamente distinto de `2x` (expiración por TTL, US-012) y `2y` (vaciado de cola al activar
        pre-reserva, US-014); la máquina de estados declarativa lo modela como arista propia.

        En una **única transacción** atómica bajo el contexto RLS del tenant, serializada por
        `SELECT … FOR UPDATE` sobre la fila de `FECHA_BLOQUEADA` (cuando el origen tiene bloqueo) y/o
        sobre la fila RESERVA (sin Redis ni locks distribuidos), el sistema re-evalúa **bajo el lock** la
        guarda de origen y ejecuta los efectos secundarios **según el sub-estado de origen** (tabla
        declarativa design.md §D-1) — todo INTERNO al backend, no expuesto en el contrato:
        - `2a`: solo marca `2z` (no hay bloqueo ni cola).
        - `2b`/`2c`/`2v`: libera la FECHA_BLOQUEADA vía `liberarFecha()` (US-040/US-041).
        - `2b`/`2v` **con cola**: además dispara **una única vez** la promoción FIFO A15
          (`promoverPrimeroEnCola`, US-018/US-041): la primera en cola pasa a `2b` (nueva bloqueante) y
          el resto reordena. La respuesta refleja al menos el nuevo estado de la RESERVA descartada
          (`2z`); el frontend re-consulta la cola/pipeline para ver la promoción (mismo patrón que
          `POST /reservas/{id}/salir-cola` y `/promover`, que devuelven la RESERVA principal).
        - `2d`: sale de la cola (`posicionCola→null`, `consultaBloqueanteId→null`) y **decrementa** la
          posición del resto de la cola de la misma bloqueante; NO libera fecha ni promueve.

        Si el Gestor aporta `motivo`, se **anexa** a `RESERVA.notas` dentro de la misma transacción
        (decisión del Gate; append, no sobrescritura); sin `motivo` la transición completa igual y
        `notas` no se toca. Se escribe `AUDIT_LOG` `accion='transicion'`, `entidad='RESERVA'`,
        `datos_anteriores.sub_estado=<origen>`, `datos_nuevos.sub_estado='2z'`. **NO** se envía ningún
        email al cliente (esta acción no está mapeada a ningún código E1–E8). La auditoría de
        `liberarFecha()` y de la promoción las registran sus respectivos seams; esta acción NO las
        duplica.

        ── Fase `pre_reserva` (workstream B) ──
        El **Gestor** descarta manualmente una RESERVA en `estado='pre_reserva'` (`subEstado=null`),
        transicionándola al terminal `estado='reserva_cancelada'` (`subEstado=null`, `ttlExpiracion=null`)
        —el mismo destino que la expiración de TTL de la pre-reserva (`MAPA_EXPIRACION_TTL`), pero
        disparado deliberadamente por el Gestor. Es la transición **mono-origen** espejo de US-013 en la
        fase `pre_reserva`; el ÚNICO origen legal es `pre_reserva` (guarda declarativa
        `ORIGENES_TRANSICION_DESCARTAR_PRERESERVA`). En una **única transacción** atómica bajo el contexto
        RLS del tenant, serializada por `SELECT … FOR UPDATE` sobre la fila de `FECHA_BLOQUEADA` y la fila
        RESERVA (sin Redis ni locks distribuidos), el sistema re-evalúa **bajo el lock** la guarda de
        origen (detecta el doble clic / la carrera → 409) y ejecuta —todo INTERNO al backend, no expuesto
        en el contrato— la transición a `reserva_cancelada`, la liberación de la `FECHA_BLOQUEADA` vía la
        función canónica `liberarFecha()` (regla dura; nunca por otra vía) y, si existe cola activa
        (`2d` sobre esa fecha), la **misma** mecánica de promoción FIFO de US-018 (exactamente-una-vez).
        Todo es **all-or-nothing**: cualquier fallo revierte por completo (no queda fecha liberada sin la
        RESERVA cancelada, ni cola promovida a medias). Si el Gestor aporta `motivo`, se audita en el
        `AUDIT_LOG` (`datos_nuevos`) dentro de la misma transacción; su ausencia NO bloquea la transición.
        Se escribe `AUDIT_LOG` `accion='transicion'`, `entidad='RESERVA'`, par
        `pre_reserva → reserva_cancelada`.

        **Concurrencia (RC-1/RC-2/RC-3)**: el descarte, el barrido de TTL de US-012 y un doble clic del
        gestor se serializan por `SELECT … FOR UPDATE`; exactamente una operación gana. Un segundo
        descarte (o una carrera perdida contra el TTL) observa la RESERVA fuera de un sub-estado activo
        bajo el lock y termina como **409** (estado terminal inmutable), sin doble transición, sin doble
        AUDIT_LOG y sin doble liberación/promoción. La `UNIQUE(tenant_id, fecha)` impide dos bloqueos
        activos simultáneos sobre la misma fecha.
      requestBody:
        # Motivo OPCIONAL (design.md §D-5, Gate). Sin body — o body vacío — la transición completa
        # igual y no toca `RESERVA.notas`. `additionalProperties: false` cierra el shape.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DescartarConsultaRequest' }
      responses:
        '200':
          description: |
            RESERVA descartada: devuelve la RESERVA actualizada tras el commit. El estado destino depende
            de la fase de origen:
            - origen `consulta` → `estado='consulta'`, `subEstado='2z'` (terminal).
            - origen `pre_reserva` → `estado='reserva_cancelada'`, `subEstado=null`, `ttlExpiracion=null`
              (terminal).
            Ambos destinos ya están cubiertos por los enums de `Reserva` (`estado`/`subEstado`); el
            consumidor discrimina por el `estado` resultante. Si el origen (`2b`/`2v` con cola, o
            `pre_reserva` con cola) disparó la promoción A15, la RESERVA promovida cambia por separado; el
            frontend refleja ese cambio re-consultando la cola/pipeline (mismo patrón que `/salir-cola` y
            `/promover`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # Autenticado pero sin rol/tenant para la acción manual del Gestor.
          $ref: '#/components/responses/Forbidden'
        '404':
          # RESERVA `{id}` inexistente o de otro tenant (invisible bajo RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (mapeo F5-02; RC-3 / RC-1): la RESERVA `{id}` ya está en un estado/sub-estado
            terminal, así que ninguna transición de descarte es aplicable. Cubre ambas fases:
            - la RESERVA está en un sub-estado terminal (`2x`/`2y`/`2z`) o en un estado terminal
              (`reserva_cancelada`/`reserva_completada`);
            - el doble descarte concurrente (segunda petición) y la carrera perdida contra el barrido de
              TTL de US-012 (fase `consulta`) o contra la expiración de TTL de la pre-reserva (fase
              `pre_reserva`), que ya dejó la RESERVA en `reserva_cancelada`.
            Sin efectos, sin doble transición, sin liberar/promover.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DescartarConsultaConflictError' }
        '422':
          description: |
            Origen inválido (mapeo F5-02; workstream B): la RESERVA `{id}` está en un estado que **no es
            descartable** —ni `consulta` (+sub-estados válidos) ni `pre_reserva`— sino `reserva_confirmada`
            o posteriores no terminales. La guarda de transición de descarte falla **sin efectos** (no muta
            ninguna entidad, no libera fecha ni promueve cola). Distinto del 409 (que es RESERVA ya
            terminal / carrera perdida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DescartarReservaOrigenInvalidoError' }

  # ============================ PRESUPUESTOS / TARIFAS ============================
  /tarifas/calcular:
    post:
      tags: [Presupuestos]
      summary: Calcular tarifa según configuración (UC-16 / US-016)
      description: >-
        Motor de tarifa (US-016, lectura pura, multi-tenant por JWT). Determina la temporada del mes
        de `fecha_evento`, busca la TARIFA vigente por temporada x duración x tramo de invitados y suma
        los extras del catálogo del tenant. Devuelve el esquema canónico D-1. Con
        `num_adultos_ninos_mayores4 > 50` responde 200 con `tarifa_a_consultar: true` e importes `null`
        (precio manual), SIN error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculoTarifaRequest'
      responses:
        '200':
          description: 'Tarifa calculada (caso normal) o tarifa a consultar (>50 invitados): mismo esquema canónico.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculoTarifaResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 'EXTRA_NO_ENCONTRADO: un extra no existe, está inactivo o no es visible en el tenant (RLS).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CalculoTarifaExtraNoEncontradoError' }
        '422':
          description: >-
            Configuración incompleta del tarifario: `TARIFA_NO_CONFIGURADA` (sin TARIFA vigente para una
            combinación válida con <= 50 invitados) o `TEMPORADA_NO_CONFIGURADA` (mes sin mapear en
            TEMPORADA_CALENDARIO).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  # [DECISIÓN F2-04 · RESUELTA] Catálogo de extras expuesto por API en el MVP: el frontend
  # (selector del borrador de presupuesto, US-014) lo consume vía GET /extras. Implementado en
  # el módulo `tarifas` (ListarExtrasController + CatalogoExtrasPort), filtrado por tenant (RLS).
  /extras:
    get:
      tags: [Presupuestos]
      summary: Listar catálogo de extras del tenant
      responses:
        '200':
          description: Catálogo de extras configurables
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Extra' }

  # ============================ US-014: PRESUPUESTO (preview + confirmar) ============================
  # [US-014 / UC-14] Dos endpoints dedicados que sustituyen al POST /reservas/{id}/presupuestos (plural,
  # DEPRECADO abajo). Decisión de contrato D-8 (Gate SDD aprobado): preview NO persiste, confirmar es la
  # transacción única (PRESUPUESTO + pre_reserva + bloqueo 7d + vaciado cola A16 + AUDIT_LOG) + E2
  # post-commit. Mapeo HTTP heredado de F5-02: 409 = conflicto/concurrencia (UNIQUE tenant_id+fecha /
  # guarda de estado); 422 = validación/guarda de negocio (datos fiscales, tarifario, precio manual).
  /reservas/{id}/presupuesto/preview:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Calcular borrador del presupuesto sin persistir (UC-14 / US-014)
      operationId: previewPresupuesto
      description: |
        [US-014] Calcula el **borrador editable** del presupuesto de la RESERVA `{id}` delegando el
        cálculo al **motor de tarifa** (US-016, capability `calculo-tarifa`). **NO persiste** nada: no
        crea PRESUPUESTO, no muta `RESERVA.estado`/`subEstado`/`ttlExpiracion` ni `FechaBloqueada`, y no
        envía ningún email. Es una operación de solo cálculo para revisar y ajustar antes de confirmar.

        **Guarda de origen** (máquina de estados declarativa): solo se permite sobre una RESERVA en
        `estado='consulta'` con `subEstado ∈ {2a,2b,2c,2v}` y **sin** PRESUPUESTO `enviado`/`aceptado`
        previo. El origen `2d` (cola), los terminales (`2x`/`2y`/`2z`) y `pre_reserva`+ se rechazan
        **antes** de invocar el motor de tarifa.

        **Validación fiscal previa** (síncrona, antes del motor): la RESERVA debe tener `fechaEvento`
        (futura válida), `duracionHoras`, `numAdultosNinosMayores4 ≥ 1`, `tipoEvento`, y el CLIENTE
        **todos** los datos fiscales no nulos (`dniNif`, `direccion`, `codigoPostal`, `poblacion`,
        `provincia`). Si falta alguno → 422 enumerando los campos faltantes.

        **Caso `tarifa_a_consultar`** (>50 invitados): el motor devuelve importes `null`; la respuesta
        propaga `tarifaAConsultar=true` y el desglose fiscal queda `null` salvo que se envíe
        `precioManualEur`, con el que se recalcula el desglose (base = total / 1.21, IVA 21%).
      requestBody:
        # Opcional: sin body calcula el borrador con los datos actuales de la RESERVA (sin extras extra,
        # sin descuento). Con body se simulan extras/descuento/precio manual para previsualizar el total.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PreviewPresupuestoRequest' }
      responses:
        '200':
          description: |
            Borrador calculado (NO persistido). Incluye el desglose fiscal (base, IVA 21%, total),
            los extras, el reparto 40%/60%/fianza y `tarifaAConsultar`. Si `tarifaAConsultar=true` sin
            `precioManualEur`, los importes fiscales son `null` (el Gestor debe introducir el precio).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoPreviewResponse' }
        '400':
          # Cuerpo mal formado (tipos inválidos en extras/descuento/precio). La validación de dominio
          # (datos fiscales, tarifario, guarda de origen) se reporta como 422/409.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Guarda de origen / precondición de estado (F5-02: 409 = conflicto de estado). La RESERVA no
            es un origen válido: está en `2d` (cola), en un terminal (`2x`/`2y`/`2z`), en `pre_reserva`+,
            o ya tiene un PRESUPUESTO `enviado`/`aceptado` (remite a la edición, UC-15). No se ejecuta el
            motor de tarifa ni se muta nada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422 = guarda/validación inválida). Casos:
            - **Datos fiscales/de la reserva incompletos (FA-01)**: falta `dniNif`/`direccion`/
              `codigoPostal`/`poblacion`/`provincia` del CLIENTE o datos de la RESERVA — el cuerpo
              enumera los campos faltantes en `camposFaltantes`.
            - **Tarifario incompleto**: el motor de tarifa lanzó `TARIFA_NO_CONFIGURADA` o
              `TEMPORADA_NO_CONFIGURADA` (num_invitados ≤ 50). El cuerpo lleva `codigo`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  /reservas/{id}/presupuesto:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Confirmar presupuesto y activar pre-reserva (UC-14 / US-014)
      operationId: confirmarPresupuesto
      description: |
        [US-014] **Confirma** el borrador: en una **única transacción de BD** (bajo el contexto RLS del
        tenant del JWT), all-or-nothing:
        1. Crea el PRESUPUESTO **congelado** (`version=1`, `tarifaCongelada=true`, `estado='enviado'`,
           `ivaPorcentaje='21.00'`, desglose fiscal `baseImponible`/`ivaImporte`/`total`, `tarifaId` de la
           TARIFA usada — `null` en el caso `tarifa_a_consultar` con `precioManualEur`).
        2. Transiciona la RESERVA `{2a,2b,2c,2v} → pre_reserva` y fija
           `ttlExpiracion = now() + TENANT_SETTINGS.ttl_prereserva_dias` (7 d por defecto, nunca
           hardcodeado).
        3. **Insert-o-update** de `FechaBloqueada(tenant_id, fechaEvento)` a `tipoBloqueo='blando'`,
           `ttlExpiracion` a 7 d (INSERT si venía de `2a` sin fila; UPDATE del TTL si venía de
           `2b`/`2c`/`2v`). `SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin locks distribuidos.
        4. **Vacía la cola A16**: las RESERVA en `2d` que apuntan a esta (`consultaBloqueanteId`) pasan a
           `2y` (`posicionCola=NULL`, `consultaBloqueanteId=NULL`). Los emails A16 a la cola están
           **solo diseñados y NO se envían** en MVP.
        5. `AUDIT_LOG accion='transicion'` para la RESERVA principal + una entrada por cada consulta
           descartada de la cola.

        Tras el COMMIT dispara (post-commit, **no bloqueante**, motor de email US-045, idempotente por
        `(reserva_id, codigo_email=E2)`) el email **E2** con el PDF del presupuesto adjunto por
        `pdfUrl`: un fallo de envío **no** revierte la pre-reserva (queda trazado en `COMUNICACION`).

        **Precio manual obligatorio** cuando el motor devuelve `tarifa_a_consultar=true` (>50
        invitados): el body DEBE incluir `precioManualEur`; su ausencia → 422.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmarPresupuestoRequest' }
      responses:
        '201':
          description: |
            PRESUPUESTO congelado creado y RESERVA elevada a `pre_reserva`. Devuelve el PRESUPUESTO
            (desglose fiscal completo, `tarifaId`, `tarifaCongelada`, `ivaPorcentaje`, `total`, `pdfUrl`
            si aplica) y el estado/TTL resultante de la RESERVA.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarPresupuestoResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado o de concurrencia (F5-02: 409 = conflicto/carrera determinista). Casos
            (la RESERVA no queda en estado intermedio observable — rollback total):
            - **Fecha no disponible (race D4)**: otra transacción ganó el `UNIQUE(tenant_id, fecha)` /
              el `SELECT … FOR UPDATE` sobre la misma `(tenant, fechaEvento)` — "Fecha no disponible".
            - **Doble clic**: una confirmación simultánea del mismo presupuesto ya aplicó la transición;
              la RESERVA ya no está en `{2a,2b,2c,2v}`.
            - **Guarda de origen / presupuesto existente**: la RESERVA está en `2d`/terminal/`pre_reserva`+
              o ya tiene un PRESUPUESTO `enviado`/`aceptado` (remite a la edición, UC-15).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422 = guarda/validación inválida). Casos:
            - **Datos fiscales/de la reserva incompletos (FA-01)**: el cuerpo enumera `camposFaltantes`.
            - **Tarifario incompleto**: `TARIFA_NO_CONFIGURADA` / `TEMPORADA_NO_CONFIGURADA`.
            - **Precio manual requerido y ausente (FA-02)**: `tarifa_a_consultar=true` (>50 invitados)
              sin `precioManualEur` en el body.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'
                  - $ref: '#/components/schemas/PresupuestoPrecioManualRequeridoError'
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  # ============================ US-015: EDITAR / REENVIAR PRESUPUESTO (pre_reserva) ============================
  # [US-015 / UC-15] Edición versionada del PRESUPUESTO mientras la RESERVA está en `pre_reserva`, más el
  # reenvío sin cambios. Tres endpoints dedicados (preview / edicion / reenvio) que SUSTITUYEN al placeholder
  # PATCH /presupuestos/{id} (marcado DEPRECADO abajo). Decisiones D1–D5 del gate SDD (2026-07-15):
  #   D1: reenvío reutiliza el template E2 con `es_reenvio=true` (sin código de email nuevo, sin migración).
  #   D2: fila nueva por versión (inmutable), vigente = MAX(version); cada ENVÍO consume un `numeroPresupuesto`
  #       `AAAANNN` nuevo; borrador no enviado → `numeroPresupuesto=null`; reenvío sin cambios NO versiona ni
  #       consume número.
  #   D3: líneas RESERVA_EXTRA ligadas a la RESERVA (conjunto vivo, MVP sin migración); el server congela el
  #       `precioUnitario` de las líneas nuevas — el body NUNCA dicta el precio.
  # Mapeo HTTP idéntico a US-014: 409 = origen/estado inválido (RESERVA fuera de pre_reserva / PRESUPUESTO
  # aceptado o rechazado); 422 = validación/guarda de negocio (descuento > base, duración inválida, precio
  # manual requerido, datos fiscales incompletos); 404 = reserva no encontrada / cross-tenant. `tenant_id` y
  # `usuario_id` SIEMPRE del JWT, nunca del body/path. Rol `gestor`.
  /reservas/{id}/presupuesto/edicion/preview:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Recalcular el borrador de la edición sin persistir (UC-15 / US-015)
      operationId: previewEdicionPresupuesto
      description: |
        [US-015] Recalcula el borrador de la **edición** del presupuesto de la RESERVA `{id}` (que está en
        `pre_reserva`) con los cambios propuestos (`numAdultosNinosMayores4`, `duracionHoras`, líneas de
        extras, `descuentoEur`, `precioManualEur`), delegando en el **motor de tarifa** (US-016) cuando
        cambian invitados o duración. **NO persiste** nada: no crea versión de PRESUPUESTO, no crea/modifica
        líneas `RESERVA_EXTRA`, no muta `RESERVA.estado`/`ttlExpiracion` ni `FechaBloqueada`, y no envía email.

        **Guarda de origen** (máquina de estados declarativa): solo se permite sobre una RESERVA en
        `estado='pre_reserva'` cuyo **último** PRESUPUESTO está en `estado ∈ {borrador, enviado}`. Si la
        RESERVA no está en `pre_reserva`, o el último PRESUPUESTO está `aceptado`/`rechazado`, se rechaza con
        409 **antes** de invocar el motor de tarifa.

        **Precio congelado de extras**: el `precioUnitario` de cada línea nueva lo **congela el servidor** con
        el precio actual del EXTRA del catálogo; el body NO dicta el precio de líneas nuevas. Las líneas ya
        existentes conservan su precio congelado.

        **Caso `tarifaAConsultar`** (>50 invitados): el motor devuelve importes `null`; la respuesta propaga
        `tarifaAConsultar=true` y el desglose fiscal queda `null` salvo que se envíe `precioManualEur`, con el
        que se recalcula el desglose (base = total / 1.21, IVA 21% en régimen con_iva).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EdicionPresupuestoPreviewRequest' }
      responses:
        '200':
          description: |
            Borrador de la edición recalculado (NO persistido). Incluye el desglose fiscal (base, IVA 21%,
            total), las líneas de extras con `precioUnitario` congelado por el server, el reparto 40/60/fianza
            y `tarifaAConsultar`. Si `tarifaAConsultar=true` sin `precioManualEur`, los importes fiscales son
            `null` (el Gestor debe introducir el precio).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EdicionPresupuestoPreviewResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Guarda de origen / precondición de estado (409 = conflicto de estado). La RESERVA no está en
            `pre_reserva`, o su último PRESUPUESTO está `aceptado`/`rechazado` (no editable). No se ejecuta el
            motor de tarifa ni se muta nada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
          description: |
            Validación de negocio sin efectos. Casos:
            - **`descuentoEur` inválido**: negativo o mayor que la `baseImponible` calculada.
            - **`duracionHoras` inválida**: fuera de `{4,8,12}`.
            - **Datos fiscales/de la reserva incompletos**: falta `dniNif`/`direccion`/`codigoPostal`/
              `poblacion`/`provincia` del CLIENTE o datos de la RESERVA — el cuerpo enumera `camposFaltantes`.
            - **Tarifario incompleto**: `TARIFA_NO_CONFIGURADA` / `TEMPORADA_NO_CONFIGURADA` (≤50 invitados).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PresupuestoEdicionValidacionError'
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  /reservas/{id}/presupuesto/edicion:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Confirmar la edición y crear nueva versión del presupuesto (UC-15 / US-015)
      operationId: editarPresupuesto
      description: |
        [US-015] **Confirma** la edición: en una **única transacción de BD** (bajo el contexto RLS del tenant
        del JWT) crea un PRESUPUESTO nuevo con `version = MAX(version de la reserva) + 1`, `tarifaCongelada=true`,
        `ivaPorcentaje` según régimen (21% con_iva / 0% sin_iva) y el desglose fiscal congelado
        (`baseImponible`/`ivaImporte`/`total`/`descuentoEur`/`descuentoMotivo`). El PRESUPUESTO **anterior
        persiste como historial** (no se borra ni sobrescribe); la unicidad `(reservaId, version)` serializa
        (colisión `P2002` ⇒ reintento recalculando `MAX+1`). Las líneas `RESERVA_EXTRA` se materializan con el
        `precioUnitario` **congelado por el server** (`origen='anadido_post_confirmacion'`, `facturaId=null`).

        El campo `enviar` decide el desenlace:
        - **`enviar=true`**: `estado='enviado'`, consume un `numeroPresupuesto` `AAAANNN` **nuevo** de la
          secuencia del régimen, regenera el PDF y, post-commit (no bloqueante, idempotente por reenvío),
          dispara el email **E2** registrando una `COMUNICACION` con `codigoEmail='E2'`, `estado='enviado'` y
          `esReenvio=true` (esquiva el índice UNIQUE parcial `(reserva_id, codigo_email) WHERE es_reenvio=false`)
          + `AUDIT_LOG accion='actualizar'` con el nuevo `idPresupuesto`.
        - **`enviar=false`**: `estado='borrador'`, `numeroPresupuesto=null`, **sin** COMUNICACION ni email
          (queda disponible para enviarse más tarde). Sí registra `AUDIT_LOG accion='actualizar'`.

        **Invariantes**: `RESERVA.estado` permanece `pre_reserva` y `FechaBloqueada.ttlExpiracion` **NO** se
        modifica (UC-15 no extiende el bloqueo; no toca el bloqueo atómico de fecha).

        **Precio manual obligatorio** cuando el motor devuelve `tarifaAConsultar=true` (>50 invitados): el body
        DEBE incluir `precioManualEur`; su ausencia → 422.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EdicionPresupuestoRequest' }
      responses:
        '201':
          description: |
            Nueva versión del PRESUPUESTO creada (`version = anterior + 1`, `tarifaCongelada=true`). Devuelve el
            PRESUPUESTO congelado, el reparto 40/60/fianza y la RESERVA (que sigue en `pre_reserva`). Con
            `enviar=true` incluye `estado='enviado'` y `numeroPresupuesto`; con `enviar=false`, `estado='borrador'`
            y `numeroPresupuesto=null`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EdicionPresupuestoResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (409). La RESERVA no está en `pre_reserva`, o su último PRESUPUESTO está
            `aceptado`/`rechazado` (no editable). Rollback total: sin nueva versión ni líneas `RESERVA_EXTRA`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
          description: |
            Validación de negocio sin efectos. Casos:
            - **`descuentoEur` inválido**: negativo o mayor que la `baseImponible`.
            - **`duracionHoras` inválida**: fuera de `{4,8,12}`.
            - **Precio manual requerido y ausente**: `tarifaAConsultar=true` (>50 invitados) sin `precioManualEur`.
            - **Datos fiscales/de la reserva incompletos**: el cuerpo enumera `camposFaltantes`.
            - **Tarifario incompleto**: `TARIFA_NO_CONFIGURADA` / `TEMPORADA_NO_CONFIGURADA`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PresupuestoEdicionValidacionError'
                  - $ref: '#/components/schemas/PresupuestoPrecioManualRequeridoError'
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  /reservas/{id}/presupuesto/reenvio:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Reenviar la versión vigente del presupuesto sin cambios (UC-15 / US-015)
      operationId: reenviarPresupuesto
      description: |
        [US-015] Reenvía **sin cambios** el PDF de la versión **vigente** (`MAX(version)`) del PRESUPUESTO de la
        RESERVA `{id}` (en `pre_reserva`). **NO crea** una versión nueva, **NO consume** un `numeroPresupuesto`
        y **NO recalcula** el desglose ni crea/modifica líneas `RESERVA_EXTRA`. Registra una nueva `COMUNICACION`
        con `codigoEmail='E2'`, `estado='enviado'` y `esReenvio=true` (esquiva el índice UNIQUE parcial, patrón
        US-023/US-028) + `AUDIT_LOG accion='actualizar'`, y deja la versión vigente en `estado='enviado'`.

        **Invariantes**: `RESERVA.estado` permanece `pre_reserva` y `FechaBloqueada.ttlExpiracion` **NO** cambia.
        No hay body (opera sobre la versión vigente derivada por el server).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReenviarPresupuestoRequest' }
      responses:
        '200':
          description: |
            Reenvío registrado. Devuelve el PRESUPUESTO vigente (sin cambios de versión ni número) y la
            COMUNICACION E2 (`esReenvio=true`) generada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReenviarPresupuestoResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (409). La RESERVA no está en `pre_reserva`, o su último PRESUPUESTO está
            `aceptado`/`rechazado`, o no existe un PRESUPUESTO vigente que reenviar. Sin efectos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }

  # transacción única (DOCUMENTO justificante + transición pre_reserva→reserva_confirmada +
  # upgrade bloqueo a firme + congelado importes + init sub-procesos + FICHA_OPERATIVA + AUDIT_LOG)
  /reservas/{id}/confirmar-senal:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Confirmar pago de señal y activar reserva confirmada (UC-17 / US-021)
      operationId: confirmarSenal
      description: |
        [US-021] El Gestor sube el **justificante de pago de la señal** (un fichero) y, sobre una
        RESERVA en `estado='pre_reserva'`, la **confirma**. En una **única transacción de BD** (bajo
        el contexto RLS del tenant del JWT), all-or-nothing:
        1. Valida en servidor (autoritativo): `estado='pre_reserva'`, `importeTotal > 0` y que se
           adjunta **exactamente un** fichero con `mimeType ∈ {image/jpeg, image/png, application/pdf}`
           y tamaño ≤ 10 MB.
        2. Crea un DOCUMENTO con `tipo='justificante_pago'`, `reservaId`, `tenantId` (del JWT), `url`
           del fichero almacenado y `mimeType`.
        3. Transiciona la RESERVA `pre_reserva → reserva_confirmada` y fija `ttlExpiracion = null`
           (la reserva confirmada no expira por TTL). Guarda de origen en la máquina de estados
           declarativa.
        4. **Upgrade del bloqueo a firme**: promueve la fila existente de `FechaBloqueada(tenant_id,
           fechaEvento)` a `tipoBloqueo='firme'`, `ttlExpiracion=null` mediante **UPDATE** (nunca
           delete+insert), sin alterar `reservaId`, reutilizando `bloquearFecha(fase='reserva_confirmada')`
           (`SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin locks distribuidos).
        5. **Congela importes**: `importeSenal = round(importeTotal × TENANT_SETTINGS.pct_senal/100, 2)`
           (40% MVP, derivado del setting, nunca hardcodeado) e `importeLiquidacion = importeTotal −
           importeSenal` (complemento por resta: `senal + liquidacion = total` exacto).
        6. **Inicializa los tres sub-procesos**: `preEventoStatus='pendiente'`,
           `liquidacionStatus='pendiente'`, `fianzaStatus='pendiente'`.
        7. Crea de forma **idempotente** la FICHA_OPERATIVA vacía (1:1 por `reserva_id @unique`,
           `fichaCerrada=false`, campos de contenido `null`); si ya existe, no la duplica y la
           transición continúa sin error.
        8. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'`, `datos_anteriores.estado='pre_reserva'`,
           `datos_nuevos.estado='reserva_confirmada'`, con el usuario del Gestor.

        Tras el COMMIT, el sistema **presenta la factura de señal en borrador** para revisión (disparo
        de US-022/UC-18): es un efecto **posterior al commit** y su ausencia/fallo NO revierte la
        confirmación. Este change **no genera ni aprueba** la FACTURA, **no** genera condiciones
        particulares (US-023) y **no** envía el email E3 (E3 se dispara solo tras aprobar la factura y
        generar las condiciones). El indicador `facturaSenalBorrador` de la respuesta es OPCIONAL y solo
        se puebla si el disparo de US-022 ya materializó el borrador; su contrato real es de US-022.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [justificante]
              properties:
                justificante:
                  type: string
                  format: binary
                  description: >-
                    Fichero justificante del pago de la señal. Formatos permitidos: `image/jpeg`,
                    `image/png`, `application/pdf`. Tamaño máximo 10 MB. Obligatorio.
      responses:
        '200':
          description: |
            RESERVA elevada a `reserva_confirmada`. Devuelve la RESERVA con `estado='reserva_confirmada'`,
            `ttlExpiracion=null`, `importeSenal`/`importeLiquidacion` congelados, los tres sub-procesos en
            `pendiente`, el DOCUMENTO justificante creado y (opcionalmente) la factura de señal en borrador.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarSenalResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado o de concurrencia (F5-02: 409 = conflicto/carrera determinista). Casos
            (la RESERVA no queda en estado intermedio observable — rollback total):
            - **La reserva ya ha sido confirmada** (doble clic / dos sesiones sobre la MISMA reserva): la
              primera transacción ganó el `SELECT … FOR UPDATE` y completó la transición; la segunda
              observa la RESERVA ya en `reserva_confirmada` y aborta sin crear un segundo DOCUMENTO ni una
              segunda FICHA_OPERATIVA.
            - **Fecha no disponible** (race D4): la `(tenant_id, fechaEvento)` ya está en bloqueo firme de
              **otra** RESERVA; el upgrade choca con `UNIQUE(tenant_id, fecha)` (`P2002`) antes de mutar la
              segunda RESERVA.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarSenalConflictoError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422 = guarda/validación inválida). No se crea
            DOCUMENTO, no se muta la RESERVA ni la `FechaBloqueada`, no se registra transición. Casos:
            - **Guarda de origen**: la RESERVA no está en `pre_reserva` (cualquier sub-estado de
              `consulta`, `reserva_confirmada`+, o `reserva_cancelada`) → "La reserva no está en estado
              pre_reserva".
            - **Justificante ausente**: no se adjuntó fichero → "Es obligatorio adjuntar el justificante
              de pago".
            - **Formato/tamaño inválido**: `mimeType` no permitido o fichero > 10 MB.
            - **Importe total no válido**: `importeTotal` es 0/null (no hay presupuesto aceptado previo).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarSenalValidacionError' }

  # [US-024 / UC-19 segundo flujo] Registro de la FIRMA de las condiciones particulares. Espejo del
  # patrón multipart de `confirmar-senal` (US-021): multipart/form-data, campo binario obligatorio,
  # mime whitelist {image/jpeg, image/png, application/pdf}, ≤ 10 MB, validación autoritativa en
  # servidor, crea un DOCUMENTO `tipo='condiciones_particulares'` en la misma transacción. A diferencia
  # de `confirmar-senal`, NO transiciona el estado (design.md §D-no-transicion): solo marca
  # `cond_part_firmadas=true` + `cond_part_firmadas_fecha=now()`. Endpoint DISTINTO del
  # `/reservas/{id}/condiciones-particulares` (JSON, genérico) preexistente. Ruta y campo fijados en
  # el Gate 1 humano: `condiciones-firmadas` + campo `condicionesFirmadas`, @Roles('gestor'),
  # @HttpCode(200). Códigos (Gate 1): 409 CONDICIONES_NO_ENVIADAS si `cond_part_enviadas_fecha` es
  # nulo; 422 para guarda de estado (terminal / fuera de {reserva_confirmada, evento_en_curso,
  # post_evento}) y validación de fichero (ausente / mime no permitido / > 10 MB).
  /reservas/{id}/condiciones-firmadas:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Registrar la firma de las condiciones particulares (UC-19 / US-024)
      operationId: registrarCondicionesFirmadas
      description: |
        [US-024] El **Gestor** sube la **copia firmada** de las condiciones particulares (segundo flujo
        de UC-19; el primer flujo —generación y envío de E3— es US-023). Sobre una RESERVA a la que ya
        se enviaron las condiciones (E3, `cond_part_enviadas_fecha` no nulo) y en un estado válido, en
        una **única transacción de BD** (bajo el contexto RLS del tenant del JWT), all-or-nothing:
        1. **Guardas de servidor** (autoritativas, antes de mutar):
           - `RESERVA.cond_part_enviadas_fecha` **no nulo** (E3 enviado en US-023). Si es nulo → **409**
             (`CONDICIONES_NO_ENVIADAS`) "Las condiciones particulares no han sido enviadas al cliente
             aún"; sin efectos.
           - `RESERVA.estado ∈ {reserva_confirmada, evento_en_curso, post_evento}`. Si es terminal
             (`reserva_completada`, `reserva_cancelada`) o cualquier otro → **422** (`ESTADO_INVALIDO`)
             "No se puede registrar la firma en una reserva en estado terminal"; sin efectos.
           - Se adjunta **exactamente un** fichero con `mimeType ∈ {image/jpeg, image/png,
             application/pdf}` y tamaño ≤ 10 MB. Si falta / formato no permitido / > 10 MB → **422**
             (`CONDICIONES_REQUERIDAS` / `FORMATO_NO_PERMITIDO` / `TAMANO_EXCEDIDO`); sin efectos.
        2. Sube el fichero firmado al almacén de documentos (clave por reserva versionada, se conservan
           todas las versiones) y **crea una nueva fila DOCUMENTO** con `tipo='condiciones_particulares'`,
           `reservaId`, `tenantId` (del JWT), `url`, `mimeType`, `nombreArchivo`, `tamanoBytes`. El
           DOCUMENTO **original no firmado** (US-023, mismo `tipo`) **permanece**: no se sustituye ni se
           elimina (conviven dos filas del mismo tipo).
        3. Actualiza `RESERVA.cond_part_firmadas=true` y `RESERVA.cond_part_firmadas_fecha=now()`.
           **No transiciona `estado`** ni ningún sub-proceso (`preEventoStatus`/`liquidacionStatus`/
           `fianzaStatus` intactos).
        4. `AUDIT_LOG accion='actualizar'`, `entidad='RESERVA'`,
           `datos_anteriores.cond_part_firmadas` (su valor previo), `datos_nuevos.cond_part_firmadas=true`
           + `datos_nuevos.cond_part_firmadas_fecha`, con el usuario del Gestor.

        **Re-firma permitida (no idempotente por diseño)**: si `cond_part_firmadas` ya es `true`, la
        operación NO se rechaza — crea otra versión del DOCUMENTO, actualiza `cond_part_firmadas_fecha`
        al nuevo timestamp, mantiene el flag en `true` y conserva el histórico (design.md §D-re-firma).
        Cada subida es una versión firmada nueva. Si el envío al almacén o cualquier escritura falla, la
        transacción **revierte por completo** (sin DOCUMENTO huérfano ni RESERVA mutada).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [condicionesFirmadas]
              properties:
                condicionesFirmadas:
                  type: string
                  format: binary
                  description: >-
                    Copia firmada de las condiciones particulares. Formatos permitidos: `image/jpeg`,
                    `image/png`, `application/pdf`. Tamaño máximo 10 MB. Obligatorio.
      responses:
        '200':
          description: |
            Firma registrada. Devuelve la RESERVA con `condPartFirmadas=true` y `condPartFechaFirma`
            (timestamp del registro) y el DOCUMENTO firmado creado. El `estado` de la reserva y los
            sub-procesos no cambian.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarCondicionesFirmadasResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            La operación requiere un prerequisito del flujo que no se cumple: las condiciones
            particulares aún NO han sido enviadas al cliente por E3 (`RESERVA.cond_part_enviadas_fecha`
            es nulo, US-023). No se crea DOCUMENTO, no se muta RESERVA ni se registra AUDIT_LOG.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CondicionesFirmadasConflictoError' }
        '422':
          description: |
            Validación de negocio sin efectos (guarda de estado o validación de fichero). No se crea
            DOCUMENTO, no se muta `RESERVA.cond_part_firmadas`/`cond_part_firmadas_fecha` ni se registra
            AUDIT_LOG. Un `codigo` de dominio discrimina el caso:
            - **Guarda de estado**: la RESERVA está en un estado terminal (`reserva_completada`,
              `reserva_cancelada`) o fuera de `{reserva_confirmada, evento_en_curso, post_evento}`.
            - **Fichero ausente / formato no permitido / tamaño excedido**.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CondicionesFirmadasValidacionError' }

  # [US-033 / UC-24] Captura de la documentación obligatoria del evento. Espejo del patrón multipart
  # de `confirmar-senal` (US-021) y `condiciones-firmadas` (US-024): multipart/form-data, campo
  # binario obligatorio (`archivo`), mime whitelist {image/jpeg, image/png, application/pdf}, ≤ 10 MB,
  # validación autoritativa en servidor. A diferencia de `confirmar-senal`, NO transiciona el estado
  # (design.md §D-no-transicion): crea una fila DOCUMENTO (`accion='crear'`) del `tipo` indicado
  # (dni_anverso | dni_reverso | clausula_responsabilidad) y devuelve el checklist actualizado. La
  # subida es NO idempotente (design.md §D-no-idempotencia): re-subir el mismo tipo crea una fila
  # nueva y conserva el histórico. @Roles('gestor'), @HttpCode(201) (creación de recurso, Gate 1).
  # Guarda de escritura: `RESERVA.estado='evento_en_curso'` (design.md §D-no-transicion). Rutas y
  # campos fijados en el Gate 1 humano: `/reservas/{id}/documentos-evento` + campos `archivo`/`tipo`.
  /reservas/{id}/documentos-evento:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [DocumentacionEvento]
      summary: Subir un documento obligatorio del evento y refrescar el checklist (UC-24 / US-033)
      operationId: subirDocumentoEvento
      description: |
        [US-033] El **Gestor** sube uno de los tres documentos obligatorios del evento
        (`dni_anverso`, `dni_reverso`, `clausula_responsabilidad`) para una RESERVA. En una **única
        transacción de BD** (bajo el contexto RLS del tenant del JWT), all-or-nothing:
        1. **Guardas de servidor** (autoritativas, ANTES de subir al almacén o escribir en BD):
           - `RESERVA.estado='evento_en_curso'`. Si está en cualquier otro estado (anterior/posterior,
             incluidos terminales) → **422** (`ESTADO_NO_PERMITE_DOCUMENTACION`) "La documentación del
             evento solo puede capturarse mientras el evento está en curso"; sin efectos.
           - Se adjunta **exactamente un** fichero con `mimeType ∈ {image/jpeg, image/png,
             application/pdf}`, `tamanoBytes > 0` (no vacío/corrupto) y tamaño ≤ 10 MB. Si falta /
             formato no permitido / vacío o corrupto / > 10 MB → **422** (`ARCHIVO_REQUERIDO` /
             `FORMATO_NO_PERMITIDO` / `ARCHIVO_INVALIDO` / `TAMANO_EXCEDIDO`); sin efectos.
           - El `tipo` pertenece a `{dni_anverso, dni_reverso, clausula_responsabilidad}`. Si no →
             **422** (`TIPO_DOCUMENTO_NO_PERMITIDO`); sin efectos.
        2. Sube los bytes al almacén de documentos **durable** (clave con `tenant_id`/`reserva_id`/
           `tipo`/`uuid`, versionada: se conservan todas las versiones) y **crea una nueva fila
           DOCUMENTO** con el `tipo` indicado, `reservaId`, `tenantId` (heredado de la RESERVA, nunca
           del input), `url`, `mimeType`, `nombreArchivo` y `tamanoBytes > 0`. **No transiciona
           `estado`** ni ningún sub-proceso.
        3. `AUDIT_LOG accion='crear'`, `entidad='DOCUMENTO'`, `datos_nuevos` (tipo, reservaId, url,
           mimeType, tamanoBytes), con el usuario del Gestor.

        **No idempotente por diseño** (design.md §D-no-idempotencia): si ya existe un DOCUMENTO del
        mismo `tipo` para la reserva (p. ej. foto borrosa), NO se rechaza ni se sobrescribe — se crea
        otra fila y se conserva el histórico. El checklist marca el ítem `completado` por existencia
        de ≥ 1 documento del tipo y toma el más reciente por `fechaCreacion` como referencia. Si la
        subida al almacén o cualquier escritura falla, la transacción **revierte por completo** (sin
        DOCUMENTO huérfano ni fichero referenciado por una fila inexistente). La respuesta incluye el
        DOCUMENTO creado y el **checklist actualizado** para refresco en tiempo real (sin round-trip).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [archivo, tipo]
              properties:
                archivo:
                  type: string
                  format: binary
                  description: >-
                    Fichero del documento del evento. Formatos permitidos: `image/jpeg`, `image/png`,
                    `application/pdf`. Tamaño máximo 10 MB, `tamanoBytes > 0`. Obligatorio.
                tipo:
                  allOf: [{ $ref: '#/components/schemas/TipoDocumentoEvento' }]
                  description: >-
                    Tipo del documento obligatorio del evento: `dni_anverso`, `dni_reverso` o
                    `clausula_responsabilidad`. Obligatorio.
      responses:
        '201':
          description: |
            DOCUMENTO del evento creado. Devuelve el DOCUMENTO recién creado y el checklist de la
            documentación obligatoria del evento con el ítem del `tipo` subido ya `completado=true`.
            `RESERVA.estado` y sus sub-procesos no cambian.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubirDocumentoEventoResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: |
            Validación de negocio sin efectos (guarda de estado, tipo no permitido o validación de
            fichero). No se crea DOCUMENTO, no se sube al almacén y no se registra AUDIT_LOG. Un
            `codigo` de dominio discrimina el caso.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubirDocumentoEventoValidacionError' }

  # [US-033 / UC-24] Checklist consultable del estado de la documentación obligatoria del evento.
  # Derivado por lectura de las filas DOCUMENTO (design.md §D-checklist), no materializado. @Roles
  # ('gestor'). Más permisivo que la escritura: consultable también en `post_evento` (FA-01, subida
  # tardía). RLS por tenant del JWT.
  /reservas/{id}/documentos-evento/checklist:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [DocumentacionEvento]
      summary: Consultar el checklist de la documentación obligatoria del evento (UC-24 / US-033)
      operationId: obtenerChecklistDocumentacionEvento
      description: |
        [US-033] Devuelve el **checklist** de la documentación obligatoria del evento de la RESERVA,
        con los **tres ítems** `dni_anverso`, `dni_reverso` y `clausula_responsabilidad`. Para cada
        ítem, `completado = existe ≥ 1 DOCUMENTO de ese tipo + reservaId bajo RLS del tenant`; cuando
        está completado se incluye el `documento` más reciente (por `fechaCreacion`) como referencia.
        El checklist se **deriva por lectura** (no se materializa como estado agregado en la RESERVA)
        y filtra por `tenant_id` del JWT (RLS): nunca incluye documentos de otro tenant. Es una señal
        **informativa, no bloqueante** (FA-01). Consultable tanto en `evento_en_curso` como en
        `post_evento` (para mostrar pendientes tras finalizar y permitir subida tardía).
      responses:
        '200':
          description: Checklist de la documentación obligatoria del evento (tres ítems).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChecklistDocumentacionEvento' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/presupuestos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Presupuestos]
      summary: Listar versiones de presupuesto de la reserva
      responses:
        '200':
          description: Presupuestos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Presupuesto' }
    post:
      deprecated: true
      tags: [Presupuestos]
      summary: '[DEPRECADO US-014] Usa POST /reservas/{id}/presupuesto (confirmar) o /preview'
      description: |
        DEPRECADO (US-014): la generación del presupuesto + activación de la pre-reserva se ha partido en
        dos endpoints dedicados — `POST /reservas/{id}/presupuesto/preview` (borrador, no persiste) y
        `POST /reservas/{id}/presupuesto` (confirma: PRESUPUESTO + `pre_reserva` + bloqueo 7d + vaciado de
        cola A16 + E2). Este endpoint plural queda solo para listar (GET) y no debe usarse para crear.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresupuestoRequest'
      responses:
        '201':
          description: Presupuesto generado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Presupuesto' }
        '409':
          $ref: '#/components/responses/Conflict'

  /presupuestos/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    patch:
      tags: [Presupuestos]
      deprecated: true
      summary: '[DEPRECADO US-015] Usa POST /reservas/{id}/presupuesto/edicion (o /edicion/preview, /reenvio)'
      description: |
        DEPRECADO (US-015): la edición/reenvío del presupuesto en `pre_reserva` se ha partido en tres
        endpoints dedicados sobre la RESERVA — `POST /reservas/{id}/presupuesto/edicion/preview` (recalcula sin
        persistir), `POST /reservas/{id}/presupuesto/edicion` (crea nueva versión; `enviar` decide `enviado` vs
        `borrador`) y `POST /reservas/{id}/presupuesto/reenvio` (reenvío sin cambios de la versión vigente). Este
        PATCH placeholder (identificado por `idPresupuesto`, no versionado) queda solo por compatibilidad y no se
        implementa.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePresupuestoRequest'
      responses:
        '200':
          description: Presupuesto actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Presupuesto' }

  # ============================ EXTRAS DE RESERVA ============================
  # [DECISIÓN F1-05] Extras como recurso de primera clase. Justificación: origen=anadido_post_confirmacion
  # implica añadir extras tras la confirmación (van a la liquidación). Confirma o intégralo en presupuesto/liquidación.
  /reservas/{id}/extras:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Presupuestos]
      summary: Listar extras de la reserva
      responses:
        '200':
          description: Extras de la reserva
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReservaExtra' }
    post:
      tags: [Presupuestos]
      summary: Añadir extra a la reserva (UC-14, UC-21)
      description: Añade una línea de extra con precio congelado. `origen` indica si viene del presupuesto o se añade tras la confirmación.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaExtraRequest'
      responses:
        '201':
          description: Extra añadido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReservaExtra' }

  # ============================ CONFIRMACIÓN / PAGOS / FACTURAS ============================
  /reservas/{id}/pagos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Confirmar pago de señal / registrar cobro (UC-17, UC-21, UC-22)
      description: Registra un `Pago` conciliado contra una factura. El pago de señal transiciona la reserva a `reserva_confirmada` (bloqueo firme).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePagoRequest'
      responses:
        '201':
          description: Pago registrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pago' }
        '404':
          $ref: '#/components/responses/NotFound'

  # [US-027 / D-5] Colección ÚNICA filtrable de las facturas de la reserva (senal, liquidacion,
  # fianza). Decisión aprobada en el Gate 1: NO se crean endpoints por tipo espejo del de señal;
  # se generaliza esta colección para exponer los BORRADORES de liquidación y fianza generados
  # como efecto post-commit de la activación de sub-procesos (US-021). La CREACIÓN de las facturas
  # de liquidación/fianza NO es endpoint público (por eso NO se toca el `post` genérico de más
  # abajo con un flujo US-027). La ALERTA al Gestor ("Documentos de liquidación y fianza pendientes
  # de revisión") NO es un endpoint nuevo: el frontend la DERIVA de esta colección (facturas en
  # `estado='borrador'` de `tipo` liquidacion/fianza), consistente con cómo US-022 expuso el estado
  # del borrador de señal vía DTO de lectura y sin inventar recursos ni notificaciones sin respaldo.
  /reservas/{id}/facturas:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Facturacion]
      summary: Listar las facturas de la reserva, filtrables por tipo (US-022 / US-027)
      operationId: listarFacturasReserva
      description: |
        [US-027 / UC-21 / UC-22] Devuelve la **colección de todas las FACTURA** de la RESERVA `{id}`
        (`senal`, `liquidacion`, `fianza`), cada una con su desglose fiscal (base + IVA 21 % + total),
        `estado` del ciclo de vida (`borrador` → `enviada` → `cobrada`), `numeroFactura` (`null` en
        `borrador`), `pdfUrl`, `fechaEmision` y los flags derivados de la UI. Vista de **solo lectura**:
        no crea ni muta ninguna FACTURA.

        Los borradores de **liquidación** (`total = importeLiquidacion + Σ extras con factura_id nulo`)
        y de **fianza** (`total = fianza_default_eur`) los crea el sistema como **efecto post-commit**
        de la activación de los sub-procesos de la confirmación (US-021 / US-027), no un endpoint
        público. Si `fianza_default_eur = 0`, la factura de fianza **no existe** y no aparece en la
        colección.

        **Alerta al Gestor (derivada, NO endpoint nuevo)**: "Documentos de liquidación y fianza
        pendientes de revisión" se **deriva en el frontend** de esta colección — hay documentos
        pendientes cuando existen facturas con `estado='borrador'` de `tipo` `liquidacion`/`fianza`.
        Si la fianza se omitió (`fianza_default_eur = 0`), solo aparece el borrador de liquidación y
        la alerta menciona solo la liquidación. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      parameters:
        - in: query
          name: tipo
          required: false
          schema: { $ref: '#/components/schemas/TipoFactura' }
          description: >-
            Filtro OPCIONAL por tipo de factura (`senal`, `liquidacion`, `fianza`, `complementaria`).
            Si se omite, devuelve todas las facturas de la reserva.
      responses:
        '200':
          description: |
            Colección de facturas de la reserva (`FacturaDto[]`), opcionalmente filtrada por `tipo`.
            Cada elemento incluye desglose fiscal, `estado`, `numeroFactura` (`null` en `borrador`),
            `pdfUrl` (`null` si aún no generado), `fechaEmision` y los flags `esBorradorInvalido`/
            `pdfPendiente`.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FacturaDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: La RESERVA no existe en el tenant (RLS). Envelope estándar `ErrorResponse`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    post:
      tags: [Facturas]
      summary: Generar factura (UC-18, UC-21)
      description: Emite una factura en estado `borrador` (`senal`, `liquidacion`, `fianza` o `complementaria`). La liquidación arrastra los `ReservaExtra` con `factura_id` nulo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFacturaRequest'
      responses:
        '201':
          description: Factura generada (borrador)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Factura' }

  # [DECISIÓN F1-02] Acción de aprobar/enviar factura (US-028). Cierra la laguna "SIN ENDPOINT".
  # Confirma este enfoque (acción dedicada) frente a un PATCH /facturas/{id} con cambio de estado.
  /reservas/{id}/facturas/{facturaId}/enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
      - in: path
        name: facturaId
        required: true
        schema: { type: string, format: uuid }
        description: ID de la factura
    post:
      tags: [Facturas]
      summary: Aprobar y enviar factura (UC-28)
      description: |
        Transiciona la factura `borrador → enviada`, asigna número de factura y dispara el email E4.
        Para la liquidación, su envío es prerequisito del cobro y arrastra el efecto sobre `fianza_status`.
      responses:
        '200':
          description: Factura aprobada y enviada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Factura' }
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: La factura no está en estado `borrador`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ============================ US-022: FACTURA DE SEÑAL (facturacion) ============================
  # [US-022 / UC-18] La FACTURA es un agregado raíz propio con ciclo de vida
  # (borrador → enviada → cobrada), numeración fiscal F-YYYY-NNNN por (tenant_id, año) y desglose
  # contable (base/IVA/total). La CREACIÓN de la factura de señal NO tiene endpoint público:
  # es un efecto POST-COMMIT del disparo de US-021 (confirmar-senal) más el reintento del PDF
  # (design.md §D-1/§D-6). Estos endpoints cubren la lectura del borrador y las acciones del
  # Gestor (aprobar/rechazar/regenerar-pdf). Mapeo HTTP heredado (F5-02): 409 = conflicto de
  # estado (factura no en borrador); 422 = guarda/validación de negocio (datos fiscales
  # incompletos, PDF pendiente); 404 = factura/reserva inexistente en el tenant (RLS).
  /reservas/{id}/factura-senal:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Facturacion]
      summary: Obtener la factura de señal de una reserva (UC-18 / US-022)
      operationId: obtenerFacturaSenal
      description: |
        [US-022] Devuelve la **factura de señal** (`tipo='senal'`) de la RESERVA `{id}`: número,
        estado, desglose fiscal (base + IVA 21 % + total), `pdfUrl` y los flags derivados que la UI
        usa para habilitar/bloquear la aprobación (`esBorradorInvalido`, `pdfPendiente`). Es una
        vista de **solo lectura**: no crea ni muta la FACTURA.

        La factura la crea el sistema como **efecto post-commit** de la confirmación de la reserva
        (US-021), no este endpoint. Aislada por `tenant_id` del JWT (RLS); nunca en el path.

        Los flags `esBorradorInvalido` y `pdfPendiente` se **derivan** (design.md §D-9), no son
        columnas de la FACTURA: `esBorradorInvalido=true` cuando faltan datos fiscales del CLIENTE
        (bloqueo por datos, requiere acción del Gestor); `pdfPendiente=true` cuando `pdfUrl=null`
        por un fallo transitorio del servicio de PDF (bloqueo temporal, el sistema reintenta solo).
        Cuando ambos son `false` y hay `pdfUrl`, el borrador es aprobable.
      responses:
        '200':
          description: |
            Factura de señal de la reserva (`FacturaSenalDto`). Incluye desglose fiscal, `estado`,
            `numeroFactura` (`null` mientras esté en `borrador`), `pdfUrl` (`null` si aún no
            generado) y los flags `esBorradorInvalido`/`pdfPendiente`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **aún no tiene** factura de señal (el disparo
            post-commit de US-021 todavía no la materializó). El cuerpo es el envelope estándar
            `ErrorResponse`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /facturas/{id}/aprobar:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    post:
      tags: [Facturacion]
      summary: Aprobar el borrador de la factura de señal — borrador → enviada (UC-18 / US-022)
      operationId: aprobarFactura
      description: |
        [US-022] El **Gestor aprueba** el borrador de la factura de señal `{id}`. Precondiciones
        (validadas en servidor, autoritativas): la FACTURA está en `estado='borrador'`, tiene
        `pdfUrl` (PDF disponible) y **datos fiscales válidos** (borrador no inválido). Si se
        cumplen, en una transacción: `estado → 'enviada'`, se fija `fechaEmision` con el timestamp
        actual y la factura queda **lista para adjuntarse en E3**.

        El Gestor **NO puede modificar** importes ni datos fiscales del borrador (provienen de
        RESERVA y CLIENTE): el cuerpo es vacío. Registra `AUDIT_LOG accion='actualizar'`,
        `datos_anteriores.estado='borrador'`, `datos_nuevos.estado='enviada'`. El envío del email
        E3 NO ocurre en este change. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AprobarFacturaRequest' }
      responses:
        '200':
          description: |
            Factura aprobada. Devuelve la `FacturaSenalDto` con `estado='enviada'`, `numeroFactura`
            asignado y `fechaEmision` con el timestamp del momento de aprobación.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (F5-02: 409 = conflicto/precondición de estado). La FACTURA **no
            está en `borrador`** (ya `enviada` o `cobrada`; p. ej. doble aprobación). No se muta el
            estado ni se re-fija `fechaEmision`. El cuerpo añade `codigo` y `motivo` al envelope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaEstadoInvalidoError' }
        '422':
          description: |
            Aprobación bloqueada por una guarda de negocio (F5-02: 422 = validación/guarda sin
            efectos). La FACTURA sigue en `borrador`. Casos (design.md §D-9), discriminados por
            `codigo`:
            - **Datos fiscales del cliente incompletos** (`DATOS_FISCALES_INCOMPLETOS`): borrador
              inválido; enumera los `camposFaltantes` del CLIENTE. Requiere que el Gestor complete
              los datos del cliente (no se reintenta solo).
            - **PDF pendiente de regenerar** (`PDF_PENDIENTE`): `pdfUrl=null` por un fallo
              transitorio del servicio de PDF; el sistema reintenta automáticamente. Reintentar la
              aprobación cuando el PDF exista (o forzar `POST /facturas/{id}/regenerar-pdf`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FacturaDatosFiscalesIncompletosError'
                  - $ref: '#/components/schemas/FacturaPdfPendienteError'

  /facturas/{id}/rechazar:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    post:
      tags: [Facturacion]
      summary: Rechazar el borrador de la factura de señal (UC-18 / US-022)
      operationId: rechazarFactura
      description: |
        [US-022] El **Gestor rechaza** el borrador de la factura de señal `{id}` indicando un
        **motivo** (obligatorio). La FACTURA **permanece en `estado='borrador'`** (el rechazo NO
        es una transición de estado): el motivo se registra en `AUDIT_LOG` y **E3 queda bloqueado**.
        Tras corregir la incidencia (p. ej. datos fiscales del TENANT en configuración), el Gestor
        puede **regenerar el PDF** (`POST /facturas/{id}/regenerar-pdf`) y volver a revisar.

        El motivo de rechazo se guarda en `AUDIT_LOG` (no en una columna de la FACTURA, design.md
        §D-7). Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RechazarFacturaRequest' }
      responses:
        '200':
          description: |
            Rechazo registrado. Devuelve la `FacturaSenalDto`, que **sigue en `borrador`** (el
            rechazo no cambia el `estado`); el motivo queda en `AUDIT_LOG` y E3 permanece bloqueado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '400':
          # Cuerpo mal formado: `motivo` ausente o vacío (obligatorio).
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (F5-02: 409). La FACTURA **no está en `borrador`** (ya `enviada` o
            `cobrada`): un borrador ya aprobado/enviado no puede rechazarse. No se muta nada. El
            cuerpo añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaEstadoInvalidoError' }

  /facturas/{id}/regenerar-pdf:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    post:
      tags: [Facturacion]
      summary: Reintentar la generación del PDF de la factura de señal (UC-18 / US-022)
      operationId: regenerarPdfFactura
      description: |
        [US-022] **Reintento manual** de la generación del PDF de la factura de señal `{id}` (además
        del reintento automático post-commit). Reutiliza el mecanismo puerto/adaptador de PDF de
        US-014/US-021 (design.md §D-5) y es **idempotente** sobre `pdfUrl`: si el PDF se genera, se
        actualiza `pdfUrl`; el estado permanece en `borrador`. Útil tras un fallo transitorio del
        servicio de PDF, o tras corregir los datos fiscales del TENANT/CLIENTE que dejaron el
        borrador inválido.

        No cambia el `estado` de la FACTURA (no aprueba ni envía). Si los datos fiscales del CLIENTE
        siguen incompletos, la regeneración NO produce PDF y el borrador continúa inválido (422).
        Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegenerarPdfFacturaRequest' }
      responses:
        '200':
          description: |
            PDF regenerado. Devuelve la `FacturaSenalDto` con `pdfUrl` actualizado, `pdfPendiente=false`
            y `estado='borrador'` (sin cambios de estado).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (F5-02: 409). La FACTURA **no está en `borrador`** (ya `enviada` o
            `cobrada`): el PDF de una factura ya emitida es inmutable, no se regenera. No se muta
            nada. El cuerpo añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaEstadoInvalidoError' }
        '422':
          description: |
            No se puede generar el PDF (F5-02: 422 = guarda/validación sin efecto de emisión). La
            FACTURA sigue en `borrador` con `pdfUrl=null`. Casos (design.md §D-9), por `codigo`:
            - **Datos fiscales del cliente incompletos** (`DATOS_FISCALES_INCOMPLETOS`): borrador
              inválido; enumera `camposFaltantes`. El Gestor debe completar los datos del CLIENTE.
            - **PDF pendiente de regenerar** (`PDF_PENDIENTE`): el servicio de PDF sigue fallando de
              forma transitoria; reintentar más tarde.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FacturaDatosFiscalesIncompletosError'
                  - $ref: '#/components/schemas/FacturaPdfPendienteError'

  # ============================ US-028: LIQUIDACIÓN + FIANZA (facturacion) ============================
  # [US-028 / UC-21 / UC-22] Cierra la laguna F1-02 ("SIN ENDPOINT para aprobar/enviar liquidación").
  # Acciones DEDICADAS del Gestor sobre los borradores de liquidación/fianza generados como efecto
  # post-commit de la confirmación (US-021 / US-027). Reutilizan el envelope estándar y el mapeo HTTP
  # heredado (F5-02): 404 = liquidación/reserva inexistente en el tenant (RLS); 409 = conflicto de
  # estado (factura no en `borrador` / no `enviada`); 422 = validación de negocio (descuento inválido);
  # 502/503 = fallo recuperable de emisión/envío (rollback total, se reintenta). El descuento y los
  # importes viajan como `Importe` (string Decimal(10,2)); el `tenant_id`/`usuario_id` derivan del JWT.
  /reservas/{id}/facturas/liquidacion/aprobar-enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Aprobar y enviar la factura de liquidación (y fianza si sigue en borrador) (UC-21 / US-028)
      operationId: aprobarEnviarLiquidacion
      description: |
        [US-028 / UC-21] Acción ÚNICA y ATÓMICA estado↔E4 (design.md §D-1): el **Gestor aprueba y
        envía** la factura de liquidación en `borrador` de la RESERVA `{id}`. En una **única unidad de
        trabajo** (tx + RLS del tenant del JWT), con reintento ante colisión de numeración (`P2002`,
        US-022; nunca locks distribuidos), all-or-nothing:
        1. (Opcional, D-2) **Descuento negociado**: recalcula total + desglose fiscal de la liquidación
           (base = total / 1.21, IVA 21 %) y marca la actualización de `RESERVA.importeLiquidacion`.
        2. Numera la liquidación (y la fianza si sigue en `borrador`) — `F-YYYY-NNNN` consecutivos.
        3. **Envío E4 SÍNCRONO y CONFIRMADO** con los PDFs adjuntos (la fianza solo si NO se envió por
           separado, D-3). Si E4 falla → la tx REVIERTE (rollback total: nada de número/estado/status/
           extras/COMUNICACION) y responde 502/503.
        4. SOLO tras confirmar E4: emite ambas facturas a `enviada`, avanza `liquidacionStatus='facturada'`
           (+ `fianzaStatus='recibo_enviado'` si la fianza se emitió aquí), marca los `RESERVA_EXTRA` con
           el `factura_id`, actualiza `importeLiquidacion` si hubo descuento, y registra la COMUNICACION
           E4 `enviado` + el AUDIT_LOG `actualizar`.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        # OPCIONAL: sin body emite la liquidación tal cual (sin descuento). Con body aplica el descuento
        # negociado (D-2) y registra el motivo en AUDIT_LOG.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AprobarEnviarLiquidacionRequest' }
      responses:
        '200':
          description: |
            Liquidación (y, si procede, fianza) emitida y enviada por E4. Devuelve ambas facturas con
            `estado='enviada'`, `numeroFactura` asignado y `fechaEmision`, más los `liquidacionStatus`/
            `fianzaStatus` resultantes de la RESERVA. `fianza=null` si la fianza no se emitió en esta
            operación (fianza_default_eur=0 o ya enviada por separado).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AprobarEnviarLiquidacionResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **no tiene** factura de liquidación en `borrador`
            (`FACTURA_LIQUIDACION_NO_ENCONTRADA`). El cuerpo añade `codigo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '409':
          description: |
            Conflicto de estado (F5-02: 409). La factura de liquidación **no está en `borrador`** (ya
            `enviada`/`cobrada`; p. ej. doble aprobación): `FACTURA_NO_BORRADOR`. No se muta nada. El
            cuerpo añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422). El **descuento negociado es inválido**
            (`DESCUENTO_INVALIDO`): negativo, mal formado o mayor/igual que el total. No se emite ni se
            muta nada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '502':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): el proveedor de email o el
            servicio de PDF falló al enviar E4. La transacción REVIERTE por completo (la liquidación
            sigue en `borrador`, sin número ni cambios de status). El Gestor puede reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '503':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): servicio de emisión/envío
            no disponible temporalmente. La transacción REVIERTE por completo; reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }

  /reservas/{id}/facturas/fianza/enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Enviar por separado el recibo de fianza (edge case sin liquidación) (UC-22 / US-028)
      operationId: enviarReciboFianza
      description: |
        [US-028 / UC-22, D-3] Edge case **sin liquidación**: el Gestor envía al cliente SOLO el recibo
        de fianza en `borrador` de la RESERVA `{id}`. En una **única unidad de trabajo** (tx + RLS del
        tenant del JWT), con reintento ante colisión de numeración (`P2002`; nunca locks distribuidos),
        all-or-nothing (misma atomicidad estado↔email de D-1):
        1. **Envío SÍNCRONO y CONFIRMADO** del recibo (email `manual`, NO E4). Si falla → la tx REVIERTE
           (rollback total) y responde 502/503.
        2. SOLO tras confirmar el envío: emite la fianza a `estado='enviada'` con `numeroFactura` PROPIO
           secuencial (`F-YYYY-NNNN`) y `fechaEmision`, avanza `fianzaStatus='recibo_enviado'` SIN tocar
           `liquidacionStatus`, registra la COMUNICACION `codigo_email='manual'` (fuera del índice de
           idempotencia parcial `(reserva_id, codigo_email)`, no colisiona con un E4 posterior) y el
           AUDIT_LOG `actualizar`.

        Sin body: la acción no toma parámetros. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      responses:
        '200':
          description: |
            Recibo de fianza emitido y enviado. Devuelve la fianza con `estado='enviada'`, `numeroFactura`
            asignado y `fechaEmision`, más `fianzaStatus='recibo_enviado'`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnviarReciboFianzaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **no tiene** recibo de fianza en `borrador`
            (`FACTURA_FIANZA_NO_ENCONTRADA`). El cuerpo añade `codigo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '409':
          description: |
            Conflicto de estado (F5-02: 409). El recibo de fianza **no está en `borrador`** (ya
            `enviada`): `FACTURA_NO_BORRADOR`. No se muta nada. El cuerpo añade `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422). Cuerpo del envelope estándar con `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '502':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): el proveedor de email o el
            servicio de PDF falló. La transacción REVIERTE (la fianza sigue en `borrador`). Reintentar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '503':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): servicio no disponible
            temporalmente. La transacción REVIERTE por completo; reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }

  /reservas/{id}/facturas/senal/enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Enviar la factura de señal (40%) + condiciones particulares por E3 (UC-18 / US-023)
      operationId: enviarFacturaSenal
      description: |
        [US-023 / UC-18, 6.4b §D-endpoint] Acción ÚNICA y ATÓMICA estado↔E3 (espejo literal de E4,
        design.md §Atomicidad): el **Gestor envía** la factura de señal (40 %) en `borrador` de la
        RESERVA `{id}` junto con las condicions particulars, cerrando el hito de confirmación. En una
        **única unidad de trabajo** (tx + RLS del tenant del JWT), con reintento ante colisión de
        numeración (`P2002`, US-022; nunca locks distribuidos), all-or-nothing:
        1. Guardas: existencia de `FACTURA tipo='senal'` (404), estado enviable (`borrador`; `rechazada`
           → 409), idempotencia de E3 (COMUNICACION E3 `enviado` previa → 409), y `pdf_url` de la señal
           presente (si null → se trata como fallo de emisión, 502).
        2. **Obtener el adjunto de condiciones — GUARDA (requisito DURO, US-023 §D-condiciones-bloqueante):**
           `GenerarPdfCondicionesPort.generar(...)`. Las condiciones son un adjunto **IMPRESCINDIBLE**: si
           devuelve `null` (tenant sin config/sin secciones) → **NO se envía E3, NO se persiste DOCUMENTO,
           rollback total** (la señal sigue en `borrador`, `cond_part_enviadas_fecha` NULL) y se aborta con
           el error de negocio `CONDICIONES_NO_CONFIGURADAS` (409) — alerta al gestor "Configura las
           condiciones particulares del espacio para poder enviar E3". Una **excepción de render/subida**
           (fallo transitorio) se trata como error **recuperable** (`EMISION_ENVIO_FALLIDO`, 502/503) también
           con rollback. Esto **REVIERTE** la concesión tolerante de 6.4b (`.catch(() => null)`): US-023
           endurece las condiciones como requisito duro.
        3. **Envío E3 SÍNCRONO y CONFIRMADO** por el puerto de emisión DIRECTO (propaga el fallo, NO pasa
           por el motor/catálogo). Si E3 falla → la tx REVIERTE (rollback total: la señal sigue en
           `borrador`, `cond_part_enviadas_fecha` no se fija, sin COMUNICACION E3 `enviado`) → 502.
        4. SOLO tras confirmar E3: emite la señal a `enviada` (fija `fechaEmision` si es null), fija
           `RESERVA.cond_part_enviadas_fecha=now()`, `cond_part_firmadas=false`, **persiste el DOCUMENTO
           `tipo='condiciones_particulares'` (GAP 1, idempotente: un único DOCUMENTO por reserva; si existe
           se reutiliza) dentro de la MISMA tx**, crea la COMUNICACION E3 `enviado` y el AUDIT_LOG
           (`actualizar` FACTURA + RESERVA, `crear` DOCUMENTO).

        Sin body: la acción no toma parámetros (la señal no se negocia; no admite descuento). Aislada por
        `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        # Cuerpo VACÍO: la acción no toma parámetros (a diferencia de la liquidación, la señal no se
        # negocia). Se declara opcional para admitir `{}` o ausencia de body.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EnviarFacturaSenalRequest' }
      responses:
        '200':
          description: |
            Factura de señal emitida y enviada por E3 con las condicions particulars. Devuelve la señal
            con `estado='enviada'`, `numeroFactura` y `fechaEmision`, más el timestamp del envío de E3
            (`condPartEnviadasFecha`) y `condPartAdjuntada`. **Invariante US-023 (GAP 2):** en un 200
            `condPartAdjuntada` es SIEMPRE `true` — las condiciones son requisito duro; si no hay
            condiciones no hay 200 (se responde 409 `CONDICIONES_NO_CONFIGURADAS`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnviarFacturaSenalResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **no tiene** factura de señal
            (`FACTURA_SENAL_NO_ENCONTRADA`). El cuerpo añade `codigo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalEnvioError' }
        '409':
          description: |
            Conflicto de estado o idempotencia (F5-02: 409). La factura de señal **no es enviable** (p. ej.
            `rechazada`): `FACTURA_SENAL_NO_ENVIABLE`; o **E3 ya se envió** (COMUNICACION E3 `enviado`
            previa): `E3_YA_ENVIADO` (no re-envía, no duplica); o el **tenant no tiene condiciones
            configuradas** (US-023 §D-condiciones-bloqueante): `CONDICIONES_NO_CONFIGURADAS` — no se envía
            E3 ni se persiste DOCUMENTO, rollback total, con la alerta al gestor "Configura las condiciones
            particulares del espacio para poder enviar E3". No se muta nada. El cuerpo añade `codigo` y
            `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalEnvioError' }
        '502':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): el proveedor de email o el
            servicio de PDF de la señal falló al enviar E3 (incluye `pdf_url` de la señal ausente). La
            transacción REVIERTE por completo (la señal sigue en `borrador`, sin COMUNICACION E3
            `enviado`). El Gestor puede reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalEnvioError' }

  /reservas/{id}/facturas/senal/reenviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Reenviar E3 (factura de señal + condiciones particulares) ya enviado (UC-19 / US-023)
      operationId: reenviarE3
      description: |
        [US-023 §D-reenvio-e3, GAP 3] **Reenvío manual del Gestor** de E3 (factura de señal + condiciones
        particulares) YA enviado previamente para la RESERVA `{id}` (espejo literal de
        `reenviarLiquidacion` de E4). **Reutiliza los documentos existentes** (la factura de señal ya
        emitida y el DOCUMENTO `tipo='condiciones_particulares'` ya persistido en GAP 1): NO regenera ni
        duplica el DOCUMENTO, NO reasigna `numeroFactura`, NO cambia `FACTURA.estado` ni los status de la
        RESERVA (un reenvío jamás muta la factura ni transiciona la reserva).

        **Reenvío síncrono** (RLS del tenant del JWT), con el envío externo PRIMERO (espejo del patrón
        aceptado de `reenviarLiquidacion` E4):
        1. Precondición: debe existir E3 ya enviado previamente (COMUNICACION E3 `enviado`,
           `es_reenvio=false`) y la factura de señal `enviada`; si no → 409 `E3_NO_ENVIADO_PREVIAMENTE`
           (nada que reenviar).
        2. **Envío E3 SÍNCRONO y CONFIRMADO** por el puerto de emisión DIRECTO, PRIMERO. Si el proveedor
           falla → 502/503 y NO se crea la COMUNICACION de reenvío ni se actualiza
           `cond_part_enviadas_fecha` (nada que revertir en BD: el único efecto externo —el email— es
           lo primero que ocurre y no llegó a persistirse cambio alguno).
        3. SOLO tras confirmar el envío de E3: crea una **NUEVA fila COMUNICACION** (`codigoEmail='E3'`,
           `estado='enviado'`, `esReenvio=true`, `fechaEnvio=now()`) — excepción explícita y auditada al
           índice UNIQUE parcial `(reserva_id, codigo_email) WHERE es_reenvio=false` (US-045): el reenvío
           manual es intencionado y esquiva el UNIQUE al ir con `esReenvio=true`. Actualiza
           `RESERVA.cond_part_enviadas_fecha=now()` (nuevo timestamp) y registra AUDIT_LOG del reenvío.

        Sin body: la acción no toma parámetros. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
        Requiere rol Gestor.
      requestBody:
        # Cuerpo VACÍO: la acción no toma parámetros. Se declara opcional para admitir `{}` o ausencia.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReenviarE3Request' }
      responses:
        '200':
          description: |
            E3 reenviado. Devuelve la factura de señal (sin cambios de estado, número ni desglose), la
            NUEVA COMUNICACION creada por el reenvío (`esReenvio=true`) y el nuevo timestamp
            `condPartEnviadasFecha`. El DOCUMENTO de condiciones se reutiliza tal cual (no se duplica).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReenviarE3Response' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **no tiene** factura de señal
            (`FACTURA_SENAL_NO_ENCONTRADA`). El cuerpo añade `codigo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalEnvioError' }
        '409':
          description: |
            Conflicto de estado (F5-02: 409). **E3 no se envió previamente** (no hay COMUNICACION E3
            `enviado` previa): `E3_NO_ENVIADO_PREVIAMENTE` — nada que reenviar. No se muta nada. El cuerpo
            añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalEnvioError' }
        '502':
          description: |
            **Fallo recuperable de reenvío** (`EMISION_ENVIO_FALLIDO`): el proveedor de email falló al
            reenviar E3. El envío va primero, así que no se crea la COMUNICACION de reenvío ni se
            actualiza `cond_part_enviadas_fecha` (nada que revertir en BD). Reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalEnvioError' }
        '503':
          description: |
            **Fallo recuperable de reenvío** (`EMISION_ENVIO_FALLIDO`): servicio de envío no disponible
            temporalmente. El envío va primero, así que nada se persistió (nada que revertir en BD).
            Reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalEnvioError' }

  /reservas/{id}/facturas/liquidacion/reenviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Reenviar la factura de liquidación ya emitida (UC-21 / US-028)
      operationId: reenviarLiquidacion
      description: |
        [US-028, D-4] **Reenvío manual del Gestor** de la factura de liquidación YA emitida
        (`estado='enviada'`) de la RESERVA `{id}`. Reutiliza el **PDF ya emitido**: NO reasigna
        `numeroFactura`, NO cambia `FACTURA.estado` ni los status de la RESERVA (un reenvío jamás muta
        la factura). Crea una **NUEVA fila COMUNICACION** (`codigoEmail='E4'`, `estado='enviado'`) por
        cada reenvío — excepción explícita y auditada a la idempotencia `(reserva_id, codigo_email)` de
        US-045: el reenvío manual es intencionado y DEBE quedar trazado en AUDIT_LOG.

        Sin body: la acción no toma parámetros. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      responses:
        '200':
          description: |
            Liquidación reenviada. Devuelve la factura de liquidación (sin cambios de estado ni número)
            y la NUEVA COMUNICACION creada por el reenvío.
          content:
