    post:
      tags: [Facturas]
      summary: Generar factura (UC-18, UC-21)
      description: Emite una factura en estado `borrador` (`senal`, `liquidacion`, `fianza` o `complementaria`). La liquidaciĆ³n arrastra los `ReservaExtra` con `factura_id` nulo.
      requestBody:
