                persistida en `AUDIT_LOG.datos_nuevos.precondiciones_incumplidas`. Cada Ć­tem identifica
                el sub-proceso pendiente (`pre_evento_status`/`liquidacion_status`/`fianza_status`).
                VacĆ­o (`[]`) si por un caso borde las tres estaban cumplidas al forzar (el forzado se
                ejecuta igualmente y `forzadoPorGestor` sigue siendo `true`).
              example: [liquidacion_status, fianza_status]

    # [US-032 D-1] Error 409 de POST /reservas/{id}/forzar-inicio-evento: la RESERVA no estĆ” en
    # `reserva_confirmada` (el cron de US-031 llegĆ³ primero y ya estĆ” en `evento_en_curso`, doble
    # sesiĆ³n del gestor, o cualquier otro estado). Conflicto de estado (mapeo F5-02: 409 = conflicto),
    # distinto del 422 de fecha. Sigue el patrĆ³n allOf(ErrorResponse) + `code` semĆ”ntico del resto del
    # contrato (envelope NestJS), simĆ©trico a FinalizarEventoConflictError.
    ForzarInicioEventoConflictError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [conflicto_estado]
              description: >-
                Discriminador del 409: la RESERVA no estĆ” en `reserva_confirmada`, asĆ­ que la
                transiciĆ³n `reserva_confirmada ā evento_en_curso` no es aplicable (estado actual
                distinto, ya iniciada por el cron de US-031 o por una peticiĆ³n concurrente).
              example: conflicto_estado
            message:
              # Mensaje del caso "cron llegĆ³ primero / idempotencia" exigido por la spec.
              example: >-
                El evento ya estĆ” en curso (iniciado automĆ”ticamente o por otro usuario). No es
                necesaria ninguna acciĆ³n.

    # [US-032 D-1] Error 422 de POST /reservas/{id}/forzar-inicio-evento: la RESERVA estĆ” en
    # `reserva_confirmada` (origen vĆ”lido) pero `date(fecha_evento) ā  date(hoy)`. PrecondiciĆ³n de
    # negocio incumplida (422), distinta del conflicto de estado 409 `conflicto_estado`. Sigue el
    # patrĆ³n allOf(ErrorResponse) + `code` semĆ”ntico del resto del contrato (envelope NestJS),
    # simĆ©trico a ArchivarFianzaNoResueltaError.
    ForzarInicioEventoFechaError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [fecha_evento_no_es_hoy]
              description: >-
                Discriminador del 422: la RESERVA estĆ” en `reserva_confirmada` pero la fecha del
                evento no es hoy (comparaciĆ³n por fecha de calendario del servidor/tenant). El forzado
                solo estĆ” disponible el dĆ­a del evento.
              example: fecha_evento_no_es_hoy
            message:
              example: >-
                El forzado del inicio del evento solo estĆ” disponible el dĆ­a del evento.

    # -------- US-038: archivado manual de la reserva --------
    # [US-038] Cuerpo de POST /reservas/{id}/archivar. La acciĆ³n no toma parĆ”metros de negocio (la
    # identidad de la RESERVA viaja en el path, el actor Gestor en el JWT). Se modela como objeto
    # opcional y vacĆ­o, calcado de FinalizarEventoRequest (US-034), para dejar hueco a una confirmaciĆ³n
    # futura sin romper el contrato. `additionalProperties: false` cierra el shape.
    ArchivarReservaManualRequest:
      type: object
      additionalProperties: false
      description: >-
        Cuerpo (opcional, vacĆ­o) de la acciĆ³n de archivado manual. No hay parĆ”metros de negocio: la
        Ćŗnica entrada es la RESERVA (path) y el Gestor autenticado (JWT).
      properties: {}

    # [US-038 D-3=3.B] Error 422 de POST /reservas/{id}/archivar: la RESERVA estĆ” en `post_evento`
    # (origen vĆ”lido) pero la fianza NO estĆ” resuelta (`fianzaStatus ā {cobrada, recibo_enviado,
    # pendiente}` con `fianzaEur > 0`). PrecondiciĆ³n de negocio incumplida (422), distinta del conflicto
    # de estado 409 `transicion_no_permitida`. Sigue el patrĆ³n allOf(ErrorResponse) + `code` semĆ”ntico
    # del resto del contrato (envelope NestJS), simĆ©trico a FinalizarEventoConflictError.
    ArchivarFianzaNoResueltaError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [fianza_no_resuelta]
              description: >-
                Discriminador del 422: la RESERVA estĆ” en `post_evento` pero la fianza sigue sin
                resolver (`fianzaEur > 0` y `fianzaStatus ā {devuelta, retenida_parcial}`). El
                archivado se bloquea hasta que se registre la devoluciĆ³n o retenciĆ³n de la fianza.
              example: fianza_no_resuelta
            message:
              # Mensaje especĆ­fico FA-01/FA-02 exigido por la spec (specs/consultas/spec.md).
              example: >-
                No se puede archivar la reserva: la fianza estĆ” pendiente de resoluciĆ³n. Registra la
                devoluciĆ³n o retenciĆ³n de fianza antes de archivar.

    # -------- US-013: descarte por cliente ā 2z --------
    # [US-013 Ā§"Motivo de descarte opcional"] Cuerpo (opcional) de POST /reservas/{id}/descartar. El
    # Ćŗnico parĆ”metro de negocio es un `motivo` OPCIONAL (string libre) que el backend ANEXA a
    # `RESERVA.notas` (decisiĆ³n del Gate, design.md Ā§D-5); su ausencia NO bloquea la transiciĆ³n. La
    # identidad de la RESERVA viaja en el path y el actor Gestor en el JWT. `additionalProperties: false`
    # cierra el shape. Sin `motivo`, `RESERVA.notas` permanece sin cambios.
    DescartarConsultaRequest:
      type: object
      additionalProperties: false
      description: >-
        Cuerpo opcional de la acciĆ³n de descarte por cliente. `motivo` es opcional: si se envĆ­a, se
        anexa a `RESERVA.notas`; si se omite, la transiciĆ³n a `2z` completa igual sin tocar `notas`.
      properties:
        motivo:
          type: string
          nullable: true
          description: >-
            Motivo del descarte comunicado por el cliente (OPCIONAL). El backend lo anexa a
            `RESERVA.notas`. La ausencia de motivo no bloquea ni retrasa la transiciĆ³n.
          example: El cliente ha decidido celebrar el evento en otra ubicaciĆ³n.

    # [US-013 Ā§"Guarda de origen" / RC-3] Error 409 de POST /reservas/{id}/descartar: la RESERVA estĆ” en
    # un estado terminal (sub-estado `2x`/`2y`/`2z` o estado `reserva_cancelada`/`reserva_completada`),
    # o una peticiĆ³n concurrente ya la descartĆ³ / la expirĆ³ por TTL (US-012). PrecondiciĆ³n de estado
    # incumplida (mapeo F5-02: 409 = conflicto de estado), simĆ©trico a FinalizarEventoConflictError.
    # Sigue el patrĆ³n allOf(ErrorResponse) + `code` semĆ”ntico del resto del contrato (envelope NestJS).
    DescartarConsultaConflictError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [transicion_no_permitida]
              description: >-
                Discriminador del 409: la RESERVA estĆ” en un sub-estado/estado terminal, por lo que la
                transiciĆ³n a `2z` no es aplicable (incluye doble descarte concurrente y carrera perdida
                contra el barrido de TTL de US-012).
              example: transicion_no_permitida
            message:
              # Mensaje exigido literalmente por la spec de US-013 en la fase `consulta`
              # (specs/consultas/spec.md, guarda de origen / RC-3). En la fase `pre_reserva` el 409
              # reutiliza este mismo schema con un mensaje anĆ”logo de estado terminal.
              example: Esta consulta ya estĆ” en un estado terminal y no puede modificarse

    # [presupuesto-prereserva-cta-descarte-y-e2 Ā§D-2 / workstream B] Error 422 de
    # POST /reservas/{id}/descartar: la RESERVA estĆ” en un estado que NO es descartable āni `consulta`
    # (+sub-estados vĆ”lidos) ni `pre_reserva`, sino `reserva_confirmada` o posteriores no terminalesā.
    # Guarda de transiciĆ³n de descarte incumplida (mapeo F5-02: 422 = guarda/origen invĆ”lido), distinta
    # del conflicto de estado 409 (RESERVA ya terminal / carrera perdida). Sigue el patrĆ³n
    # allOf(ErrorResponse) + `code` semĆ”ntico del resto del contrato (envelope NestJS), simĆ©trico a
    # ForzarInicioEventoFechaError.
    DescartarReservaOrigenInvalidoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
