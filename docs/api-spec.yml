  # ============================ US-028: LIQUIDACIĆN + FIANZA (facturacion) ============================
  # [US-028 / UC-21 / UC-22] Cierra la laguna F1-02 ("SIN ENDPOINT para aprobar/enviar liquidaciĆ³n").
  # Acciones DEDICADAS del Gestor sobre los borradores de liquidaciĆ³n/fianza generados como efecto
  # post-commit de la confirmaciĆ³n (US-021 / US-027). Reutilizan el envelope estĆ”ndar y el mapeo HTTP
  # heredado (F5-02): 404 = liquidaciĆ³n/reserva inexistente en el tenant (RLS); 409 = conflicto de
  # estado (factura no en `borrador` / no `enviada`); 502/503 = fallo recuperable de emisiĆ³n/envĆ­o
  # (rollback total, se reintenta). El `tenant_id`/`usuario_id` derivan del JWT.
  /reservas/{id}/facturas/liquidacion/aprobar-enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Aprobar y enviar la factura de liquidaciĆ³n (y fianza si sigue en borrador) (UC-21 / US-028)
      operationId: aprobarEnviarLiquidacion
      description: |
        [US-028 / UC-21] AcciĆ³n ĆNICA y ATĆMICA estadoāE4 (design.md Ā§D-1): el **Gestor aprueba y
        envĆ­a** la factura de liquidaciĆ³n en `borrador` de la RESERVA `{id}`. En una **Ćŗnica unidad de
        trabajo** (tx + RLS del tenant del JWT), con reintento ante colisiĆ³n de numeraciĆ³n (`P2002`,
        US-022; nunca locks distribuidos), all-or-nothing:
        1. Numera la liquidaciĆ³n (y la fianza si sigue en `borrador`) ā `F-YYYY-NNNN` consecutivos.
        2. **EnvĆ­o E4 SĆNCRONO y CONFIRMADO** con los PDFs adjuntos (la fianza solo si NO se enviĆ³ por
           separado, D-3). Si E4 falla ā la tx REVIERTE (rollback total: nada de nĆŗmero/estado/status/
           extras/COMUNICACION) y responde 502/503.
        3. SOLO tras confirmar E4: emite ambas facturas a `enviada`, avanza `liquidacionStatus='facturada'`
           (+ `fianzaStatus='recibo_enviado'` si la fianza se emitiĆ³ aquĆ­), marca los `RESERVA_EXTRA` con
           el `factura_id`, y registra la COMUNICACION E4 `enviado` + el AUDIT_LOG `actualizar`.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AprobarEnviarLiquidacionRequest' }
      responses:
        '200':
          description: |
            LiquidaciĆ³n (y, si procede, fianza) emitida y enviada por E4. Devuelve ambas facturas con
            `estado='enviada'`, `numeroFactura` asignado y `fechaEmision`, mĆ”s los `liquidacionStatus`/
            `fianzaStatus` resultantes de la RESERVA. `fianza=null` si la fianza no se emitiĆ³ en esta
            operaciĆ³n (fianza_default_eur=0 o ya enviada por separado).
