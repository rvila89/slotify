        fecha)`; sin Redis ni locks distribuidos) ejecuta las **cuatro** operaciones, all-or-nothing:
        1. RESERVA ā `subEstado='2c'` y `ttlExpiracion = ttlExpiracion_actual + ttl_consulta_dias`
           (extensiĆ³n derivada de `TENANT_SETTINGS.ttl_consulta_dias`, **nunca hardcodeada**;
