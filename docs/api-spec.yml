openapi: 3.0.0
info:
  title: Slotify API
  description: |
    API REST de **Slotify**, la plataforma SaaS de gestiĆ³n integral para espacios
    boutique de eventos privados (masĆ­as, fincas, villas).

    La reserva es el agregado raĆ­z: recorre toda la mĆ”quina de estados, desde los
    sub-estados de consulta (2.aā2.z) hasta `reserva_completada`. El bloqueo atĆ³mico
    de fecha se garantiza con la restricciĆ³n `UNIQUE(tenant_id, fecha)` en PostgreSQL
    y transacciones `SELECT ... FOR UPDATE`.

    La API sigue arquitectura hexagonal + DDD sobre NestJS, es multi-tenant (RLS) y
    expone este contrato OpenAPI como fuente de verdad para generar el cliente HTTP
    type-safe del frontend.

    ## Convenciones
    - Lenguaje ubicuo del dominio en espaĆ±ol (reservas, presupuestos, fianzaā¦).
    - AutenticaciĆ³n JWT Bearer (access token de vida corta) + refresh token en cookie httpOnly.
    - Identificadores en formato UUID.
    - [F2-01] Importes monetarios como `string` decimal de 2 decimales (Decimal(10,2)), NUNCA coma flotante,
      para evitar errores de redondeo en facturaciĆ³n; porcentajes como `string` Decimal(4,2).
    - Todas las operaciones estĆ”n aisladas por tenant (derivado del JWT, no del path).

    ## Salud / documentaciĆ³n
    - [DECISIĆN F1-03] `GET /api/health` y `GET /api/docs` son endpoints operativos/infra (US-000) y
      quedan FUERA de este contrato de negocio a propĆ³sito. Confirma si prefieres documentarlos aquĆ­.

  version: 1.2.0
  contact:
    name: Equipo Slotify
  license:
    name: UNLICENSED

servers:
  # [DECISIĆN F5-06] Dominios no respaldados por ninguna fuente; confirma las URLs reales antes de publicar.
  - url: http://localhost:3000/api
    description: Servidor de desarrollo (backend NestJS)
  - url: https://api.slotify.app/api
    description: Servidor de producciĆ³n

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: AutenticaciĆ³n y sesiĆ³n (UC-01, UC-02)
  - name: Reservas
    description: Ciclo de vida de la reserva y transiciones de estado (UC-03 a UC-10, UC-23 a UC-28)
  - name: Cola
    description: Cola de espera de fechas bloqueadas (UC-11 a UC-13)
  - name: Presupuestos
    description: Pre-reserva, tarifas y presupuestos (UC-14 a UC-16)
  - name: Confirmacion
    description: ConfirmaciĆ³n de reserva, pagos, facturas y condiciones particulares (UC-17 a UC-19)
  - name: Subprocesos
    description: Sub-procesos paralelos pre-evento, liquidaciĆ³n y fianza (UC-20 a UC-22, UC-26, UC-27)
  - name: Facturas
    description: EmisiĆ³n de facturas y registro de pagos (UC-18, UC-21)
  - name: Facturacion
    description: >-
      Ciclo de vida de la FACTURA como agregado raĆ­z (borrador ā enviada ā cobrada): factura
      de seĆ±al (US-022 / UC-18), aprobaciĆ³n, rechazo y regeneraciĆ³n de PDF. La creaciĆ³n de la
      factura de seĆ±al NO es un endpoint pĆŗblico: es efecto post-commit de la confirmaciĆ³n de
      la reserva (US-021).
  - name: FichaOperativa
    description: Briefing operativo del evento (UC-20, UC-24)
  - name: Calendario
    description: Disponibilidad, bloqueo y liberaciĆ³n de fechas (UC-29 a UC-31)
  - name: Clientes
    description: Datos de contacto y fiscales de clientes (atributo de la reserva, no entidad de navegaciĆ³n)
  - name: Historico
    description: BĆŗsqueda y exportaciĆ³n del histĆ³rico (UC-32, UC-33)
  - name: Dashboard
    description: >-
      Vista de lectura agregada operativa: 7 widgets del estado de las reservas del tenant
      (UC-34 / US-044). No incluye el dashboard financiero ni KPIs avanzados (Ā§7.2, fuera de MVP).
  - name: Comunicaciones
    description: EnvĆ­o y log de emails E1āE8 y manuales (UC-35, UC-36)
  - name: Documentos
    description: Subida y descarga de documentos polimĆ³rficos (UC-19, UC-24)
  - name: DocumentacionEvento
    description: >-
      Captura de la documentaciĆ³n obligatoria del evento (DNI anverso/reverso, clĆ”usula de
      responsabilidad firmada) y su checklist en tiempo real (UC-24 / US-033). La subida solo se
      admite con `RESERVA.estado='evento_en_curso'`; el checklist es consultable tambiĆ©n en
      `post_evento`.
  - name: Cron
    description: Endpoint protegido de barrido periĆ³dico (TTLs, cola, recordatorios)

paths:
  # ============================ AUTH ============================
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesiĆ³n (UC-01)
      description: Valida credenciales y devuelve un access token JWT. El refresh token se entrega en una cookie httpOnly.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: AutenticaciĆ³n correcta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          # [US-001 FA-01] 401 genĆ©rico anti-enumeration: credenciales invĆ”lidas y cuenta
          # deshabilitada (activo=false) devuelven EXACTAMENTE el mismo shape y mensaje, para
          # no revelar si un email existe o estĆ” deshabilitado. NO se usa 403 ni un mensaje
          # distinto que permita distinguir ambos casos.
          description: |
            AutenticaciĆ³n fallida. Cubre tanto **credenciales invĆ”lidas** como **cuenta
            deshabilitada** (`activo=false`) con idĆ©ntico cuerpo de error (decisiĆ³n
            anti-enumeration deliberada). El cliente no puede distinguir ambos casos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa el refresh token de la cookie httpOnly para emitir un nuevo access token.
      # [F3-01] La autenticaciĆ³n de este endpoint es la cookie de refresh, no el bearer.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Nuevo access token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesiĆ³n (UC-02)
      description: |
        Cierra la sesiĆ³n del **dispositivo actual**: limpia la cookie httpOnly de
        refresh. Es **best-effort / stateless** ā no hay invalidaciĆ³n server-side
        persistente del refresh token (decisiĆ³n US-002 Ā§1); el riesgo residual estĆ”
        acotado por la cookie httpOnly + TTL del refresh (~7 dĆ­as).

        **Idempotente**: responde 200/204 SIEMPRE, tambiĆ©n en un segundo logout cuando
        la cookie de refresh estĆ” ausente, expirada o es invĆ”lida; NUNCA devuelve 401
        por falta de cookie. Por eso la cookie de refresh es seguridad **opcional**.

        **No anĆ³nimo**: actĆŗa Ćŗnicamente sobre la cookie de refresh del propio llamante.
        No acepta un identificador de usuario de destino (ni en body ni en parĆ”metros),
        por lo que no puede cerrar la sesiĆ³n de otro usuario.

        **AuditorĆ­a (efecto de servidor)**: cuando el refresh token identifica a un
        usuario, el servidor registra en AUDIT_LOG `accion = logout`, `entidad = USUARIO`,
        `usuario_id` y `tenant_id` (bajo contexto RLS del tenant). Si no hay usuario
        identificable (doble logout sin cookie vĆ”lida), NO se audita.

        El **access token previo no se revoca** activamente: sigue siendo vĆ”lido hasta su
        expiraciĆ³n natural (~15 min); es el frontend quien lo elimina de memoria.
        [F1-09] Se autentica con la cookie de refresh (no con el access token), para
        permitir el logout aunque el access token ya haya expirado (US-002).
      # [US-002 Ā§2] Cookie de refresh OPCIONAL para preservar la idempotencia del doble
      # logout: la ausencia de cookie NO produce 401. El `{}` declara "sin autenticaciĆ³n"
      # como alternativa vĆ”lida a `cookieAuth`, en lugar del `bearerAuth` global.
      security:
        - {}
        - cookieAuth: []
      responses:
        '200':
          description: SesiĆ³n cerrada de forma idempotente (cuerpo vacĆ­o).
        '204':
          description: SesiĆ³n cerrada (sin contenido).

  /auth/me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      description: '[F1-08] Soporte de restauraciĆ³n de sesiĆ³n del shell (US-000A/US-001).'
      responses:
        '200':
          description: Datos del usuario en sesiĆ³n
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================ RESERVAS ============================
  /reservas:
    get:
      tags: [Reservas]
      operationId: listarReservas
      summary: Listar reservas (pipeline)
      description: Lista paginada de reservas del tenant con filtros por estado, sub-estado, fecha y canal.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - in: query
          name: estado
          schema: { $ref: '#/components/schemas/EstadoReserva' }
        - in: query
          name: subEstado
          schema: { $ref: '#/components/schemas/SubEstadoConsulta' }
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
          description: BĆŗsqueda por cĆ³digo, nombre de cliente o notas
      responses:
        '200':
          description: Reservas recuperadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Reservas]
      summary: Dar de alta un nuevo lead/consulta (UC-03)
      description: |
        Crea una reserva en estado `consulta`. El sub-estado resultante depende de `fechaEvento`:
        - SIN `fechaEvento` (US-003, alta exploratoria) ā nace en `2a`, `ttlExpiracion = null`,
          SIN `FechaBloqueada`.
        - CON `fechaEvento` (estrictamente futura) y fecha LIBRE (US-004) ā nace en `2b`, dispara
          el bloqueo blando atĆ³mico (`FechaBloqueada` con `tipoBloqueo = blando`),
          `ttlExpiracion = now() + ttl_consulta_dias`. La respuesta incluye `tipoBloqueo = blando`.
        - CON `fechaEvento` bloqueada por una consulta en `2b` ā nace en `2d` (cola), con
          `posicionCola` y `consultaBloqueanteId`, SIN nueva `FechaBloqueada`.
        - CON `fechaEvento` bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores
          ā nace en `2a` exploratoria (`fechaDisponible = false` + `avisoDisponibilidad`
          informativo), sin bloqueo ni cola.

        El CLIENTE se crea/reutiliza de forma idempotente por `(tenant_id, email)`. El campo
        `comentarios` decide el flujo del email E1 (ver su descripciĆ³n en `CreateReservaRequest`).
        Si hay `fechaEvento` + nĀŗ de invitados + horas, E1 incorpora la `tarifaEstimada` (motor
        UC-16); es tolerante: si la tarifa no puede calcularse, E1 sale sin precio y el alta no se
        bloquea.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaRequest'
      responses:
        '201':
          description: |
            Reserva creada (`CreateReservaResponse`). En el alta exploratoria sin fecha (US-003) el
            recurso tiene `estado = 'consulta'`, `subEstado = '2a'`, `ttlExpiracion = null` y los
            campos transitorios ausentes. Con fecha aparecen los campos derivados segĆŗn el
            sub-estado: `tipoBloqueo`+`ttlExpiracion` (2b), `posicionCola`+`consultaBloqueanteId`
            (2d), `fechaDisponible`+`avisoDisponibilidad` (2a por fecha no disponible), y
            `tarifaEstimada` cuando E1 la incluye.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservaResponse'
        '400':
          # ValidaciĆ³n de entrada (class-validator ā exception filter de NestJS). El cuerpo es
          # ErrorResponse con `message` como array de strings (un mensaje por campo afectado).
          # Casos: obligatorios faltantes (cliente.nombre/apellidos/email/telefono), email mal
          # formado, canalEntrada fuera del enum, y [US-004] `fechaEvento` = hoy o fecha pasada
          # (debe ser estrictamente futura, > hoy). En cualquiera de ellos NO se crea RESERVA ni
          # FechaBloqueada.
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /reservas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Reservas]
      summary: Detalle de reserva
      responses:
        '200':
          description: Reserva recuperada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaDetalle'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reservas]
      summary: Actualizar datos de la reserva
      description: |
        ActualizaciĆ³n parcial de los campos editables (invitados, duraciĆ³n, tipo de evento, notasā¦).
        No cambia el estado. [F1-07] El nĀŗ de invitados (US-007) y datos nĆŗcleo del lead; la fecha de
        evento NO se asigna aquĆ­ sino vĆ­a /transiciones (ver [F1-01]).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservaRequest'
      responses:
        '200':
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/transiciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Ejecutar una transiciĆ³n de estado (UC-04, UC-06, UC-10, UC-23, UC-25, UC-28)
      description: |
        Aplica una transiciĆ³n de la mĆ”quina de estados de la reserva. El backend valida la
        transiciĆ³n contra la tabla declarativa de transiciones y sus guardas. Cubre, entre otras:
        2.bā2.c (pendiente invitados), ā2.z (descartar por cliente), iniciar evento, finalizar
        evento y archivar. NOTA [US-005]: la asignaciĆ³n de fecha (transiciĆ³n 2.aā2.b/2.d) NO se
        hace aquĆ­, sino en el endpoint dedicado `POST /reservas/{id}/fecha` (design.md Ā§D-2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransicionRequest'
      responses:
        '200':
          description: TransiciĆ³n aplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: TransiciĆ³n no permitida o guarda no satisfecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservas/{id}/fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Asignar fecha a una consulta exploratoria ā transiciĆ³n 2.aā2.b/2.d (UC-04 / US-005)
      description: |
        [US-005] TransiciĆ³n de un agregado RESERVA **existente** en sub-estado `2a` (consulta
        exploratoria) hacia `2b` (consulta con fecha + bloqueo blando) o `2d` (cola), asignando
        `fechaEvento` y disparando el bloqueo atĆ³mico de fecha en la **misma transacciĆ³n**
        (`SELECT ā¦ FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos).

        Difiere de `POST /reservas` (US-003/004, alta de un lead nuevo): aquĆ­ se **muta** un
        agregado ya en `2a`; el nĆŗcleo de determinaciĆ³n de sub-estado, bloqueo y cola se reutiliza
        (`determinarAltaConFecha` + `bloquearEnTx`, US-004/US-040).

        DeterminaciĆ³n del sub-estado destino:
        - fecha **LIBRE** ā `2b`, crea `FechaBloqueada` blanda, `ttlExpiracion = now() + ttl_consulta_dias`.
        - fecha bloqueada por una consulta en `2b` ā se **ofrece cola**: `409` con
          `colaDisponible=true`; el cliente reenvĆ­a con `aceptarCola=true` para entrar en `2d`
          (`posicionCola`, `consultaBloqueanteId`). La RESERVA permanece en `2a` hasta confirmar.
        - fecha bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores ā `409`
          con `colaDisponible=false` (no disponible, sin cola). La RESERVA permanece en `2a`.
        - **carrera D4** (otra transiciĆ³n ganĆ³ el bloqueo, `P2002`) ā se re-deriva a oferta de cola
          (`409 colaDisponible=true`); con `aceptarCola=true` el reintento entra directo a `2d`.

        Flujo interactivo de la cola (FA-01) SIN estado servidor intermedio: la 1ĀŖ llamada informa
        (`409` + `colaDisponible`), la 2ĀŖ con `aceptarCola=true` confirma `2d`.

        Tras el COMMIT de `2aā2b` se registra/envĆ­a (post-commit, **no bloqueante**) la comunicaciĆ³n
        de confirmaciĆ³n de bloqueo provisional (extensiĆ³n de E1, motor US-045): un fallo de envĆ­o no
        revierte la transiciĆ³n ni el bloqueo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarFechaRequest'
      responses:
        '200':
          description: |
            TransiciĆ³n aplicada. Devuelve la RESERVA actualizada:
            - `2b`: `subEstado='2b'`, `fechaEvento`, `ttlExpiracion` (bloqueo blando creado).
            - `2d`: `subEstado='2d'`, `fechaEvento`, `posicionCola`, `consultaBloqueanteId`
              (entrada en cola; requiere `aceptarCola=true`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          # fechaEvento ausente, mal formada o NO estrictamente futura (= hoy o pasada). Regla
          # unificada `> hoy` (D-1, coherente con US-004/US-040). No se muta la RESERVA.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Fecha no asignable de inmediato; la RESERVA permanece en `2a`. El cuerpo aĆ±ade
            `colaDisponible` y `motivo` al envelope de error estĆ”ndar:
            - `colaDisponible=true` ā bloqueada por una consulta en `2b` (o carrera D4): se ofrece
              cola; reintentar con `aceptarCola=true` para entrar en `2d`.
            - `colaDisponible=false` ā bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+:
              no disponible, sin cola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignarFechaConflictoError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO estĆ” en sub-estado `2a` (p. ej. ya tiene
            fecha, estĆ” en cola, en un estado terminal `2x/2y/2z` o mĆ”s avanzada). No se muta
            (F5-02: 409 = concurrencia, 422 = transiciĆ³n/guarda invĆ”lida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # [US-051 Ā§D-2.1] Cambio ATĆMICO de una fecha YA bloqueada. Endpoint DEDICADO (NO reutiliza
  # POST /reservas/{id}/fecha, que solo asigna la PRIMERA fecha 2aā2b/2d): aquĆ­ la RESERVA ya
  # tiene fecha bloqueada (sub-estados 2b/2c/2v) y se pide moverla a otra fecha.
  /reservas/{id}/cambiar-fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Cambiar la fecha de una RESERVA ā operaciĆ³n atĆ³mica; origen con fecha bloqueada (2b/2c/2v) o en cola (2d)
      description: |
        Cambia la `fechaEvento` de una RESERVA por otra fecha, en una **Ćŗnica transacciĆ³n
        atĆ³mica** (`SELECT ā¦ FOR UPDATE` sobre la RESERVA y sobre `FECHA_BLOQUEADA(tenant_id,
        fecha_nueva)`; `UNIQUE(tenant_id, fecha)`; **sin Redis ni locks distribuidos** ā
        `CLAUDE.md Ā§Regla crĆ­tica: bloqueo atĆ³mico de fecha`). El origen vĆ”lido es una RESERVA
        con fecha **YA bloqueada** (sub-estados `2b`/`2c`/`2v`) o una consulta **en cola de
        espera** (`2d`). El comportamiento se ramifica **por el origen** (mismo esquema de
        request/response en ambos casos):

        **A) Origen `2b`/`2c`/`2v` (fecha ya bloqueada)** [US-051 Ā§D-2.1]:

        1. Si la fecha nueva estĆ” **LIBRE** ā `bloquearFecha(tenant_id, fecha_nueva)`, actualiza
           `RESERVA.fecha_evento`, `liberarFecha(tenant_id, fecha_antigua)` y, si la fecha antigua
           tenĆ­a cola, dispara la **promociĆ³n FIFO** (mecĆ”nica A15) del primero en cola. No cambia
           estado ni sub-estado (`subEstado` intacto).
        2. Si la fecha nueva estĆ” **OCUPADA** por otra RESERVA ā **rechaza con 409 sin tocar nada**
           (rollback total: la RESERVA conserva su fecha antigua y su bloqueo). A diferencia del
           alta/asignaciĆ³n (`POST /reservas/{id}/fecha`), aquĆ­ **NO se ofrece cola** para la fecha
           nueva: el conflicto es terminal para esta operaciĆ³n (por eso NO lleva `colaDisponible`).

        **B) Origen `2d` (consulta en cola de espera)** [change `cambiar-fecha-consulta-en-cola`]:

        1. Si la fecha nueva estĆ” **LIBRE** ā la consulta **SALE de la cola** y transiciona
           **`2d ā 2b`**: `bloquearFecha(tenant_id, fecha_nueva)` (INSERTA un bloqueo nuevo, blando,
           con TTL; la `2d` no poseĆ­a bloqueo propio), `RESERVA.fecha_evento = fecha_nueva`,
           `posicionCola ā null`, `consultaBloqueanteId ā null`, y **reordena la cola vieja**
           cerrando el hueco (mecĆ”nica de *Salida de cola con reordenaciĆ³n al descartar desde 2.d*,
           US-013). La RESERVA bloqueante de la fecha antigua **no se toca** y su bloqueo **no se
           libera**, por lo que **NO** se dispara ninguna promociĆ³n de cola. Se crea un **borrador
           E1** de transiciĆ³n de fecha (no autoenviado, `fechaEnvio = null`) para revisiĆ³n del
           gestor con el flujo existente (US-046).
        2. Si la fecha nueva estĆ” **OCUPADA** por otra RESERVA ā **409 terminal sin re-encolar**
           (rollback total: la consulta conserva su posiciĆ³n en la cola actual; mismo shape que A2,
           solo `motivo`, sin `colaDisponible`).

        En ambos orĆ­genes registra `AUDIT_LOG` (`accion='actualizar'`,
        `entidad='RESERVA'`) con la fecha anterior y la nueva (en la rama `2d`, `datos_nuevos`
        refleja ademĆ”s la salida de cola: `sub_estado`, `posicion_cola`, `consulta_bloqueante_id`). La fecha NUNCA se muta por
        `PATCH /reservas/{id}` (Ā§D-1): esa vĆ­a es solo para campos simples; toda mutaciĆ³n de bloqueo
        pasa por aquĆ­ o por `POST /reservas/{id}/fecha`. El esquema de request/response no cambia
        entre orĆ­genes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarFechaRequest'
      responses:
        '200':
          description: |
            Cambio aplicado. Devuelve la RESERVA actualizada con la nueva `fechaEvento`. Desde
            origen `2b`/`2c`/`2v` el `subEstado` se conserva; desde origen `2d` la consulta sale
            de la cola y transiciona a `subEstado='2b'` (`posicionCola`/`consultaBloqueanteId`
            quedan a `null`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            La fecha destino no estĆ” disponible: estĆ” bloqueada por otra RESERVA. El cambio se
            rechaza SIN efectos (rollback total): desde origen `2b`/`2c`/`2v` la RESERVA conserva su
            fecha antigua y su bloqueo; desde origen `2d` la consulta conserva su posiciĆ³n en la
            cola actual (NO se re-encola en la fecha nueva). Conflicto **terminal** para esta
            operaciĆ³n en ambos orĆ­genes: NO se ofrece cola para la fecha nueva (por eso el cuerpo
            no lleva `colaDisponible`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CambiarFechaConflictoError'
        '422':
          description: |
            Guarda no satisfecha, sin mutar la RESERVA (F5-02: 409 = concurrencia/ocupaciĆ³n, 422 =
            guarda invĆ”lida):
            - la RESERVA NO estĆ” en un origen vĆ”lido para cambiar fecha: los orĆ­genes vĆ”lidos son
              `2b`/`2c`/`2v` (con fecha bloqueada) y `2d` (en cola de espera). Se rechazan p. ej.
              `2a` (sin fecha; usar `POST /reservas/{id}/fecha`), terminales `2x/2y/2z`, o
              `pre_reserva`+;
            - o `fechaEvento` no es estrictamente futura (`> hoy`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

