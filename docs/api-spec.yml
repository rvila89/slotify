  # [US-027 / D-5] ColecciĆ³n ĆNICA filtrable de las facturas de la reserva (senal, liquidacion,
  # fianza). DecisiĆ³n aprobada en el Gate 1: NO se crean endpoints por tipo espejo del de seĆ±al;
  # se generaliza esta colecciĆ³n para exponer los BORRADORES de liquidaciĆ³n y fianza generados
  # como efecto post-commit de la activaciĆ³n de sub-procesos (US-021). La CREACIĆN de las facturas
  # de liquidaciĆ³n/fianza NO es endpoint pĆŗblico (por eso NO se toca el `post` genĆ©rico de mĆ”s
  # abajo con un flujo US-027). La ALERTA al Gestor ("Documentos de liquidaciĆ³n y fianza pendientes
  # de revisiĆ³n") NO es un endpoint nuevo: el frontend la DERIVA de esta colecciĆ³n (facturas en
  # `estado='borrador'` de `tipo` liquidacion/fianza), consistente con cĆ³mo US-022 expuso el estado
  # del borrador de seĆ±al vĆ­a DTO de lectura y sin inventar recursos ni notificaciones sin respaldo.
  /reservas/{id}/facturas:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
