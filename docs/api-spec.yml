    # [US-036 / Gate 1] El schema placeholder `DevolucionFianzaRequest` (pre-US-036) queda REEMPLAZADO
    # por `RegistrarDevolucionFianzaRequest` (secciĆ³n "DevoluciĆ³n de fianza (US-036)"), que aĆ±ade
    # `fechaCobro`, `justificanteDocId` (patrĆ³n US-030, no multipart) y la semĆ”ntica del motivo. Se
    # elimina para evitar drift: ya no lo referencia ningĆŗn path.

    # -------- Ficha operativa [US-025 / UC-20] --------
    # [US-025] RepresentaciĆ³n de la FICHA_OPERATIVA (1:1 con RESERVA, `reserva_id @unique`) devuelta
    # por GET y PATCH. Los 5 campos de contacto/logĆ­stica son nullable (la ficha se crea vacĆ­a en US-021,
    # excepto `contactoEventoCorreo` que se pre-rellena desde la reserva).
    # `fichaCerrada`/`fechaCierre` reflejan el cierre (D-6/D-4) y `preEventoStatus` el sub-proceso
    # vigente de la RESERVA (pendiente|en_curso|cerrado). `fechaActualizacion` (@updatedAt) es
    # independiente de `fechaCierre` (D-4).
    FichaOperativa:
      type: object
      required: [idFicha, reservaId, fichaCerrada, preEventoStatus]
      properties:
        idFicha: { type: string, format: uuid }
        reservaId: { type: string, format: uuid }
        # [reserva-viva] Campos ESTRUCTURADOS de la RESERVA que determinan el precio, expuestos
        # ahora en la ficha (igual que el editor de consulta). Editarlos por PATCH dispara el
        # recĆ”lculo en cascada dentro de la ventana viva. Nullable porque una RESERVA exploratoria
        # puede no tenerlos aĆŗn; el GET pre-rellena `duracionHoras` desde la RESERVA.
        duracionHoras:
          allOf: [{ $ref: '#/components/schemas/DuracionHoras' }]
          nullable: true
          description: >-
            [reserva-viva] DuraciĆ³n ESTRUCTURADA del evento (enum `{4,8,12}`) tomada de
            `RESERVA.duracionHoras`. Sustituye al campo legacy `duracion` (texto libre) para
            aforo/duraciĆ³n estructural. `null` si la RESERVA aĆŗn no la tiene.
        numAdultosNinosMayores4:
          type: integer
          nullable: true
          minimum: 0
          description: >-
            [reserva-viva] Adultos y niĆ±os > 4 aĆ±os (`RESERVA.numAdultosNinosMayores4`). Determina
            el tramo del tarifario. `null` si la RESERVA aĆŗn no lo tiene.
        numNinosMenores4:
          type: integer
          nullable: true
          minimum: 0
          description: >-
            [reserva-viva] NiĆ±os ā¤ 4 aĆ±os (`RESERVA.numNinosMenores4`). No cuenta para el tramo del
            tarifario. `null` si la RESERVA aĆŗn no lo tiene.
        numInvitadosConfirmado:
          type: integer
          nullable: true
          readOnly: true
          description: >-
            [reserva-viva] NĀŗ de invitados confirmado, valor DERIVADO de solo lectura:
            `RESERVA.numInvitadosFinal ?? (numAdultosNinosMayores4 + numNinosMenores4)` (nulls como
            0), regla `derivarNumPersonas`. NO se escribe por PATCH (cambia vĆ­a el desglose de
            invitados). La columna legacy `FICHA_OPERATIVA.numInvitadosConfirmado` no se escribe por
            esta vĆ­a.
        contactoEventoNombre:
          type: string
          nullable: true
          description: >-
            [reserva-viva] Contacto del evento. Al LEER se pre-rellena desde `CLIENTE.nombre`
            (+ `apellidos`) si la ficha no tiene valor propio; un valor propio guardado prevalece.
        contactoEventoTelefono:
          type: string
          nullable: true
          description: >-
            [reserva-viva] TelĆ©fono del contacto del evento. Al LEER se pre-rellena desde
            `CLIENTE.telefono` si la ficha no tiene valor propio; un valor propio prevalece.
        contactoEventoCorreo:
          type: string
          nullable: true
          description: >-
            Correo del contacto del evento. Al LEER se pre-rellena desde `CLIENTE.email` si la ficha
            no tiene valor propio (pre-relleno completo al leer, no solo al crear).
        horaLlegada:
          type: string
          nullable: true
          description: >-
            Hora de llegada al evento (formato HH:MM). Al LEER se pre-rellena desde
            `RESERVA.horario` si la ficha no tiene valor propio.
        duracion:
          type: string
          nullable: true
          deprecated: true
          description: >-
            DEPRECATED [reserva-viva]: duraciĆ³n como texto libre (ej: "3h", "2h 30min"). La
            duraciĆ³n ESTRUCTURAL vive ahora en `duracionHoras` (enum `{4,8,12}`). Columna legacy;
            no se escribe por PATCH como duraciĆ³n estructural. Se conserva por backward-compat.
        notasOperativas: { type: string, nullable: true }
        briefingEquipo: { type: string, nullable: true }
        fichaCerrada:
          type: boolean
          description: '`true` una vez cerrada la ficha (POST .../cerrar).'
        fechaCierre:
          type: string
          format: date-time
          nullable: true
          description: >-
            Instante del Ćŗltimo cierre/consolidaciĆ³n. `null` mientras la ficha no se ha cerrado; el
            backend la reescribe con `now()` en cada ediciĆ³n post-cierre (D-4).
        preEventoStatus:
          allOf: [{ $ref: '#/components/schemas/PreEventoStatus' }]
          description: 'Sub-proceso pre-evento de la RESERVA (pendiente|en_curso|cerrado).'

    # [US-025] Cuerpo de PATCH /reservas/{id}/ficha-operativa: guardado PARCIAL (D-5). Todos los
    # campos son OPCIONALES; solo se persiste el subconjunto presente. No incluye
    # `fichaCerrada`/`fechaCierre`: el cierre es una acciĆ³n dedicada (POST .../cerrar) y
    # `fechaCierre` la gestiona el backend (D-4).
    # [reserva-viva] Ahora acepta los campos ESTRUCTURADOS de la RESERVA (`duracionHoras`,
    # `numAdultosNinosMayores4`, `numNinosMenores4`) + `precioManualEur` para el caso
    # `tarifaAConsultar`. Enviar cualquiera de los tres estructurales con un valor distinto al
    # vigente dispara el RECĆLCULO en cascada (ver `recalculo` en GuardarFichaOperativaResponse),
    # sujeto a la guarda de ventana viva (422 fuera de ella). Los campos legacy
    # `numInvitadosConfirmado`/`duracion` quedan soft-deprecated: ya no escriben aforo/duraciĆ³n
    # estructural.
    GuardarFichaOperativaRequest:
      type: object
      additionalProperties: false
      properties:
        duracionHoras:
          allOf: [{ $ref: '#/components/schemas/DuracionHoras' }]
          nullable: true
          description: >-
            [reserva-viva] DuraciĆ³n ESTRUCTURADA (enum `{4,8,12}`). Se persiste sobre
            `RESERVA.duracionHoras`; si cambia dispara el recĆ”lculo (ventana viva). Fuera de
