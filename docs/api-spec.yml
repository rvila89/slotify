    # -------- Comunicaciones --------
    # [US-045 motor / US-046 acciĆ³n manual] ProyecciĆ³n de una COMUNICACION (er-diagram Ā§3.17).
    # `estado` (EstadoComunicacion): borrador|enviado|fallido; `codigoEmail` (CodigoEmail): E1..E8|manual.
    # El descarte de un borrador por el gestor se modela como `estado='fallido'` (no hay estado
    # "descartado" en el enum); se distingue por el AUDIT_LOG con causa "descartado por gestor".
    EstadoComunicacion:
      type: string
      enum: [borrador, enviado, fallido]
      description: >-
        Estado de la COMUNICACION (US-045). `borrador` = pendiente de revisiĆ³n/envĆ­o (accionable);
        `enviado` = terminal (no se revierte ni re-envĆ­a); `fallido` = el proveedor fallĆ³ o el gestor
        la descartĆ³ (distinguible por AUDIT_LOG).
    SubtipoEmail:
      type: string
      enum: [consulta_exploratoria, fecha_disponible, fecha_confirmada, cola_espera, cambio_fecha, solicitud_datos]
      description: >-
        Subtipo del email E1 que distingue el evento del ciclo de vida que lo generĆ³
        (respuesta a consulta exploratoria, asignaciĆ³n de fecha disponible, confirmaciĆ³n de fecha,
        entrada en cola, cambio de fecha o solicitud de datos de presupuesto). `NULL` para E2āE8 y
        `manual`. `solicitud_datos` (change solicitud-datos-presupuesto-borrador) es el E1 que pide
        al cliente los datos fiscales cuando aportĆ³ la fecha en la primera consulta sin pasar por la
        transiciĆ³n `2a ā 2b`; su terna `(reservaId, 'E1', 'solicitud_datos')` es independiente de
        `fecha_disponible`/`cola_espera` y no colisiona con ellas en el Ć­ndice de idempotencia.
    Comunicacion:
      type: object
      required: [idComunicacion, clienteId, codigoEmail, asunto, estado, esReenvio, fechaCreacion]
      properties:
        idComunicacion: { type: string, format: uuid }
        reservaId: { type: string, format: uuid, nullable: true }
        clienteId: { type: string, format: uuid }
        codigoEmail: { $ref: '#/components/schemas/CodigoEmail' }
        subtipo:
          allOf: [{ $ref: '#/components/schemas/SubtipoEmail' }]
          nullable: true
          description: 'Subtipo del email E1 (evento del ciclo de vida). NULL para E2āE8, manual y filas legadas.'
        asunto: { type: string }
        cuerpo:
          type: string
          nullable: true
          description: 'Cuerpo del email efectivamente enviado/guardado (puede ser nulo en borradores E1..E8).'
        destinatarioEmail:
          type: string
          format: email
          nullable: true
          description: 'Email del destinatario heredado del CLIENTE. No editable por el gestor; puede ser nulo/ invĆ”lido (bloquea el envĆ­o con 422).'
        estado: { $ref: '#/components/schemas/EstadoComunicacion' }
        esReenvio:
          type: boolean
          description: >-
            `true` cuando la fila es un reenvĆ­o (excepciĆ³n auditada a la idempotencia UNIQUE parcial,
            US-023/US-028). Los emails `manual` de US-046 son `false` (quedan fuera del Ć­ndice por el
            predicado `codigoEmail <> 'manual'`, no por `esReenvio`).
        fechaCreacion: { type: string, format: date-time }
        fechaEnvio: { type: string, format: date-time, nullable: true }
    ComunicacionListItem:
      # [US-046 D-3] ProyecciĆ³n de listado enriquecida para la ficha de la RESERVA. Extiende
      # Comunicacion con el flag derivado `accionable` (solo-lectura vs. accionable). Hereda de
      # Comunicacion el campo `subtipo` (nullable): cada Ć­tem del historial E1 lo trae etiquetado
      # con el evento del ciclo de vida que lo generĆ³. El listado devuelve TODAS las filas (una por
      # evento) sin deduplicar por `codigoEmail`/`subtipo`.
      allOf:
        - $ref: '#/components/schemas/Comunicacion'
        - type: object
          required: [accionable]
          properties:
            accionable:
              type: boolean
              description: >-
                Derivado de solo-lectura: `true` sii `estado='borrador'` (la fila puede enviarse o
                descartarse). `enviado`/`fallido` son de solo lectura (`accionable=false`).
    EnviarBorradorRequest:
      # [US-046] EdiciĆ³n OPCIONAL al confirmar el envĆ­o. Solo `asunto`/`cuerpo` son editables por el
      # gestor; `codigoEmail` y `destinatarioEmail` NO. Ausencia de campos => se envĆ­a el borrador tal cual.
      type: object
