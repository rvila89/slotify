  # (confirmaciĆ³n de recepciĆ³n) al `CLIENTE.email` reutilizando el motor de comunicaciones (US-045).
  # Decisiones de contrato aprobadas en Gate 1: D-5A (verbo/ruta = PATCH /reservas/{id}/iban-devolucion
  # con body `{ iban }`, contextualizado en la reserva de post-evento para ligar la COMUNICACION E8 a
  # `reserva_id`) y D-3A (cada registro/correcciĆ³n crea una NUEVA fila COMUNICACION E8, excepciĆ³n
  # auditada a la idempotencia, simĆ©trico con E4/US-028). Guardarāenviar separados (D-2): un fallo de
  # E8 NO revierte el IBAN guardado (FA-03) ā por eso la respuesta 200 lleva cuerpo con `avisoEmail`
  # opcional en vez de un 204 sin cuerpo (necesitamos transmitir el aviso de FA-03).
  /reservas/{id}/iban-devolucion:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    patch:
      tags: [Reservas]
      summary: Registrar IBAN de devoluciĆ³n de fianza y confirmar recepciĆ³n (UC-26/UC-27 / US-035)
      operationId: registrarIbanDevolucion
      description: |
        [US-035] El **Gestor** (JWT de usuario, rol gestor, RLS del tenant del JWT ā NUNCA
        `X-Cron-Token`: es acciĆ³n manual) registra el **IBAN de devoluciĆ³n** que el cliente le
        proporcionĆ³, sobre una RESERVA concreta. La acciĆ³n solo estĆ” disponible cuando
        `RESERVA.estado='post_evento'` **Y** `RESERVA.fianzaEur > 0`; en cualquier otra combinaciĆ³n
        se rechaza con **409** (FA-04). El efecto persistido recae en **`CLIENTE.iban_devolucion`**
        (atributo del cliente, disponible para futuras reservas del mismo cliente ā design.md Ā§D-1),
        no en la RESERVA.

        Realiza **dos operaciones separadas** (patrĆ³n "guardar-luego-enviar", design.md Ā§D-2):

        1. **ValidaciĆ³n previa + paso transaccional**: valida el IBAN con el algoritmo de
           **checksum mĆ³dulo 97** (ISO 13616: longitud por paĆ­s, prefijo de paĆ­s, dĆ­gitos de
           control) **ANTES** de cualquier escritura. Si el IBAN es invĆ”lido responde **422** sin
           tocar BD ni enviar E8 (FA-01). Si es vĆ”lido, actualiza `CLIENTE.iban_devolucion`
           (sobreescribiendo el valor previo en correcciones, FA-02) y escribe `AUDIT_LOG`
           `accion='actualizar'`, `entidad='CLIENTE'`,
           `datos_anteriores={iban_devolucion: <previo o null>}`,
           `datos_nuevos={iban_devolucion: <nuevo>}`. Commit.
        2. **Paso post-commit (best-effort)**: invoca el motor de email de `comunicaciones`
           (US-045) con el trigger **E8** hacia `CLIENTE.email` (**nunca** al gestor), creando una
           **nueva** COMUNICACION (`codigoEmail='E8'`, `reserva_id`, `cliente_id`, `tenant_id`) ā
           cada registro/correcciĆ³n crea una fila nueva como excepciĆ³n auditada a la idempotencia
           `(reserva_id, codigoEmail)` (D-3A, simĆ©trico al reenvĆ­o de E4/US-028). Si el proveedor
           falla, el IBAN **permanece guardado** (no se revierte), `COMUNICACION.estado='fallido'` y
           la respuesta 200 incluye `avisoEmail` para que la UI muestre la alerta y ofrezca reenvĆ­o
           (FA-03). El reintento se apoya en el mecanismo de reintento del motor de `comunicaciones`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrarIbanDevolucionRequest' }
      responses:
        '200':
          description: |
            IBAN vĆ”lido registrado en `CLIENTE.iban_devolucion`. Devuelve el IBAN guardado
            (normalizado) mĆ”s `avisoEmail`: nulo cuando E8 se enviĆ³ correctamente; presente cuando
            el IBAN quedĆ³ guardado pero E8 no pudo enviarse (FA-03), seĆ±alando el fallo sin revertir
            el IBAN. Respuesta con cuerpo (no 204) precisamente para poder transmitir ese aviso.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarIbanDevolucionResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # Autenticado pero sin rol Gestor del tenant para la acciĆ³n manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # RESERVA `{id}` inexistente o de otro tenant (RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado/precondiciĆ³n (FA-04): la RESERVA `{id}` no estĆ” en `post_evento`
            o no tiene fianza que devolver (`fianzaEur <= 0` o `null`). Sin efectos: no se actualiza
            `CLIENTE.iban_devolucion` ni se envĆ­a E8.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarIbanDevolucionConflictError' }
        '422':
          description: |
            IBAN invĆ”lido (FA-01): no supera la validaciĆ³n de checksum mĆ³dulo 97 (longitud por paĆ­s,
            prefijo de paĆ­s o dĆ­gitos de control incorrectos). Sin efectos: no se actualiza
            `CLIENTE.iban_devolucion` ni se envĆ­a E8.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # [US-014 #5 / Parte B] Completar los datos fiscales del CLIENTE de una RESERVA para desbloquear
  # `DATOS_FISCALES_INCOMPLETOS` (422) al generar presupuesto. PatrĆ³n calcado de
  # `PATCH /reservas/{id}/iban-devolucion` (US-035): acciĆ³n manual del Gestor (JWT + RLS del tenant),
  # el `{id}` es la RESERVA y el CLIENTE se resuelve a travĆ©s de ella. Solo toca los 5 campos fiscales
  # escalares del CLIENTE (design.md Ā§D-1/Ā§D-3): NO modifica la RESERVA (fecha/duraciĆ³n/invitados/tipo),
  # ni su estado/sub_estado/ttl, ni `FECHA_BLOQUEADA` ā la fecha tiene su flujo de bloqueo atĆ³mico
  # dedicado. SemĆ”ntica PATCH parcial (Ā§D-2): solo se actualizan los campos presentes en el body; los
  # ausentes NO se sobrescriben a null. `tenant_id` SIEMPRE del JWT, nunca del body.
  /reservas/{id}/datos-fiscales:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    patch:
      tags: [Reservas]
      summary: Completar datos fiscales del cliente de una reserva (UC-14 / US-014, #5)
      operationId: actualizarDatosFiscalesCliente
      description: |
        [US-014 #5] El **Gestor** (JWT de usuario, rol gestor, RLS del tenant del JWT ā NUNCA
        `X-Cron-Token`: es acciĆ³n manual) actualiza los **datos fiscales del CLIENTE** asociado a la
        RESERVA `{id}`, para poder resolver la validaciĆ³n `DATOS_FISCALES_INCOMPLETOS` (US-014 Ā§FA-01)
        sin abandonar el flujo de presupuesto. El efecto persistido recae **Ćŗnicamente** en los cinco
        campos fiscales del CLIENTE (`dniNif`, `direccion`, `codigoPostal`, `poblacion`, `provincia`);
        el CLIENTE se resuelve **a travĆ©s de** la RESERVA bajo el contexto RLS del tenant del JWT.

        **SemĆ”ntica PATCH parcial** (design.md Ā§D-2): todos los campos son opcionales. Solo se
        actualizan los campos **presentes** en el body; los ausentes **no** se tocan (no se
        sobrescriben a `null`), de modo que el diĆ”logo puede enviar solo lo que el gestor completa
        sin perder datos previos.

        **Alcance estricto** (design.md Ā§D-3): NO modifica ningĆŗn campo de la RESERVA
        (`fechaEvento`, `duracionHoras`, `numAdultosNinosMayores4`, `tipoEvento`), ni su
        `estado`/`subEstado`/`ttlExpiracion`, ni `FECHA_BLOQUEADA`. La fecha del evento tiene su flujo
        de bloqueo atĆ³mico dedicado (`POST /reservas/{id}/fecha`); tocarla aquĆ­ violarĆ­a la regla de
        bloqueo atĆ³mico de fecha. Es un UPDATE de columnas escalares del CLIENTE: sin mĆ”quina de
        estados ni zona crĆ­tica de concurrencia propia.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActualizarDatosFiscalesClienteRequest' }
      responses:
        '200':
          description: |
            Datos fiscales del CLIENTE actualizados. Devuelve el estado resultante de los cinco campos
            fiscales del CLIENTE (los presentes en el body actualizados; los ausentes con su valor
            previo intacto). Cualquiera puede ser `null` si sigue sin informar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActualizarDatosFiscalesClienteResponse' }
        '400':
          # Body mal formado (tipos invĆ”lidos / propiedades no permitidas). class-validator ā
          # exception filter de NestJS. Sin efectos: no se actualiza el CLIENTE.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # Autenticado pero sin rol Gestor del tenant para la acciĆ³n manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # RESERVA `{id}` inexistente o de otro tenant (RLS): no visible bajo el tenant del JWT.
          $ref: '#/components/responses/NotFound'

  # ============================ CALENDARIO ============================
  /calendario:
    get:
      tags: [Calendario]
      summary: Consultar calendario de disponibilidad (UC-29 / US-039)
      operationId: consultarCalendario
      description: |
        [US-039] Vista de **lectura pura** (no muta estado) de la disponibilidad de fechas del
        tenant. Dado un rango `[desde, hasta]` y una `vista`, devuelve la **agregaciĆ³n por fecha
        ocupada**: una entrada por cada fecha con bloqueo activo en `FECHA_BLOQUEADA`, con el
        `color` semĆ”ntico derivado del par `(estado, subEstado)` de la reserva bloqueante y el
        conteo de cola. Las fechas **libres no aparecen** en `fechas` (la celda neutra es la
        ausencia de entrada); por eso la respuesta es proporcional a las fechas ocupadas, no al
        tamaĆ±o del rango.

        La `vista` (`mes`|`semana`|`dia`|`lista`) es **informativa** (forma de render): el conjunto
        de datos es el mismo para todas las vistas del mismo rango, lo que garantiza el cĆ³digo de
        colores idĆ©ntico entre vistas (US-039 Ā§Reglas de ValidaciĆ³n). El detalle del popover
        (cliente, subEstado, TTL, enlace) viaja ya en cada entrada: el clic en una celda **no**
        dispara otra llamada (no hay endpoint de detalle separado).

        DerivaciĆ³n del color (SlotifyGeneralSpecs Ā§11.3, design.md Ā§D-2):
        - **gris** ā consulta activa (`subEstado` ā {`2a`, `2b`, `2c`, `2v`}).
        - **ambar** ā `pre_reserva`.
        - **verde** ā `reserva_confirmada`, `evento_en_curso` o `post_evento` (heredan el verde).
        - **azul** ā `reserva_completada` (histĆ³rica).
        - **rojo** ā `reserva_cancelada`.
        Los sub-estados terminales de consulta (`2x`/`2y`/`2z`) NO aparecen: su bloqueo ya fue
        liberado, asĆ­ que no entran en la query de fechas ocupadas.

        Aislada por `tenant_id` del JWT (reforzada por RLS); ningĆŗn dato cross-tenant es visible.
      parameters:
        - in: query
          name: desde
          required: true
          description: Inicio del rango (inclusive). El frontend lo calcula segĆŗn la vista y el perĆ­odo.
          schema: { type: string, format: date }
        - in: query
          name: hasta
          required: true
          description: Fin del rango (inclusive). El backend agrega sobre `[desde, hasta]`.
          schema: { type: string, format: date }
        - in: query
          name: vista
          required: false
          description: Vista solicitada (informativa; no altera el conjunto de datos del rango).
          schema:
            allOf: [{ $ref: '#/components/schemas/VistaCalendario' }]
            default: mes
      responses:
        '200':
          description: Disponibilidad agregada del rango (solo fechas ocupadas).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CalendarioResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /fechas-bloqueadas:
    post:
      tags: [Calendario]
      summary: Bloquear fecha (UC-30)
      description: |
        OperaciĆ³n crĆ­tica. Crea un `FechaBloqueada` dentro de una transacciĆ³n con
        `SELECT ... FOR UPDATE`. La restricciĆ³n `UNIQUE(tenant_id, fecha)` garantiza
        que dos peticiones concurrentes para la misma fecha resulten en un Ć©xito y un 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BloquearFechaRequest'
      responses:
        '201':
          description: Fecha bloqueada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FechaBloqueada' }
        '409':
          description: La fecha ya estĆ” bloqueada (doble reserva evitada)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /fechas-bloqueadas/{id}:
