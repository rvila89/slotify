            `ttlExpiracion=null`, `importeSenal`/`importeLiquidacion` congelados, los tres sub-procesos en
            `pendiente`, el DOCUMENTO justificante creado y (opcionalmente) la factura de seĆ±al en borrador.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarSenalResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado o de concurrencia (F5-02: 409 = conflicto/carrera determinista). Casos
            (la RESERVA no queda en estado intermedio observable ā rollback total):
            - **La reserva ya ha sido confirmada** (doble clic / dos sesiones sobre la MISMA reserva): la
              primera transacciĆ³n ganĆ³ el `SELECT ā¦ FOR UPDATE` y completĆ³ la transiciĆ³n; la segunda
              observa la RESERVA ya en `reserva_confirmada` y aborta sin crear un segundo DOCUMENTO ni una
