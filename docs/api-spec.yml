  # transacciĆ³n Ćŗnica (DOCUMENTO justificante + transiciĆ³n pre_reservaāreserva_confirmada +
  # upgrade bloqueo a firme + congelado importes + init sub-procesos + FICHA_OPERATIVA + AUDIT_LOG)
  /reservas/{id}/confirmar-senal:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Confirmar pago de seĆ±al y activar reserva confirmada (UC-17 / US-021)
      operationId: confirmarSenal
      description: |
        [US-021] El Gestor sube el **justificante de pago de la seĆ±al** (un fichero) y, sobre una
        RESERVA en `estado='pre_reserva'`, la **confirma**. En una **Ćŗnica transacciĆ³n de BD** (bajo
        el contexto RLS del tenant del JWT), all-or-nothing:
        1. Valida en servidor (autoritativo): `estado='pre_reserva'`, `importeTotal > 0` y que se
           adjunta **exactamente un** fichero con `mimeType ā {image/jpeg, image/png, application/pdf}`
           y tamaĆ±o ā¤ 10 MB.
        2. Crea un DOCUMENTO con `tipo='justificante_pago'`, `reservaId`, `tenantId` (del JWT), `url`
           del fichero almacenado y `mimeType`.
        3. Transiciona la RESERVA `pre_reserva ā reserva_confirmada` y fija `ttlExpiracion = null`
           (la reserva confirmada no expira por TTL). Guarda de origen en la mĆ”quina de estados
           declarativa.
        4. **Upgrade del bloqueo a firme**: promueve la fila existente de `FechaBloqueada(tenant_id,
           fechaEvento)` a `tipoBloqueo='firme'`, `ttlExpiracion=null` mediante **UPDATE** (nunca
           delete+insert), sin alterar `reservaId`, reutilizando `bloquearFecha(fase='reserva_confirmada')`
           (`SELECT ā¦ FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin locks distribuidos).
        5. **Congela importes**: `importeSenal = round(importeTotal Ć TENANT_SETTINGS.pct_senal/100, 2)`
           (40% MVP, derivado del setting, nunca hardcodeado) e `importeLiquidacion = importeTotal ā
           importeSenal` (complemento por resta: `senal + liquidacion = total` exacto).
        6. **Inicializa los tres sub-procesos**: `preEventoStatus='pendiente'`,
           `liquidacionStatus='pendiente'`, `fianzaStatus='pendiente'`.
        7. Crea de forma **idempotente** la FICHA_OPERATIVA vacĆ­a (1:1 por `reserva_id @unique`,
           `fichaCerrada=false`, campos de contenido `null`); si ya existe, no la duplica y la
           transiciĆ³n continĆŗa sin error.
        8. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'`, `datos_anteriores.estado='pre_reserva'`,
           `datos_nuevos.estado='reserva_confirmada'`, con el usuario del Gestor.

        Tras el COMMIT, el sistema **presenta la factura de seĆ±al en borrador** para revisiĆ³n (disparo
        de US-022/UC-18): es un efecto **posterior al commit** y su ausencia/fallo NO revierte la
        confirmaciĆ³n. Este change **no genera ni aprueba** la FACTURA, **no** genera condiciones
        particulares (US-023) y **no** envĆ­a el email E3 (E3 se dispara solo tras aprobar la factura y
        generar las condiciones). El indicador `facturaSenalBorrador` de la respuesta es OPCIONAL y solo
        se puebla si el disparo de US-022 ya materializĆ³ el borrador; su contrato real es de US-022.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [justificante]
              properties:
                justificante:
                  type: string
