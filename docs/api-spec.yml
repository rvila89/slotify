            de US-031 llegĆ³ primero y ya estĆ” en `evento_en_curso`", doble sesiĆ³n del gestor, o
            cualquier otro estado). Sin efectos, sin doble transiciĆ³n ni doble auditorĆ­a.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ForzarInicioEventoConflictError' }
        '422':
          description: |
            PrecondiciĆ³n de negocio incumplida: la RESERVA `{id}` estĆ” en `reserva_confirmada`
            (origen vĆ”lido) pero `date(fecha_evento) ā  date(hoy)`. El forzado solo estĆ” disponible el
