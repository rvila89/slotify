openapi: 3.0.0
info:
  title: Slotify API
  description: |
    API REST de **Slotify**, la plataforma SaaS de gestiГіn integral para espacios
    boutique de eventos privados (masГ­as, fincas, villas).

    La reserva es el agregado raГ­z: recorre toda la mГЎquina de estados, desde los
    sub-estados de consulta (2.aвЂ“2.z) hasta `reserva_completada`. El bloqueo atГіmico
    de fecha se garantiza con la restricciГіn `UNIQUE(tenant_id, fecha)` en PostgreSQL
    y transacciones `SELECT ... FOR UPDATE`.

    La API sigue arquitectura hexagonal + DDD sobre NestJS, es multi-tenant (RLS) y
    expone este contrato OpenAPI como fuente de verdad para generar el cliente HTTP
    type-safe del frontend.

    ## Convenciones
    - Lenguaje ubicuo del dominio en espaГ±ol (reservas, presupuestos, fianzaвЂ¦).
    - AutenticaciГіn JWT Bearer (access token de vida corta) + refresh token en cookie httpOnly.
    - Identificadores en formato UUID.
    - [F2-01] Importes monetarios como `string` decimal de 2 decimales (Decimal(10,2)), NUNCA coma flotante,
      para evitar errores de redondeo en facturaciГіn; porcentajes como `string` Decimal(4,2).
    - Todas las operaciones estГЎn aisladas por tenant (derivado del JWT, no del path).

    ## Salud / documentaciГіn
    - [DECISIГ“N F1-03] `GET /api/health` y `GET /api/docs` son endpoints operativos/infra (US-000) y
      quedan FUERA de este contrato de negocio a propГіsito. Confirma si prefieres documentarlos aquГ­.

  version: 1.2.0
  contact:
    name: Equipo Slotify
  license:
    name: UNLICENSED

servers:
  # [DECISIГ“N F5-06] Dominios no respaldados por ninguna fuente; confirma las URLs reales antes de publicar.
  - url: http://localhost:3000/api
    description: Servidor de desarrollo (backend NestJS)
  - url: https://api.slotify.app/api
    description: Servidor de producciГіn

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: AutenticaciГіn y sesiГіn (UC-01, UC-02)
  - name: Reservas
    description: Ciclo de vida de la reserva y transiciones de estado (UC-03 a UC-10, UC-23 a UC-28)
  - name: Cola
    description: Cola de espera de fechas bloqueadas (UC-11 a UC-13)
  - name: Presupuestos
    description: Pre-reserva, tarifas y presupuestos (UC-14 a UC-16)
  - name: Confirmacion
    description: ConfirmaciГіn de reserva, pagos, facturas y condiciones particulares (UC-17 a UC-19)
  - name: Subprocesos
    description: Sub-procesos paralelos pre-evento, liquidaciГіn y fianza (UC-20 a UC-22, UC-26, UC-27)
  - name: Facturas
    description: EmisiГіn de facturas y registro de pagos (UC-18, UC-21)
  - name: FichaOperativa
    description: Briefing operativo del evento (UC-20, UC-24)
  - name: Calendario
    description: Disponibilidad, bloqueo y liberaciГіn de fechas (UC-29 a UC-31)
  - name: Clientes
    description: Datos de contacto y fiscales de clientes (atributo de la reserva, no entidad de navegaciГіn)
  - name: Historico
    description: BГєsqueda y exportaciГіn del histГіrico (UC-32, UC-33)
  - name: Dashboard
    description: KPIs operativos y financieros (UC-34)
  - name: Comunicaciones
    description: EnvГ­o y log de emails E1вЂ“E8 y manuales (UC-35, UC-36)
  - name: Documentos
    description: Subida y descarga de documentos polimГіrficos (UC-19, UC-24)
  - name: Cron
    description: Endpoint protegido de barrido periГіdico (TTLs, cola, recordatorios)

paths:
  # ============================ AUTH ============================
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesiГіn (UC-01)
      description: Valida credenciales y devuelve un access token JWT. El refresh token se entrega en una cookie httpOnly.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: AutenticaciГіn correcta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          # [US-001 FA-01] 401 genГ©rico anti-enumeration: credenciales invГЎlidas y cuenta
          # deshabilitada (activo=false) devuelven EXACTAMENTE el mismo shape y mensaje, para
          # no revelar si un email existe o estГЎ deshabilitado. NO se usa 403 ni un mensaje
          # distinto que permita distinguir ambos casos.
          description: |
            AutenticaciГіn fallida. Cubre tanto **credenciales invГЎlidas** como **cuenta
            deshabilitada** (`activo=false`) con idГ©ntico cuerpo de error (decisiГіn
            anti-enumeration deliberada). El cliente no puede distinguir ambos casos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa el refresh token de la cookie httpOnly para emitir un nuevo access token.
      # [F3-01] La autenticaciГіn de este endpoint es la cookie de refresh, no el bearer.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Nuevo access token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesiГіn (UC-02)
      description: |
        Cierra la sesiГіn del **dispositivo actual**: limpia la cookie httpOnly de
        refresh. Es **best-effort / stateless** вЂ” no hay invalidaciГіn server-side
        persistente del refresh token (decisiГіn US-002 В§1); el riesgo residual estГЎ
        acotado por la cookie httpOnly + TTL del refresh (~7 dГ­as).

        **Idempotente**: responde 200/204 SIEMPRE, tambiГ©n en un segundo logout cuando
        la cookie de refresh estГЎ ausente, expirada o es invГЎlida; NUNCA devuelve 401
        por falta de cookie. Por eso la cookie de refresh es seguridad **opcional**.

        **No anГіnimo**: actГєa Гєnicamente sobre la cookie de refresh del propio llamante.
        No acepta un identificador de usuario de destino (ni en body ni en parГЎmetros),
        por lo que no puede cerrar la sesiГіn de otro usuario.

        **AuditorГ­a (efecto de servidor)**: cuando el refresh token identifica a un
        usuario, el servidor registra en AUDIT_LOG `accion = logout`, `entidad = USUARIO`,
        `usuario_id` y `tenant_id` (bajo contexto RLS del tenant). Si no hay usuario
        identificable (doble logout sin cookie vГЎlida), NO se audita.

        El **access token previo no se revoca** activamente: sigue siendo vГЎlido hasta su
        expiraciГіn natural (~15 min); es el frontend quien lo elimina de memoria.
        [F1-09] Se autentica con la cookie de refresh (no con el access token), para
        permitir el logout aunque el access token ya haya expirado (US-002).
      # [US-002 В§2] Cookie de refresh OPCIONAL para preservar la idempotencia del doble
      # logout: la ausencia de cookie NO produce 401. El `{}` declara "sin autenticaciГіn"
      # como alternativa vГЎlida a `cookieAuth`, en lugar del `bearerAuth` global.
      security:
        - {}
        - cookieAuth: []
      responses:
        '200':
          description: SesiГіn cerrada de forma idempotente (cuerpo vacГ­o).
        '204':
          description: SesiГіn cerrada (sin contenido).

  /auth/me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      description: '[F1-08] Soporte de restauraciГіn de sesiГіn del shell (US-000A/US-001).'
      responses:
        '200':
          description: Datos del usuario en sesiГіn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================ RESERVAS ============================
  /reservas:
    get:
      tags: [Reservas]
      summary: Listar reservas (pipeline)
      description: Lista paginada de reservas del tenant con filtros por estado, sub-estado, fecha y canal.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - in: query
          name: estado
          schema: { $ref: '#/components/schemas/EstadoReserva' }
        - in: query
          name: subEstado
          schema: { $ref: '#/components/schemas/SubEstadoConsulta' }
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
          description: BГєsqueda por cГіdigo, nombre de cliente o notas
      responses:
        '200':
          description: Reservas recuperadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Reservas]
      summary: Dar de alta un nuevo lead/consulta (UC-03)
      description: |
        Crea una reserva en estado `consulta`. El sub-estado resultante depende de `fechaEvento`:
        - SIN `fechaEvento` (US-003, alta exploratoria) в†’ nace en `2a`, `ttlExpiracion = null`,
          SIN `FechaBloqueada`.
        - CON `fechaEvento` (estrictamente futura) y fecha LIBRE (US-004) в†’ nace en `2b`, dispara
          el bloqueo blando atГіmico (`FechaBloqueada` con `tipoBloqueo = blando`),
          `ttlExpiracion = now() + ttl_consulta_dias`. La respuesta incluye `tipoBloqueo = blando`.
        - CON `fechaEvento` bloqueada por una consulta en `2b` в†’ nace en `2d` (cola), con
          `posicionCola` y `consultaBloqueanteId`, SIN nueva `FechaBloqueada`.
        - CON `fechaEvento` bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores
          в†’ nace en `2a` exploratoria (`fechaDisponible = false` + `avisoDisponibilidad`
          informativo), sin bloqueo ni cola.

        El CLIENTE se crea/reutiliza de forma idempotente por `(tenant_id, email)`. El campo
        `comentarios` decide el flujo del email E1 (ver su descripciГіn en `CreateReservaRequest`).
        Si hay `fechaEvento` + nВє de invitados + horas, E1 incorpora la `tarifaEstimada` (motor
        UC-16); es tolerante: si la tarifa no puede calcularse, E1 sale sin precio y el alta no se
        bloquea.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaRequest'
      responses:
        '201':
          description: |
            Reserva creada (`CreateReservaResponse`). En el alta exploratoria sin fecha (US-003) el
            recurso tiene `estado = 'consulta'`, `subEstado = '2a'`, `ttlExpiracion = null` y los
            campos transitorios ausentes. Con fecha aparecen los campos derivados segГєn el
            sub-estado: `tipoBloqueo`+`ttlExpiracion` (2b), `posicionCola`+`consultaBloqueanteId`
            (2d), `fechaDisponible`+`avisoDisponibilidad` (2a por fecha no disponible), y
            `tarifaEstimada` cuando E1 la incluye.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservaResponse'
        '400':
          # ValidaciГіn de entrada (class-validator в†’ exception filter de NestJS). El cuerpo es
          # ErrorResponse con `message` como array de strings (un mensaje por campo afectado).
          # Casos: obligatorios faltantes (cliente.nombre/apellidos/email/telefono), email mal
          # formado, canalEntrada fuera del enum, y [US-004] `fechaEvento` = hoy o fecha pasada
          # (debe ser estrictamente futura, > hoy). En cualquiera de ellos NO se crea RESERVA ni
          # FechaBloqueada.
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /reservas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Reservas]
      summary: Detalle de reserva
      responses:
        '200':
          description: Reserva recuperada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaDetalle'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reservas]
      summary: Actualizar datos de la reserva
      description: |
        ActualizaciГіn parcial de los campos editables (invitados, duraciГіn, tipo de evento, notasвЂ¦).
        No cambia el estado. [F1-07] El nВє de invitados (US-007) y datos nГєcleo del lead; la fecha de
        evento NO se asigna aquГ­ sino vГ­a /transiciones (ver [F1-01]).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservaRequest'
      responses:
        '200':
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/transiciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Ejecutar una transiciГіn de estado (UC-04, UC-06, UC-10, UC-23, UC-25, UC-28)
      description: |
        Aplica una transiciГіn de la mГЎquina de estados de la reserva. El backend valida la
        transiciГіn contra la tabla declarativa de transiciones y sus guardas. Cubre, entre otras:
        2.bв†’2.c (pendiente invitados), в†’2.z (descartar por cliente), iniciar evento, finalizar
        evento y archivar. NOTA [US-005]: la asignaciГіn de fecha (transiciГіn 2.aв†’2.b/2.d) NO se
        hace aquГ­, sino en el endpoint dedicado `POST /reservas/{id}/fecha` (design.md В§D-2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransicionRequest'
      responses:
        '200':
          description: TransiciГіn aplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: TransiciГіn no permitida o guarda no satisfecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservas/{id}/fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Asignar fecha a una consulta exploratoria вЂ” transiciГіn 2.aв†’2.b/2.d (UC-04 / US-005)
      description: |
        [US-005] TransiciГіn de un agregado RESERVA **existente** en sub-estado `2a` (consulta
        exploratoria) hacia `2b` (consulta con fecha + bloqueo blando) o `2d` (cola), asignando
        `fechaEvento` y disparando el bloqueo atГіmico de fecha en la **misma transacciГіn**
        (`SELECT вЂ¦ FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos).

        Difiere de `POST /reservas` (US-003/004, alta de un lead nuevo): aquГ­ se **muta** un
        agregado ya en `2a`; el nГєcleo de determinaciГіn de sub-estado, bloqueo y cola se reutiliza
        (`determinarAltaConFecha` + `bloquearEnTx`, US-004/US-040).

        DeterminaciГіn del sub-estado destino:
        - fecha **LIBRE** в†’ `2b`, crea `FechaBloqueada` blanda, `ttlExpiracion = now() + ttl_consulta_dias`.
        - fecha bloqueada por una consulta en `2b` в†’ se **ofrece cola**: `409` con
          `colaDisponible=true`; el cliente reenvГ­a con `aceptarCola=true` para entrar en `2d`
          (`posicionCola`, `consultaBloqueanteId`). La RESERVA permanece en `2a` hasta confirmar.
        - fecha bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores в†’ `409`
          con `colaDisponible=false` (no disponible, sin cola). La RESERVA permanece en `2a`.
        - **carrera D4** (otra transiciГіn ganГі el bloqueo, `P2002`) в†’ se re-deriva a oferta de cola
          (`409 colaDisponible=true`); con `aceptarCola=true` el reintento entra directo a `2d`.

        Flujo interactivo de la cola (FA-01) SIN estado servidor intermedio: la 1ВЄ llamada informa
        (`409` + `colaDisponible`), la 2ВЄ con `aceptarCola=true` confirma `2d`.

        Tras el COMMIT de `2aв†’2b` se registra/envГ­a (post-commit, **no bloqueante**) la comunicaciГіn
        de confirmaciГіn de bloqueo provisional (extensiГіn de E1, motor US-045): un fallo de envГ­o no
        revierte la transiciГіn ni el bloqueo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarFechaRequest'
      responses:
        '200':
          description: |
            TransiciГіn aplicada. Devuelve la RESERVA actualizada:
            - `2b`: `subEstado='2b'`, `fechaEvento`, `ttlExpiracion` (bloqueo blando creado).
            - `2d`: `subEstado='2d'`, `fechaEvento`, `posicionCola`, `consultaBloqueanteId`
              (entrada en cola; requiere `aceptarCola=true`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          # fechaEvento ausente, mal formada o NO estrictamente futura (= hoy o pasada). Regla
          # unificada `> hoy` (D-1, coherente con US-004/US-040). No se muta la RESERVA.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Fecha no asignable de inmediato; la RESERVA permanece en `2a`. El cuerpo aГ±ade
            `colaDisponible` y `motivo` al envelope de error estГЎndar:
            - `colaDisponible=true` в†’ bloqueada por una consulta en `2b` (o carrera D4): se ofrece
              cola; reintentar con `aceptarCola=true` para entrar en `2d`.
            - `colaDisponible=false` в†’ bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+:
              no disponible, sin cola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignarFechaConflictoError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO estГЎ en sub-estado `2a` (p. ej. ya tiene
            fecha, estГЎ en cola, en un estado terminal `2x/2y/2z` o mГЎs avanzada). No se muta
            (F5-02: 409 = concurrencia, 422 = transiciГіn/guarda invГЎlida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/extender-bloqueo:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Extender plazo de bloqueo (UC-05)
      description: AmplГ­a el `ttl_expiracion` del bloqueo blando vigente segГєn la polГ­tica del tenant.
      responses:
        '200':
          description: Bloqueo extendido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/visita:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Programar visita al espacio (UC-07)
      description: Transiciona la consulta a sub-estado `2.v` y fija fecha/hora de visita.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramarVisitaRequest'
      responses:
        '200':
          description: Visita programada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags: [Reservas]
      summary: Registrar resultado de visita (UC-08)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultadoVisitaRequest'
      responses:
        '200':
          description: Resultado registrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ COLA ============================
  /reservas/{id}/cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Cola]
      summary: Visualizar cola de espera de la fecha de una reserva bloqueante (UC-11)
      responses:
        '200':
          description: Cola FIFO ordenada por posiciГіn
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ColaItem' }

  /reservas/{id}/promover:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Promover consulta de la cola (UC-12)
      description: Promueve la primera consulta en cola (2.dв†’2.b) cuando la bloqueante se libera. Encadenamiento automГЎtico.
      responses:
        '200':
          description: Consulta promovida
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '409':
          $ref: '#/components/responses/Conflict'

  /reservas/{id}/salir-cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Salir voluntariamente de la cola (UC-13)
      responses:
        '200':
          description: Reserva retirada de la cola
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ PRESUPUESTOS / TARIFAS ============================
  /tarifas/calcular:
    post:
      tags: [Presupuestos]
      summary: Calcular tarifa segГєn configuraciГіn (UC-16 / US-016)
      description: >-
        Motor de tarifa (US-016, lectura pura, multi-tenant por JWT). Determina la temporada del mes
        de `fecha_evento`, busca la TARIFA vigente por temporada x duraciГіn x tramo de invitados y suma
        los extras del catГЎlogo del tenant. Devuelve el esquema canГіnico D-1. Con
        `num_adultos_ninos_mayores4 > 50` responde 200 con `tarifa_a_consultar: true` e importes `null`
        (precio manual), SIN error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculoTarifaRequest'
      responses:
        '200':
          description: 'Tarifa calculada (caso normal) o tarifa a consultar (>50 invitados): mismo esquema canГіnico.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculoTarifaResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 'EXTRA_NO_ENCONTRADO: un extra no existe, estГЎ inactivo o no es visible en el tenant (RLS).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CalculoTarifaExtraNoEncontradoError' }
        '422':
          description: >-
            ConfiguraciГіn incompleta del tarifario: `TARIFA_NO_CONFIGURADA` (sin TARIFA vigente para una
            combinaciГіn vГЎlida con <= 50 invitados) o `TEMPORADA_NO_CONFIGURADA` (mes sin mapear en
            TEMPORADA_CALENDARIO).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  # [DECISIГ“N F2-04] CatГЎlogo de extras: necesario para resolver extraId/extraIds desde el frontend.
  # Confirma si en MVP el catГЎlogo se expone por API o se siembra/hardcodea.
  /extras:
    get:
      tags: [Presupuestos]
      summary: Listar catГЎlogo de extras del tenant
      responses:
        '200':
          description: CatГЎlogo de extras configurables
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Extra' }

  /reservas/{id}/presupuestos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Presupuestos]
      summary: Listar versiones de presupuesto de la reserva
      responses:
        '200':
          description: Presupuestos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Presupuesto' }
    post:
      tags: [Presupuestos]
      summary: Generar presupuesto y activar pre-reserva (UC-14)
      description: Crea una nueva versiГіn de presupuesto (PDF), congela la tarifa y transiciona la reserva a `pre_reserva` (bloqueo firme/7 dГ­as).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresupuestoRequest'
      responses:
        '201':
          description: Presupuesto generado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Presupuesto' }
        '409':
          $ref: '#/components/responses/Conflict'

  /presupuestos/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    patch:
      tags: [Presupuestos]
      summary: Editar y enviar presupuesto (UC-15)
      description: Edita lГ­neas/descuento y, opcionalmente, marca el presupuesto como `enviado` (dispara email E-presupuesto).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePresupuestoRequest'
      responses:
        '200':
          description: Presupuesto actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Presupuesto' }

  # ============================ EXTRAS DE RESERVA ============================
  # [DECISIГ“N F1-05] Extras como recurso de primera clase. JustificaciГіn: origen=anadido_post_confirmacion
  # implica aГ±adir extras tras la confirmaciГіn (van a la liquidaciГіn). Confirma o intГ©gralo en presupuesto/liquidaciГіn.
  /reservas/{id}/extras:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Presupuestos]
      summary: Listar extras de la reserva
      responses:
        '200':
          description: Extras de la reserva
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReservaExtra' }
    post:
      tags: [Presupuestos]
      summary: AГ±adir extra a la reserva (UC-14, UC-21)
      description: AГ±ade una lГ­nea de extra con precio congelado. `origen` indica si viene del presupuesto o se aГ±ade tras la confirmaciГіn.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaExtraRequest'
      responses:
        '201':
          description: Extra aГ±adido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReservaExtra' }

  # ============================ CONFIRMACIГ“N / PAGOS / FACTURAS ============================
  /reservas/{id}/pagos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Confirmar pago de seГ±al / registrar cobro (UC-17, UC-21, UC-22)
      description: Registra un `Pago` conciliado contra una factura. El pago de seГ±al transiciona la reserva a `reserva_confirmada` (bloqueo firme).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePagoRequest'
      responses:
        '201':
          description: Pago registrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pago' }
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/facturas:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Facturas]
      summary: Listar facturas de la reserva
      responses:
        '200':
          description: Facturas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Factura' }
    post:
      tags: [Facturas]
      summary: Generar factura (UC-18, UC-21)
      description: Emite una factura en estado `borrador` (`senal`, `liquidacion`, `fianza` o `complementaria`). La liquidaciГіn arrastra los `ReservaExtra` con `factura_id` nulo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFacturaRequest'
      responses:
        '201':
          description: Factura generada (borrador)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Factura' }

  # [DECISIГ“N F1-02] AcciГіn de aprobar/enviar factura (US-028). Cierra la laguna "SIN ENDPOINT".
  # Confirma este enfoque (acciГіn dedicada) frente a un PATCH /facturas/{id} con cambio de estado.
  /reservas/{id}/facturas/{facturaId}/enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
      - in: path
        name: facturaId
        required: true
        schema: { type: string, format: uuid }
        description: ID de la factura
    post:
      tags: [Facturas]
      summary: Aprobar y enviar factura (UC-28)
      description: |
        Transiciona la factura `borrador в†’ enviada`, asigna nГєmero de factura y dispara el email E4.
        Para la liquidaciГіn, su envГ­o es prerequisito del cobro y arrastra el efecto sobre `fianza_status`.
      responses:
        '200':
          description: Factura aprobada y enviada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Factura' }
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: La factura no estГЎ en estado `borrador`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/condiciones-particulares:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Gestionar condiciones particulares (UC-19)
      description: Marca el envГ­o o la firma de las condiciones particulares y asocia el documento firmado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CondicionesParticularesRequest'
      responses:
        '200':
          description: Estado de condiciones actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ SUB-PROCESOS ============================
  /reservas/{id}/subprocesos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    patch:
      tags: [Subprocesos]
      summary: Gestionar sub-procesos paralelos (UC-20, UC-21, UC-22)
      description: Avanza el estado de los sub-procesos `pre_evento`, `liquidacion` y/o `fianza`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubprocesosRequest'
      responses:
        '200':
          description: Sub-procesos actualizados
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # [DECISIГ“N F1-06] ELIMINADO `POST /reservas/{id}/fianza/solicitar-iban`.
  # Motivo: la solicitud de IBAN (E5) se dispara AUTOMГЃTICAMENTE al entrar en post_evento (US-034/035),
  # no es una acciГіn manual del gestor. El gestor solo REGISTRA el IBAN vГ­a PATCH /clientes/{id} (US-035),
  # y E8 confirma la recepciГіn. Restaura este endpoint solo si confirmas que existe una solicitud manual.

  /reservas/{id}/fianza/devolver:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Subprocesos]
      summary: Procesar devoluciГіn de fianza (UC-27)
      description: Registra la devoluciГіn total o parcial (retenciГіn por desperfectos) de la fianza.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevolucionFianzaRequest'
      responses:
        '200':
          description: DevoluciГіn procesada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ FICHA OPERATIVA ============================
  /reservas/{id}/ficha-operativa:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [FichaOperativa]
      summary: Consultar ficha operativa del evento (UC-24)
      responses:
        '200':
          description: Ficha operativa
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativa' }
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [FichaOperativa]
      summary: Crear/actualizar ficha operativa (UC-20, UC-24)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertFichaOperativaRequest'
      responses:
        '200':
          description: Ficha guardada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativa' }

  # ============================ CALENDARIO ============================
  /calendario:
    get:
      tags: [Calendario]
      summary: Consultar calendario y disponibilidad (UC-29)
      description: Devuelve reservas y fechas bloqueadas del tenant en un rango, para las vistas mensual/semanal.
      parameters:
        - in: query
          name: desde
          required: true
          schema: { type: string, format: date }
        - in: query
          name: hasta
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Disponibilidad del rango
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CalendarioItem' }

  /fechas-bloqueadas:
    post:
      tags: [Calendario]
      summary: Bloquear fecha (UC-30)
      description: |
        OperaciГіn crГ­tica. Crea un `FechaBloqueada` dentro de una transacciГіn con
        `SELECT ... FOR UPDATE`. La restricciГіn `UNIQUE(tenant_id, fecha)` garantiza
        que dos peticiones concurrentes para la misma fecha resulten en un Г©xito y un 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BloquearFechaRequest'
      responses:
        '201':
          description: Fecha bloqueada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FechaBloqueada' }
        '409':
          description: La fecha ya estГЎ bloqueada (doble reserva evitada)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /fechas-bloqueadas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    delete:
      tags: [Calendario]
      summary: Liberar fecha (UC-31)
      description: Libera la fecha y dispara la promociГіn de la cola de espera si la hay.
      responses:
        '204':
          description: Fecha liberada
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================ CLIENTES ============================
  # [DECISIГ“N F1-04] ELIMINADOS `GET /clientes` (listado/bГєsqueda) y `POST /clientes`.
  # Motivo: violan la piedra angular "la reserva es la entidad central; el cliente es un atributo,
  # no un punto de navegaciГіn tipo CRM" (er-diagram В§3.4). El cliente se crea EMBEBIDO en el alta de
  # reserva (CreateReservaRequest.cliente, US-003/004). Se conservan GET/PATCH /clientes/{id} como soporte
  # (lectura de datos fiscales en US-014, registro de IBAN en US-035). Restaura el listado solo si confirmas
  # que necesitas un selector de clientes recurrentes (serГ­a ya una funcionalidad cliente-cГ©ntrica).
  /clientes/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    get:
      tags: [Clientes]
      summary: Detalle de cliente (soporte, US-014)
      responses:
        '200':
          description: Cliente
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cliente' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Clientes]
      summary: Actualizar datos fiscales / IBAN del cliente (US-035)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClienteRequest'
      responses:
        '200':
          description: Cliente actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cliente' }

  # ============================ HISTГ“RICO ============================
  /historico/reservas:
    get:
      tags: [Historico]
      summary: Buscar en histГіrico (UC-32)
      description: BГєsqueda full-text sobre reservas archivadas (cГіdigo, cliente, notas).
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200':
          description: Resultados del histГіrico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'

  /historico/exportar:
    get:
      tags: [Historico]
      summary: Exportar reservas (UC-33)
      description: Exporta el histГіrico filtrado a CSV.
      parameters:
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
      responses:
        '200':
          description: Fichero CSV
          content:
            text/csv:
              schema: { type: string, format: binary }

  # ============================ DASHBOARD ============================
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Visualizar dashboard operativo (UC-34)
      description: Devuelve KPIs operativos (ocupaciГіn, conversiГіn, pipeline) y financieros (ingresos, cobros pendientes).
      responses:
        '200':
          description: KPIs del dashboard
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardResponse' }

  # ============================ COMUNICACIONES ============================
  /reservas/{id}/comunicaciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Comunicaciones]
      summary: Log de comunicaciones de la reserva
      responses:
        '200':
          description: Comunicaciones
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Comunicacion' }
    post:
      tags: [Comunicaciones]
      summary: Enviar email manual o automГЎtico (UC-35, UC-36)
      description: Crea y envГ­a (o guarda como borrador para revisiГіn, UC-36) un email vinculado a la reserva.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateComunicacionRequest'
      responses:
        '201':
          description: ComunicaciГіn creada/enviada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comunicacion' }

  # ============================ DOCUMENTOS ============================
  /documentos:
    post:
      tags: [Documentos]
      summary: Subir documento (UC-19, UC-24)
      description: Sube un documento polimГіrfico (DNI, clГЎusula, condiciones, justificante de pago, etc.) al storage y registra sus metadatos.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                tipo:
                  $ref: '#/components/schemas/TipoDocumento'
                reservaId:
                  type: string
                  format: uuid
              required: [file, tipo]
      responses:
        '201':
          description: Documento subido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Documento' }
        '400':
          description: Tipo de fichero no vГЎlido o demasiado grande (>10MB)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ============================ CRON ============================
  /cron/barrido:
    post:
      tags: [Cron]
      summary: Barrido periГіdico de TTLs, cola y recordatorios
      description: |
        Endpoint protegido (token de servicio) invocado por el cron. Es idempotente:
        barre reservas con `ttl_expiracion` vencido, las expira (2.bв†’2.x), libera la fecha,
        promueve la cola y dispara recordatorios automГЎticos. No depende del reloj exacto.
      # [DECISIГ“N granularidad] El parГЎmetro `tarea` permite invocar/testear cada barrido por separado,
      # imprescindible para aislar tests de concurrencia (US-012/018/026/031/037). Confirma este enfoque
      # frente a un Гєnico barrido monolГ­tico.
      parameters:
        - in: query
          name: tarea
          schema:
            type: string
            enum: [expiracion, cola, fichas, eventos, archivado, recordatorios, all]
            default: all
          description: Barrido concreto a ejecutar (por defecto todos)
      security:
        - cronToken: []
      responses:
        '200':
          description: Barrido ejecutado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT de vida corta. `tenant_id` y `rol` van firmados en el payload.
    cookieAuth:
      # [F3-01] Modela explГ­citamente el refresh token en cookie httpOnly+Secure+SameSite (architecture В§2.8).
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token en cookie httpOnly+Secure+SameSite. Inaccesible desde JavaScript (anti-XSS).
    cronToken:
      # [DECISIГ“N F5-05] Nombre de cabecera no respaldado por fuente. Confirma el mecanismo de auth
      # service-to-service (p. ej. secreto fuerte en variable de entorno).
      type: apiKey
      in: header
      name: X-Cron-Token
      description: Token de servicio para el endpoint de barrido del cron.

  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
      description: NГєmero de pГЎgina
    Limit:
      # [DECISIГ“N F5-04] default=20 y maximum=100 son convenciГіn, no fuente. Confirma con el PO.
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Elementos por pГЎgina
    IdReserva:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
      description: ID de la reserva
    IdGenerico:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
      description: Identificador del recurso

  responses:
    # [DECISIГ“N F5-02] Mapeo HTTP ratificado: 409 = conflicto/concurrencia (violaciГіn UNIQUE determinista),
    # 422 = transiciГіn/guarda invГЎlida. Documentar como decisiГіn en la spec.
    Unauthorized:
      description: No autenticado o token invГЎlido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Recurso no encontrado en el tenant
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Error de validaciГіn de entrada
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflicto de estado o de concurrencia (p. ej. fecha ya bloqueada)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      # [US-005] Autenticado pero sin rol/permiso suficiente. Distinto de 401 (sin sesiГіn).
      description: Autenticado pero sin rol/permiso suficiente para la operaciГіn
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      # [US-001] Rate-limiting provisto por el guard self-contained LoginThrottleGuard (por IP+email). No altera el schema de peticiГіn.
      description: Demasiadas peticiones (rate-limit excedido)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    # -------- Tipos monetarios [F2-01] --------
    Importe:
      type: string
      pattern: '^-?\d+\.\d{2}$'
      example: '1234.56'
      description: Importe monetario en EUR, Decimal(10,2) serializado como string para evitar coma flotante.
    Porcentaje:
      type: string
      pattern: '^\d+\.\d{2}$'
      example: '21.00'
      description: Porcentaje, Decimal(4,2) serializado como string.

    # -------- Enums --------
    EstadoReserva:
      type: string
      enum: [consulta, pre_reserva, reserva_confirmada, evento_en_curso, post_evento, reserva_completada, reserva_cancelada]
    SubEstadoConsulta:
      type: string
