                Esta reserva no puede descartarse desde su estado actual.

    # -------- US-035: registrar IBAN de devoluciĆ³n --------
    # [US-035 D-5A] Cuerpo del PATCH /reservas/{id}/iban-devolucion: el Ćŗnico parĆ”metro de negocio
    # es el IBAN que el cliente proporcionĆ³. El backend lo valida por checksum mod-97 ANTES de
    # escribir (FA-01); el `pattern` aquĆ­ es un pre-filtro laxo de formato IBAN (paĆ­s 2 letras + 2
    # dĆ­gitos de control + BBAN alfanumĆ©rico, 15ā32 mĆ”s), NO sustituye la validaciĆ³n mod-97 de dominio.
    RegistrarIbanDevolucionRequest:
      type: object
      additionalProperties: false
      required: [iban]
      properties:
        iban:
          type: string
          minLength: 15
          maxLength: 34
          pattern: '^[A-Za-z]{2}[0-9]{2}[A-Za-z0-9 ]{11,30}$'
          description: >-
            IBAN a registrar (se normaliza en servidor: mayĆŗsculas, sin espacios). Se valida por
            checksum mĆ³dulo 97 antes de persistir; un IBAN que no supere mod-97 devuelve 422 (FA-01).
          example: ES9121000418450200051332

    # [US-035 D-2/FA-03] Aviso opcional cuando el IBAN se guardĆ³ pero E8 no pudo enviarse. Su
    # presencia (no nulo) es la seĆ±al de FA-03 para la UI (alerta + botĆ³n de reenvĆ­o). Nulo cuando
    # E8 se enviĆ³ correctamente. COMUNICACION es la fuente de verdad del estado del email.
    RegistrarIbanDevolucionAvisoEmail:
      type: object
      required: [codigo, mensaje]
      properties:
        codigo:
          type: string
