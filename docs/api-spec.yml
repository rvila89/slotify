openapi: 3.0.0
info:
  title: Slotify API
  description: |
    API REST de **Slotify**, la plataforma SaaS de gestión integral para espacios
    boutique de eventos privados (masías, fincas, villas).

    La reserva es el agregado raíz: recorre toda la máquina de estados, desde los
    sub-estados de consulta (2.a–2.z) hasta `reserva_completada`. El bloqueo atómico
    de fecha se garantiza con la restricción `UNIQUE(tenant_id, fecha)` en PostgreSQL
    y transacciones `SELECT ... FOR UPDATE`.

    La API sigue arquitectura hexagonal + DDD sobre NestJS, es multi-tenant (RLS) y
    expone este contrato OpenAPI como fuente de verdad para generar el cliente HTTP
    type-safe del frontend.

    ## Convenciones
    - Lenguaje ubicuo del dominio en español (reservas, presupuestos, fianza…).
    - Autenticación JWT Bearer (access token de vida corta) + refresh token en cookie httpOnly.
    - Identificadores en formato UUID.
    - [F2-01] Importes monetarios como `string` decimal de 2 decimales (Decimal(10,2)), NUNCA coma flotante,
      para evitar errores de redondeo en facturación; porcentajes como `string` Decimal(4,2).
    - Todas las operaciones están aisladas por tenant (derivado del JWT, no del path).

    ## Salud / documentación
    - [DECISIÓN F1-03] `GET /api/health` y `GET /api/docs` son endpoints operativos/infra (US-000) y
      quedan FUERA de este contrato de negocio a propósito. Confirma si prefieres documentarlos aquí.

  version: 1.2.0
  contact:
    name: Equipo Slotify
  license:
    name: UNLICENSED

servers:
  # [DECISIÓN F5-06] Dominios no respaldados por ninguna fuente; confirma las URLs reales antes de publicar.
  - url: http://localhost:3000/api
    description: Servidor de desarrollo (backend NestJS)
  - url: https://api.slotify.app/api
    description: Servidor de producción

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autenticación y sesión (UC-01, UC-02)
  - name: Reservas
    description: Ciclo de vida de la reserva y transiciones de estado (UC-03 a UC-10, UC-23 a UC-28)
  - name: Cola
    description: Cola de espera de fechas bloqueadas (UC-11 a UC-13)
  - name: Presupuestos
    description: Pre-reserva, tarifas y presupuestos (UC-14 a UC-16)
  - name: Confirmacion
    description: Confirmación de reserva, pagos, facturas y condiciones particulares (UC-17 a UC-19)
  - name: Subprocesos
    description: Sub-procesos paralelos pre-evento, liquidación y fianza (UC-20 a UC-22, UC-26, UC-27)
  - name: Facturas
    description: Emisión de facturas y registro de pagos (UC-18, UC-21)
  - name: Facturacion
    description: >-
      Ciclo de vida de la FACTURA como agregado raíz (borrador → enviada → cobrada): factura
      de señal (US-022 / UC-18), aprobación, rechazo y regeneración de PDF. La creación de la
      factura de señal NO es un endpoint público: es efecto post-commit de la confirmación de
      la reserva (US-021).
  - name: FichaOperativa
    description: Briefing operativo del evento (UC-20, UC-24)
  - name: Calendario
    description: Disponibilidad, bloqueo y liberación de fechas (UC-29 a UC-31)
  - name: Clientes
    description: Datos de contacto y fiscales de clientes (atributo de la reserva, no entidad de navegación)
  - name: Historico
    description: Búsqueda y exportación del histórico (UC-32, UC-33)
  - name: Dashboard
    description: >-
      Vista de lectura agregada operativa: 7 widgets del estado de las reservas del tenant
      (UC-34 / US-044). No incluye el dashboard financiero ni KPIs avanzados (§7.2, fuera de MVP).
  - name: Comunicaciones
    description: Envío y log de emails E1–E8 y manuales (UC-35, UC-36)
  - name: Documentos
    description: Subida y descarga de documentos polimórficos (UC-19, UC-24)
  - name: Cron
    description: Endpoint protegido de barrido periódico (TTLs, cola, recordatorios)

paths:
  # ============================ AUTH ============================
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión (UC-01)
      description: Valida credenciales y devuelve un access token JWT. El refresh token se entrega en una cookie httpOnly.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación correcta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          # [US-001 FA-01] 401 genérico anti-enumeration: credenciales inválidas y cuenta
          # deshabilitada (activo=false) devuelven EXACTAMENTE el mismo shape y mensaje, para
          # no revelar si un email existe o está deshabilitado. NO se usa 403 ni un mensaje
          # distinto que permita distinguir ambos casos.
          description: |
            Autenticación fallida. Cubre tanto **credenciales inválidas** como **cuenta
            deshabilitada** (`activo=false`) con idéntico cuerpo de error (decisión
            anti-enumeration deliberada). El cliente no puede distinguir ambos casos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa el refresh token de la cookie httpOnly para emitir un nuevo access token.
      # [F3-01] La autenticación de este endpoint es la cookie de refresh, no el bearer.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Nuevo access token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión (UC-02)
      description: |
        Cierra la sesión del **dispositivo actual**: limpia la cookie httpOnly de
        refresh. Es **best-effort / stateless** — no hay invalidación server-side
        persistente del refresh token (decisión US-002 §1); el riesgo residual está
        acotado por la cookie httpOnly + TTL del refresh (~7 días).

        **Idempotente**: responde 200/204 SIEMPRE, también en un segundo logout cuando
        la cookie de refresh está ausente, expirada o es inválida; NUNCA devuelve 401
        por falta de cookie. Por eso la cookie de refresh es seguridad **opcional**.

        **No anónimo**: actúa únicamente sobre la cookie de refresh del propio llamante.
        No acepta un identificador de usuario de destino (ni en body ni en parámetros),
        por lo que no puede cerrar la sesión de otro usuario.

        **Auditoría (efecto de servidor)**: cuando el refresh token identifica a un
        usuario, el servidor registra en AUDIT_LOG `accion = logout`, `entidad = USUARIO`,
        `usuario_id` y `tenant_id` (bajo contexto RLS del tenant). Si no hay usuario
        identificable (doble logout sin cookie válida), NO se audita.

        El **access token previo no se revoca** activamente: sigue siendo válido hasta su
        expiración natural (~15 min); es el frontend quien lo elimina de memoria.
        [F1-09] Se autentica con la cookie de refresh (no con el access token), para
        permitir el logout aunque el access token ya haya expirado (US-002).
      # [US-002 §2] Cookie de refresh OPCIONAL para preservar la idempotencia del doble
      # logout: la ausencia de cookie NO produce 401. El `{}` declara "sin autenticación"
      # como alternativa válida a `cookieAuth`, en lugar del `bearerAuth` global.
      security:
        - {}
        - cookieAuth: []
      responses:
        '200':
          description: Sesión cerrada de forma idempotente (cuerpo vacío).
        '204':
          description: Sesión cerrada (sin contenido).

  /auth/me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      description: '[F1-08] Soporte de restauración de sesión del shell (US-000A/US-001).'
      responses:
        '200':
          description: Datos del usuario en sesión
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================ RESERVAS ============================
  /reservas:
    get:
      tags: [Reservas]
      operationId: listarReservas
      summary: Listar reservas (pipeline)
      description: Lista paginada de reservas del tenant con filtros por estado, sub-estado, fecha y canal.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - in: query
          name: estado
          schema: { $ref: '#/components/schemas/EstadoReserva' }
        - in: query
          name: subEstado
          schema: { $ref: '#/components/schemas/SubEstadoConsulta' }
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
          description: Búsqueda por código, nombre de cliente o notas
      responses:
        '200':
          description: Reservas recuperadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Reservas]
      summary: Dar de alta un nuevo lead/consulta (UC-03)
      description: |
        Crea una reserva en estado `consulta`. El sub-estado resultante depende de `fechaEvento`:
        - SIN `fechaEvento` (US-003, alta exploratoria) → nace en `2a`, `ttlExpiracion = null`,
          SIN `FechaBloqueada`.
        - CON `fechaEvento` (estrictamente futura) y fecha LIBRE (US-004) → nace en `2b`, dispara
          el bloqueo blando atómico (`FechaBloqueada` con `tipoBloqueo = blando`),
          `ttlExpiracion = now() + ttl_consulta_dias`. La respuesta incluye `tipoBloqueo = blando`.
        - CON `fechaEvento` bloqueada por una consulta en `2b` → nace en `2d` (cola), con
          `posicionCola` y `consultaBloqueanteId`, SIN nueva `FechaBloqueada`.
        - CON `fechaEvento` bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores
          → nace en `2a` exploratoria (`fechaDisponible = false` + `avisoDisponibilidad`
          informativo), sin bloqueo ni cola.

        El CLIENTE se crea/reutiliza de forma idempotente por `(tenant_id, email)`. El campo
        `comentarios` decide el flujo del email E1 (ver su descripción en `CreateReservaRequest`).
        Si hay `fechaEvento` + nº de invitados + horas, E1 incorpora la `tarifaEstimada` (motor
        UC-16); es tolerante: si la tarifa no puede calcularse, E1 sale sin precio y el alta no se
        bloquea.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaRequest'
      responses:
        '201':
          description: |
            Reserva creada (`CreateReservaResponse`). En el alta exploratoria sin fecha (US-003) el
            recurso tiene `estado = 'consulta'`, `subEstado = '2a'`, `ttlExpiracion = null` y los
            campos transitorios ausentes. Con fecha aparecen los campos derivados según el
            sub-estado: `tipoBloqueo`+`ttlExpiracion` (2b), `posicionCola`+`consultaBloqueanteId`
            (2d), `fechaDisponible`+`avisoDisponibilidad` (2a por fecha no disponible), y
            `tarifaEstimada` cuando E1 la incluye.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservaResponse'
        '400':
          # Validación de entrada (class-validator → exception filter de NestJS). El cuerpo es
          # ErrorResponse con `message` como array de strings (un mensaje por campo afectado).
          # Casos: obligatorios faltantes (cliente.nombre/apellidos/email/telefono), email mal
          # formado, canalEntrada fuera del enum, y [US-004] `fechaEvento` = hoy o fecha pasada
          # (debe ser estrictamente futura, > hoy). En cualquiera de ellos NO se crea RESERVA ni
          # FechaBloqueada.
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /reservas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Reservas]
      summary: Detalle de reserva
      responses:
        '200':
          description: Reserva recuperada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaDetalle'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reservas]
      summary: Actualizar datos de la reserva
      description: |
        Actualización parcial de los campos editables (invitados, duración, tipo de evento, notas…).
        No cambia el estado. [F1-07] El nº de invitados (US-007) y datos núcleo del lead; la fecha de
        evento NO se asigna aquí sino vía /transiciones (ver [F1-01]).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservaRequest'
      responses:
        '200':
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/transiciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Ejecutar una transición de estado (UC-04, UC-06, UC-10, UC-23, UC-25, UC-28)
      description: |
        Aplica una transición de la máquina de estados de la reserva. El backend valida la
        transición contra la tabla declarativa de transiciones y sus guardas. Cubre, entre otras:
        2.b→2.c (pendiente invitados), →2.z (descartar por cliente), iniciar evento, finalizar
        evento y archivar. NOTA [US-005]: la asignación de fecha (transición 2.a→2.b/2.d) NO se
        hace aquí, sino en el endpoint dedicado `POST /reservas/{id}/fecha` (design.md §D-2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransicionRequest'
      responses:
        '200':
          description: Transición aplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: Transición no permitida o guarda no satisfecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservas/{id}/fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Asignar fecha a una consulta exploratoria — transición 2.a→2.b/2.d (UC-04 / US-005)
      description: |
        [US-005] Transición de un agregado RESERVA **existente** en sub-estado `2a` (consulta
        exploratoria) hacia `2b` (consulta con fecha + bloqueo blando) o `2d` (cola), asignando
        `fechaEvento` y disparando el bloqueo atómico de fecha en la **misma transacción**
        (`SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos).

        Difiere de `POST /reservas` (US-003/004, alta de un lead nuevo): aquí se **muta** un
        agregado ya en `2a`; el núcleo de determinación de sub-estado, bloqueo y cola se reutiliza
        (`determinarAltaConFecha` + `bloquearEnTx`, US-004/US-040).

        Determinación del sub-estado destino:
        - fecha **LIBRE** → `2b`, crea `FechaBloqueada` blanda, `ttlExpiracion = now() + ttl_consulta_dias`.
        - fecha bloqueada por una consulta en `2b` → se **ofrece cola**: `409` con
          `colaDisponible=true`; el cliente reenvía con `aceptarCola=true` para entrar en `2d`
          (`posicionCola`, `consultaBloqueanteId`). La RESERVA permanece en `2a` hasta confirmar.
        - fecha bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores → `409`
          con `colaDisponible=false` (no disponible, sin cola). La RESERVA permanece en `2a`.
        - **carrera D4** (otra transición ganó el bloqueo, `P2002`) → se re-deriva a oferta de cola
          (`409 colaDisponible=true`); con `aceptarCola=true` el reintento entra directo a `2d`.

        Flujo interactivo de la cola (FA-01) SIN estado servidor intermedio: la 1ª llamada informa
        (`409` + `colaDisponible`), la 2ª con `aceptarCola=true` confirma `2d`.

        Tras el COMMIT de `2a→2b` se registra/envía (post-commit, **no bloqueante**) la comunicación
        de confirmación de bloqueo provisional (extensión de E1, motor US-045): un fallo de envío no
        revierte la transición ni el bloqueo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarFechaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada:
            - `2b`: `subEstado='2b'`, `fechaEvento`, `ttlExpiracion` (bloqueo blando creado).
            - `2d`: `subEstado='2d'`, `fechaEvento`, `posicionCola`, `consultaBloqueanteId`
              (entrada en cola; requiere `aceptarCola=true`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          # fechaEvento ausente, mal formada o NO estrictamente futura (= hoy o pasada). Regla
          # unificada `> hoy` (D-1, coherente con US-004/US-040). No se muta la RESERVA.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Fecha no asignable de inmediato; la RESERVA permanece en `2a`. El cuerpo añade
            `colaDisponible` y `motivo` al envelope de error estándar:
            - `colaDisponible=true` → bloqueada por una consulta en `2b` (o carrera D4): se ofrece
              cola; reintentar con `aceptarCola=true` para entrar en `2d`.
            - `colaDisponible=false` → bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+:
              no disponible, sin cola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignarFechaConflictoError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO está en sub-estado `2a` (p. ej. ya tiene
            fecha, está en cola, en un estado terminal `2x/2y/2z` o más avanzada). No se muta
            (F5-02: 409 = concurrencia, 422 = transición/guarda inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/pendiente-invitados:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Marcar consulta como pendiente de invitados — transición 2.b→2.c (UC-06 / US-007)
      description: |
        [US-007] Transición de un agregado RESERVA **existente** en sub-estado `2b` (consulta con
        fecha + bloqueo blando vigente) hacia `2c` (pendiente de número de invitados). En una
        **única transacción** (`SELECT … FOR UPDATE` sobre la fila bloqueante + `UNIQUE(tenant_id,
        fecha)`; sin Redis ni locks distribuidos) ejecuta las **cuatro** operaciones, all-or-nothing:
        1. RESERVA → `subEstado='2c'` y `ttlExpiracion = ttlExpiracion_actual + ttl_consulta_dias`
           (extensión derivada de `TENANT_SETTINGS.ttl_consulta_dias`, **nunca hardcodeada**;
           reutiliza la primitiva atómica `resolverPlanBloqueo({ fase: '2.c' }) → extend`, US-040).
        2. **UPDATE** del `ttl_expiracion` de la fila de `FechaBloqueada` de esa RESERVA al mismo
           nuevo valor (no inserta; la fila ya existe, a diferencia de US-005).
        3. **Vaciado atómico de la cola (A16)**: todas las RESERVA con
           `consultaBloqueanteId = id de esta RESERVA` y `subEstado='2d'` pasan a `subEstado='2y'`
           (descartada por cola, **terminal**), con `posicionCola=null` y `consultaBloqueanteId=null`.
           Si la cola está vacía afecta a 0 filas y la transición se completa igualmente.
        4. `AUDIT_LOG accion='transicion'` de la principal (`2b→2c`) y de cada descartada (`2d→2y`).

        El cuerpo es vacío (`{}`): la acción no toma parámetros; el TTL se deriva del setting del
        tenant. Los **emails automáticos** de descarte de cola (A16) y el email de solicitud de
        invitados de UC-06 paso 7 quedan **fuera de alcance en MVP** (📐 solo diseñados / gap de
        spec sin E-code); solo se implementa la mecánica de la transición.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PendienteInvitadosRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada (`subEstado='2c'`, `ttlExpiracion`
            extendido) y `consultasDescartadas`: recuento de RESERVA de cola pasadas a `2y`
            (feedback para la UI; 0 si no había cola).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendienteInvitadosResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Bloqueo no vigente: la RESERVA NO tiene una fila activa en `FechaBloqueada` para
            `(tenant_id, fechaEvento)`, o su `ttl_expiracion < ahora` (bloqueo expirado). La RESERVA
            no se modifica. El cuerpo añade `motivo` al envelope de error estándar (F5-02: 409 =
            conflicto/precondición de bloqueo; 422 = guarda de transición inválida).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BloqueoNoVigenteError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO está en sub-estado `2b` (p. ej. `2a`, `2c`,
            `2v` o un estado terminal `2x/2y/2z`/`reserva_cancelada`/`reserva_completada`, inmutables).
            No se muta la RESERVA, ni su `FechaBloqueada`, ni ninguna RESERVA de cola (F5-02: 409 =
            concurrencia/precondición, 422 = transición/guarda inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/extender-bloqueo:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Extender plazo del bloqueo blando — prórroga pura del TTL (UC-05 / US-006)
      operationId: extenderBloqueo
      description: |
        [US-006] **Override manual del Gestor** que extiende el `ttlExpiracion` del **bloqueo
        blando vigente** de un agregado RESERVA **existente** antes de que expire, **sin liberar la
        fecha** ni disparar la promoción de cola. Aplica cuando hay bloqueo blando activo:
        `subEstado ∈ {2b, 2c, 2v}` O `estado = 'pre_reserva'`, con `ttlExpiracion > ahora` y **fila
        activa en `FechaBloqueada`** (`tipoBloqueo = 'blando'`).

        A diferencia de US-005/007/008 —que son **transiciones de máquina de estados** (cambian
        `subEstado`)— esta operación es una **prórroga pura del TTL**: **NO** cambia `estado`,
        `subEstado`, `tipoBloqueo` ni `fecha`. En una **única transacción** (`SELECT … FOR UPDATE`
        sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos)
        ejecuta, all-or-nothing:
        1. RESERVA → `ttlExpiracion = ttlExpiracion_actual + dias` (la base es el `ttlExpiracion`
           **actual**, no `now()`; `dias` lo indica el gestor, **no** se deriva de
           `ttl_consulta_dias`).
        2. **UPDATE** del `ttl_expiracion` de la fila de `FechaBloqueada` de esa RESERVA al **mismo
           nuevo valor** (no inserta; la fila ya existe).
        3. `AUDIT_LOG accion='actualizar'`, `entidad='RESERVA'`, con
           `datos_anteriores.ttl_expiracion` (valor previo) y `datos_nuevos.ttl_expiracion` (nuevo).

        Los recordatorios automáticos (A3/A4/A5) se **reprograman implícitamente**: se derivan del
        `ttlExpiracion` y los dispara el barrido periódico (patrón estado-en-fila + barrido,
        `architecture.md §2.5`; barrido US-012). No se introduce ni se toca ningún scheduler. No se
        envía email al cliente al extender (UC-05 no lo describe).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtenderBloqueoRequest'
      responses:
        '200':
          description: |
            Extensión aplicada. Devuelve la RESERVA actualizada con el **nuevo** `ttlExpiracion`
            (= `ttlExpiracion` anterior + `dias`); `estado`, `subEstado`, `tipoBloqueo` y `fecha`
            permanecen sin cambios.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            **Conflicto con el estado del bloqueo en BD** (D-3); la RESERVA no se modifica. El cuerpo
            añade `motivo` al envelope de error estándar. Casos:
            - **TTL ya expirado** (`ttlExpiracion < ahora`): el bloqueo ya caducó; una extensión no
              puede "deshacer" una expiración ya ejecutada por el barrido.
            - **Bloqueo firme** (`estado = 'reserva_confirmada'`, `tipoBloqueo = 'firme'`, **sin
              TTL**): no hay TTL que extender.
            - **Sin fila bloqueante blanda vigente**: la RESERVA no tiene una fila activa en
              `FechaBloqueada` para `(tenant_id, fechaEvento)`.
            (F5-02: 409 = conflicto/precondición de bloqueo; 422 = guarda de estado / validación.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtenderBloqueoConflictoError'
        '422':
          description: |
            **Precondición de estado no extensible o cuerpo inválido** (D-3); la RESERVA no se muta.
            Casos:
            - **Estado sin bloqueo activo extensible**: `subEstado = '2a'` (sin fecha bloqueada) o un
              estado terminal (`2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`). El predicado
              declarativo `esEstadoConBloqueoBlandoExtensible` rechaza estos estados antes de tocar BD.
            - **`dias` inválido**: `0`, negativo o no entero (validación de cuerpo defensiva en
              servidor): "El número de días de extensión debe ser un entero positivo (≥ 1)".
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/visita:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Programar visita al espacio — transición 2.a/2.b/2.c→2.v (UC-07 / US-008)
      operationId: programarVisita
      description: |
        [US-008] Transición de un agregado RESERVA **existente** en sub-estado `2a`
        (exploratoria con `fechaEvento` definida), `2b` (con fecha + bloqueo blando) o `2c`
        (pendiente de invitados) hacia `2v` (visita programada). En una **única transacción**
        (`SELECT … FOR UPDATE` sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis
        ni locks distribuidos) ejecuta, all-or-nothing:
        1. RESERVA → `subEstado='2v'`, `visitaProgramadaFecha=fecha`, `visitaProgramadaHora=hora`,
           `visitaRealizada=false`.
        2. **INSERT-o-UPDATE** (upsert por `UNIQUE(tenant_id, fechaEvento)`) de `FechaBloqueada`
           con `ttlExpiracion = visitaProgramadaFecha + 1 día (23:59:59)` y `tipoBloqueo='blando'`:
           si venía de `2b`/`2c` (fila existente) se **actualiza** el TTL; si venía de `2a` (sin
           bloqueo) se **crea** la fila. El TTL deriva de la fecha de visita, **no** del setting
           `ttl_consulta_dias` (reutiliza la primitiva `resolverPlanBloqueo({ fase: '2.v' })`,
           US-040). El setting `TENANT_SETTINGS.max_dias_programar_visita` solo acota la **ventana
           de entrada** de `fecha`, no el TTL.
        3. `AUDIT_LOG accion='transicion'` (`datos_anteriores.sub_estado` ∈ {2a,2b,2c},
           `datos_nuevos.sub_estado='2v'`, `datos_nuevos.visita_programada_fecha`).

        Tras el COMMIT se dispara (post-commit, **no bloqueante**, motor de email US-045) el email
        **E6** de confirmación de visita y se registra en `COMUNICACION` (`codigo_email='E6'`,
        `estado='enviado'`, `reservaId`, `clienteId`): un fallo de envío **no** revierte la
        transición ni el bloqueo (design.md §D-6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramarVisitaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada: `subEstado='2v'`,
            `visitaProgramadaFecha`, `visitaProgramadaHora`, `visitaRealizada=false` y el nuevo
            `ttlExpiracion` del bloqueo (= fecha de visita + 1 día 23:59:59).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          # Cuerpo mal formado: `fecha`/`hora` ausentes o con formato inválido (no `date` / `HH:mm`).
          # La validación de dominio (ventana de fecha / guarda de origen) se reporta como 422.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Consulta en cola (`subEstado='2d'`): no es posible programar una visita directamente;
            la consulta debe ser **promovida primero** (`POST /reservas/{id}/promover`, UC-12). La
            RESERVA no se modifica. El cuerpo añade `motivo` al envelope de error estándar (F5-02:
            409 = conflicto/precondición de estado; 422 = guarda de transición/validación inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramarVisitaConflictoError' }
        '422':
          description: |
            No se puede transicionar a `2v`. Casos (la RESERVA NO se modifica):
            - **Guarda de origen**: el sub-estado de origen no es `2a`/`2b`/`2c` (p. ej. `2v` ya
              programada, o un terminal `2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`,
              inmutables).
            - **`2a` sin `fechaEvento`**: debe introducirse la fecha del evento antes de programar
              la visita.
            - **Fecha fuera de ventana**: `fecha ≤ hoy` (debe ser futura) o
              `fecha > hoy + TENANT_SETTINGS.max_dias_programar_visita` (fuera del límite).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Reservas]
      summary: Registrar resultado de visita — "interesado" (2.v→2.b) / "reserva inmediata" (2.v→pre_reserva) (UC-08/UC-14 · US-009/US-010)
      operationId: registrarResultadoVisita
      description: |
        Endpoint **polimórfico** que registra el **resultado de una visita** sobre un agregado RESERVA
        **existente** en sub-estado `2v` (visita programada) y marca la visita como realizada. El
        desenlace se selecciona por el enum `resultado` (`ResultadoVisita`). Estado de implementación:

        - `interesado` — **[US-009, implementado]** el cliente sigue interesado; la consulta vuelve a
          `2b` (con fecha + bloqueo blando) con un TTL **fresco** y se envía E7.
        - `reserva_inmediata` — **[US-010, implementado]** el cliente confirma en la visita; la consulta
          transiciona directamente a `pre_reserva` (sin pasar por `2b`).
        - `descarta` — **[US-011, RESERVADO]** aún no implementado; el servidor lo **rechaza con 422**
          hasta US-011. La forma polimórfica evita romper el contrato al añadirlo (solo se levanta la guarda).

        ---
        **`resultado='interesado'` (US-009 · 2.v→2.b)** — en una **única transacción** (`SELECT … FOR
        UPDATE` sobre la fila bloqueante; sin Redis ni locks distribuidos), all-or-nothing:
        1. RESERVA → `subEstado='2b'`, `visitaRealizada=true`,
           `ttlExpiracion = now + TENANT_SETTINGS.ttl_consulta_dias` (default 3). El TTL es **fresco**:
           se calcula desde el instante de la transición (`now`), **no** se acumula sobre el
           `ttlExpiracion` previo ni deriva de `visitaProgramadaFecha` (informativa). Reutiliza la
           primitiva `resolverPlanBloqueo({ fase: '2.b' })` (US-040).
        2. **UPDATE** del `ttlExpiracion` de la fila **existente** de `FechaBloqueada` de esa RESERVA
           al **mismo valor** que `RESERVA.ttlExpiracion`. La fila siempre existe (proviene de `2v`,
           US-008): es un UPDATE puro, sin INSERT ni DELETE. `tipoBloqueo` **permanece** `'blando'`.
        3. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'`
           (`datos_anteriores.sub_estado='2v'`, `datos_anteriores.visita_realizada=false`,
           `datos_nuevos.sub_estado='2b'`, `datos_nuevos.visita_realizada=true`).

        Tras el COMMIT se dispara (post-commit, **no bloqueante**, motor de email US-045) el email
        **E7** de confirmación de bloqueo post-visita (plazo de 3 días para decidir) y se registra en
        `COMUNICACION` (`codigo_email='E7'`, `estado='enviado'`, `reservaId`, `clienteId`): un fallo
        del proveedor **no** revierte la transición y queda trazado con `estado='fallido'` para
        reintento (design.md §D-4). Idempotencia `(reservaId, codigo_email)` de US-045.

        ---
        **`resultado='reserva_inmediata'` (US-010 · 2.v→pre_reserva)** — el cliente decide reservar en
        la propia visita. **Requiere datos completos** (validación UC-14, ver 422). En una **única
        transacción** (`SELECT … FOR UPDATE` sobre la fila bloqueante; sin Redis ni locks distribuidos),
        all-or-nothing:
        1. RESERVA → `estado='pre_reserva'`, `subEstado=null`, `visitaRealizada=true`,
           `ttlExpiracion = now + TENANT_SETTINGS.ttl_prereserva_dias` (default **7 días**, nunca
           hardcodeado). TTL **fresco** desde `now`.
        2. **UPDATE** de la fila **existente** de `FechaBloqueada` de esa RESERVA:
           `tipoBloqueo='blando'` y `ttlExpiracion` al **mismo valor** que `RESERVA.ttlExpiracion`
           (7 días). La fila siempre existe (proviene de `2v`, US-008): UPDATE puro, **sin INSERT ni
           DELETE**.
        3. **Vaciado de la cola A16** en la misma transacción: las RESERVA en `2d` cuyo
           `consultaBloqueanteId` apunta a esta pasan a `subEstado='2y'` (`posicionCola=null`,
           `consultaBloqueanteId=null`). Válido con **0 filas** en cola. Los emails A16 a la cola están
           **solo diseñados y NO se envían** en MVP.
        4. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'` para la principal
           (`datos_anteriores.sub_estado='2v'`, `datos_nuevos.estado='pre_reserva'`) + una entrada por
           cada consulta descartada de la cola (`2d→2y`).

        A diferencia de `interesado`, `reserva_inmediata` **NO envía email propio** (no dispara E7 ni
        E2). La atomicidad es all-or-nothing: nunca queda `pre_reserva` sin la `FechaBloqueada`
        actualizada ni la cola a medio vaciar, ni viceversa.

        ---
        El registro se permite **aunque `visitaProgramadaFecha > hoy`** (la fecha de visita es
        informativa, no una precondición estricta), para ambos desenlaces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultadoVisitaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada. El estado resultante depende del
            `resultado` enviado:
            - `interesado` (US-009): `estado='consulta'`, `subEstado='2b'`, `visitaRealizada=true` y el
              nuevo `ttlExpiracion` fresco (`now + TENANT_SETTINGS.ttl_consulta_dias`), idéntico al de
              su fila de `FechaBloqueada`.
            - `reserva_inmediata` (US-010): `estado='pre_reserva'`, `subEstado=null`,
              `visitaRealizada=true` y `ttlExpiracion` fresco (`now + TENANT_SETTINGS.ttl_prereserva_dias`,
              7 días por defecto), idéntico al de su fila de `FechaBloqueada` (ya en `tipoBloqueo='blando'`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          # Cuerpo mal formado: `resultado` ausente o no es string. La guarda de origen (estado) y el
          # valor de resultado no soportado se reportan como 422.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: |
            No se puede registrar el resultado. Casos (la RESERVA NO se modifica — rollback total):
            - **Guarda de origen**: el sub-estado de origen no es `2v` (p. ej. `2a`/`2b`/`2c`/`2d`, o
              un terminal `2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`, inmutables). Ambos
              desenlaces (`interesado`, `reserva_inmediata`) solo son válidos desde `2v`; validación
              defensiva en servidor, re-evaluada bajo el lock (`FOR UPDATE`).
            - **Datos obligatorios incompletos (solo `reserva_inmediata`, validación UC-14)**: para
              transicionar a `pre_reserva` la RESERVA y su CLIENTE deben tener datos completos. Faltan
              datos fiscales del CLIENTE (`dniNif`, `direccion`, `codigoPostal`, `poblacion`,
              `provincia`) y/o de la RESERVA (`fechaEvento`, `duracionHoras`, `numAdultosNinosMayores4`,
              `tipoEvento`). El cuerpo enumera los que faltan en `camposFaltantes` (schema
              `PresupuestoDatosFiscalesError`, `codigo='DATOS_FISCALES_INCOMPLETOS'`, reutilizado de
              UC-14). La RESERVA permanece en `2v` sin cambios.
            - **Resultado no soportado**: `resultado='descarta'` (US-011, aún no implementado). Solo
              `interesado` (US-009) y `reserva_inmediata` (US-010) se aceptan.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'

  # ============================ COLA ============================
  /reservas/{id}/cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Cola]
      summary: Visualizar cola de espera de la fecha de una reserva bloqueante (UC-11 / US-017)
      description: |
        Vista de **solo lectura** (US-017) que proyecta, para la RESERVA **bloqueante** `{id}`
        (la que posee la `FECHA_BLOQUEADA` activa), un read model con dos secciones:
        - **`bloqueante`**: cliente, `subEstado` (`2b`/`2c`/`2v`), `ttlExpiracion` (instante crudo)
          y `ttlRestante` (legible derivado en backend), más `visitaProgramadaFecha` cuando está
          en `2v`.
        - **`cola`**: RESERVA en `subEstado='2d'` cuyo `consultaBloqueanteId` apunta a la
          bloqueante, ordenadas **ASC por `posicionCola`** (FIFO), con `fechaCreacion` (instante
          crudo) y `tiempoEnCola` (legible derivado en backend).

        NO muta estado (no promueve, no saca de cola, no registra AUDIT_LOG). Los derivados
        temporales (`ttlRestante = ttlExpiracion − now()`, `tiempoEnCola = now() − fechaCreacion`)
        se calculan en backend sobre instantes `timestamptz`, nunca formateando fechas.

        **FA-04** — si la reserva `{id}` existe en el tenant pero **no** posee una
        `FECHA_BLOQUEADA` activa (no bloquea ninguna fecha), la respuesta es **200** con
        `estaBloqueada=false`, `bloqueante=null` y `cola=[]` (la UI muestra "Fecha disponible").
        El **404 se reserva exclusivamente** para reserva inexistente o de otro tenant (RLS).
      responses:
        '200':
          description: |
            Read model de la cola. Incluye tanto el caso con bloqueante activa (con o sin cola)
            como el caso FA-04 "fecha disponible" (`estaBloqueada=false`, `bloqueante=null`,
            `cola=[]`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ColaEsperaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/promover:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Promover una consulta de la cola a bloqueante (UC-12 — automática US-018 / manual US-019)
      operationId: promoverConsultaCola
      description: |
        Promueve una consulta en cola (`2.d → 2.b`) a bloqueante de su fecha. Dos modos que
        comparten operación de dominio y superficie HTTP, discriminados por el body/actor
        (decisión de contrato D-1, US-019):

        - **Automática (US-018, actor Sistema, SIN body)**: encadenamiento FIFO cuando la
          bloqueante se libera (`liberarFecha()`). El `{id}` es la **primera** de la cola
          (`posicionCola = 1`). No expira ninguna bloqueante (la fecha ya está libre).
        - **Manual (US-019, actor Gestor, body `PromoverManualRequest` con `confirmado: true`)**:
          acción DELIBERADA y DESTRUCTIVA disparada desde la vista de cola (US-017). El `{id}`
          es la RESERVA en `2.d` que el Gestor elige, **cualquier `posicionCola`** (no solo la
          primera). Como parte indivisible de la operación: (1) **expira forzosamente** la
          bloqueante activa a `2.x` (`ttlExpiracion → NULL`) si sigue viva; (2) promueve la
          elegida a `2.b` (`posicionCola`/`consultaBloqueanteId → NULL`, `ttlExpiracion → now() +
          tenant_settings.ttl_consulta_dias`); (3) **re-asigna** la fila de `FECHA_BLOQUEADA` a
          la promovida (una sola fila activa por `(tenant, fecha)` en todo momento); (4)
          **reordena la cola cerrando el hueco** (posiciones contiguas desde 1); (5) audita cada
          RESERVA modificada con `origen: 'promocion_manual'` y el `usuarioId` del Gestor.

        Todo en **una transacción** serializada por `SELECT … FOR UPDATE` sobre la fila de
        `FECHA_BLOQUEADA`, bajo el contexto **RLS del tenant** del JWT (nunca del path). La
        garantía anti-doble-promoción reside **exclusivamente en PostgreSQL** (`UNIQUE(tenant_id,
        fecha)` + `FOR UPDATE`), NUNCA en locks distribuidos.

        **Arbitraje (D-4, FIFO estricto + "gana quien toma el lock primero", decisión heredada de
        US-018 §D-6, sin cesión al Gestor)**: si el barrido automático de US-018 —u otro Gestor—
        adquiere el lock primero y ya promovió, la promoción manual **aborta sin cambios** con
        **409** ("La cola ya fue actualizada automáticamente, por favor recarga la vista").

        La promoción manual requiere **rol Gestor** del tenant (autorización por JWT); un actor
        sin rol suficiente recibe **403**.
      requestBody:
        # Opcional para preservar la compatibilidad con la promoción AUTOMÁTICA de US-018 (sin
        # body). Presente y con `confirmado: true` para la promoción MANUAL del Gestor (US-019).
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoverManualRequest' }
      responses:
        '200':
          description: |
            Consulta promovida a bloqueante (`2.b`). En la promoción manual, además, la bloqueante
            anterior quedó expirada a `2.x` y la cola reordenada; el cuerpo devuelve la RESERVA
            promovida.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # [US-019 D-4] Autenticado pero sin rol Gestor del tenant para la promoción manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # Reserva `{id}` inexistente o de otro tenant (RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de concurrencia/estado (mapeo F5-02: 409 = carrera perdida):
            - **Carrera perdida (US-019 D-4)**: el barrido automático (US-018) u otro Gestor ya
              actualizó la cola bajo el lock — "La cola ya fue actualizada automáticamente, por
              favor recarga la vista".
            - **Inconsistencia de bloqueo**: no existe una `FECHA_BLOQUEADA` activa para la fecha
              de la consulta elegida (una consulta en `2.d` sin fecha bloqueada).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: |
            Guarda de negocio inviolada (mapeo F5-02: 422 = transición/guarda inválida) sin efectos:
            - **Consulta ya no en cola (FA-05)**: la RESERVA `{id}` no está en `sub_estado = '2d'`
              (expiró, es terminal `2x`/`2y`/`2z`, o es la propia bloqueante) — "La consulta
              seleccionada ya no está en cola".
            - **Confirmación ausente**: la promoción manual llegó sin `confirmado: true`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/salir-cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Salir voluntariamente de la cola (UC-13)
      responses:
        '200':
          description: Reserva retirada de la cola
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ PRESUPUESTOS / TARIFAS ============================
  /tarifas/calcular:
    post:
      tags: [Presupuestos]
      summary: Calcular tarifa según configuración (UC-16 / US-016)
      description: >-
        Motor de tarifa (US-016, lectura pura, multi-tenant por JWT). Determina la temporada del mes
        de `fecha_evento`, busca la TARIFA vigente por temporada x duración x tramo de invitados y suma
        los extras del catálogo del tenant. Devuelve el esquema canónico D-1. Con
        `num_adultos_ninos_mayores4 > 50` responde 200 con `tarifa_a_consultar: true` e importes `null`
        (precio manual), SIN error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculoTarifaRequest'
      responses:
        '200':
          description: 'Tarifa calculada (caso normal) o tarifa a consultar (>50 invitados): mismo esquema canónico.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculoTarifaResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 'EXTRA_NO_ENCONTRADO: un extra no existe, está inactivo o no es visible en el tenant (RLS).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CalculoTarifaExtraNoEncontradoError' }
        '422':
          description: >-
            Configuración incompleta del tarifario: `TARIFA_NO_CONFIGURADA` (sin TARIFA vigente para una
            combinación válida con <= 50 invitados) o `TEMPORADA_NO_CONFIGURADA` (mes sin mapear en
            TEMPORADA_CALENDARIO).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  # [DECISIÓN F2-04] Catálogo de extras: necesario para resolver extraId/extraIds desde el frontend.
  # Confirma si en MVP el catálogo se expone por API o se siembra/hardcodea.
  /extras:
    get:
      tags: [Presupuestos]
      summary: Listar catálogo de extras del tenant
      responses:
        '200':
          description: Catálogo de extras configurables
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Extra' }

  # ============================ US-014: PRESUPUESTO (preview + confirmar) ============================
  # [US-014 / UC-14] Dos endpoints dedicados que sustituyen al POST /reservas/{id}/presupuestos (plural,
  # DEPRECADO abajo). Decisión de contrato D-8 (Gate SDD aprobado): preview NO persiste, confirmar es la
  # transacción única (PRESUPUESTO + pre_reserva + bloqueo 7d + vaciado cola A16 + AUDIT_LOG) + E2
  # post-commit. Mapeo HTTP heredado de F5-02: 409 = conflicto/concurrencia (UNIQUE tenant_id+fecha /
  # guarda de estado); 422 = validación/guarda de negocio (datos fiscales, tarifario, precio manual).
  /reservas/{id}/presupuesto/preview:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Calcular borrador del presupuesto sin persistir (UC-14 / US-014)
      operationId: previewPresupuesto
      description: |
        [US-014] Calcula el **borrador editable** del presupuesto de la RESERVA `{id}` delegando el
        cálculo al **motor de tarifa** (US-016, capability `calculo-tarifa`). **NO persiste** nada: no
        crea PRESUPUESTO, no muta `RESERVA.estado`/`subEstado`/`ttlExpiracion` ni `FechaBloqueada`, y no
        envía ningún email. Es una operación de solo cálculo para revisar y ajustar antes de confirmar.

        **Guarda de origen** (máquina de estados declarativa): solo se permite sobre una RESERVA en
        `estado='consulta'` con `subEstado ∈ {2a,2b,2c,2v}` y **sin** PRESUPUESTO `enviado`/`aceptado`
        previo. El origen `2d` (cola), los terminales (`2x`/`2y`/`2z`) y `pre_reserva`+ se rechazan
        **antes** de invocar el motor de tarifa.

        **Validación fiscal previa** (síncrona, antes del motor): la RESERVA debe tener `fechaEvento`
        (futura válida), `duracionHoras`, `numAdultosNinosMayores4 ≥ 1`, `tipoEvento`, y el CLIENTE
        **todos** los datos fiscales no nulos (`dniNif`, `direccion`, `codigoPostal`, `poblacion`,
        `provincia`). Si falta alguno → 422 enumerando los campos faltantes.

        **Caso `tarifa_a_consultar`** (>50 invitados): el motor devuelve importes `null`; la respuesta
        propaga `tarifaAConsultar=true` y el desglose fiscal queda `null` salvo que se envíe
        `precioManualEur`, con el que se recalcula el desglose (base = total / 1.21, IVA 21%).
      requestBody:
        # Opcional: sin body calcula el borrador con los datos actuales de la RESERVA (sin extras extra,
        # sin descuento). Con body se simulan extras/descuento/precio manual para previsualizar el total.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PreviewPresupuestoRequest' }
      responses:
        '200':
          description: |
            Borrador calculado (NO persistido). Incluye el desglose fiscal (base, IVA 21%, total),
            los extras, el reparto 40%/60%/fianza y `tarifaAConsultar`. Si `tarifaAConsultar=true` sin
            `precioManualEur`, los importes fiscales son `null` (el Gestor debe introducir el precio).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoPreviewResponse' }
        '400':
          # Cuerpo mal formado (tipos inválidos en extras/descuento/precio). La validación de dominio
          # (datos fiscales, tarifario, guarda de origen) se reporta como 422/409.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Guarda de origen / precondición de estado (F5-02: 409 = conflicto de estado). La RESERVA no
            es un origen válido: está en `2d` (cola), en un terminal (`2x`/`2y`/`2z`), en `pre_reserva`+,
            o ya tiene un PRESUPUESTO `enviado`/`aceptado` (remite a la edición, UC-15). No se ejecuta el
            motor de tarifa ni se muta nada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422 = guarda/validación inválida). Casos:
            - **Datos fiscales/de la reserva incompletos (FA-01)**: falta `dniNif`/`direccion`/
              `codigoPostal`/`poblacion`/`provincia` del CLIENTE o datos de la RESERVA — el cuerpo
              enumera los campos faltantes en `camposFaltantes`.
            - **Tarifario incompleto**: el motor de tarifa lanzó `TARIFA_NO_CONFIGURADA` o
              `TEMPORADA_NO_CONFIGURADA` (num_invitados ≤ 50). El cuerpo lleva `codigo`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  /reservas/{id}/presupuesto:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Confirmar presupuesto y activar pre-reserva (UC-14 / US-014)
      operationId: confirmarPresupuesto
      description: |
        [US-014] **Confirma** el borrador: en una **única transacción de BD** (bajo el contexto RLS del
        tenant del JWT), all-or-nothing:
        1. Crea el PRESUPUESTO **congelado** (`version=1`, `tarifaCongelada=true`, `estado='enviado'`,
           `ivaPorcentaje='21.00'`, desglose fiscal `baseImponible`/`ivaImporte`/`total`, `tarifaId` de la
           TARIFA usada — `null` en el caso `tarifa_a_consultar` con `precioManualEur`).
        2. Transiciona la RESERVA `{2a,2b,2c,2v} → pre_reserva` y fija
           `ttlExpiracion = now() + TENANT_SETTINGS.ttl_prereserva_dias` (7 d por defecto, nunca
           hardcodeado).
        3. **Insert-o-update** de `FechaBloqueada(tenant_id, fechaEvento)` a `tipoBloqueo='blando'`,
           `ttlExpiracion` a 7 d (INSERT si venía de `2a` sin fila; UPDATE del TTL si venía de
           `2b`/`2c`/`2v`). `SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin locks distribuidos.
        4. **Vacía la cola A16**: las RESERVA en `2d` que apuntan a esta (`consultaBloqueanteId`) pasan a
           `2y` (`posicionCola=NULL`, `consultaBloqueanteId=NULL`). Los emails A16 a la cola están
           **solo diseñados y NO se envían** en MVP.
        5. `AUDIT_LOG accion='transicion'` para la RESERVA principal + una entrada por cada consulta
           descartada de la cola.

        Tras el COMMIT dispara (post-commit, **no bloqueante**, motor de email US-045, idempotente por
        `(reserva_id, codigo_email=E2)`) el email **E2** con el PDF del presupuesto adjunto por
        `pdfUrl`: un fallo de envío **no** revierte la pre-reserva (queda trazado en `COMUNICACION`).

        **Precio manual obligatorio** cuando el motor devuelve `tarifa_a_consultar=true` (>50
        invitados): el body DEBE incluir `precioManualEur`; su ausencia → 422.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmarPresupuestoRequest' }
      responses:
        '201':
          description: |
            PRESUPUESTO congelado creado y RESERVA elevada a `pre_reserva`. Devuelve el PRESUPUESTO
            (desglose fiscal completo, `tarifaId`, `tarifaCongelada`, `ivaPorcentaje`, `total`, `pdfUrl`
            si aplica) y el estado/TTL resultante de la RESERVA.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarPresupuestoResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado o de concurrencia (F5-02: 409 = conflicto/carrera determinista). Casos
            (la RESERVA no queda en estado intermedio observable — rollback total):
            - **Fecha no disponible (race D4)**: otra transacción ganó el `UNIQUE(tenant_id, fecha)` /
              el `SELECT … FOR UPDATE` sobre la misma `(tenant, fechaEvento)` — "Fecha no disponible".
            - **Doble clic**: una confirmación simultánea del mismo presupuesto ya aplicó la transición;
              la RESERVA ya no está en `{2a,2b,2c,2v}`.
            - **Guarda de origen / presupuesto existente**: la RESERVA está en `2d`/terminal/`pre_reserva`+
              o ya tiene un PRESUPUESTO `enviado`/`aceptado` (remite a la edición, UC-15).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422 = guarda/validación inválida). Casos:
            - **Datos fiscales/de la reserva incompletos (FA-01)**: el cuerpo enumera `camposFaltantes`.
            - **Tarifario incompleto**: `TARIFA_NO_CONFIGURADA` / `TEMPORADA_NO_CONFIGURADA`.
            - **Precio manual requerido y ausente (FA-02)**: `tarifa_a_consultar=true` (>50 invitados)
              sin `precioManualEur` en el body.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'
                  - $ref: '#/components/schemas/PresupuestoPrecioManualRequeridoError'
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  # transacción única (DOCUMENTO justificante + transición pre_reserva→reserva_confirmada +
  # upgrade bloqueo a firme + congelado importes + init sub-procesos + FICHA_OPERATIVA + AUDIT_LOG)
  /reservas/{id}/confirmar-senal:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Confirmar pago de señal y activar reserva confirmada (UC-17 / US-021)
      operationId: confirmarSenal
      description: |
        [US-021] El Gestor sube el **justificante de pago de la señal** (un fichero) y, sobre una
        RESERVA en `estado='pre_reserva'`, la **confirma**. En una **única transacción de BD** (bajo
        el contexto RLS del tenant del JWT), all-or-nothing:
        1. Valida en servidor (autoritativo): `estado='pre_reserva'`, `importeTotal > 0` y que se
           adjunta **exactamente un** fichero con `mimeType ∈ {image/jpeg, image/png, application/pdf}`
           y tamaño ≤ 10 MB.
        2. Crea un DOCUMENTO con `tipo='justificante_pago'`, `reservaId`, `tenantId` (del JWT), `url`
           del fichero almacenado y `mimeType`.
        3. Transiciona la RESERVA `pre_reserva → reserva_confirmada` y fija `ttlExpiracion = null`
           (la reserva confirmada no expira por TTL). Guarda de origen en la máquina de estados
           declarativa.
        4. **Upgrade del bloqueo a firme**: promueve la fila existente de `FechaBloqueada(tenant_id,
           fechaEvento)` a `tipoBloqueo='firme'`, `ttlExpiracion=null` mediante **UPDATE** (nunca
           delete+insert), sin alterar `reservaId`, reutilizando `bloquearFecha(fase='reserva_confirmada')`
           (`SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin locks distribuidos).
        5. **Congela importes**: `importeSenal = round(importeTotal × TENANT_SETTINGS.pct_senal/100, 2)`
           (40% MVP, derivado del setting, nunca hardcodeado) e `importeLiquidacion = importeTotal −
           importeSenal` (complemento por resta: `senal + liquidacion = total` exacto).
        6. **Inicializa los tres sub-procesos**: `preEventoStatus='pendiente'`,
           `liquidacionStatus='pendiente'`, `fianzaStatus='pendiente'`.
        7. Crea de forma **idempotente** la FICHA_OPERATIVA vacía (1:1 por `reserva_id @unique`,
           `fichaCerrada=false`, campos de contenido `null`); si ya existe, no la duplica y la
           transición continúa sin error.
        8. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'`, `datos_anteriores.estado='pre_reserva'`,
           `datos_nuevos.estado='reserva_confirmada'`, con el usuario del Gestor.

        Tras el COMMIT, el sistema **presenta la factura de señal en borrador** para revisión (disparo
        de US-022/UC-18): es un efecto **posterior al commit** y su ausencia/fallo NO revierte la
        confirmación. Este change **no genera ni aprueba** la FACTURA, **no** genera condiciones
        particulares (US-023) y **no** envía el email E3 (E3 se dispara solo tras aprobar la factura y
        generar las condiciones). El indicador `facturaSenalBorrador` de la respuesta es OPCIONAL y solo
        se puebla si el disparo de US-022 ya materializó el borrador; su contrato real es de US-022.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [justificante]
              properties:
                justificante:
                  type: string
                  format: binary
                  description: >-
                    Fichero justificante del pago de la señal. Formatos permitidos: `image/jpeg`,
                    `image/png`, `application/pdf`. Tamaño máximo 10 MB. Obligatorio.
      responses:
        '200':
          description: |
            RESERVA elevada a `reserva_confirmada`. Devuelve la RESERVA con `estado='reserva_confirmada'`,
            `ttlExpiracion=null`, `importeSenal`/`importeLiquidacion` congelados, los tres sub-procesos en
            `pendiente`, el DOCUMENTO justificante creado y (opcionalmente) la factura de señal en borrador.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarSenalResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado o de concurrencia (F5-02: 409 = conflicto/carrera determinista). Casos
            (la RESERVA no queda en estado intermedio observable — rollback total):
            - **La reserva ya ha sido confirmada** (doble clic / dos sesiones sobre la MISMA reserva): la
              primera transacción ganó el `SELECT … FOR UPDATE` y completó la transición; la segunda
              observa la RESERVA ya en `reserva_confirmada` y aborta sin crear un segundo DOCUMENTO ni una
              segunda FICHA_OPERATIVA.
            - **Fecha no disponible** (race D4): la `(tenant_id, fechaEvento)` ya está en bloqueo firme de
              **otra** RESERVA; el upgrade choca con `UNIQUE(tenant_id, fecha)` (`P2002`) antes de mutar la
              segunda RESERVA.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarSenalConflictoError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422 = guarda/validación inválida). No se crea
            DOCUMENTO, no se muta la RESERVA ni la `FechaBloqueada`, no se registra transición. Casos:
            - **Guarda de origen**: la RESERVA no está en `pre_reserva` (cualquier sub-estado de
              `consulta`, `reserva_confirmada`+, o `reserva_cancelada`) → "La reserva no está en estado
              pre_reserva".
            - **Justificante ausente**: no se adjuntó fichero → "Es obligatorio adjuntar el justificante
              de pago".
            - **Formato/tamaño inválido**: `mimeType` no permitido o fichero > 10 MB.
            - **Importe total no válido**: `importeTotal` es 0/null (no hay presupuesto aceptado previo).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarSenalValidacionError' }

  /reservas/{id}/presupuestos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Presupuestos]
      summary: Listar versiones de presupuesto de la reserva
      responses:
        '200':
          description: Presupuestos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Presupuesto' }
    post:
      deprecated: true
      tags: [Presupuestos]
      summary: '[DEPRECADO US-014] Usa POST /reservas/{id}/presupuesto (confirmar) o /preview'
      description: |
        DEPRECADO (US-014): la generación del presupuesto + activación de la pre-reserva se ha partido en
        dos endpoints dedicados — `POST /reservas/{id}/presupuesto/preview` (borrador, no persiste) y
        `POST /reservas/{id}/presupuesto` (confirma: PRESUPUESTO + `pre_reserva` + bloqueo 7d + vaciado de
        cola A16 + E2). Este endpoint plural queda solo para listar (GET) y no debe usarse para crear.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresupuestoRequest'
      responses:
        '201':
          description: Presupuesto generado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Presupuesto' }
        '409':
          $ref: '#/components/responses/Conflict'

  /presupuestos/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    patch:
      tags: [Presupuestos]
      summary: Editar y enviar presupuesto (UC-15)
      description: Edita líneas/descuento y, opcionalmente, marca el presupuesto como `enviado` (dispara email E-presupuesto).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePresupuestoRequest'
      responses:
        '200':
          description: Presupuesto actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Presupuesto' }

  # ============================ EXTRAS DE RESERVA ============================
  # [DECISIÓN F1-05] Extras como recurso de primera clase. Justificación: origen=anadido_post_confirmacion
  # implica añadir extras tras la confirmación (van a la liquidación). Confirma o intégralo en presupuesto/liquidación.
  /reservas/{id}/extras:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Presupuestos]
      summary: Listar extras de la reserva
      responses:
        '200':
          description: Extras de la reserva
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReservaExtra' }
    post:
      tags: [Presupuestos]
      summary: Añadir extra a la reserva (UC-14, UC-21)
      description: Añade una línea de extra con precio congelado. `origen` indica si viene del presupuesto o se añade tras la confirmación.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaExtraRequest'
      responses:
        '201':
          description: Extra añadido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReservaExtra' }

  # ============================ CONFIRMACIÓN / PAGOS / FACTURAS ============================
  /reservas/{id}/pagos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Confirmar pago de señal / registrar cobro (UC-17, UC-21, UC-22)
      description: Registra un `Pago` conciliado contra una factura. El pago de señal transiciona la reserva a `reserva_confirmada` (bloqueo firme).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePagoRequest'
      responses:
        '201':
          description: Pago registrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Pago' }
        '404':
          $ref: '#/components/responses/NotFound'

  # [US-027 / D-5] Colección ÚNICA filtrable de las facturas de la reserva (senal, liquidacion,
  # fianza). Decisión aprobada en el Gate 1: NO se crean endpoints por tipo espejo del de señal;
  # se generaliza esta colección para exponer los BORRADORES de liquidación y fianza generados
  # como efecto post-commit de la activación de sub-procesos (US-021). La CREACIÓN de las facturas
  # de liquidación/fianza NO es endpoint público (por eso NO se toca el `post` genérico de más
  # abajo con un flujo US-027). La ALERTA al Gestor ("Documentos de liquidación y fianza pendientes
  # de revisión") NO es un endpoint nuevo: el frontend la DERIVA de esta colección (facturas en
  # `estado='borrador'` de `tipo` liquidacion/fianza), consistente con cómo US-022 expuso el estado
  # del borrador de señal vía DTO de lectura y sin inventar recursos ni notificaciones sin respaldo.
  /reservas/{id}/facturas:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Facturacion]
      summary: Listar las facturas de la reserva, filtrables por tipo (US-022 / US-027)
      operationId: listarFacturasReserva
      description: |
        [US-027 / UC-21 / UC-22] Devuelve la **colección de todas las FACTURA** de la RESERVA `{id}`
        (`senal`, `liquidacion`, `fianza`), cada una con su desglose fiscal (base + IVA 21 % + total),
        `estado` del ciclo de vida (`borrador` → `enviada` → `cobrada`), `numeroFactura` (`null` en
        `borrador`), `pdfUrl`, `fechaEmision` y los flags derivados de la UI. Vista de **solo lectura**:
        no crea ni muta ninguna FACTURA.

        Los borradores de **liquidación** (`total = importeLiquidacion + Σ extras con factura_id nulo`)
        y de **fianza** (`total = fianza_default_eur`) los crea el sistema como **efecto post-commit**
        de la activación de los sub-procesos de la confirmación (US-021 / US-027), no un endpoint
        público. Si `fianza_default_eur = 0`, la factura de fianza **no existe** y no aparece en la
        colección.

        **Alerta al Gestor (derivada, NO endpoint nuevo)**: "Documentos de liquidación y fianza
        pendientes de revisión" se **deriva en el frontend** de esta colección — hay documentos
        pendientes cuando existen facturas con `estado='borrador'` de `tipo` `liquidacion`/`fianza`.
        Si la fianza se omitió (`fianza_default_eur = 0`), solo aparece el borrador de liquidación y
        la alerta menciona solo la liquidación. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      parameters:
        - in: query
          name: tipo
          required: false
          schema: { $ref: '#/components/schemas/TipoFactura' }
          description: >-
            Filtro OPCIONAL por tipo de factura (`senal`, `liquidacion`, `fianza`, `complementaria`).
            Si se omite, devuelve todas las facturas de la reserva.
      responses:
        '200':
          description: |
            Colección de facturas de la reserva (`FacturaDto[]`), opcionalmente filtrada por `tipo`.
            Cada elemento incluye desglose fiscal, `estado`, `numeroFactura` (`null` en `borrador`),
            `pdfUrl` (`null` si aún no generado), `fechaEmision` y los flags `esBorradorInvalido`/
            `pdfPendiente`.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FacturaDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: La RESERVA no existe en el tenant (RLS). Envelope estándar `ErrorResponse`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    post:
      tags: [Facturas]
      summary: Generar factura (UC-18, UC-21)
      description: Emite una factura en estado `borrador` (`senal`, `liquidacion`, `fianza` o `complementaria`). La liquidación arrastra los `ReservaExtra` con `factura_id` nulo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFacturaRequest'
      responses:
        '201':
          description: Factura generada (borrador)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Factura' }

  # [DECISIÓN F1-02] Acción de aprobar/enviar factura (US-028). Cierra la laguna "SIN ENDPOINT".
  # Confirma este enfoque (acción dedicada) frente a un PATCH /facturas/{id} con cambio de estado.
  /reservas/{id}/facturas/{facturaId}/enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
      - in: path
        name: facturaId
        required: true
        schema: { type: string, format: uuid }
        description: ID de la factura
    post:
      tags: [Facturas]
      summary: Aprobar y enviar factura (UC-28)
      description: |
        Transiciona la factura `borrador → enviada`, asigna número de factura y dispara el email E4.
        Para la liquidación, su envío es prerequisito del cobro y arrastra el efecto sobre `fianza_status`.
      responses:
        '200':
          description: Factura aprobada y enviada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Factura' }
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: La factura no está en estado `borrador`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ============================ US-022: FACTURA DE SEÑAL (facturacion) ============================
  # [US-022 / UC-18] La FACTURA es un agregado raíz propio con ciclo de vida
  # (borrador → enviada → cobrada), numeración fiscal F-YYYY-NNNN por (tenant_id, año) y desglose
  # contable (base/IVA/total). La CREACIÓN de la factura de señal NO tiene endpoint público:
  # es un efecto POST-COMMIT del disparo de US-021 (confirmar-senal) más el reintento del PDF
  # (design.md §D-1/§D-6). Estos endpoints cubren la lectura del borrador y las acciones del
  # Gestor (aprobar/rechazar/regenerar-pdf). Mapeo HTTP heredado (F5-02): 409 = conflicto de
  # estado (factura no en borrador); 422 = guarda/validación de negocio (datos fiscales
  # incompletos, PDF pendiente); 404 = factura/reserva inexistente en el tenant (RLS).
  /reservas/{id}/factura-senal:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Facturacion]
      summary: Obtener la factura de señal de una reserva (UC-18 / US-022)
      operationId: obtenerFacturaSenal
      description: |
        [US-022] Devuelve la **factura de señal** (`tipo='senal'`) de la RESERVA `{id}`: número,
        estado, desglose fiscal (base + IVA 21 % + total), `pdfUrl` y los flags derivados que la UI
        usa para habilitar/bloquear la aprobación (`esBorradorInvalido`, `pdfPendiente`). Es una
        vista de **solo lectura**: no crea ni muta la FACTURA.

        La factura la crea el sistema como **efecto post-commit** de la confirmación de la reserva
        (US-021), no este endpoint. Aislada por `tenant_id` del JWT (RLS); nunca en el path.

        Los flags `esBorradorInvalido` y `pdfPendiente` se **derivan** (design.md §D-9), no son
        columnas de la FACTURA: `esBorradorInvalido=true` cuando faltan datos fiscales del CLIENTE
        (bloqueo por datos, requiere acción del Gestor); `pdfPendiente=true` cuando `pdfUrl=null`
        por un fallo transitorio del servicio de PDF (bloqueo temporal, el sistema reintenta solo).
        Cuando ambos son `false` y hay `pdfUrl`, el borrador es aprobable.
      responses:
        '200':
          description: |
            Factura de señal de la reserva (`FacturaSenalDto`). Incluye desglose fiscal, `estado`,
            `numeroFactura` (`null` mientras esté en `borrador`), `pdfUrl` (`null` si aún no
            generado) y los flags `esBorradorInvalido`/`pdfPendiente`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **aún no tiene** factura de señal (el disparo
            post-commit de US-021 todavía no la materializó). El cuerpo es el envelope estándar
            `ErrorResponse`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /facturas/{id}/aprobar:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    post:
      tags: [Facturacion]
      summary: Aprobar el borrador de la factura de señal — borrador → enviada (UC-18 / US-022)
      operationId: aprobarFactura
      description: |
        [US-022] El **Gestor aprueba** el borrador de la factura de señal `{id}`. Precondiciones
        (validadas en servidor, autoritativas): la FACTURA está en `estado='borrador'`, tiene
        `pdfUrl` (PDF disponible) y **datos fiscales válidos** (borrador no inválido). Si se
        cumplen, en una transacción: `estado → 'enviada'`, se fija `fechaEmision` con el timestamp
        actual y la factura queda **lista para adjuntarse en E3**.

        El Gestor **NO puede modificar** importes ni datos fiscales del borrador (provienen de
        RESERVA y CLIENTE): el cuerpo es vacío. Registra `AUDIT_LOG accion='actualizar'`,
        `datos_anteriores.estado='borrador'`, `datos_nuevos.estado='enviada'`. El envío del email
        E3 NO ocurre en este change. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AprobarFacturaRequest' }
      responses:
        '200':
          description: |
            Factura aprobada. Devuelve la `FacturaSenalDto` con `estado='enviada'`, `numeroFactura`
            asignado y `fechaEmision` con el timestamp del momento de aprobación.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (F5-02: 409 = conflicto/precondición de estado). La FACTURA **no
            está en `borrador`** (ya `enviada` o `cobrada`; p. ej. doble aprobación). No se muta el
            estado ni se re-fija `fechaEmision`. El cuerpo añade `codigo` y `motivo` al envelope.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaEstadoInvalidoError' }
        '422':
          description: |
            Aprobación bloqueada por una guarda de negocio (F5-02: 422 = validación/guarda sin
            efectos). La FACTURA sigue en `borrador`. Casos (design.md §D-9), discriminados por
            `codigo`:
            - **Datos fiscales del cliente incompletos** (`DATOS_FISCALES_INCOMPLETOS`): borrador
              inválido; enumera los `camposFaltantes` del CLIENTE. Requiere que el Gestor complete
              los datos del cliente (no se reintenta solo).
            - **PDF pendiente de regenerar** (`PDF_PENDIENTE`): `pdfUrl=null` por un fallo
              transitorio del servicio de PDF; el sistema reintenta automáticamente. Reintentar la
              aprobación cuando el PDF exista (o forzar `POST /facturas/{id}/regenerar-pdf`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FacturaDatosFiscalesIncompletosError'
                  - $ref: '#/components/schemas/FacturaPdfPendienteError'

  /facturas/{id}/rechazar:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    post:
      tags: [Facturacion]
      summary: Rechazar el borrador de la factura de señal (UC-18 / US-022)
      operationId: rechazarFactura
      description: |
        [US-022] El **Gestor rechaza** el borrador de la factura de señal `{id}` indicando un
        **motivo** (obligatorio). La FACTURA **permanece en `estado='borrador'`** (el rechazo NO
        es una transición de estado): el motivo se registra en `AUDIT_LOG` y **E3 queda bloqueado**.
        Tras corregir la incidencia (p. ej. datos fiscales del TENANT en configuración), el Gestor
        puede **regenerar el PDF** (`POST /facturas/{id}/regenerar-pdf`) y volver a revisar.

        El motivo de rechazo se guarda en `AUDIT_LOG` (no en una columna de la FACTURA, design.md
        §D-7). Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RechazarFacturaRequest' }
      responses:
        '200':
          description: |
            Rechazo registrado. Devuelve la `FacturaSenalDto`, que **sigue en `borrador`** (el
            rechazo no cambia el `estado`); el motivo queda en `AUDIT_LOG` y E3 permanece bloqueado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '400':
          # Cuerpo mal formado: `motivo` ausente o vacío (obligatorio).
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (F5-02: 409). La FACTURA **no está en `borrador`** (ya `enviada` o
            `cobrada`): un borrador ya aprobado/enviado no puede rechazarse. No se muta nada. El
            cuerpo añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaEstadoInvalidoError' }

  /facturas/{id}/regenerar-pdf:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    post:
      tags: [Facturacion]
      summary: Reintentar la generación del PDF de la factura de señal (UC-18 / US-022)
      operationId: regenerarPdfFactura
      description: |
        [US-022] **Reintento manual** de la generación del PDF de la factura de señal `{id}` (además
        del reintento automático post-commit). Reutiliza el mecanismo puerto/adaptador de PDF de
        US-014/US-021 (design.md §D-5) y es **idempotente** sobre `pdfUrl`: si el PDF se genera, se
        actualiza `pdfUrl`; el estado permanece en `borrador`. Útil tras un fallo transitorio del
        servicio de PDF, o tras corregir los datos fiscales del TENANT/CLIENTE que dejaron el
        borrador inválido.

        No cambia el `estado` de la FACTURA (no aprueba ni envía). Si los datos fiscales del CLIENTE
        siguen incompletos, la regeneración NO produce PDF y el borrador continúa inválido (422).
        Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegenerarPdfFacturaRequest' }
      responses:
        '200':
          description: |
            PDF regenerado. Devuelve la `FacturaSenalDto` con `pdfUrl` actualizado, `pdfPendiente=false`
            y `estado='borrador'` (sin cambios de estado).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (F5-02: 409). La FACTURA **no está en `borrador`** (ya `enviada` o
            `cobrada`): el PDF de una factura ya emitida es inmutable, no se regenera. No se muta
            nada. El cuerpo añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaEstadoInvalidoError' }
        '422':
          description: |
            No se puede generar el PDF (F5-02: 422 = guarda/validación sin efecto de emisión). La
            FACTURA sigue en `borrador` con `pdfUrl=null`. Casos (design.md §D-9), por `codigo`:
            - **Datos fiscales del cliente incompletos** (`DATOS_FISCALES_INCOMPLETOS`): borrador
              inválido; enumera `camposFaltantes`. El Gestor debe completar los datos del CLIENTE.
            - **PDF pendiente de regenerar** (`PDF_PENDIENTE`): el servicio de PDF sigue fallando de
              forma transitoria; reintentar más tarde.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/FacturaDatosFiscalesIncompletosError'
                  - $ref: '#/components/schemas/FacturaPdfPendienteError'

  # ============================ US-028: LIQUIDACIÓN + FIANZA (facturacion) ============================
  # [US-028 / UC-21 / UC-22] Cierra la laguna F1-02 ("SIN ENDPOINT para aprobar/enviar liquidación").
  # Acciones DEDICADAS del Gestor sobre los borradores de liquidación/fianza generados como efecto
  # post-commit de la confirmación (US-021 / US-027). Reutilizan el envelope estándar y el mapeo HTTP
  # heredado (F5-02): 404 = liquidación/reserva inexistente en el tenant (RLS); 409 = conflicto de
  # estado (factura no en `borrador` / no `enviada`); 422 = validación de negocio (descuento inválido);
  # 502/503 = fallo recuperable de emisión/envío (rollback total, se reintenta). El descuento y los
  # importes viajan como `Importe` (string Decimal(10,2)); el `tenant_id`/`usuario_id` derivan del JWT.
  /reservas/{id}/facturas/liquidacion/aprobar-enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Aprobar y enviar la factura de liquidación (y fianza si sigue en borrador) (UC-21 / US-028)
      operationId: aprobarEnviarLiquidacion
      description: |
        [US-028 / UC-21] Acción ÚNICA y ATÓMICA estado↔E4 (design.md §D-1): el **Gestor aprueba y
        envía** la factura de liquidación en `borrador` de la RESERVA `{id}`. En una **única unidad de
        trabajo** (tx + RLS del tenant del JWT), con reintento ante colisión de numeración (`P2002`,
        US-022; nunca locks distribuidos), all-or-nothing:
        1. (Opcional, D-2) **Descuento negociado**: recalcula total + desglose fiscal de la liquidación
           (base = total / 1.21, IVA 21 %) y marca la actualización de `RESERVA.importeLiquidacion`.
        2. Numera la liquidación (y la fianza si sigue en `borrador`) — `F-YYYY-NNNN` consecutivos.
        3. **Envío E4 SÍNCRONO y CONFIRMADO** con los PDFs adjuntos (la fianza solo si NO se envió por
           separado, D-3). Si E4 falla → la tx REVIERTE (rollback total: nada de número/estado/status/
           extras/COMUNICACION) y responde 502/503.
        4. SOLO tras confirmar E4: emite ambas facturas a `enviada`, avanza `liquidacionStatus='facturada'`
           (+ `fianzaStatus='recibo_enviado'` si la fianza se emitió aquí), marca los `RESERVA_EXTRA` con
           el `factura_id`, actualiza `importeLiquidacion` si hubo descuento, y registra la COMUNICACION
           E4 `enviado` + el AUDIT_LOG `actualizar`.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        # OPCIONAL: sin body emite la liquidación tal cual (sin descuento). Con body aplica el descuento
        # negociado (D-2) y registra el motivo en AUDIT_LOG.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AprobarEnviarLiquidacionRequest' }
      responses:
        '200':
          description: |
            Liquidación (y, si procede, fianza) emitida y enviada por E4. Devuelve ambas facturas con
            `estado='enviada'`, `numeroFactura` asignado y `fechaEmision`, más los `liquidacionStatus`/
            `fianzaStatus` resultantes de la RESERVA. `fianza=null` si la fianza no se emitió en esta
            operación (fianza_default_eur=0 o ya enviada por separado).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AprobarEnviarLiquidacionResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **no tiene** factura de liquidación en `borrador`
            (`FACTURA_LIQUIDACION_NO_ENCONTRADA`). El cuerpo añade `codigo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '409':
          description: |
            Conflicto de estado (F5-02: 409). La factura de liquidación **no está en `borrador`** (ya
            `enviada`/`cobrada`; p. ej. doble aprobación): `FACTURA_NO_BORRADOR`. No se muta nada. El
            cuerpo añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422). El **descuento negociado es inválido**
            (`DESCUENTO_INVALIDO`): negativo, mal formado o mayor/igual que el total. No se emite ni se
            muta nada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '502':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): el proveedor de email o el
            servicio de PDF falló al enviar E4. La transacción REVIERTE por completo (la liquidación
            sigue en `borrador`, sin número ni cambios de status). El Gestor puede reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '503':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): servicio de emisión/envío
            no disponible temporalmente. La transacción REVIERTE por completo; reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }

  /reservas/{id}/facturas/fianza/enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Enviar por separado el recibo de fianza (edge case sin liquidación) (UC-22 / US-028)
      operationId: enviarReciboFianza
      description: |
        [US-028 / UC-22, D-3] Edge case **sin liquidación**: el Gestor envía al cliente SOLO el recibo
        de fianza en `borrador` de la RESERVA `{id}`. En una **única unidad de trabajo** (tx + RLS del
        tenant del JWT), con reintento ante colisión de numeración (`P2002`; nunca locks distribuidos),
        all-or-nothing (misma atomicidad estado↔email de D-1):
        1. **Envío SÍNCRONO y CONFIRMADO** del recibo (email `manual`, NO E4). Si falla → la tx REVIERTE
           (rollback total) y responde 502/503.
        2. SOLO tras confirmar el envío: emite la fianza a `estado='enviada'` con `numeroFactura` PROPIO
           secuencial (`F-YYYY-NNNN`) y `fechaEmision`, avanza `fianzaStatus='recibo_enviado'` SIN tocar
           `liquidacionStatus`, registra la COMUNICACION `codigo_email='manual'` (fuera del índice de
           idempotencia parcial `(reserva_id, codigo_email)`, no colisiona con un E4 posterior) y el
           AUDIT_LOG `actualizar`.

        Sin body: la acción no toma parámetros. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      responses:
        '200':
          description: |
            Recibo de fianza emitido y enviado. Devuelve la fianza con `estado='enviada'`, `numeroFactura`
            asignado y `fechaEmision`, más `fianzaStatus='recibo_enviado'`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EnviarReciboFianzaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **no tiene** recibo de fianza en `borrador`
            (`FACTURA_FIANZA_NO_ENCONTRADA`). El cuerpo añade `codigo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '409':
          description: |
            Conflicto de estado (F5-02: 409). El recibo de fianza **no está en `borrador`** (ya
            `enviada`): `FACTURA_NO_BORRADOR`. No se muta nada. El cuerpo añade `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '422':
          description: |
            Validación de negocio sin efectos (F5-02: 422). Cuerpo del envelope estándar con `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '502':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): el proveedor de email o el
            servicio de PDF falló. La transacción REVIERTE (la fianza sigue en `borrador`). Reintentar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '503':
          description: |
            **Fallo recuperable de emisión/envío** (`EMISION_ENVIO_FALLIDO`): servicio no disponible
            temporalmente. La transacción REVIERTE por completo; reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }

  /reservas/{id}/facturas/liquidacion/reenviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Reenviar la factura de liquidación ya emitida (UC-21 / US-028)
      operationId: reenviarLiquidacion
      description: |
        [US-028, D-4] **Reenvío manual del Gestor** de la factura de liquidación YA emitida
        (`estado='enviada'`) de la RESERVA `{id}`. Reutiliza el **PDF ya emitido**: NO reasigna
        `numeroFactura`, NO cambia `FACTURA.estado` ni los status de la RESERVA (un reenvío jamás muta
        la factura). Crea una **NUEVA fila COMUNICACION** (`codigoEmail='E4'`, `estado='enviado'`) por
        cada reenvío — excepción explícita y auditada a la idempotencia `(reserva_id, codigo_email)` de
        US-045: el reenvío manual es intencionado y DEBE quedar trazado en AUDIT_LOG.

        Sin body: la acción no toma parámetros. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      responses:
        '200':
          description: |
            Liquidación reenviada. Devuelve la factura de liquidación (sin cambios de estado ni número)
            y la NUEVA COMUNICACION creada por el reenvío.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReenviarLiquidacionResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **no tiene** factura de liquidación
            (`FACTURA_LIQUIDACION_NO_ENCONTRADA`). El cuerpo añade `codigo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '409':
          description: |
            Conflicto de estado (F5-02: 409). La factura de liquidación **aún no ha sido emitida**
            (sigue en `borrador`): `FACTURA_NO_ENVIADA` — nada que reenviar. No se muta nada. El cuerpo
            añade `codigo` y `motivo` al envelope estándar.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '502':
          description: |
            **Fallo recuperable de reenvío** (`EMISION_ENVIO_FALLIDO`): el proveedor de email falló al
            reenviar E4. No se crea la COMUNICACION. Reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '503':
          description: |
            **Fallo recuperable de reenvío** (`EMISION_ENVIO_FALLIDO`): servicio de envío no disponible
            temporalmente. Reintentar la acción.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }

  /reservas/{id}/facturas/liquidacion/cobro:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Registrar el cobro de la factura de liquidación (UC-21 pasos 7-10 / US-029)
      operationId: registrarCobroLiquidacion
      description: |
        [US-029 / UC-21 pasos 7-10] El **Gestor registra el cobro** del 60 % restante de la RESERVA
        `{id}` cuando recibe la transferencia bancaria externa (Slotify **registra**, no procesa el
        pago; sin pasarela en MVP). Precondición: `RESERVA.liquidacionStatus='facturada'` y su
        `FACTURA (tipo='liquidacion').estado='enviada'` (dejado por US-028).

        En una **única unidad de trabajo atómica** (tx + RLS del tenant del JWT), releyendo el estado
        de la RESERVA con `SELECT ... FOR UPDATE` para serializar el doble cobro concurrente (lock de
        fila PostgreSQL, **nunca** locks distribuidos; design.md §D-2):
        1. Crea un registro `PAGO` con `facturaId` de la factura de liquidación, `importe` (el importe
           real cobrado), `fechaCobro` y, si se adjunta, `justificanteDocId` (referencia a un DOCUMENTO
           `tipo='justificante_pago'` **ya subido**; opcional, `null` si no se adjunta).
        2. Transiciona `FACTURA (liquidacion).estado='cobrada'`.
        3. Transiciona `RESERVA.liquidacionStatus='cobrada'` (habilita una de las 3 precondiciones de
           `evento_en_curso`, US-031; NO transiciona `RESERVA.estado`).
        4. Registra `AUDIT_LOG` (`crear` del PAGO; `actualizar` de FACTURA y RESERVA; la discrepancia
           si la hubo).

        **Discrepancia de importe (alerta, NO bloquea)**: si `importe` difiere de `FACTURA.total`, el
        cobro se registra igualmente con el importe real y la respuesta 200 incluye `alertaDiscrepancia`
        (importe facturado, cobrado y diferencia) para que el Gestor la concilie. NO es un error.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrarCobroLiquidacionRequest' }
      responses:
        '200':
          description: |
            Cobro registrado. La liquidación queda en `estado='cobrada'` y `liquidacionStatus='cobrada'`.
            Devuelve el `PAGO` creado, la `FACTURA` de liquidación actualizada, el `liquidacionStatus`
            resultante y, **solo si hubo discrepancia de importe**, `alertaDiscrepancia` (informativa,
            no bloqueante).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarCobroLiquidacionResponse' }
        '400':
          description: |
            Validación de entrada (F5-01). El `importe` no es Decimal(10,2) positivo (`> 0`) o
            `fechaCobro` no es una fecha válida `<= hoy` (futura o mal formada): `COBRO_INVALIDO`. No se
            crea `PAGO` ni cambia el estado. Cuerpo = envelope estándar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroLiquidacionError' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS), no tiene factura de liquidación
            (`FACTURA_LIQUIDACION_NO_ENCONTRADA`), o el `justificanteDocId` indicado no existe en el
            tenant (`JUSTIFICANTE_NO_ENCONTRADO`). No se muta nada. Cuerpo + `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroLiquidacionError' }
        '409':
          description: |
            Conflicto de precondición de estado (F5-02: 409), sin efectos, releído bajo
            `SELECT ... FOR UPDATE`:
            - `LIQUIDACION_YA_COBRADA` — la liquidación ya está `cobrada` (**doble cobro**, incl. dos
              peticiones concurrentes: solo la primera registra el PAGO). "La liquidación ya está
              marcada como cobrada".
            - `LIQUIDACION_NO_FACTURADA` — `liquidacionStatus='pendiente'` (la factura de liquidación
              aún no fue enviada, US-028 no ejecutada). "La factura de liquidación debe estar enviada
              antes de registrar su cobro".
            Cuerpo = envelope estándar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroLiquidacionError' }

  /reservas/{id}/facturas/fianza/cobro:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Registrar el cobro del recibo de la fianza (UC-22 pasos 5-9 / US-030)
      operationId: registrarCobroFianza
      description: |
        [US-030 / UC-22 pasos 5-9] El **Gestor registra el cobro** de la fianza (depósito reembolsable)
        de la RESERVA `{id}` cuando recibe el ingreso externo (Slotify **registra**, no procesa el pago;
        sin pasarela en MVP). Precondición del happy path: `RESERVA.fianzaStatus='recibo_enviado'` y su
        `FACTURA (tipo='fianza').estado='enviada'` (dejado por US-028).

        En una **única unidad de trabajo atómica** (tx + RLS del tenant del JWT), releyendo el estado de
        la RESERVA con `SELECT ... FOR UPDATE` para serializar el doble cobro concurrente (lock de fila
        PostgreSQL, **nunca** locks distribuidos; design.md §D-1):
        1. Crea un registro `PAGO` con `facturaId` del recibo de fianza, `importe` (el importe real
           cobrado), `fechaCobro` y, si se adjunta, `justificanteDocId` (referencia a un DOCUMENTO
           `tipo='justificante_pago'` **ya subido**; opcional, `null` si no se adjunta).
        2. Transiciona `FACTURA (fianza).estado='cobrada'`.
        3. Transiciona `RESERVA.fianzaStatus='cobrada'`, y establece `RESERVA.fianzaEur=importe` y
           `RESERVA.fianzaCobradaFecha=fechaCobro` (habilita la 3.ª de las 3 precondiciones de
           `evento_en_curso`, US-031; NO transiciona `RESERVA.estado`).
        4. Registra `AUDIT_LOG` (`crear` del PAGO/DOCUMENTO; `actualizar` de FACTURA y RESERVA; y la
           traza del flujo excepcional "Negociable" si se cobró sobre `pendiente`).

        **Política "Negociable" (design.md §D-2, diverge de US-029)**: si `RESERVA.fianzaStatus='pendiente'`
        (el recibo de fianza nunca se envió), el cobro **NO se bloquea de forma dura**. Sin
        `confirmarSinRecibo=true` en el body, la respuesta es **200 con `confirmacionRequerida`** (aviso, NO
        crea PAGO ni FACTURA) para que el frontend muestre el diálogo y reintente; con `confirmarSinRecibo=true`,
        el cobro se registra igualmente (si la FACTURA(fianza) está en `borrador` salta `borrador → cobrada`;
        si no existe se crea al vuelo `cobrada`) y el flujo excepcional queda trazado en `AUDIT_LOG`.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrarCobroFianzaRequest' }
      responses:
        '200':
          description: |
            Resultado del registro. **Dos formas discriminadas por el campo `resultado`**:
            - `resultado='cobrado'` (`RegistrarCobroFianzaCobrado`): el cobro se registró. La fianza queda
              en `estado='cobrada'` y `fianzaStatus='cobrada'`. Devuelve el `PAGO` creado, la
              `FACTURA (fianza)` actualizada, el `fianzaStatus`, `fianzaEur` y `fianzaCobradaFecha`.
            - `resultado='confirmacion_requerida'` (`RegistrarCobroFianzaConfirmacionRequerida`): política
              "Negociable" — `fianzaStatus='pendiente'` sin `confirmarSinRecibo=true`. **NO se creó PAGO
              ni FACTURA** ni se cambió el estado. Devuelve `codigo=RECIBO_FIANZA_NO_ENVIADO`, un `mensaje`
              para el diálogo y `reintentarCon` indicando el flag a enviar. El frontend confirma y reintenta.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarCobroFianzaResponse' }
        '400':
          description: |
            Validación de entrada. El `importe` no es Decimal(10,2) positivo (`> 0`) o `fechaCobro` no es
            una fecha válida `<= RESERVA.fechaEvento` (posterior al evento o mal formada): `COBRO_INVALIDO`.
            No se crea `PAGO` ni cambia el estado. Cuerpo = envelope estándar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroFianzaError' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS), no tiene recibo de fianza cuando se esperaba
            (`FACTURA_FIANZA_NO_ENCONTRADA`), o el `justificanteDocId` indicado no existe en el tenant
            (`JUSTIFICANTE_NO_ENCONTRADO`). No se muta nada. Cuerpo + `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroFianzaError' }
        '409':
          description: |
            Conflicto de precondición de estado (doble cobro), sin efectos, releído bajo
            `SELECT ... FOR UPDATE`:
            - `FIANZA_YA_COBRADA` — la fianza ya está `cobrada` (**doble cobro**, incl. dos peticiones
              concurrentes: solo la primera registra el PAGO). "La fianza ya está marcada como cobrada".
            Cuerpo = envelope estándar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroFianzaError' }

  /reservas/{id}/condiciones-particulares:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Confirmacion]
      summary: Gestionar condiciones particulares (UC-19)
      description: Marca el envío o la firma de las condiciones particulares y asocia el documento firmado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CondicionesParticularesRequest'
      responses:
        '200':
          description: Estado de condiciones actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ SUB-PROCESOS ============================
  /reservas/{id}/subprocesos:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    patch:
      tags: [Subprocesos]
      summary: Gestionar sub-procesos paralelos (UC-20, UC-21, UC-22)
      description: Avanza el estado de los sub-procesos `pre_evento`, `liquidacion` y/o `fianza`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubprocesosRequest'
      responses:
        '200':
          description: Sub-procesos actualizados
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # [DECISIÓN F1-06] ELIMINADO `POST /reservas/{id}/fianza/solicitar-iban`.
  # Motivo: la solicitud de IBAN (E5) se dispara AUTOMÁTICAMENTE al entrar en post_evento (US-034/035),
  # no es una acción manual del gestor. El gestor solo REGISTRA el IBAN vía PATCH /clientes/{id} (US-035),
  # y E8 confirma la recepción. Restaura este endpoint solo si confirmas que existe una solicitud manual.

  # [US-036 / Gate 1 G1-2] Materializa la devolución de fianza como sub-recurso simétrico al cobro
  # de US-030 (`POST /reservas/{id}/facturas/fianza/cobro`). Reemplaza el placeholder previo
  # `POST /reservas/{id}/fianza/devolver` (skeleton pre-US-036). El justificante NO es multipart
  # (G1-3): se sube antes por `POST /documentos` y aquí se referencia por `justificanteDocId`,
  # patrón idéntico a US-030/US-029.
  /reservas/{id}/fianza/devolucion:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Registrar la devolución de la fianza (UC-27 pasos 4-8 / US-036)
      operationId: registrarDevolucionFianza
      description: |
        [US-036 / UC-27 pasos 4-8] El **Gestor registra la devolución** de la fianza (depósito
        reembolsable) de la RESERVA `{id}` tras ejecutarla externamente en su banca (Slotify
        **registra**, no procesa el pago; sin pasarela en MVP). Es el **paso simétrico inverso** del
        cobro de US-030. Precondición del happy path (triple): `RESERVA.estado='post_evento'` **Y**
        `RESERVA.fianzaStatus='cobrada'` **Y** `CLIENTE.iban_devolucion IS NOT NULL`.

        En una **única unidad de trabajo atómica** (tx + RLS del tenant del JWT), releyendo el estado
        de la RESERVA con `SELECT ... FOR UPDATE` para serializar el doble registro concurrente (lock
        de fila PostgreSQL, **nunca** locks distribuidos; design.md §D-1/§D-4):
        1. Valida importe (`importeDevuelto`, `0.00 ≤ x ≤ RESERVA.fianzaEur`) y fecha
           (`fechaCobro ≥ RESERVA.fianzaCobradaFecha`).
        2. Deriva el estado final: `importeDevuelto == fianzaEur` ⇒ `fianzaStatus='devuelta'`;
           `importeDevuelto < fianzaEur` (incl. `"0.00"`) ⇒ `fianzaStatus='retenida_parcial'`.
        3. Si `fianzaStatus` resulta `retenida_parcial`, `motivoRetencion` es **obligatorio**
           (validación de dominio) y se persiste en `RESERVA.motivoRetencion` (campo dedicado, G1-1);
           en `devuelta`, `motivoRetencion` se ignora / queda `null`.
        4. Si se referenció `justificanteDocId` (opcional), lo **vincula** validando que el DOCUMENTO
           (`tipo='justificante_pago'`) exista en el tenant; NO es multipart (G1-3).
        5. Establece `RESERVA.fianzaDevueltaEur=importeDevuelto`,
           `RESERVA.fianzaDevueltaFecha=fechaCobro`, `RESERVA.fianzaStatus` al estado final y
           `RESERVA.motivoRetencion` (si parcial). NO transiciona `RESERVA.estado`.
        6. Registra `AUDIT_LOG` (`actualizar` de RESERVA; vínculo del DOCUMENTO si aplica).

        **Estado final irreversible** (MVP): una vez en `devuelta`/`retenida_parcial`, un nuevo
        intento se rechaza con 409 `DEVOLUCION_YA_REGISTRADA` (doble registro, incl. concurrentes:
        solo la primera aplica). **Justificante opcional (FA-04)**: si se omite `justificanteDocId`,
        la devolución se registra igualmente con `avisoSinJustificante=true`.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrarDevolucionFianzaRequest' }
      responses:
        '200':
          description: |
            Devolución registrada. Devuelve la RESERVA actualizada (`fianzaStatus` derivado a
            `devuelta`|`retenida_parcial`, `fianzaDevueltaEur`, `fianzaDevueltaFecha`,
            `motivoRetencion` si parcial); el DOCUMENTO justificante si se referenció; y
            `avisoSinJustificante=true` si se registró sin justificante (FA-04).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarDevolucionFianzaResponse' }
        '400':
          description: |
            Validación de entrada / dominio, sin efectos: `IMPORTE_SUPERA_FIANZA` (FA-02:
            `importeDevuelto > RESERVA.fianzaEur`; también importe negativo o no Decimal(10,2)) o
            `FECHA_DEVOLUCION_INVALIDA` (FA-03: `fechaCobro < RESERVA.fianzaCobradaFecha` o mal
            formada), o `MOTIVO_RETENCION_REQUERIDO` (resultado parcial sin `motivoRetencion`).
            Cuerpo = envelope estándar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevolucionFianzaError' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o el `justificanteDocId` indicado no existe en el
            tenant (`JUSTIFICANTE_NO_ENCONTRADO`, misma semántica que US-030). No se muta nada.
            Cuerpo + `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevolucionFianzaError' }
        '409':
          description: |
            Conflicto de precondición / estado, sin efectos, releído bajo `SELECT ... FOR UPDATE`:
            - `PRECONDICION_NO_CUMPLIDA` — la precondición triple no se cumple
              (`RESERVA.estado ≠ post_evento`, `RESERVA.fianzaStatus ≠ cobrada`, o
              `CLIENTE.iban_devolucion` ausente).
            - `DEVOLUCION_YA_REGISTRADA` — la fianza ya está `devuelta`/`retenida_parcial` (**doble
              registro**, incl. dos peticiones concurrentes: solo la primera aplica; estado
              irreversible). Cuerpo = envelope estándar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevolucionFianzaError' }

  # ============================ FICHA OPERATIVA ============================
  # [US-025 / UC-20] Cumplimentación progresiva y cierre de la FICHA_OPERATIVA de una RESERVA
  # confirmada, más las transiciones de `RESERVA.pre_evento_status` (pendiente → en_curso →
  # cerrado). Endpoints anidados en el recurso reserva (design.md §D-5). La FICHA_OPERATIVA vacía
  # la crea la confirmación de señal (US-021); US-025 no crea entidad ni enum. Se conserva el path
  # `{id}` (parámetro IdReserva) por coherencia con el resto de endpoints anidados de la reserva.
  # Reemplaza el placeholder GET/PUT previo: el guardado es PATCH parcial (D-5) y se añade el cierre.
  /reservas/{id}/ficha-operativa:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [FichaOperativa]
      summary: Consultar ficha operativa del evento (UC-20)
      operationId: leerFichaOperativa
      description: >-
        [US-025] Lee la FICHA_OPERATIVA de la RESERVA sin mutar ningún estado. Solo accesible con
        `RESERVA.estado ∈ {reserva_confirmada, evento_en_curso, post_evento}` y filtrada por el
        `tenant_id` del JWT (RLS). Si la RESERVA está en un estado anterior a `reserva_confirmada`
        (la ficha aún no existe), responde `409` con `code=ficha_no_disponible` (D-3), distinto del
        `404` que indica que la RESERVA no existe en el tenant.
      responses:
        '200':
          description: Ficha operativa
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativa' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: >-
            La RESERVA aún no está confirmada: la ficha operativa no está disponible
            (`code=ficha_no_disponible`, D-3).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativaNoDisponibleError' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [FichaOperativa]
      summary: Guardar parcialmente la ficha operativa (UC-20)
      operationId: guardarFichaOperativa
      description: >-
        [US-025] Guardado **parcial/progresivo** de la ficha: todos los campos son opcionales y
        solo se persiste el subconjunto enviado. Efecto colateral en el backend (no es campo del
        contrato, D-2): el primer guardado que deje al menos un campo con dato transiciona
        `RESERVA.pre_evento_status` de `pendiente` a `en_curso`. Sirve también para la edición
        post-cierre (D-4): si la ficha ya está cerrada, el backend reescribe `fechaCierre = now()`
        y mantiene `pre_evento_status = cerrado` (la edición no reabre el estado). Guardas de acceso
        y errores idénticos al GET.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardarFichaOperativaRequest'
      responses:
        '200':
          description: Ficha guardada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativa' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: >-
            La RESERVA aún no está confirmada: la ficha operativa no está disponible
            (`code=ficha_no_disponible`, D-3).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativaNoDisponibleError' }
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/ficha-operativa/cerrar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [FichaOperativa]
      summary: Cerrar la ficha operativa (UC-20)
      operationId: cerrarFichaOperativa
      description: >-
        [US-025] Cierra la FICHA_OPERATIVA: fija `fichaCerrada = true`, `fechaCierre = now()` y
        transiciona `RESERVA.pre_evento_status` de `en_curso` a `cerrado`. El cierre **nunca falla
        por campos vacíos** (D-6): si quedan campos opcionales sin rellenar, se permiten y se
        devuelven en `avisosCamposVacios` como aviso puramente informativo (nunca un 4xx). Guardas
        de acceso y errores por estado/tenant/auth idénticos al GET.
      responses:
        '200':
          description: Ficha cerrada (con posibles avisos informativos de campos vacíos)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CerrarFichaOperativaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: >-
            La RESERVA aún no está confirmada: la ficha operativa no está disponible
            (`code=ficha_no_disponible`, D-3).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativaNoDisponibleError' }
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================ US-034: FINALIZAR EVENTO ============================
  # [US-034 / UC-25] Acción MANUAL del Gestor que cierra la ejecución del evento: transiciona
  # `RESERVA.estado: evento_en_curso → post_evento` (irreversible) y, condicionalmente, dispara
  # el email E5 (solicitud de IBAN + agradecimiento + NPS). Contrapartida manual del inicio
  # automático de US-031 (cron). Decisión de contrato D-3 (Gate SDD aprobado): acción POST
  # semántica sobre el recurso (Opción A), NO un PATCH genérico de estado. El reenvío/reintento
  # de E5 desde la ficha se DIFIERE a una US futura (D-7): NO se añade endpoint de reenvío aquí.
  /reservas/{id}/finalizar-evento:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Finalizar evento y disparar solicitud de IBAN (UC-25 / US-034)
      operationId: finalizarEvento
      description: |
        [US-034] El **Gestor** (JWT de usuario, rol gestor, RLS del tenant del JWT — NUNCA
        `X-Cron-Token`: es acción manual, no barrido de Sistema) marca como **finalizado** un
        evento en ejecución. Sobre una RESERVA en `estado='evento_en_curso'`, la acción realiza
        **dos operaciones separadas** disparadas por el mismo click (design.md §D-2):

        1. **Paso transaccional (crítico, all-or-nothing)**: bajo `SELECT … FOR UPDATE` de la
           fila RESERVA, re-evalúa la guarda de origen (`estado='evento_en_curso'`), transiciona
           `evento_en_curso → post_evento` (**irreversible**, incondicional respecto a fianza y
           email), marca la NPS como **programada** (T+3d, marca derivada; el envío real es US
           futura, fuera de MVP — design.md §D-6) y escribe `AUDIT_LOG accion='transicion'`,
           `entidad='RESERVA'`, `datos_anteriores.estado='evento_en_curso'`,
           `datos_nuevos.estado='post_evento'`, con el `usuarioId` del Gestor (origen **Usuario**,
           a diferencia del barrido de Sistema de US-031). Si `fianzaStatus='cobrada'` **y**
           `fianzaEur IS NULL` (dato anómalo, D-4), registra una **alerta de dato anómalo** en
           `AUDIT_LOG` (no bloquea, no envía E5). Commit.
        2. **Paso post-commit (best-effort)**: **solo si `fianzaEur > 0`** (guarda pura
           `debeEnviarseE5`: `NULL` y `0` colapsan a "sin fianza", D-4) invoca el motor de email
           de `comunicaciones` (US-045) con el trigger **E5** hacia `CLIENTE.email`, creando
           COMUNICACION (`codigoEmail='E5'`). El envío vive **fuera** de la transacción de la
           transición: un fallo del proveedor deja `COMUNICACION.estado='fallido'` **SIN**
           revertir el estado ya commiteado (`post_evento` se mantiene).

        La respuesta expone el resultado para las alertas de los criterios de aceptación:
        `e5.resultado` (`enviado` / `fallido` / `no_aplica`) y `documentacionPendiente` (lista de
        ítems del checklist de documentación sin subir — advertencia informativa **no
        bloqueante**, consultada a la superficie de US-033; fail-open si aún no está expuesta,
        design.md §D-7).

        **Concurrencia (D-8)**: dos peticiones concurrentes (doble click) se serializan por
        `SELECT … FOR UPDATE` sobre la fila RESERVA; exactamente una gana, la segunda observa
        `estado ≠ evento_en_curso` y termina como **409** sin doble transición, doble AUDIT_LOG
        ni doble E5. Sin locks distribuidos (no toca `FECHA_BLOQUEADA` ni la cola).
      requestBody:
        # Acción sin parámetros de negocio: la única entrada es la identidad de la RESERVA (path)
        # y el actor (JWT). Body opcional y vacío, en línea con las acciones de transición sin
        # payload del contrato (p. ej. POST /reservas/{id}/promover automático, /salir-cola).
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinalizarEventoRequest' }
      responses:
        '200':
          description: |
            Evento finalizado: RESERVA en `post_evento`. Devuelve la RESERVA actualizada más el
            resultado del disparo de E5 (`e5`) y la advertencia no bloqueante de documentación
            pendiente (`documentacionPendiente`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FinalizarEventoResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # [US-034 D-3] Autenticado pero sin rol Gestor del tenant para la acción manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # RESERVA `{id}` inexistente o de otro tenant (RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (mapeo F5-02): la RESERVA `{id}` no está en `evento_en_curso`
            (transición `evento_en_curso → post_evento` no permitida desde el estado actual, o
            carrera de doble finalización perdida — D-8). Sin efectos, sin doble transición.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FinalizarEventoConflictError' }

  # ============================ US-035: REGISTRAR IBAN DE DEVOLUCIÓN ============================
  # [US-035 / UC-26 FA-01, UC-27 pasos 1–3] Acción MANUAL del Gestor que cierra el ciclo de
  # recepción del IBAN iniciado por E5 (US-034): valida el IBAN (checksum mod-97) ANTES de escribir,
  # lo persiste en `CLIENTE.iban_devolucion` (atributo del cliente, no de la reserva) y dispara E8
  # (confirmación de recepción) al `CLIENTE.email` reutilizando el motor de comunicaciones (US-045).
  # Decisiones de contrato aprobadas en Gate 1: D-5A (verbo/ruta = PATCH /reservas/{id}/iban-devolucion
  # con body `{ iban }`, contextualizado en la reserva de post-evento para ligar la COMUNICACION E8 a
  # `reserva_id`) y D-3A (cada registro/corrección crea una NUEVA fila COMUNICACION E8, excepción
  # auditada a la idempotencia, simétrico con E4/US-028). Guardar↔enviar separados (D-2): un fallo de
  # E8 NO revierte el IBAN guardado (FA-03) — por eso la respuesta 200 lleva cuerpo con `avisoEmail`
  # opcional en vez de un 204 sin cuerpo (necesitamos transmitir el aviso de FA-03).
  /reservas/{id}/iban-devolucion:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    patch:
      tags: [Reservas]
      summary: Registrar IBAN de devolución de fianza y confirmar recepción (UC-26/UC-27 / US-035)
      operationId: registrarIbanDevolucion
      description: |
        [US-035] El **Gestor** (JWT de usuario, rol gestor, RLS del tenant del JWT — NUNCA
        `X-Cron-Token`: es acción manual) registra el **IBAN de devolución** que el cliente le
        proporcionó, sobre una RESERVA concreta. La acción solo está disponible cuando
        `RESERVA.estado='post_evento'` **Y** `RESERVA.fianzaEur > 0`; en cualquier otra combinación
        se rechaza con **409** (FA-04). El efecto persistido recae en **`CLIENTE.iban_devolucion`**
        (atributo del cliente, disponible para futuras reservas del mismo cliente — design.md §D-1),
        no en la RESERVA.

        Realiza **dos operaciones separadas** (patrón "guardar-luego-enviar", design.md §D-2):

        1. **Validación previa + paso transaccional**: valida el IBAN con el algoritmo de
           **checksum módulo 97** (ISO 13616: longitud por país, prefijo de país, dígitos de
           control) **ANTES** de cualquier escritura. Si el IBAN es inválido responde **422** sin
           tocar BD ni enviar E8 (FA-01). Si es válido, actualiza `CLIENTE.iban_devolucion`
           (sobreescribiendo el valor previo en correcciones, FA-02) y escribe `AUDIT_LOG`
           `accion='actualizar'`, `entidad='CLIENTE'`,
           `datos_anteriores={iban_devolucion: <previo o null>}`,
           `datos_nuevos={iban_devolucion: <nuevo>}`. Commit.
        2. **Paso post-commit (best-effort)**: invoca el motor de email de `comunicaciones`
           (US-045) con el trigger **E8** hacia `CLIENTE.email` (**nunca** al gestor), creando una
           **nueva** COMUNICACION (`codigoEmail='E8'`, `reserva_id`, `cliente_id`, `tenant_id`) —
           cada registro/corrección crea una fila nueva como excepción auditada a la idempotencia
           `(reserva_id, codigoEmail)` (D-3A, simétrico al reenvío de E4/US-028). Si el proveedor
           falla, el IBAN **permanece guardado** (no se revierte), `COMUNICACION.estado='fallido'` y
           la respuesta 200 incluye `avisoEmail` para que la UI muestre la alerta y ofrezca reenvío
           (FA-03). El reintento se apoya en el mecanismo de reintento del motor de `comunicaciones`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrarIbanDevolucionRequest' }
      responses:
        '200':
          description: |
            IBAN válido registrado en `CLIENTE.iban_devolucion`. Devuelve el IBAN guardado
            (normalizado) más `avisoEmail`: nulo cuando E8 se envió correctamente; presente cuando
            el IBAN quedó guardado pero E8 no pudo enviarse (FA-03), señalando el fallo sin revertir
            el IBAN. Respuesta con cuerpo (no 204) precisamente para poder transmitir ese aviso.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarIbanDevolucionResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # Autenticado pero sin rol Gestor del tenant para la acción manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # RESERVA `{id}` inexistente o de otro tenant (RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado/precondición (FA-04): la RESERVA `{id}` no está en `post_evento`
            o no tiene fianza que devolver (`fianzaEur <= 0` o `null`). Sin efectos: no se actualiza
            `CLIENTE.iban_devolucion` ni se envía E8.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarIbanDevolucionConflictError' }
        '422':
          description: |
            IBAN inválido (FA-01): no supera la validación de checksum módulo 97 (longitud por país,
            prefijo de país o dígitos de control incorrectos). Sin efectos: no se actualiza
            `CLIENTE.iban_devolucion` ni se envía E8.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ============================ CALENDARIO ============================
  /calendario:
    get:
      tags: [Calendario]
      summary: Consultar calendario de disponibilidad (UC-29 / US-039)
      operationId: consultarCalendario
      description: |
        [US-039] Vista de **lectura pura** (no muta estado) de la disponibilidad de fechas del
        tenant. Dado un rango `[desde, hasta]` y una `vista`, devuelve la **agregación por fecha
        ocupada**: una entrada por cada fecha con bloqueo activo en `FECHA_BLOQUEADA`, con el
        `color` semántico derivado del par `(estado, subEstado)` de la reserva bloqueante y el
        conteo de cola. Las fechas **libres no aparecen** en `fechas` (la celda neutra es la
        ausencia de entrada); por eso la respuesta es proporcional a las fechas ocupadas, no al
        tamaño del rango.

        La `vista` (`mes`|`semana`|`dia`|`lista`) es **informativa** (forma de render): el conjunto
        de datos es el mismo para todas las vistas del mismo rango, lo que garantiza el código de
        colores idéntico entre vistas (US-039 §Reglas de Validación). El detalle del popover
        (cliente, subEstado, TTL, enlace) viaja ya en cada entrada: el clic en una celda **no**
        dispara otra llamada (no hay endpoint de detalle separado).

        Derivación del color (SlotifyGeneralSpecs §11.3, design.md §D-2):
        - **gris** → consulta activa (`subEstado` ∈ {`2a`, `2b`, `2c`, `2v`}).
        - **ambar** → `pre_reserva`.
        - **verde** → `reserva_confirmada`, `evento_en_curso` o `post_evento` (heredan el verde).
        - **azul** → `reserva_completada` (histórica).
        - **rojo** → `reserva_cancelada`.
        Los sub-estados terminales de consulta (`2x`/`2y`/`2z`) NO aparecen: su bloqueo ya fue
        liberado, así que no entran en la query de fechas ocupadas.

        Aislada por `tenant_id` del JWT (reforzada por RLS); ningún dato cross-tenant es visible.
      parameters:
        - in: query
          name: desde
          required: true
          description: Inicio del rango (inclusive). El frontend lo calcula según la vista y el período.
          schema: { type: string, format: date }
        - in: query
          name: hasta
          required: true
          description: Fin del rango (inclusive). El backend agrega sobre `[desde, hasta]`.
          schema: { type: string, format: date }
        - in: query
          name: vista
          required: false
          description: Vista solicitada (informativa; no altera el conjunto de datos del rango).
          schema:
            allOf: [{ $ref: '#/components/schemas/VistaCalendario' }]
            default: mes
      responses:
        '200':
          description: Disponibilidad agregada del rango (solo fechas ocupadas).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CalendarioResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /fechas-bloqueadas:
    post:
      tags: [Calendario]
      summary: Bloquear fecha (UC-30)
      description: |
        Operación crítica. Crea un `FechaBloqueada` dentro de una transacción con
        `SELECT ... FOR UPDATE`. La restricción `UNIQUE(tenant_id, fecha)` garantiza
        que dos peticiones concurrentes para la misma fecha resulten en un éxito y un 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BloquearFechaRequest'
      responses:
        '201':
          description: Fecha bloqueada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FechaBloqueada' }
        '409':
          description: La fecha ya está bloqueada (doble reserva evitada)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /fechas-bloqueadas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    delete:
      tags: [Calendario]
      summary: Liberar fecha (UC-31)
      description: Libera la fecha y dispara la promoción de la cola de espera si la hay.
      responses:
        '204':
          description: Fecha liberada
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================ CLIENTES ============================
  # [DECISIÓN F1-04] ELIMINADOS `GET /clientes` (listado/búsqueda) y `POST /clientes`.
  # Motivo: violan la piedra angular "la reserva es la entidad central; el cliente es un atributo,
  # no un punto de navegación tipo CRM" (er-diagram §3.4). El cliente se crea EMBEBIDO en el alta de
  # reserva (CreateReservaRequest.cliente, US-003/004). Se conservan GET/PATCH /clientes/{id} como soporte
  # (lectura de datos fiscales en US-014, registro de IBAN en US-035). Restaura el listado solo si confirmas
  # que necesitas un selector de clientes recurrentes (sería ya una funcionalidad cliente-céntrica).
  /clientes/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    get:
      tags: [Clientes]
      summary: Detalle de cliente (soporte, US-014)
      responses:
        '200':
          description: Cliente
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cliente' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Clientes]
      summary: Actualizar datos fiscales / IBAN del cliente (US-035)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClienteRequest'
      responses:
        '200':
          description: Cliente actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cliente' }

  # ============================ HISTÓRICO ============================
  /historico/reservas:
    get:
      tags: [Historico]
      summary: Buscar en histórico (UC-32)
      description: Búsqueda full-text sobre reservas archivadas (código, cliente, notas).
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
      responses:
        '200':
          description: Resultados del histórico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'

  /historico/exportar:
    get:
      tags: [Historico]
      summary: Exportar reservas (UC-33)
      description: Exporta el histórico filtrado a CSV.
      parameters:
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
      responses:
        '200':
          description: Fichero CSV
          content:
            text/csv:
              schema: { type: string, format: binary }

  # ============================ DASHBOARD ============================
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Visualizar dashboard operativo (UC-34 / US-044)
      operationId: consultarDashboard
      description: |
        [US-044] Vista de **lectura pura** (NO muta estado) que agrega en una sola respuesta
        el estado operativo del tenant en **7 widgets** (§7.1 SlotifyGeneralSpecs, design.md
        §D-1: un único endpoint agregado en vez de 7). Cada widget devuelve sus `items` y el
        `total` de elementos que satisfacen su criterio; cada ítem enlaza a la ficha de la
        `RESERVA` (`enlace`). El widget `proximos30Dias` añade el `color` semántico canónico
        derivado del par `(estado, subEstado)`, el **mismo código cromático que el Calendario
        (US-039 / §11.3)** — reutilizado, no reimplementado (design.md §D-2).

        Widgets (design.md §D-1):
        - **hoyManana**: reservas con `fecha_evento ∈ {hoy, mañana}` en `reserva_confirmada`
          o `evento_en_curso`, ordenadas por `fecha_evento` asc.
        - **pipeline**: recuento de reservas `activo = true` agrupado por `estado`/`sub_estado`
          (Exploratoria, Con fecha, Pendiente invitados, En cola, Visita programada,
          Pre-reserva, Confirmada).
        - **subProcesosCriticos**: `reserva_confirmada` con sub-proceso atrasado
          (`pre_evento_status ≠ cerrado` con evento próximo, `liquidacion_status ≠ cobrada`
          o `fianza_status ≠ cobrada`).
        - **pendientes**: acciones requeridas (presupuesto `enviado` sin respuesta, TTL en las
          próximas 24 h, factura `enviada` sin pago con vencimiento superado).
        - **consultasEnCola**: reservas en `sub_estado = 2d`, agrupables por `fecha_evento`.
        - **visitasProgramadas**: `sub_estado = 2v` con `visita_programada_fecha` futura,
          ordenadas por `visita_programada_fecha` asc.
        - **proximos30Dias**: reservas con `fecha_evento ∈ [hoy, hoy + 30 días]` (inclusive),
          cada una con su `color` canónico.

        Aislada por `tenant_id` del JWT (reforzada por RLS) y considera **solo** reservas con
        `activo = true` (US-044 §FA-04). NO expone datos financieros del tenant ni
        `CLIENTE.iban_devolucion` (§7.2, fuera de MVP). Sin parámetros de query: el filtrado
        por tenant viaja en el JWT. Las ventanas temporales se calculan en backend (design.md
        §D-3); cada widget gestiona su estado vacío de forma independiente (§FA-01).
      responses:
        '200':
          description: Carga agregada de los 7 widgets del dashboard operativo del tenant.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================ COMUNICACIONES ============================
  /reservas/{id}/comunicaciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Comunicaciones]
      summary: Log de comunicaciones de la reserva
      responses:
        '200':
          description: Comunicaciones
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Comunicacion' }
    post:
      tags: [Comunicaciones]
      summary: Enviar email manual o automático (UC-35, UC-36)
      description: Crea y envía (o guarda como borrador para revisión, UC-36) un email vinculado a la reserva.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateComunicacionRequest'
      responses:
        '201':
          description: Comunicación creada/enviada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comunicacion' }

  # ============================ DOCUMENTOS ============================
  /documentos:
    post:
      tags: [Documentos]
      summary: Subir documento (UC-19, UC-24)
      description: Sube un documento polimórfico (DNI, cláusula, condiciones, justificante de pago, etc.) al storage y registra sus metadatos.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                tipo:
                  $ref: '#/components/schemas/TipoDocumento'
                reservaId:
                  type: string
                  format: uuid
              required: [file, tipo]
      responses:
        '201':
          description: Documento subido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Documento' }
        '400':
          description: Tipo de fichero no válido o demasiado grande (>10MB)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ============================ CRON ============================
  /cron/barrido:
    post:
      tags: [Cron]
      summary: Barrido periódico de TTLs, cola, recordatorios y cierre de fichas
      description: |
        Endpoint protegido (token de servicio `X-Cron-Token`, nunca JWT) invocado por el cron.
        Es idempotente: barre reservas con `ttl_expiracion` vencido, las expira (2.b→2.x),
        libera la fecha, promueve la cola y dispara recordatorios automáticos. No depende del
        reloj exacto.

        Con `tarea=fichas` (o `all`) ejecuta además el **cierre automático de la ficha
        operativa en T-1d** ([US-026], automatización A10): selecciona cross-tenant las RESERVA
        en `reserva_confirmada` con `pre_evento_status != 'cerrado'` y `date(fecha_evento) =
        date(hoy) + 1 día`, y por cada una, en su **propia transacción** bajo el contexto RLS
        del tenant de la RESERVA (cross-tenant read / RLS write), re-evalúa la guarda y aplica
        la mutación de cierre reutilizada de US-025 (`FICHA_OPERATIVA.ficha_cerrada = true`,
        `fecha_cierre = now()`, `RESERVA.pre_evento_status → cerrado`, `AUDIT_LOG
        accion='transicion'` origen Sistema, causa `A10`). **Idempotente**: las fichas ya
        cerradas (por un pase previo o por cierre manual US-025) no son candidatas → N
        ejecuciones = 1 cierre y 1 auditoría. El **fallo de una candidata no aborta el lote**
        (fallo aislado por RESERVA). El resumen del cierre de fichas se devuelve en
        `BarridoResponse.fichas` (`candidatas`, `fichasCerradas`, `fallos`). No envía email ni
        resumen al cliente (out-of-scope, sin código E).
      # [DECISIÓN granularidad] El parámetro `tarea` permite invocar/testear cada barrido por separado,
      # imprescindible para aislar tests de concurrencia (US-012/018/026/031/037). Confirma este enfoque
      # frente a un único barrido monolítico.
      parameters:
        - in: query
          name: tarea
          schema:
            type: string
            enum: [expiracion, cola, fichas, eventos, archivado, recordatorios, all]
            default: all
          description: Barrido concreto a ejecutar (por defecto todos)
      security:
        - cronToken: []
      responses:
        '200':
          description: Barrido ejecutado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cron/barrido-expiracion:
    post:
      tags: [Cron]
      operationId: barridoExpiracion
      summary: Barrido de expiración de consultas por TTL agotado (UC-09 / US-012)
      description: |
        [US-012] Endpoint **interno protegido** invocado por el cron scheduler
        (`@nestjs/schedule`) para expirar las consultas cuyo bloqueo blando ha agotado su
        TTL (automatizaciones A4/A5/A21/A21b). Cierra el patrón obligatorio "estado en fila
        + barrido periódico" (`CLAUDE.md §Jobs asíncronos`; skill `async-jobs`): NUNCA
        Lambda/EventBridge ni timers exactos; el trabajo pendiente es estado en la BBDD
        (`RESERVA.ttl_expiracion` + `estado`/`sub_estado`).

        Autenticación **service-to-service** mediante la cabecera `X-Cron-Token` (comparada
        con `CRON_TOKEN` del entorno vía `CronTokenGuard`), **NO** el JWT de usuario: sin
        token válido devuelve `401`. El scheduler no ejecuta lógica de negocio, solo dispara
        este endpoint (invocable también manualmente/por otro scheduler externo y testeable
        por HTTP).

        Selecciona todas las RESERVA con `ttl_expiracion < now()` **AND** (`sub_estado ∈
        {'2b','2c','2v'}` **OR** `estado = 'pre_reserva'`) comparando **instantes**
        (`timestamptz`), nunca fechas formateadas, y por cada una, en su **propia
        transacción** serializada (`SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin
        Redis ni locks distribuidos), bajo el **contexto RLS del tenant** de la RESERVA:
        transiciona al estado terminal por TTL (`2b/2c/2v → 2x`, `pre_reserva →
        reserva_cancelada`, mapa declarativo), libera la fila de `FECHA_BLOQUEADA`
        (`liberarFecha()`, US-041, causa `TTL`) y, si la RESERVA tenía cola activa
        (`2.b`/`2.v` con cola heredada), **dispara** el seam `PromocionColaPort` exactamente
        una vez. El adaptador real `PromocionColaPrismaAdapter` (US-018) materializa la
        mecánica A15: `2d → 2b`, re-bloqueo atómico vía `bloquearFecha()` y reordenación
        FIFO en una sola transacción, serializada por `SELECT … FOR UPDATE` sobre RESERVA
        `2d` (la fila de `FECHA_BLOQUEADA` ya no existe en ese punto).

        **Idempotente** (D-4): las RESERVA ya terminales no son candidatas (la guarda de
        origen las excluye) y el `DELETE` de `FECHA_BLOQUEADA` con 0 filas es éxito
        silencioso; N ejecuciones sobre la misma RESERVA = 1 sola transición y 1 sola
        auditoría (`accion='transicion'`, `entidad='RESERVA'`). El **fallo de una candidata
        no aborta el lote** (fallo aislado por RESERVA); el resumen registra los fallos.
      security:
        - cronToken: []
      responses:
        '200':
          description: |
            Barrido ejecutado. Devuelve un **resumen** del barrido (sin datos de negocio
            sensibles): candidatas evaluadas, expiradas efectivamente, promociones de cola
            disparadas y fallos aislados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoExpiracionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cron/barrido-eventos:
    post:
      tags: [Cron]
      operationId: barridoEventos
      summary: Barrido de inicio automático del evento en T-0 (UC-23 / US-031)
      description: |
        [US-031] Endpoint **interno protegido** invocado por el cron scheduler
        (`@nestjs/schedule`) para iniciar automáticamente el evento en su día (T-0), actor
        Sistema. Cierra el patrón obligatorio "estado en fila + barrido periódico"
        (`CLAUDE.md §Jobs asíncronos`; skill `async-jobs`): NUNCA Lambda/EventBridge ni timers
        exactos; el trabajo pendiente es estado en la BBDD (`RESERVA.estado` + `fecha_evento`).
        El `@Cron` se dispara **una vez al día a las 00:00**; endpoint dedicado, gemelo de
        `POST /cron/barrido-expiracion` (US-012), en el módulo `reservas`.

        Autenticación **service-to-service** mediante la cabecera `X-Cron-Token` (comparada
        con `CRON_TOKEN` del entorno vía `CronTokenGuard`), **NO** el JWT de usuario: sin
        token válido devuelve `401`. El scheduler no ejecuta lógica de negocio, solo dispara
        este endpoint (invocable también manualmente/por otro scheduler externo y testeable
        por HTTP).

        Selecciona **cross-tenant** las RESERVA con `estado = 'reserva_confirmada'` **AND**
        `date(fecha_evento) = date(hoy)` (T-0, filtro **estricto** por fecha de calendario en
        la zona horaria de negocio, no por instante ni string formateado). Por cada candidata,
        en su **propia transacción** bajo el contexto RLS del tenant de la RESERVA (cross-tenant
        read / RLS write) y con `SELECT … FOR UPDATE` sobre la fila, re-evalúa la guarda de
        origen y **las tres precondiciones en una única lectura** (`pre_evento_status =
        'cerrado'` AND `liquidacion_status = 'cobrada'` AND `fianza_status = 'cobrada'`): si se
        cumplen, transiciona atómicamente `reserva_confirmada → evento_en_curso` y registra
        `AUDIT_LOG accion='transicion'` origen Sistema (`datos_anteriores={estado:reserva_confirmada}`,
        `datos_nuevos={estado:evento_en_curso}`); si no, **no transiciona** y emite una **alerta
        crítica** al gestor con las precondiciones incumplidas (el forzado manual es US-032,
        fuera de alcance). Emite además la **A29 no bloqueante** cuando `cond_part_firmadas =
        false`, con independencia del resultado de la transición.

        **Idempotente**: las RESERVA ya en `evento_en_curso` (por un pase previo o por el gestor
        US-032) no son candidatas → N ejecuciones = 1 transición y 1 auditoría; la re-evaluación
        bajo el lock hace que un pase concurrente re-lea el `estado` ya actualizado y la UPDATE
        afecte 0 filas (no-op sin error). El **fallo de una candidata no aborta el lote** (fallo
        aislado por RESERVA); el resumen registra los fallos. No envía email ni briefing
        (out-of-scope, sin código E); la vista móvil "evento en curso" consume `RESERVA.estado`
        de `GET /reservas` (US-049/US-033/US-034).
      security:
        - cronToken: []
      responses:
        '200':
          description: |
            Barrido ejecutado. Devuelve un **resumen** del barrido (sin datos de negocio
            sensibles): candidatas evaluadas, eventos efectivamente iniciados, precondiciones
            incumplidas (alerta crítica) y fallos aislados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoEventosResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT de vida corta. `tenant_id` y `rol` van firmados en el payload.
    cookieAuth:
      # [F3-01] Modela explícitamente el refresh token en cookie httpOnly+Secure+SameSite (architecture §2.8).
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token en cookie httpOnly+Secure+SameSite. Inaccesible desde JavaScript (anti-XSS).
    cronToken:
      # [DECISIÓN F5-05] Nombre de cabecera no respaldado por fuente. Confirma el mecanismo de auth
      # service-to-service (p. ej. secreto fuerte en variable de entorno).
      type: apiKey
      in: header
      name: X-Cron-Token
      description: Token de servicio para el endpoint de barrido del cron.

  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
      description: Número de página
    Limit:
      # [DECISIÓN F5-04] default=20 y maximum=100 son convención, no fuente. Confirma con el PO.
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Elementos por página
    IdReserva:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
      description: ID de la reserva
    IdGenerico:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
      description: Identificador del recurso

  responses:
    # [DECISIÓN F5-02] Mapeo HTTP ratificado: 409 = conflicto/concurrencia (violación UNIQUE determinista),
    # 422 = transición/guarda inválida. Documentar como decisión en la spec.
    Unauthorized:
      description: No autenticado o token inválido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Recurso no encontrado en el tenant
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Error de validación de entrada
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflicto de estado o de concurrencia (p. ej. fecha ya bloqueada)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      # [US-005] Autenticado pero sin rol/permiso suficiente. Distinto de 401 (sin sesión).
      description: Autenticado pero sin rol/permiso suficiente para la operación
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      # [US-001] Rate-limiting provisto por el guard self-contained LoginThrottleGuard (por IP+email). No altera el schema de petición.
      description: Demasiadas peticiones (rate-limit excedido)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    # -------- Tipos monetarios [F2-01] --------
    Importe:
      type: string
      pattern: '^-?\d+\.\d{2}$'
      example: '1234.56'
      description: Importe monetario en EUR, Decimal(10,2) serializado como string para evitar coma flotante.
    Porcentaje:
      type: string
      pattern: '^\d+\.\d{2}$'
      example: '21.00'
      description: Porcentaje, Decimal(4,2) serializado como string.

    # -------- Enums --------
    EstadoReserva:
      type: string
      enum: [consulta, pre_reserva, reserva_confirmada, evento_en_curso, post_evento, reserva_completada, reserva_cancelada]
    SubEstadoConsulta:
      type: string
      enum: ['2a', '2b', '2c', '2d', '2v', '2x', '2y', '2z']
    VistaCalendario:
      # [US-039] Vista de render del calendario; informativa (no altera el dataset del rango).
      type: string
      enum: [mes, semana, dia, lista]
    ColorCalendario:
      # [US-039] Color semántico canónico (SlotifyGeneralSpecs §11.3) derivado de (estado, subEstado)
      # de la reserva bloqueante. Token lógico; el frontend lo mapea a su token Tailwind (US-000A).
      type: string
      enum: [gris, ambar, verde, azul, rojo]
    CanalEntrada:
      type: string
      enum: [web, email, whatsapp, instagram, telefono]
    DuracionHoras:
      type: integer
      enum: [4, 8, 12]
    TipoEvento:
      type: string
      enum: [boda, corporativo, privado, otro]
    Temporada:
      type: string
      enum: [alta, media, baja]
    TipoBloqueo:
      type: string
      enum: [blando, firme]
    OrigenExtra:
      type: string
      enum: [presupuesto, anadido_post_confirmacion]
    TipoFactura:
      type: string
      enum: [senal, liquidacion, fianza, complementaria]
    EstadoPresupuesto:
      type: string
      enum: [borrador, enviado, aceptado, rechazado]
    EstadoFactura:
      type: string
      enum: [borrador, enviada, cobrada]
    FianzaStatus:
      type: string
      enum: [pendiente, recibo_enviado, cobrada, devuelta, retenida_parcial]
    PreEventoStatus:
      type: string
      enum: [pendiente, en_curso, cerrado]
    LiquidacionStatus:
      type: string
      enum: [pendiente, facturada, cobrada]
    TipoDocumento:
      type: string
      enum: [dni_anverso, dni_reverso, clausula_responsabilidad, condiciones_particulares, justificante_pago, presupuesto, factura, otro]
    CodigoEmail:
      type: string
      enum: [E1, E2, E3, E4, E5, E6, E7, E8, manual]

    # -------- Auth --------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    LoginResponse:
      type: object
      required: [accessToken, usuario]
      properties:
        accessToken: { type: string, description: JWT de vida corta (~15 min) }
        usuario: { $ref: '#/components/schemas/Usuario' }
    Usuario:
      type: object
      properties:
        idUsuario: { type: string, format: uuid }
        email: { type: string, format: email }
        nombre: { type: string }
        apellidos: { type: string, nullable: true }
        rol: { type: string, enum: [gestor, admin, operario] }

    # -------- Reserva --------
    Reserva:
      type: object
      properties:
        idReserva: { type: string, format: uuid }
        codigo: { type: string, example: 'SLO-2026-0001' }
        clienteId: { type: string, format: uuid }
        estado: { $ref: '#/components/schemas/EstadoReserva' }
        subEstado: { $ref: '#/components/schemas/SubEstadoConsulta' }
        canalEntrada: { $ref: '#/components/schemas/CanalEntrada' }
        fechaEvento: { type: string, format: date, nullable: true }
        duracionHoras: { allOf: [{ $ref: '#/components/schemas/DuracionHoras' }], nullable: true }
        tipoEvento: { allOf: [{ $ref: '#/components/schemas/TipoEvento' }], nullable: true }
        numAdultosNinosMayores4: { type: integer, nullable: true }
        numNinosMenores4: { type: integer, nullable: true }
        numInvitadosFinal: { type: integer, nullable: true }
        importeTotal: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        importeSenal: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        importeLiquidacion: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        ttlExpiracion: { type: string, format: date-time, nullable: true }
        # [F2-02] Campos del ER que el recurso de lectura omitía (visita US-008/009, fianza US-030/036, cond. part. US-024)
        visitaProgramadaFecha: { type: string, format: date, nullable: true }
        visitaProgramadaHora: { type: string, nullable: true, example: '17:30' }
        visitaRealizada: { type: boolean, nullable: true }
        fianzaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        fianzaCobradaFecha: { type: string, format: date, nullable: true }
        fianzaDevueltaFecha: { type: string, format: date, nullable: true }
        fianzaDevueltaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        # [US-036 / Gate 1 G1-1] Motivo de retención de la fianza. Campo dedicado nuevo
        # `RESERVA.motivo_retencion` (String? @db.Text; migración aditiva la aplica el backend).
        # Se puebla solo en devolución parcial (`fianza_status='retenida_parcial'`); `null` en
        # devolución completa (`devuelta`) y antes de registrar la devolución.
        motivoRetencion: { type: string, nullable: true, description: 'Motivo de retención de la fianza (solo en retenida_parcial; null en devuelta / sin devolver).' }
        condPartFirmadas: { type: boolean, nullable: true }
        condPartFechaEnvio: { type: string, format: date-time, nullable: true }
        condPartFechaFirma: { type: string, format: date-time, nullable: true }
        preEventoStatus: { $ref: '#/components/schemas/PreEventoStatus' }
        liquidacionStatus: { $ref: '#/components/schemas/LiquidacionStatus' }
        fianzaStatus: { $ref: '#/components/schemas/FianzaStatus' }
        posicionCola: { type: integer, nullable: true }
        consultaBloqueanteId: { type: string, format: uuid, nullable: true }
        notas: { type: string, nullable: true }
        fechaCreacion: { type: string, format: date-time }
        # [US-049] Campos derivados de presentación para el pipeline (Kanban/Listado). OPCIONALES
        # (cambio aditivo): el backend del GET /reservas los proyecta; los demás endpoints que
        # heredan `Reserva` (ReservaDetalle, CreateReservaResponse, FichaConsulta) pueden omitirlos.
        nombreEvento:
          type: string
          description: >-
            Nombre del evento derivado del cliente asociado como
            `{cliente.nombre} {cliente.apellidos}`, con fallback al `codigo` de la reserva cuando no
            hay cliente resoluble. Campo de presentación, no persistido en RESERVA.
        progressLogistica:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            Progreso de logística/pre-evento (0-100) derivado de `preEventoStatus`:
            `pendiente=0`, `en_curso=50`, `cerrado=100`. En estados de consulta (`2a`, `2b`, `2c`,
            `2d`, `2v`) y en `pre_reserva` arranca en `0` (aún no hay sub-proceso de pre-evento).
        progressLiquidacion:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            Progreso de liquidación (0-100) derivado de `liquidacionStatus`:
            `pendiente=0`, `facturada=50`, `cobrada=100`. En estados de consulta (`2a`, `2b`, `2c`,
            `2d`, `2v`) y en `pre_reserva` arranca en `0` (aún no hay liquidación en curso).
      required: [idReserva, codigo, clienteId, estado, canalEntrada]
    ReservaDetalle:
      allOf:
        - $ref: '#/components/schemas/Reserva'
        - type: object
          properties:
            cliente: { $ref: '#/components/schemas/Cliente' }
            extras:
              type: array
              items: { $ref: '#/components/schemas/ReservaExtra' }
            presupuestos:
              type: array
              items: { $ref: '#/components/schemas/Presupuesto' }
            facturas:
              type: array
              items: { $ref: '#/components/schemas/Factura' }
    ReservaListResponse:
      type: object
      required: [data, metadata]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Reserva' }
        metadata: { $ref: '#/components/schemas/PaginationMetadata' }
    # [US-004] Respuesta del alta (POST /reservas). Extiende `Reserva` con campos transitorios,
    # NO persistidos en la RESERVA, derivados del sub-estado resultante del alta con fecha. Todos
    # son OPCIONALES (ausentes en el alta sin fecha US-003 → compat. hacia atrás garantizada).
    CreateReservaResponse:
      allOf:
        - $ref: '#/components/schemas/Reserva'
        - type: object
          properties:
            tipoBloqueo:
              allOf: [{ $ref: '#/components/schemas/TipoBloqueo' }]
              nullable: true
              description: >-
                Presente (= `blando`) cuando el alta nace en `2b` y crea la `FechaBloqueada` blanda.
                Espejo del `tipo_bloqueo` de la fila `FechaBloqueada` recién insertada; no es una
                columna de RESERVA. Ausente/null en `2a` y `2d`.
            fechaDisponible:
              type: boolean
              nullable: true
              description: >-
                Flag de disponibilidad de `fechaEvento`. `false` cuando el alta cae en `2a` por estar
                la fecha bloqueada por un estado no encolable (`2c`/`2v`/`pre_reserva`/
                `reserva_confirmada` o posteriores). Ausente/null en el alta sin fecha (US-003).
            avisoDisponibilidad:
              type: string
              nullable: true
              description: >-
                Mensaje informativo para la UI cuando la fecha no está disponible (alta degradada a
                `2a` exploratoria). Ausente/null cuando la fecha sí se pudo bloquear (`2b`) o encolar
                (`2d`), y en el alta sin fecha.
            tarifaEstimada:
              allOf: [{ $ref: '#/components/schemas/TarifaEstimada' }]
              nullable: true
              description: >-
                [D-4] Tarifa estimada que viaja en la comunicación E1, calculada por el motor UC-16
                SOLO si hay `fechaEvento` + nº de invitados + horas. Es DECORATIVA (no se persiste
                como importe congelado de la RESERVA, eso es UC-14) y TOLERANTE: si faltan datos o el
                cálculo no es posible (temporada/tarifa no configurada, >50 invitados), se OMITE y E1
                sale con el dossier general sin precio, sin bloquear el alta. Objeto camelCase propio
                del envelope del alta (NO el `CalculoTarifaResponse` snake_case del motor UC-16).
    TarifaEstimada:
      # Objeto DECORATIVO (camelCase) anidado en CreateReservaResponse.tarifaEstimada (US-004 §D-4).
      # Espejo del subconjunto que el alta emite en la comunicación E1; NO es la salida del motor de
      # tarifa US-016 (eso es CalculoTarifaResponse, snake_case, no se toca). Importes como number
      # (EUR ya redondeados a céntimos, IVA 21% incluido), igual que el motor. Es TOLERANTE: todos los
      # campos son opcionales y los importes/ids nullable, porque el cálculo puede no ser posible.
      type: object
      properties:
        temporada:
          type: string
          description: 'Temporada resuelta para el mes de fechaEvento. Puede omitirse si no se calculó.'
        tarifaAConsultar:
          type: boolean
          description: 'true cuando numAdultosNinosMayores4 > 50 (tramo +51 sin tarifa): precio manual.'
        precioTarifaEur:
          type: number
          nullable: true
          description: 'Precio de la TARIFA en EUR (IVA 21% incluido). null si tarifaAConsultar=true.'
        extrasTotalEur:
          type: number
          nullable: true
          description: 'Suma de subtotales de extras (precioEur x cantidad). null si tarifaAConsultar=true.'
        totalEur:
          type: number
          nullable: true
          description: 'precioTarifaEur + extrasTotalEur. null si tarifaAConsultar=true.'
        tarifaId:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA usada. null si tarifaAConsultar=true.'
    CreateReservaRequest:
      type: object
      required: [canalEntrada, cliente]
      properties:
        canalEntrada: { $ref: '#/components/schemas/CanalEntrada' }
        fechaEvento:
          type: string
          format: date
          nullable: true
          description: >-
            [US-004] OPCIONAL. Fecha del evento (YYYY-MM-DD). Si se OMITE → alta exploratoria
            US-003: la reserva nace en `2a`, `ttlExpiracion = null`, SIN `FechaBloqueada`.
            Si se ENVÍA debe ser ESTRICTAMENTE FUTURA (> hoy, día natural): el servidor rechaza
            con 400 la fecha de HOY o anterior, sin crear RESERVA ni `FechaBloqueada` (regla
            unificada `validarFechaFutura`, US-040; divergencia aprobada en Gate 1 frente a la
            ficha que admitía ≥ hoy). Con fecha válida el sub-estado resultante (`2b` / `2d` /
            `2a`) lo determina el estado de la fecha (ver la descripción del endpoint).
        tipoEvento: { $ref: '#/components/schemas/TipoEvento' }
        duracionHoras: { $ref: '#/components/schemas/DuracionHoras' }
        numAdultosNinosMayores4: { type: integer }
        numNinosMenores4: { type: integer }
        notas: { type: string }
        comentarios:
          type: string
          maxLength: 2000
          description: >-
            [US-003] Comentarios libres del gestor sobre el lead en el momento del alta. Su
            PRESENCIA/AUSENCIA decide el flujo del email E1 (respuesta inicial automática):
            SIN `comentarios` (omitido o vacío) → la COMUNICACION E1 se persiste con
            `estado='enviado'` y se dispara el auto-envío de la respuesta inicial;
            CON `comentarios` → la COMUNICACION E1 se persiste con `estado='borrador'`, NO se
            envía, y la UI alerta al gestor de un borrador pendiente de revisión. Es distinto de
            `notas` (anotaciones internas que NO afectan al envío de E1).
        cliente: { $ref: '#/components/schemas/CreateClienteRequest' }
    UpdateReservaRequest:
      type: object
      properties:
        tipoEvento: { $ref: '#/components/schemas/TipoEvento' }
        duracionHoras: { $ref: '#/components/schemas/DuracionHoras' }
        numAdultosNinosMayores4: { type: integer }
        numNinosMenores4: { type: integer }
        numInvitadosFinal: { type: integer }
        notas: { type: string }
    TransicionRequest:
      type: object
      required: [estadoDestino]
      properties:
        estadoDestino: { $ref: '#/components/schemas/EstadoReserva' }
        subEstadoDestino: { $ref: '#/components/schemas/SubEstadoConsulta' }
        # [F1-01 RESUELTO por US-005] La asignación de fecha 2.a→2.b/2.d se trasladó a su endpoint
        # dedicado `POST /reservas/{id}/fecha` (design.md §D-2). Este campo queda DEPRECADO aquí y se
        # conserva solo por compatibilidad; no debe usarse para asignar fecha.
        fechaEvento:
          type: string
          format: date
          nullable: true
          deprecated: true
          description: >-
            DEPRECADO (US-005): usa `POST /reservas/{id}/fecha` para asignar la fecha y disparar el
            bloqueo atómico. Se mantiene por compatibilidad; no realiza la asignación de fecha.
        motivo: { type: string, description: 'Obligatorio en cancelaciones/descartes' }
    # [US-008] Cuerpo de POST /reservas/{id}/visita: transición 2.a/2.b/2.c→2.v sobre una RESERVA
    # existente. `fecha`/`hora` de la visita presencial. El servidor valida (defensivo) que `fecha`
    # esté en la ventana [hoy+1, hoy+max_dias_programar_visita]; fuera de rango → 422.
    ProgramarVisitaRequest:
      type: object
      required: [fecha, hora]
      additionalProperties: false
      properties:
        fecha:
          type: string
          format: date
          description: >-
            OBLIGATORIO. Fecha de la visita (YYYY-MM-DD). Debe ser FUTURA (≥ hoy + 1 día) y estar
            dentro de la ventana [hoy + 1, hoy + TENANT_SETTINGS.max_dias_programar_visita]. Fuera de
            rango → 422 (la RESERVA no se muta). El TTL del bloqueo se deriva de esta fecha + 1 día.
        hora:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: '17:30'
          description: 'OBLIGATORIO. Hora de la visita en formato 24h `HH:mm`.'
    # [US-009/US-010] Cuerpo de PATCH /reservas/{id}/visita: registra el resultado de la visita sobre
    # una RESERVA existente en 2.v. El resultado se modela como un enum (`ResultadoVisita`) polimórfico
    # con los tres desenlaces del UC-08. Implementados: `interesado` (US-009, 2.v→2.b + TTL fresco +
    # E7) y `reserva_inmediata` (US-010, 2.v→pre_reserva + TTL 7d + vaciado de cola A16, sin email).
    # `descarta` (US-011) sigue RESERVADO en el enum como valor futuro y el servidor lo rechaza con 422
    # hasta que se implemente. La forma polimórfica evita romper el contrato al añadir US-011 (solo se
    # levanta la guarda).
    ResultadoVisitaRequest:
      type: object
      required: [resultado]
      additionalProperties: false
      properties:
        resultado:
          allOf:
            - $ref: '#/components/schemas/ResultadoVisita'
          description: >-
            OBLIGATORIO. Resultado de la visita. Soportados: `interesado` (US-009, transición 2.v→2.b
            con TTL fresco y E7) y `reserva_inmediata` (US-010, transición 2.v→pre_reserva con TTL de 7
            días, vaciado de cola y validación de datos UC-14, sin email). `descarta` (US-011) aún no
            implementado → 422.
    # [US-009/US-010] Enum polimórfico de resultados de visita (UC-08). Los strings EXACTOS del enum
    # (contrato = FRONTERA HTTP, alineados con el DTO `@nestjs/swagger`/class-validator del backend):
    #   - `interesado`        → implementado en US-009 (2.v→2.b).
    #   - `reserva_inmediata` → implementado en US-010 (2.v→pre_reserva). String literal exacto que
    #                           viaja en el body: `"reserva_inmediata"` (snake_case, sin acentos).
    #   - `descarta`          → RESERVADO para US-011 (rechazado con 422 hasta entonces).
    ResultadoVisita:
      type: string
      enum: [interesado, reserva_inmediata, descarta]
    # [US-006] Cuerpo de POST /reservas/{id}/extender-bloqueo: prórroga pura del TTL del bloqueo
    # blando vigente. Único parámetro `dias` (entero ≥ 1) indicado por el gestor; la base de la
    # extensión es el ttlExpiracion ACTUAL (no now()) y NO se deriva de ttl_consulta_dias. Solo se
    # contempla EXTENDER (no acortar ni fijar fecha absoluta). La validación de tipo/rango la hace el
    # DTO y, de forma defensiva, el dominio (422 si dias es 0/negativo/no entero).
    ExtenderBloqueoRequest:
      type: object
      required: [dias]
      additionalProperties: false
      properties:
        dias:
          type: integer
          minimum: 1
          example: 7
          description: >-
            OBLIGATORIO. Número ENTERO de días a añadir al `ttlExpiracion` ACTUAL del bloqueo blando
            (≥ 1). `0`, negativo o no entero → 422 sin mutar nada ("El número de días de extensión
            debe ser un entero positivo (≥ 1)").
    AsignarFechaRequest:
      # [US-005] Cuerpo de POST /reservas/{id}/fecha: transición 2a→2b/2d sobre una RESERVA existente.
      type: object
      required: [fechaEvento]
      properties:
        fechaEvento:
          type: string
          format: date
          description: >-
            OBLIGATORIO. Fecha del evento (YYYY-MM-DD). Debe ser ESTRICTAMENTE FUTURA (> hoy, día
            natural): el servidor rechaza con 400 la fecha de HOY o anterior, sin mutar la RESERVA
            (regla unificada `validarFechaFutura`, US-040; coherente con US-004; divergencia
            aprobada en Gate frente a la ficha US-005 que admitía ≥ hoy).
        aceptarCola:
          type: boolean
          description: >-
            OPCIONAL. Resuelve el flujo interactivo de cola (FA-01) sin estado servidor intermedio.
            Si la fecha está bloqueada por una consulta en `2b` (o en carrera D4): con `false`/ausente
            el servidor responde `409 colaDisponible=true` (informa y ofrece cola) y la RESERVA sigue
            en `2a`; con `true` el reintento confirma la entrada en cola (`2d`). No tiene efecto si la
            fecha está libre (→ `2b`) ni si está bloqueada por un estado no encolable (→ `409
            colaDisponible=false`).

    # -------- Cola --------
    # [US-017] Read model de la vista de cola de espera (UC-11). Superset del ColaItem original
    # (idReserva/codigo/posicionCola/clienteNombre ya existían) + sección `bloqueante`. Lectura
    # pura: no muta estado. Derivados temporales (ttlRestante/tiempoEnCola) se calculan en backend
    # sobre instantes timestamptz; la respuesta expone también los instantes crudos
    # (ttlExpiracion/fechaCreacion) para que el frontend pueda reformatear.
    ColaEsperaResponse:
      type: object
      description: |
        Proyección de solo lectura de la cola de espera de una fecha (US-017 / UC-11), agregada por
        la RESERVA bloqueante. En FA-04 (la reserva no bloquea ninguna fecha activa):
        `estaBloqueada=false`, `bloqueante=null`, `cola=[]`.
      required: [estaBloqueada, bloqueante, cola]
      properties:
        estaBloqueada:
          type: boolean
          description: |
            `true` cuando la reserva `{id}` posee una `FECHA_BLOQUEADA` activa (sección
            `bloqueante` presente). `false` en FA-04 (fecha disponible): `bloqueante=null`,
            `cola=[]`.
        bloqueante:
          nullable: true
          description: |
            Sección de la consulta bloqueante de la fecha. `null` en FA-04. La cola FIFO se proyecta
            con el mismo formato en cualquier `subEstado` de la bloqueante.
          allOf:
            - $ref: '#/components/schemas/ColaBloqueante'
        cola:
          type: array
          description: Cola de espera ordenada ASC por `posicionCola` (FIFO). `[]` si no hay cola o en FA-04.
          items: { $ref: '#/components/schemas/ColaItem' }
    PromoverManualRequest:
      # [US-019 / UC-12 FA manual] Body de la promoción MANUAL por el Gestor sobre POST
      # /reservas/{id}/promover. El `{id}` de la ruta es la RESERVA en `2d` (cualquier
      # `posicionCola`, no solo la primera) que el Gestor promueve a bloqueante. El body
      # distingue la promoción manual (actor Gestor) de la automática de US-018 (actor Sistema,
      # sin body). `confirmado: true` es la defensa en servidor de la acción DESTRUCTIVA
      # (expira irreversiblemente la bloqueante actual a `2x`); el diálogo de confirmación de la
      # UI (US-017) es la salvaguarda de UX. El `tenantId`/`usuarioId` del Gestor NUNCA viajan
      # aquí: se derivan del JWT firmado.
      type: object
      required: [confirmado]
      properties:
        confirmado:
          type: boolean
          description: |
            DEBE ser `true` para ejecutar la promoción manual. Confirma explícitamente la acción
            destructiva (la bloqueante activa se expira forzosamente a `2x`, terminal e
            irreversible). Si es `false` o falta, el servidor rechaza con 422 sin efectos.
          example: true
    ColaBloqueante:
      type: object
      description: Sección de la consulta bloqueante dentro de `ColaEsperaResponse` (US-017).
      required: [idReserva, codigo, clienteNombre, subEstado]
      properties:
        idReserva:
          type: string
          format: uuid
          description: ID de la RESERVA bloqueante; enlace a su ficha (`GET /reservas/{id}`, US-005).
        codigo: { type: string, description: 'Código legible de la reserva (p. ej. `SLO-2026-0007`).' }
        clienteNombre: { type: string, description: Nombre del cliente de la bloqueante. }
        subEstado:
          description: 'Sub-estado de la bloqueante: uno de `2b`, `2c`, `2v`.'
          allOf:
            - $ref: '#/components/schemas/SubEstadoConsulta'
        ttlExpiracion:
          type: string
          format: date-time
          nullable: true
          description: |
            Instante crudo de expiración del bloqueo blando (mismo modelo que
            `Reserva.ttlExpiracion`). `null` cuando la bloqueante no tiene TTL.
        ttlRestante:
          type: string
          nullable: true
          description: |
            TTL restante legible derivado en backend (`ttlExpiracion − now()`, p. ej. "22 h",
            "2 días"). `null` cuando `ttlExpiracion` es `null`.
        visitaProgramadaFecha:
          type: string
          format: date
          nullable: true
          description: Fecha de la visita programada. Solo presente (no `null`) cuando `subEstado` es `2v`.
    # [US-017] Elemento de la cola FIFO. Superset del ColaItem original: añade fechaCreacion
    # (instante crudo) y tiempoEnCola (legible derivado en backend) para el "tiempo en cola".
    ColaItem:
      type: object
      required: [idReserva, codigo, clienteNombre, posicionCola, fechaCreacion]
      properties:
        idReserva:
          type: string
          format: uuid
          description: ID de la RESERVA en cola; enlace a su ficha (`GET /reservas/{id}`, US-005).
        codigo: { type: string }
        clienteNombre: { type: string }
        posicionCola:
          type: integer
          minimum: 1
          description: Posición FIFO en la cola (1 = primera en promocionarse).
        fechaCreacion:
          type: string
          format: date-time
          description: Instante crudo de creación de la RESERVA en cola (`timestamptz`).
        tiempoEnCola:
          type: string
          nullable: true
          description: |
            Tiempo en cola legible derivado en backend (`now() − fechaCreacion`, p. ej. "2 h",
            "30 min").
    # [US-005] Error 409 de POST /reservas/{id}/fecha. Sigue el patrón de errores de dominio de
    # US-016 (allOf ErrorResponse + campos específicos): conserva el envelope NestJS
    # (`statusCode`/`message`) y añade los campos de dominio `colaDisponible`/`motivo` que dirigen el
    # flujo interactivo de cola. US-004 (alta con fecha) NO tiene un 409 equivalente porque
    # auto-resuelve a `2d`/`2a` sin interacción; por eso se reutiliza el patrón de US-016 (justifica
    # la divergencia respecto a US-004, que no aplica aquí).
    AsignarFechaConflictoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [colaDisponible, motivo]
          properties:
            colaDisponible:
              type: boolean
              description: >-
                `true` cuando la fecha está bloqueada por una consulta en `2b` (o carrera D4): se
                ofrece cola, reintentar con `aceptarCola=true` para entrar en `2d`. `false` cuando
                está bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+: no disponible.
            motivo:
              type: string
              description: 'Mensaje informativo para la UI sobre por qué la fecha no se pudo asignar.'

    # -------- Transición 2.b→2.c (US-007) --------
    # [US-007] Body de POST /reservas/{id}/pendiente-invitados. La acción no toma parámetros (el TTL
    # se deriva de TENANT_SETTINGS.ttl_consulta_dias); se modela como objeto vacío para mantener un
    # requestBody JSON explícito coherente con las demás transiciones de la RESERVA.
    PendienteInvitadosRequest:
      type: object
      additionalProperties: false
      description: 'Cuerpo vacío. La transición 2.b→2.c no requiere parámetros (TTL derivado del setting del tenant).'
    # [US-007] Respuesta 200 de la transición 2.b→2.c. Reutiliza el schema Reserva (que ya expone
    # subEstado y ttlExpiracion) y le añade consultasDescartadas: recuento de RESERVA de cola
    # (2.d) pasadas a 2.y por el vaciado A16, para el feedback de la UI. Es un wrapper de respuesta
    # (no un campo del agregado RESERVA), por eso se modela como objeto con `reserva` +
    # `consultasDescartadas` en vez de inflar el schema Reserva con un dato transitorio.
    PendienteInvitadosResponse:
      type: object
      required: [reserva, consultasDescartadas]
      properties:
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: 'RESERVA actualizada: subEstado=`2c`, ttlExpiracion extendido.'
        consultasDescartadas:
          type: integer
          minimum: 0
          example: 3
          description: >-
            Recuento de RESERVA de cola (`subEstado='2d'`) que el vaciado A16 pasó a `2y` (terminal).
            `0` cuando la consulta no bloqueaba ninguna cola.
    # [US-007] Error 409 de POST /reservas/{id}/pendiente-invitados (bloqueo no vigente). Sigue el
    # mismo patrón que AsignarFechaConflictoError de US-005 (allOf ErrorResponse + campo de dominio):
    # conserva el envelope NestJS (statusCode/message) y añade `motivo`. No reutiliza
    # AsignarFechaConflictoError porque aquí NO se ofrece cola (no aplica `colaDisponible`).
    BloqueoNoVigenteError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [motivo]
          properties:
            motivo:
              type: string
              description: >-
                Motivo por el que la transición a `2c` no es posible: la RESERVA no tiene fecha
                bloqueada activa, o el bloqueo ya expiró (`ttl_expiracion < ahora`).

    # [US-006] Error 409 de POST /reservas/{id}/extender-bloqueo (conflicto con el estado del bloqueo
    # en BD). Mismo patrón que BloqueoNoVigenteError de US-007 (allOf ErrorResponse + campo de dominio
    # `motivo`): conserva el envelope NestJS (statusCode/message) y añade `motivo`. No reutiliza
    # BloqueoNoVigenteError por claridad semántica: aquí el 409 agrupa tres conflictos del bloqueo
    # (TTL expirado, bloqueo firme sin TTL, o sin fila bloqueante blanda vigente). D-3: 409 =
    # conflicto/precondición del bloqueo en BD; 422 = precondición de estado no extensible o `dias`
    # inválido.
    ExtenderBloqueoConflictoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [motivo]
          properties:
            motivo:
              type: string
              description: >-
                Motivo por el que el bloqueo no se puede extender: el TTL ya expiró
                (`ttl_expiracion < ahora`), el bloqueo es firme (`reserva_confirmada`, sin TTL), o la
                RESERVA no tiene una fila bloqueante blanda vigente en `FechaBloqueada`.

    # -------- Transición 2.a/2.b/2.c→2.v (US-008) --------
    # [US-008] Error 409 de POST /reservas/{id}/visita: consulta en cola (2.d). Mismo patrón que
    # BloqueoNoVigenteError de US-007 (allOf ErrorResponse + campo de dominio `motivo`): conserva el
    # envelope NestJS (statusCode/message) y añade `motivo` con el mensaje UC-12. No reutiliza
    # BloqueoNoVigenteError por claridad semántica (aquí el conflicto es el estado de cola, no un
    # bloqueo expirado). 409 = precondición de estado (cola); las guardas de origen / ventana → 422.
    ProgramarVisitaConflictoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [motivo]
          properties:
            motivo:
              type: string
              example: >-
                No es posible programar una visita para una consulta en cola. La consulta debe ser
                promovida primero (UC-12).
              description: >-
                Motivo por el que la visita no se puede programar: la RESERVA está en cola
                (`subEstado='2d'`) y debe promoverse primero (UC-12).

    # -------- Errores de dominio de US-014 (generar presupuesto / activar pre_reserva) --------
    # Reutilizan el envelope NestJS (ErrorResponse: statusCode/message) + `codigo` de dominio, mismo
    # patrón que los errores del motor de tarifa (US-016) y AsignarFechaConflictoError (US-005). No se
    # inventan formatos nuevos.
    PresupuestoDatosFiscalesError:
      # 422 FA-01: datos fiscales/de la reserva incompletos. Enumera los campos faltantes para que la UI
      # los resalte. Ningún efecto: sin PRESUPUESTO, RESERVA y FechaBloqueada intactas.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, camposFaltantes]
          properties:
            codigo: { type: string, enum: [DATOS_FISCALES_INCOMPLETOS] }
            camposFaltantes:
              type: array
              minItems: 1
              description: >-
                Campos no nulos requeridos que faltan. Del CLIENTE: `dniNif`, `direccion`, `codigoPostal`,
                `poblacion`, `provincia`. De la RESERVA: `fechaEvento`, `duracionHoras`,
                `numAdultosNinosMayores4`, `tipoEvento`.
              items:
                type: string
                enum: [dniNif, direccion, codigoPostal, poblacion, provincia, fechaEvento, duracionHoras, numAdultosNinosMayores4, tipoEvento]
    PresupuestoPrecioManualRequeridoError:
      # 422 FA-02: el motor devolvió tarifa_a_consultar (>50 invitados) y el body de confirmación no trae
      # precioManualEur. Sin efectos.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo: { type: string, enum: [PRECIO_MANUAL_REQUERIDO] }
    PresupuestoGuardaOrigenError:
      # 409: la RESERVA no es origen válido para generar/confirmar presupuesto (2d/terminal/pre_reserva+),
      # o ya existe un PRESUPUESTO enviado/aceptado, o carrera "Fecha no disponible" (UNIQUE tenant+fecha).
      # Sin efectos (rollback total en la confirmación). Mismo patrón allOf ErrorResponse + campo de dominio.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, motivo]
          properties:
            codigo:
              type: string
              enum: [ORIGEN_INVALIDO, PRESUPUESTO_YA_EXISTE, FECHA_NO_DISPONIBLE]
              description: >-
                `ORIGEN_INVALIDO` (2d/terminal/pre_reserva+); `PRESUPUESTO_YA_EXISTE` (hay uno
                enviado/aceptado — usar UC-15); `FECHA_NO_DISPONIBLE` (carrera D4 sobre UNIQUE(tenant,fecha)).
            motivo:
              type: string
              description: 'Mensaje legible para la UI (p. ej. "Fecha no disponible" o "Usa la edición del presupuesto").'

    # -------- US-021: Confirmar pago de señal / activar reserva_confirmada (UC-17) --------
    ConfirmarSenalResponse:
      # Respuesta 200: la RESERVA elevada a reserva_confirmada + el DOCUMENTO justificante creado +
      # (opcional) la factura de señal en borrador disparada post-commit (US-022). Reutiliza los
      # schemas existentes Reserva / Documento / Factura; no se inventa contrato de US-022.
      type: object
      required: [reserva, justificante]
      properties:
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: >-
            RESERVA resultante: `estado='reserva_confirmada'`, `ttlExpiracion=null`, `importeSenal` e
            `importeLiquidacion` congelados (`senal + liquidacion = importeTotal`), y los tres
            sub-procesos `preEventoStatus`/`liquidacionStatus`/`fianzaStatus = 'pendiente'`.
        justificante:
          allOf: [{ $ref: '#/components/schemas/Documento' }]
          description: "DOCUMENTO creado con `tipo='justificante_pago'`, `url` y `mimeType` del fichero subido."
        facturaSenalBorrador:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          nullable: true
          description: >-
            OPCIONAL — indicador de la factura de señal en borrador presentada al Gestor tras el commit
            (disparo de US-022/UC-18, `tipo='senal'`, `estado='borrador'`). Su generación/aprobación NO
            es de este change (US-021): si el disparo de US-022 aún no ha materializado el borrador en el
            momento de responder, se OMITE (`null`). El contrato definitivo de la factura lo fija US-022;
            aquí solo se reutiliza el schema `Factura` existente como referencia mínima.
    ConfirmarSenalValidacionError:
      # 422 (F5-02: guarda/validación de negocio sin efectos). Un `codigo` de dominio discrimina el caso.
      # Sin DOCUMENTO, sin mutación de RESERVA/FechaBloqueada, sin transición. Mismo patrón allOf
      # ErrorResponse + campo de dominio que US-014 (PresupuestoGuardaOrigenError).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum: [ORIGEN_INVALIDO, JUSTIFICANTE_REQUERIDO, FORMATO_NO_PERMITIDO, TAMANO_EXCEDIDO, IMPORTE_TOTAL_INVALIDO]
              description: >-
                `ORIGEN_INVALIDO` → "La reserva no está en estado pre_reserva";
                `JUSTIFICANTE_REQUERIDO` → "Es obligatorio adjuntar el justificante de pago";
                `FORMATO_NO_PERMITIDO` → formato de fichero no permitido (no jpeg/png/pdf);
                `TAMANO_EXCEDIDO` → fichero > 10 MB;
                `IMPORTE_TOTAL_INVALIDO` → `importeTotal` 0/null (sin presupuesto aceptado previo).
    ConfirmarSenalConflictoError:
      # 409 (F5-02: conflicto de estado / carrera determinista). Rollback total, sin estado intermedio
      # observable. Mismo patrón allOf ErrorResponse + `codigo` + `motivo` que US-014.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, motivo]
          properties:
            codigo:
              type: string
              enum: [RESERVA_YA_CONFIRMADA, FECHA_NO_DISPONIBLE]
              description: >-
                `RESERVA_YA_CONFIRMADA` (doble clic / dos sesiones sobre la MISMA reserva: la segunda
                observa la RESERVA ya en `reserva_confirmada`) → "La reserva ya ha sido confirmada";
                `FECHA_NO_DISPONIBLE` (la `(tenant_id, fecha)` ya está en bloqueo firme de OTRA reserva,
                `UNIQUE`/`P2002`) → "Fecha no disponible".
            motivo:
              type: string
              description: 'Mensaje legible para la UI ("La reserva ya ha sido confirmada" o "Fecha no disponible").'

    # -------- US-022: Factura de señal (facturacion) --------
    # [US-022 / UC-18] La FACTURA es el agregado raíz de la capability `facturacion`. FacturaSenalDto
    # es la vista de lectura de la factura de señal (tipo='senal'): mapea los campos de la tabla
    # FACTURA (er-diagram §3.12) + los flags DERIVADOS (esBorradorInvalido, pdfPendiente) que la UI
    # usa para habilitar/bloquear la aprobación. Reutiliza los wrappers monetarios (Importe/Porcentaje
    # como string, F2-01) y el enum EstadoFactura existente. Los request/error schemas siguen el mismo
    # patrón allOf(ErrorResponse) + `codigo`/`motivo`/`camposFaltantes` de US-014/US-021: no se inventan
    # formatos nuevos ni wrappers/paginación no respaldados.
    # [US-027 / D-5] Vista de lectura CANÓNICA y GENERALIZADA de una FACTURA (cualquier tipo:
    # senal, liquidacion, fianza). Generaliza el DTO de señal de US-022 para que la colección
    # `GET /reservas/{id}/facturas` exponga también los borradores de liquidación y fianza SIN
    # duplicar ni redefinir el agregado. `FacturaSenalDto` (US-022) queda como un alias que
    # referencia este schema (allOf) para no romper el contrato ya congelado de la factura de señal.
    # Espejo de la tabla FACTURA (er-diagram §3.12): importes Decimal(10,2) como string (`Importe`),
    # IVA Decimal(4,2) como string (`Porcentaje`).
    FacturaDto:
      type: object
      description: |
        FACTURA de una reserva (`tipo` ∈ {`senal`, `liquidacion`, `fianza`, `complementaria`}), con
        desglose fiscal, estado del ciclo de vida y flags derivados para la UI. Es el item de la
        colección `GET /reservas/{id}/facturas`. En `borrador`, `numeroFactura` y `fechaEmision` son
        `null`; la numeración `F-YYYY-NNNN` y la emisión se asignan al enviar (US-028).
      required:
        - idFactura
        - reservaId
        - tipo
        - baseImponible
        - ivaPorcentaje
        - ivaImporte
        - total
        - estado
        - esBorradorInvalido
        - pdfPendiente
      properties:
        idFactura:
          type: string
          format: uuid
          description: 'Identificador de la FACTURA (er-diagram §3.12 id_factura).'
        reservaId:
          type: string
          format: uuid
          description: 'RESERVA a la que pertenece la factura (única por `(reservaId, tipo)`).'
        numeroFactura:
          type: string
          nullable: true
          example: 'F-2026-0001'
          description: >-
            Número fiscal `F-YYYY-NNNN` secuencial y único por `(tenant_id, año)`. `null` mientras
            la factura está en `borrador`; se asigna al enviar (`estado='enviada'`, US-028).
        tipo:
          allOf: [{ $ref: '#/components/schemas/TipoFactura' }]
          description: >-
            Tipo de la factura: `senal` (40 %, US-022), `liquidacion` (60 % + extras pendientes,
            US-027), `fianza` (fianza_default_eur, US-027) o `complementaria`.
        baseImponible:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Base imponible = round(total / 1.21, 2). Decimal(10,2) como string.'
        ivaPorcentaje:
          allOf: [{ $ref: '#/components/schemas/Porcentaje' }]
          description: "IVA general fijo del MVP: `21.00`. Decimal(4,2) como string."
        ivaImporte:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Importe de IVA = total − baseImponible (por resta, no por doble redondeo), de modo que
            `baseImponible + ivaImporte = total` exactamente (design.md §D-2).
        total:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Total con IVA. Para `senal` = `RESERVA.importeSenal` (40 % MVP, US-021); para
            `liquidacion` = `importeLiquidacion + Σ(RESERVA_EXTRA.subtotal WHERE factura_id IS NULL)`
            (US-027); para `fianza` = `TENANT_SETTINGS.fianza_default_eur` (US-027). Todos congelados;
            no se recalcula tarifa ni porcentaje.
        concepto:
          type: string
          nullable: true
          description: 'Concepto de la factura (p. ej. "Señal 40 % reserva SLO-2026-0001").'
        pdfUrl:
          type: string
          nullable: true
          description: >-
            URL del PDF generado (mecanismo de PDF de US-014/US-021, design.md §D-5). `null` si el
            PDF aún no se ha generado (borrador inválido por datos fiscales o fallo transitorio).
        estado:
          allOf: [{ $ref: '#/components/schemas/EstadoFactura' }]
          description: "Ciclo de vida: `borrador` → `enviada` (al enviar) → `cobrada`."
        fechaEmision:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp de emisión, fijado al enviar (estado='enviada'). null en borrador."
        fechaCreacion:
          type: string
          format: date-time
          description: 'Instante de creación de la factura (post-commit de la confirmación de US-021/US-027).'
        esBorradorInvalido:
          type: boolean
          description: >-
            Flag DERIVADO (design.md §D-9), no columna de FACTURA. `true` cuando faltan datos
            fiscales del CLIENTE (dniNif o dirección fiscal): el borrador NO puede aprobarse y el
            sistema NO reintenta solo (requiere que el Gestor complete los datos del cliente).
        pdfPendiente:
          type: boolean
          description: >-
            Flag DERIVADO (design.md §D-9), no columna de FACTURA. `true` cuando `pdfUrl=null` por un
            fallo transitorio del servicio de PDF: la aprobación queda bloqueada y el sistema
            reintenta la generación automáticamente.
    FacturaSenalDto:
      # [US-022] Alias de lectura de la factura de señal (tipo='senal'). Referencia FacturaDto para
      # NO duplicar campos ni redefinir el agregado (US-027 §Consistencia); el `tipo` es siempre
      # `senal` para las respuestas de los endpoints de la factura de señal (US-022).
      allOf:
        - $ref: '#/components/schemas/FacturaDto'
      description: |
        Factura de señal (`tipo='senal'`) de una reserva. Misma forma que `FacturaDto`; se conserva
        como nombre estable de los endpoints de US-022 (obtener/aprobar/rechazar/regenerar-pdf).
    AprobarFacturaRequest:
      # [US-022 §Aprobación] Cuerpo vacío: el Gestor NO puede modificar importes ni datos fiscales
      # del borrador (provienen de RESERVA y CLIENTE). Se modela como objeto vacío para mantener un
      # requestBody JSON explícito coherente con las transiciones de la RESERVA (p. ej.
      # PendienteInvitadosRequest de US-007).
      type: object
      additionalProperties: false
      description: 'Cuerpo vacío. La aprobación no toma parámetros (importes/datos fiscales inmutables).'
    RechazarFacturaRequest:
      # [US-022 §Rechazo] Motivo obligatorio; se registra en AUDIT_LOG (no en columna de FACTURA).
      type: object
      required: [motivo]
      additionalProperties: false
      properties:
        motivo:
          type: string
          minLength: 1
          maxLength: 2000
          description: >-
            OBLIGATORIO, no vacío. Motivo del rechazo del borrador (p. ej. "Datos fiscales del tenant
            erróneos"). Se registra en `AUDIT_LOG`; la FACTURA permanece en `borrador`.
    RegenerarPdfFacturaRequest:
      # [US-022 §Error de generación del PDF] Reintento manual del PDF. Sin parámetros; se modela como
      # objeto vacío para un requestBody JSON explícito coherente con el resto del contrato.
      type: object
      additionalProperties: false
      description: 'Cuerpo vacío. El reintento de PDF no toma parámetros (idempotente sobre pdfUrl).'
    # [US-022] Errores de dominio de facturacion. Reutilizan el envelope NestJS (ErrorResponse:
    # statusCode/message) + `codigo` de dominio, mismo patrón que US-014/US-021. No se inventan
    # formatos nuevos.
    FacturaEstadoInvalidoError:
      # 409: la FACTURA no está en `borrador` (ya `enviada`/`cobrada`); aprobar/rechazar/regenerar-pdf
      # no son aplicables. Sin efectos.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, motivo]
          properties:
            codigo:
              type: string
              enum: [FACTURA_NO_BORRADOR]
              description: "`FACTURA_NO_BORRADOR` → la factura ya no está en `borrador` (`enviada`/`cobrada`)."
            motivo:
              type: string
              example: 'La factura no está en borrador'
              description: 'Mensaje legible para la UI ("La factura no está en borrador").'
    FacturaDatosFiscalesIncompletosError:
      # 422: borrador inválido por datos fiscales del CLIENTE incompletos (design.md §D-9). Bloquea la
      # aprobación y la generación del PDF hasta que el Gestor complete los datos del cliente. Enumera
      # los campos faltantes para que la UI los resalte. Sin efectos.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, camposFaltantes]
          properties:
            codigo:
              type: string
              enum: [DATOS_FISCALES_INCOMPLETOS]
            camposFaltantes:
              type: array
              minItems: 1
              description: >-
                Campos fiscales no nulos del CLIENTE que faltan para emitir la factura: `dniNif`,
                `direccion`, `codigoPostal`, `poblacion`, `provincia`.
              items:
                type: string
                enum: [dniNif, direccion, codigoPostal, poblacion, provincia]
    FacturaPdfPendienteError:
      # 422: el PDF no está disponible por un fallo TRANSITORIO del servicio de PDF (design.md §D-9).
      # El sistema reintenta automáticamente; la aprobación queda bloqueada hasta que pdfUrl exista.
      # Distinto de DATOS_FISCALES_INCOMPLETOS (fallo de datos que NO se reintenta solo). Sin efectos.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, motivo]
          properties:
            codigo:
              type: string
              enum: [PDF_PENDIENTE]
            motivo:
              type: string
              example: 'PDF pendiente de regenerar'
              description: 'Mensaje legible para la UI ("PDF pendiente de regenerar").'

    # -------- US-028: Liquidación + fianza (facturacion) --------
    # [US-028 / UC-21 / UC-22] Request/response de las acciones dedicadas de aprobar/enviar la
    # liquidación, enviar el recibo de fianza por separado y reenviar la liquidación. Los objetos
    # de factura reutilizan el schema `Factura`; los status, los enums `LiquidacionStatus`/`FianzaStatus`.
    AprobarEnviarLiquidacionRequest:
      # Cuerpo OPCIONAL de la acción. Sin body: emite la liquidación tal cual (sin descuento). Con body:
      # aplica el descuento negociado (D-2) y registra el motivo en AUDIT_LOG.
      type: object
      properties:
        descuento:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Descuento negociado OPCIONAL sobre el total de la liquidación (Importe string Decimal(10,2),
            p. ej. `"200.00"`). Debe ser > 0 y < total; recalcula el desglose fiscal (base = total / 1.21,
            IVA 21 %). Un valor inválido → 422 `DESCUENTO_INVALIDO`.
        motivo:
          type: string
          description: 'Motivo OPCIONAL del descuento, registrado en AUDIT_LOG.'
    AprobarEnviarLiquidacionResponse:
      type: object
      required: [liquidacion, fianza, liquidacionStatus, fianzaStatus]
      properties:
        liquidacion:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          description: 'Factura de liquidación emitida (`estado=enviada`, `numeroFactura`, `fechaEmision`).'
        fianza:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          nullable: true
          description: >-
            Factura de fianza emitida en la misma operación (`estado=enviada`), o `null` si la fianza no
            se emitió aquí (fianza_default_eur=0 o ya enviada por separado, D-3).
        liquidacionStatus:
          allOf: [{ $ref: '#/components/schemas/LiquidacionStatus' }]
          description: 'Sub-proceso de liquidación de la RESERVA tras la emisión (`facturada`).'
        fianzaStatus:
          allOf: [{ $ref: '#/components/schemas/FianzaStatus' }]
          description: 'Sub-proceso de fianza de la RESERVA tras la emisión (`recibo_enviado` si se emitió aquí).'
    EnviarReciboFianzaResponse:
      type: object
      required: [fianza, fianzaStatus]
      properties:
        fianza:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          description: 'Recibo de fianza emitido (`estado=enviada`, `numeroFactura` propio, `fechaEmision`).'
        fianzaStatus:
          allOf: [{ $ref: '#/components/schemas/FianzaStatus' }]
          description: 'Sub-proceso de fianza de la RESERVA tras el envío separado (`recibo_enviado`).'
    ReenviarLiquidacionResponse:
      type: object
      required: [liquidacion, comunicacion]
      properties:
        liquidacion:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          description: 'Factura de liquidación YA emitida (sin cambios de estado, número ni desglose).'
        comunicacion:
          type: object
          description: 'NUEVA COMUNICACION creada por el reenvío (excepción auditada a la idempotencia US-045).'
          required: [idComunicacion]
          properties:
            idComunicacion: { type: string, format: uuid }
            estado: { type: string, example: 'enviado' }
            fechaEnvio: { type: string, format: date-time, nullable: true }
    LiquidacionError:
      # Envelope estándar NestJS (ErrorResponse: statusCode/message/error) + `codigo` de dominio y
      # `motivo` legible. Cubre 404/409/422/502/503 de las acciones de liquidación/fianza de US-028.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - FACTURA_LIQUIDACION_NO_ENCONTRADA
                - FACTURA_FIANZA_NO_ENCONTRADA
                - FACTURA_NO_BORRADOR
                - FACTURA_NO_ENVIADA
                - DESCUENTO_INVALIDO
                - EMISION_ENVIO_FALLIDO
              description: >-
                Código de error de dominio: `FACTURA_LIQUIDACION_NO_ENCONTRADA`/
                `FACTURA_FIANZA_NO_ENCONTRADA` (404), `FACTURA_NO_BORRADOR`/`FACTURA_NO_ENVIADA` (409),
                `DESCUENTO_INVALIDO` (422), `EMISION_ENVIO_FALLIDO` (502/503).
            motivo:
              type: string
              description: 'Mensaje legible para la UI (presente en 409/422).'

    # -------- US-029: Registro del cobro de la liquidación (facturacion) --------
    # [US-029 / UC-21 pasos 7-10] Request/response de la acción dedicada de registrar el cobro de la
    # factura de liquidación. Materializa la entidad PAGO (er-diagram §3.13) conciliada contra la
    # FACTURA de liquidación ya emitida (US-028). Reutiliza los wrappers monetarios (Importe string
    # Decimal(10,2), F2-01), el schema `Factura` y el enum `LiquidacionStatus`. El justificante es una
    # referencia a un DOCUMENTO (tipo='justificante_pago') YA subido (design.md §D-4 opción a; D-5),
    # opcional. La discrepancia de importe se modela como campo OPCIONAL de la respuesta 200
    # (`alertaDiscrepancia`), NO como error: alerta informativa que NO bloquea el cobro (design.md §D-3).
    # Los errores reutilizan el envelope NestJS (ErrorResponse) + `codigo`/`motivo`, mismo patrón que
    # US-028 (LiquidacionError). No se inventan formatos, wrappers ni paginación.
    PagoLiquidacion:
      # Vista de lectura del PAGO conciliado contra la factura de liquidación (er-diagram §3.13 PAGO).
      # `tenant_id` NO se expone en el DTO (viaja/deriva del JWT, RLS); nunca en path ni body.
      type: object
      required: [idPago, facturaId, importe, fechaCobro]
      properties:
        idPago:
          type: string
          format: uuid
          description: 'Identificador del PAGO (er-diagram §3.13 id_pago).'
        facturaId:
          type: string
          format: uuid
          description: 'FACTURA de liquidación conciliada (er-diagram §3.13 factura_id).'
        importe:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Importe REAL cobrado, Decimal(10,2) como string. Puede diferir de `Factura.total`.'
        fechaCobro:
          type: string
          format: date
          example: '2026-06-15'
          description: 'Fecha del cobro (DATE). Validada `<= hoy` (no futura) al registrar.'
        justificanteDocId:
          type: string
          format: uuid
          nullable: true
          description: >-
            Referencia al DOCUMENTO (`tipo='justificante_pago'`) del justificante de transferencia, o
            `null` si el cobro se registró sin adjuntar justificante (er-diagram §3.13 justificante_doc_id).
        fechaCreacion:
          type: string
          format: date-time
          description: 'Instante de creación del registro de cobro (er-diagram §3.13 fecha_creacion).'
    RegistrarCobroLiquidacionRequest:
      # Cuerpo de la acción de cobro. `justificanteDocId` OPCIONAL: referencia a un DOCUMENTO ya subido
      # por el flujo de documentos existente (design.md §D-4 opción a); si se omite, el cobro es válido
      # igualmente y el PAGO queda con justificante_doc_id=NULL.
      type: object
      required: [importe, fechaCobro]
      additionalProperties: false
      properties:
        importe:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Importe REAL cobrado (Importe string Decimal(10,2), p. ej. `"4100.00"`). DEBE ser `> 0`
            (`0`/negativo → 400 `COBRO_INVALIDO`). Puede diferir de `Factura.total` (→ `alertaDiscrepancia`
            en la respuesta 200; no bloquea).
        fechaCobro:
          type: string
          format: date
          example: '2026-06-15'
          description: >-
            Fecha del cobro (DATE). DEBE ser una fecha válida `<= hoy` (futura o mal formada → 400
            `COBRO_INVALIDO`).
        justificanteDocId:
          type: string
          format: uuid
          nullable: true
          description: >-
            OPCIONAL. Referencia a un DOCUMENTO (`tipo='justificante_pago'`) YA subido en el tenant. Si
            se omite o es `null`, el cobro se registra sin justificante (`PAGO.justificanteDocId=null`) y
            avanza igualmente a `cobrada`. Un id inexistente en el tenant → 404 `JUSTIFICANTE_NO_ENCONTRADO`.
    AlertaDiscrepanciaCobro:
      # [US-029 §D-3] Alerta INFORMATIVA de discrepancia de importe. Presente en la respuesta 200 SOLO
      # si el importe cobrado difiere del facturado. NO es un error: el cobro se registra igualmente.
      type: object
      required: [importeFacturado, importeCobrado, diferencia]
      properties:
        importeFacturado:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Total de la FACTURA de liquidación (`Factura.total`), Decimal(10,2) como string.'
        importeCobrado:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Importe realmente cobrado (`Pago.importe`), Decimal(10,2) como string.'
        diferencia:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Diferencia `importeFacturado - importeCobrado` (Decimal(10,2) como string; positiva si se
            cobró de menos, negativa si de más). La conciliación se delega al Gestor.
    RegistrarCobroLiquidacionResponse:
      type: object
      required: [pago, liquidacion, liquidacionStatus]
      properties:
        pago:
          allOf: [{ $ref: '#/components/schemas/PagoLiquidacion' }]
          description: 'El PAGO creado (con el importe real y, si se adjuntó, `justificanteDocId`).'
        liquidacion:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          description: 'Factura de liquidación actualizada (`estado=cobrada`).'
        liquidacionStatus:
          allOf: [{ $ref: '#/components/schemas/LiquidacionStatus' }]
          description: 'Sub-proceso de liquidación de la RESERVA tras el cobro (`cobrada`).'
        alertaDiscrepancia:
          allOf: [{ $ref: '#/components/schemas/AlertaDiscrepanciaCobro' }]
          nullable: true
          description: >-
            Presente SOLO si `pago.importe !== liquidacion.total`. Alerta informativa (no bloqueante);
            `null`/ausente cuando el importe cobrado coincide con el facturado.
    CobroLiquidacionError:
      # Envelope estándar NestJS (ErrorResponse: statusCode/message/error) + `codigo` de dominio y
      # `motivo` legible. Cubre 400/404/409 de la acción de cobro de US-029. La discrepancia de importe
      # NO es un error (va en la respuesta 200 como `alertaDiscrepancia`).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - COBRO_INVALIDO
                - FACTURA_LIQUIDACION_NO_ENCONTRADA
                - JUSTIFICANTE_NO_ENCONTRADO
                - LIQUIDACION_YA_COBRADA
                - LIQUIDACION_NO_FACTURADA
              description: >-
                Código de error de dominio: `COBRO_INVALIDO` (400: `importe <= 0` o `fechaCobro` futura/
                inválida), `FACTURA_LIQUIDACION_NO_ENCONTRADA`/`JUSTIFICANTE_NO_ENCONTRADO` (404),
                `LIQUIDACION_YA_COBRADA` (409, doble cobro), `LIQUIDACION_NO_FACTURADA` (409,
                `liquidacionStatus='pendiente'`).
            motivo:
              type: string
              description: >-
                Mensaje legible para la UI ("La liquidación ya está marcada como cobrada", "La factura
                de liquidación debe estar enviada antes de registrar su cobro").

    # -------- Cobro de fianza (US-030) --------
    RegistrarCobroFianzaRequest:
      # [US-030 §D-3] Cuerpo de la acción de cobro de fianza. `justificanteDocId` OPCIONAL: referencia a
      # un DOCUMENTO ya subido por el flujo de documentos existente (design.md §D-5); si se omite, el cobro
      # es válido igualmente y el PAGO queda con justificante_doc_id=NULL. `confirmarSinRecibo` materializa
      # la política "Negociable" (design.md §D-2) para `fianzaStatus='pendiente'`.
      type: object
      required: [importe, fechaCobro]
      additionalProperties: false
      properties:
        importe:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Importe REAL cobrado (Importe string Decimal(10,2), p. ej. `"1000.00"`). DEBE ser `> 0`
            (`0`/negativo → 400 `COBRO_INVALIDO`). Se registra como `RESERVA.fianzaEur`.
        fechaCobro:
          type: string
          format: date
          example: '2026-07-10'
          description: >-
            Fecha del cobro (DATE). DEBE ser una fecha válida `<= RESERVA.fechaEvento` (relativo al
            evento, NO a hoy; posterior al evento o mal formada → 400 `COBRO_INVALIDO`). `fechaCobro =
            fechaEvento` (cobro en T-0) es válida y se procesa como el happy path.
        justificanteDocId:
          type: string
          format: uuid
          nullable: true
          description: >-
            OPCIONAL. Referencia a un DOCUMENTO (`tipo='justificante_pago'`) YA subido en el tenant. Si
            se omite o es `null`, el cobro se registra sin justificante (`PAGO.justificanteDocId=null`) y
            avanza igualmente a `cobrada`. Un id inexistente en el tenant → 404 `JUSTIFICANTE_NO_ENCONTRADO`.
        confirmarSinRecibo:
          type: boolean
          default: false
          description: >-
            Política "Negociable" (design.md §D-2). Solo relevante si `fianzaStatus='pendiente'` (el recibo
            de fianza nunca se envió). Ausente o `false` sobre `pendiente` → respuesta 200
            `confirmacion_requerida` (aviso, NO crea PAGO). `true` → el Gestor confirma el cobro sin recibo
            enviado: se registra igualmente (FACTURA(fianza) `borrador → cobrada` o creada al vuelo
            `cobrada`) y se traza el flujo excepcional en `AUDIT_LOG`. Irrelevante sobre `recibo_enviado`.
    RegistrarCobroFianzaResponse:
      # Respuesta discriminada por `resultado`: el frontend distingue el cobro efectivo de la respuesta
      # "confirmación requerida" (política Negociable) para mostrar el diálogo y reintentar con
      # confirmarSinRecibo=true. NO es un error 4xx: la Negociable es un aviso no bloqueante (design.md §D-2).
      oneOf:
        - $ref: '#/components/schemas/RegistrarCobroFianzaCobrado'
        - $ref: '#/components/schemas/RegistrarCobroFianzaConfirmacionRequerida'
      discriminator:
        propertyName: resultado
        mapping:
          cobrado: '#/components/schemas/RegistrarCobroFianzaCobrado'
          confirmacion_requerida: '#/components/schemas/RegistrarCobroFianzaConfirmacionRequerida'
    RegistrarCobroFianzaCobrado:
      # Cobro registrado: PAGO creado + FACTURA(fianza) cobrada + fianzaStatus='cobrada' + fianzaEur +
      # fianzaCobradaFecha. `resultado='cobrado'` discrimina esta forma en el oneOf.
      type: object
      required: [resultado, pago, facturaFianza, fianzaStatus, fianzaEur, fianzaCobradaFecha]
      properties:
        resultado:
          type: string
          enum: [cobrado]
          description: 'Discriminador: el cobro se registró correctamente.'
        pago:
          allOf: [{ $ref: '#/components/schemas/PagoLiquidacion' }]
          description: >-
            El PAGO creado (con el importe real y, si se adjuntó, `justificanteDocId`). Misma forma de
            lectura del PAGO que en US-029 (`facturaId` = recibo de fianza).
        facturaFianza:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          description: 'Recibo de fianza actualizado (`estado=cobrada`); creado al vuelo si no existía (D-2b).'
        fianzaStatus:
          allOf: [{ $ref: '#/components/schemas/FianzaStatus' }]
          description: 'Sub-proceso de fianza de la RESERVA tras el cobro (`cobrada`).'
        fianzaEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Importe cobrado registrado en `RESERVA.fianzaEur` (Decimal(10,2) como string).'
        fianzaCobradaFecha:
          type: string
          format: date
          example: '2026-07-10'
          description: 'Fecha del cobro registrada en `RESERVA.fianzaCobradaFecha` (= `fechaCobro`).'
    RegistrarCobroFianzaConfirmacionRequerida:
      # Política "Negociable" (design.md §D-2): fianzaStatus='pendiente' sin confirmarSinRecibo=true.
      # NO crea PAGO ni FACTURA ni cambia estado. El frontend muestra el aviso y reintenta con el flag.
      # `resultado='confirmacion_requerida'` discrimina esta forma en el oneOf.
      type: object
      required: [resultado, codigo, mensaje, reintentarCon]
      properties:
        resultado:
          type: string
          enum: [confirmacion_requerida]
          description: 'Discriminador: aviso no bloqueante; NO se registró el cobro.'
        codigo:
          type: string
          enum: [RECIBO_FIANZA_NO_ENVIADO]
          description: 'Código del aviso Negociable (recibo de fianza nunca enviado, `fianzaStatus=pendiente`).'
        mensaje:
          type: string
          example: 'El recibo de fianza no ha sido enviado al cliente. ¿Desea registrar el cobro igualmente?'
          description: 'Texto del diálogo de confirmación que muestra el frontend.'
        reintentarCon:
          type: object
          required: [confirmarSinRecibo]
          description: 'Indica al frontend cómo reintentar para forzar el cobro tras la confirmación del Gestor.'
          properties:
            confirmarSinRecibo:
              type: boolean
              enum: [true]
              description: 'Reenviar la misma petición con `confirmarSinRecibo: true` para registrar el cobro.'
    CobroFianzaError:
      # Envelope estándar NestJS (ErrorResponse: statusCode/message/error) + `codigo` de dominio y `motivo`
      # legible. Cubre 400/404/409 de la acción de cobro de fianza (US-030). La política "Negociable" NO es
      # un error: viaja en la respuesta 200 como `RegistrarCobroFianzaConfirmacionRequerida`.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - COBRO_INVALIDO
                - FACTURA_FIANZA_NO_ENCONTRADA
                - JUSTIFICANTE_NO_ENCONTRADO
                - FIANZA_YA_COBRADA
              description: >-
                Código de error de dominio: `COBRO_INVALIDO` (400: `importe <= 0` o `fechaCobro` posterior
                a `fechaEvento`/inválida), `FACTURA_FIANZA_NO_ENCONTRADA`/`JUSTIFICANTE_NO_ENCONTRADO`
                (404), `FIANZA_YA_COBRADA` (409, doble cobro).
            motivo:
              type: string
              description: >-
                Mensaje legible para la UI ("La fianza ya está marcada como cobrada").

    # -------- Devolución de fianza (US-036) --------
    RegistrarDevolucionFianzaRequest:
      # [US-036 / Gate 1] Cuerpo application/json (NO multipart, G1-3) de la acción de devolución de
      # fianza. Naming camelCase y estilo alineados con RegistrarCobroFianzaRequest (US-030).
      # `justificanteDocId` OPCIONAL: referencia a un DOCUMENTO (`tipo='justificante_pago'`) YA subido
      # por `POST /documentos`; si se omite, la devolución es válida igualmente (FA-04) con aviso.
      # `motivoRetencion` obligatorio SOLO si el resultado es parcial (importeDevuelto < fianzaEur).
      type: object
      required: [importeDevuelto, fechaCobro]
      additionalProperties: false
      properties:
        importeDevuelto:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Importe devuelto (Importe string Decimal(10,2), p. ej. `"1000.00"`). DEBE ser
            `0.00 ≤ x ≤ RESERVA.fianzaEur`. `"0.00"` es válido (retención total). `x > fianzaEur`
            → 400 `IMPORTE_SUPERA_FIANZA` (FA-02). `== fianzaEur` ⇒ `devuelta`; `< fianzaEur` ⇒
            `retenida_parcial`.
        fechaCobro:
          type: string
          format: date
          example: '2026-07-10'
          description: >-
            Fecha real del abono de la devolución (DATE). DEBE ser `>= RESERVA.fianzaCobradaFecha`
            (anterior o mal formada → 400 `FECHA_DEVOLUCION_INVALIDA`, FA-03). Naming `fechaCobro`
            por coherencia con US-030.
        motivoRetencion:
          type: string
          nullable: true
          description: >-
            Motivo de la retención. OBLIGATORIO solo en devolución parcial (`importeDevuelto <
            fianzaEur` ⇒ `retenida_parcial`); si falta en ese caso → 400 `MOTIVO_RETENCION_REQUERIDO`.
            En devolución completa (`devuelta`) se ignora / `null`. Se persiste en
            `RESERVA.motivoRetencion` (campo dedicado, G1-1).
        justificanteDocId:
          type: string
          format: uuid
          nullable: true
          description: >-
            OPCIONAL. Referencia a un DOCUMENTO (`tipo='justificante_pago'`) YA subido en el tenant
            (vía `POST /documentos`, NO multipart aquí — G1-3). Omitido o `null` → la devolución se
            registra sin justificante (FA-04) con `avisoSinJustificante=true`. Un id inexistente en el
            tenant → 404 `JUSTIFICANTE_NO_ENCONTRADO` (misma semántica que US-030).
    RegistrarDevolucionFianzaResponse:
      # Respuesta 200: RESERVA actualizada (patrón allOf de US-021/US-030 reutilizando el schema
      # Reserva) + el DOCUMENTO justificante si se referenció + aviso FA-04 si se registró sin él.
      type: object
      required: [reserva, avisoSinJustificante]
      properties:
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: >-
            La RESERVA actualizada: `fianzaStatus` derivado (`devuelta`|`retenida_parcial`),
            `fianzaDevueltaEur`, `fianzaDevueltaFecha` y `motivoRetencion` (si parcial).
        documentoJustificante:
          allOf: [{ $ref: '#/components/schemas/Documento' }]
          nullable: true
          description: >-
            El DOCUMENTO justificante vinculado (`tipo='justificante_pago'`), o `null`/ausente si no
            se referenció (FA-04).
        avisoSinJustificante:
          type: boolean
          description: >-
            `true` si la devolución se registró sin justificante (FA-04); el frontend muestra el
            aviso "Devolución registrada sin justificante. Puedes adjuntarlo más tarde.".
    DevolucionFianzaError:
      # Envelope estándar NestJS (ErrorResponse: statusCode/message/error) + `codigo` de dominio y
      # `motivo` legible. Cubre 400/404/409 de la acción de devolución de fianza (US-036). Mismo
      # patrón y códigos reutilizados que CobroFianzaError (US-030): JUSTIFICANTE_NO_ENCONTRADO (404).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - IMPORTE_SUPERA_FIANZA
                - FECHA_DEVOLUCION_INVALIDA
                - MOTIVO_RETENCION_REQUERIDO
                - JUSTIFICANTE_NO_ENCONTRADO
                - PRECONDICION_NO_CUMPLIDA
                - DEVOLUCION_YA_REGISTRADA
              description: >-
                Código de error de dominio: `IMPORTE_SUPERA_FIANZA` (400, FA-02: importe > fianzaEur o
                negativo), `FECHA_DEVOLUCION_INVALIDA` (400, FA-03: fecha < fianzaCobradaFecha),
                `MOTIVO_RETENCION_REQUERIDO` (400, parcial sin motivo), `JUSTIFICANTE_NO_ENCONTRADO`
                (404, reutilizado de US-030), `PRECONDICION_NO_CUMPLIDA` (409, estado≠post_evento /
                fianzaStatus≠cobrada / iban_devolucion null), `DEVOLUCION_YA_REGISTRADA` (409, doble
                registro sobre estado final irreversible).
            motivo:
              type: string
              description: >-
                Mensaje legible para la UI ("El importe a devolver no puede superar la fianza
                cobrada").

    # -------- Cliente --------
    Cliente:
      type: object
      properties:
        idCliente: { type: string, format: uuid }
        nombre: { type: string }
        apellidos: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        telefono: { type: string, nullable: true }
        dniNif: { type: string, nullable: true }
        direccion: { type: string, nullable: true }
        codigoPostal: { type: string, nullable: true }
        poblacion: { type: string, nullable: true }
        provincia: { type: string, nullable: true }
        ibanDevolucion: { type: string, nullable: true }
      required: [idCliente, nombre]
    CreateClienteRequest:
      # [US-003] Datos de contacto mínimos del lead, embebidos en el alta de reserva.
      # nombre, apellidos, email y telefono son OBLIGATORIOS (canal_entrada va en CreateReservaRequest).
      type: object
      required: [nombre, apellidos, email, telefono]
      properties:
        nombre: { type: string, minLength: 1, maxLength: 100, description: 'Obligatorio, no vacío, máx 100.' }
        apellidos: { type: string, minLength: 1, maxLength: 100, description: 'Obligatorio, no vacío, máx 100.' }
        email:
          type: string
          format: email
          # RFC 5322 básico (forma local@dominio.tld, sin espacios). Validación dura adicional al format.
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          maxLength: 254
          description: 'Obligatorio. Formato email RFC 5322 básico. Idempotencia de CLIENTE por (tenant_id, email).'
        telefono: { type: string, minLength: 1, description: 'Obligatorio, no vacío.' }
        dniNif: { type: string }
        direccion: { type: string }
        codigoPostal: { type: string }
        poblacion: { type: string }
        provincia: { type: string }
    UpdateClienteRequest:
      # PATCH parcial (US-035): todos los campos opcionales (p. ej. registrar solo el IBAN).
      # NO hereda los `required` de CreateClienteRequest a propósito.
      type: object
      properties:
        nombre: { type: string, minLength: 1, maxLength: 100 }
        apellidos: { type: string, minLength: 1, maxLength: 100 }
        email:
          type: string
          format: email
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          maxLength: 254
        telefono: { type: string, minLength: 1 }
        dniNif: { type: string }
        direccion: { type: string }
        codigoPostal: { type: string }
        poblacion: { type: string }
        provincia: { type: string }
        ibanDevolucion: { type: string }

    # -------- Catálogo de extras [F2-04] --------
    Extra:
      type: object
      properties:
        idExtra: { type: string, format: uuid }
        nombre: { type: string }
        descripcion: { type: string, nullable: true }
        precioUnitario: { $ref: '#/components/schemas/Importe' }
        activo: { type: boolean }

    # -------- Tarifa / Presupuesto / Extra de reserva --------
    # [US-016 / D-1] Esquema canónico del motor de tarifa (calculo-tarifa).
    # Nombres de campo en snake_case por decisión de diseño D-1 ya aprobada por el gate humano
    # (design.md §D-1): el contrato DEBE usar este esquema tal cual. Los tests TDD y los DTOs
    # backend (@nestjs/swagger) se alinean con estos nombres exactos.
    CalculoTarifaExtraInput:
      # Un extra solicitado al motor: referencia al catálogo del tenant + cantidad.
      type: object
      required: [extra_id, cantidad]
      properties:
        extra_id: { type: string, format: uuid, description: 'ID del EXTRA del catálogo del tenant.' }
        cantidad: { type: integer, minimum: 1, description: 'Unidades del extra (>= 1).' }
    CalculoTarifaRequest:
      # Input del motor (US-016 §Reglas de Validación). num_ninos_menores4 NO es input del motor.
      type: object
      required: [fecha_evento, duracion_horas, num_adultos_ninos_mayores4]
      properties:
        fecha_evento:
          type: string
          format: date
          description: 'Fecha del evento (YYYY-MM-DD). Debe ser estrictamente futura: no nula, no pasada y no el mismo día que la llamada (comparación por día natural UTC).'
        duracion_horas: { $ref: '#/components/schemas/DuracionHoras' }
        num_adultos_ninos_mayores4:
          type: integer
          minimum: 0
          description: 'Adultos + niños mayores de 4 años. Los menores de 4 (num_ninos_menores4) no cuentan ni se pasan.'
        extras:
          type: array
          default: []
          description: 'Extras a sumar. Puede ser []. Solo se evalúan en el caso normal (no en tarifa_a_consultar).'
          items: { $ref: '#/components/schemas/CalculoTarifaExtraInput' }
    CalculoTarifaResponse:
      # Esquema de salida canónico unificado (D-1): válido para el caso normal y para tarifa_a_consultar.
      # temporada y tarifa_a_consultar SIEMPRE presentes; los otros cuatro son null si tarifa_a_consultar=true.
      # Importes como number (EUR ya redondeados a céntimos, IVA 21% incluido en precio_tarifa_eur) por D-1/D-4;
      # NO se usa el wrapper Importe (string) aquí: es la salida del motor, no una columna Decimal de BD.
      type: object
      required: [temporada, tarifa_a_consultar, precio_tarifa_eur, extras_total_eur, total_eur, tarifa_id]
      properties:
        temporada:
          allOf: [{ $ref: '#/components/schemas/Temporada' }]
          description: 'Temporada resuelta para el mes de fecha_evento. SIEMPRE presente (también en a_consultar).'
        tarifa_a_consultar:
          type: boolean
          description: 'true cuando num_adultos_ninos_mayores4 > 50 (tramo +51 sin tarifa): precio manual. SIEMPRE presente.'
        precio_tarifa_eur:
          type: number
          nullable: true
          description: 'Precio de la TARIFA en EUR (IVA 21% incluido). null si tarifa_a_consultar=true.'
        extras_total_eur:
          type: number
          nullable: true
          description: 'Suma de subtotales de extras (precio_eur x cantidad). null si tarifa_a_consultar=true.'
        total_eur:
          type: number
          nullable: true
          description: 'precio_tarifa_eur + extras_total_eur. null si tarifa_a_consultar=true.'
        tarifa_id:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA usada. null si tarifa_a_consultar=true.'
    # -------- Errores de dominio del motor de tarifa (US-016 D-3) --------
    # Reutilizan el envelope NestJS (ErrorResponse) y añaden `codigo` (error de dominio) + `detalle` diagnóstico.
    CalculoTarifaTarifaNoConfiguradaError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, detalle]
          properties:
            codigo: { type: string, enum: [TARIFA_NO_CONFIGURADA] }
            detalle:
              type: object
              required: [temporada, duracion_horas, num_invitados]
              properties:
                temporada: { $ref: '#/components/schemas/Temporada' }
                duracion_horas: { $ref: '#/components/schemas/DuracionHoras' }
                num_invitados: { type: integer }
              description: 'Parámetros de búsqueda sin fila de TARIFA vigente (tarifario incompleto, num_invitados <= 50).'
    CalculoTarifaExtraNoEncontradoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, detalle]
          properties:
            codigo: { type: string, enum: [EXTRA_NO_ENCONTRADO] }
            detalle:
              type: object
              required: [extra_id, motivo]
              properties:
                extra_id: { type: string, format: uuid }
                motivo:
                  type: string
                  enum: [inexistente, inactivo]
                  description: 'Motivo. El extra de otro tenant (RLS) se reporta como `inexistente` para no filtrar su existencia.'
    CalculoTarifaTemporadaNoConfiguradaError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, detalle]
          properties:
            codigo: { type: string, enum: [TEMPORADA_NO_CONFIGURADA] }
            detalle:
              type: object
              required: [mes]
              properties:
                mes: { type: integer, minimum: 1, maximum: 12, description: 'Mes (1-12) sin fila en TEMPORADA_CALENDARIO del tenant.' }
    Presupuesto:
      type: object
      properties:
        idPresupuesto: { type: string, format: uuid }
        reservaId: { type: string, format: uuid }
        version: { type: integer }
        baseImponible: { $ref: '#/components/schemas/Importe' }
        ivaPorcentaje: { $ref: '#/components/schemas/Porcentaje' }
        ivaImporte: { $ref: '#/components/schemas/Importe' }
        total: { $ref: '#/components/schemas/Importe' }
        descuentoEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        descuentoMotivo: { type: string, nullable: true }
        pdfUrl: { type: string, nullable: true }
        estado: { $ref: '#/components/schemas/EstadoPresupuesto' }
        fechaEnvio: { type: string, format: date-time, nullable: true }
    CreatePresupuestoRequest:
      type: object
      properties:
        descuentoEur: { $ref: '#/components/schemas/Importe' }
        descuentoMotivo: { type: string }
        extras:
          type: array
          items: { $ref: '#/components/schemas/CreateReservaExtraRequest' }
    UpdatePresupuestoRequest:
      type: object
      properties:
        descuentoEur: { $ref: '#/components/schemas/Importe' }
        descuentoMotivo: { type: string }
        enviar: { type: boolean, description: 'Si true, marca como enviado y dispara el email' }

    # -------- US-014: Presupuesto preview (borrador, no persiste) + confirmar (pre_reserva) --------
    # [US-014 / UC-14] Reutiliza los tipos existentes (Importe string, Porcentaje string, Reserva,
    # EstadoPresupuesto) y el esquema del motor de tarifa (CalculoTarifaExtraInput / CalculoTarifaResponse,
    # snake_case por D-1). Los payloads propios de US-014 siguen la convención camelCase del contrato de
    # negocio (baseImponible, descuentoEur, precioManualEur), no la snake_case del motor.
    PresupuestoExtraInput:
      # Un extra seleccionado por el Gestor para el presupuesto: referencia al catálogo + cantidad.
      # Reutiliza la forma de CalculoTarifaExtraInput (extra_id/cantidad) que consume el motor de tarifa.
      type: object
      required: [extra_id, cantidad]
      properties:
        extra_id: { type: string, format: uuid, description: 'ID del EXTRA del catálogo del tenant.' }
        cantidad: { type: integer, minimum: 1, description: 'Unidades del extra (>= 1).' }
    RepartoPago:
      # Reparto informativo 40% señal / 60% liquidación + fianza que se muestra en el borrador y en el PDF.
      # Importes string (Decimal 10,2). NO crea FACTURA en este change (solo texto informativo del PDF).
      type: object
      required: [senalEur, liquidacionEur, fianzaEur]
      properties:
        senalEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: '40% del total (señal). Derivado de TENANT_SETTINGS.pct_senal.' }
        liquidacionEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: '60% del total (liquidación).' }
        fianzaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: 'Fianza (TENANT_SETTINGS.fianza_default_eur), fuera del total.' }
    DesgloseFiscal:
      # Desglose fiscal congelado (D-5): base + IVA 21% + total. Presente en el borrador (preview) y
      # persistido en el PRESUPUESTO al confirmar. base = total / 1.21; ivaImporte = total - base.
      type: object
      required: [baseImponible, ivaPorcentaje, ivaImporte, total]
      properties:
        baseImponible: { $ref: '#/components/schemas/Importe' }
        ivaPorcentaje: { allOf: [{ $ref: '#/components/schemas/Porcentaje' }], description: 'Siempre "21.00" en MVP.' }
        ivaImporte: { $ref: '#/components/schemas/Importe' }
        total: { $ref: '#/components/schemas/Importe' }
    PreviewPresupuestoRequest:
      # Body OPCIONAL del preview. Sin body → borrador con los datos actuales de la RESERVA (sin extras
      # extra, sin descuento). Con body → simula extras/descuento/precio manual.
      type: object
      additionalProperties: false
      properties:
        extras:
          type: array
          default: []
          description: 'Extras a incluir en el borrador. Se pasan al motor de tarifa para sumar subtotales.'
          items: { $ref: '#/components/schemas/PresupuestoExtraInput' }
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Descuento a restar del total, opcional.'
        precioManualEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Precio total manual (IVA incluido) para el caso `tarifaAConsultar=true` (>50 invitados). Si se
            envía, el desglose fiscal se recalcula a partir de él; ignorado en el caso normal.
    PresupuestoPreviewResponse:
      # Resultado del cálculo del borrador (NO persistido). Combina el output canónico del motor de tarifa
      # (tarifa) con el desglose fiscal derivado, los extras, el reparto 40/60/fianza y las banderas de flujo.
      type: object
      required: [tarifaAConsultar, tarifa, extrasTotalEur]
      properties:
        tarifaAConsultar:
          type: boolean
          description: '`true` cuando el motor no tiene tarifa para el tramo (>50 invitados): habilita precio manual.'
        tarifa:
          allOf: [{ $ref: '#/components/schemas/CalculoTarifaResponse' }]
          description: 'Salida canónica del motor de tarifa (US-016, snake_case). Importes null si tarifaAConsultar.'
        extrasTotalEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Suma de subtotales de extras (Decimal string). "0.00" si no hay extras.'
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          nullable: true
          description: 'Descuento aplicado en el borrador, si el Gestor lo indicó.'
        desglose:
          allOf: [{ $ref: '#/components/schemas/DesgloseFiscal' }]
          nullable: true
          description: >-
            Desglose fiscal (base/IVA/total). `null` cuando `tarifaAConsultar=true` y no se envió
            `precioManualEur` (el Gestor debe introducir el precio para completar el desglose).
        reparto:
          allOf: [{ $ref: '#/components/schemas/RepartoPago' }]
          nullable: true
          description: 'Reparto 40%/60% + fianza. `null` mientras el total sea desconocido (tarifa a consultar sin precio).'
    ConfirmarPresupuestoRequest:
      # Body de la confirmación (crea el PRESUPUESTO congelado + activa pre_reserva).
      type: object
      properties:
        extras:
          type: array
          default: []
          description: 'Extras definitivos del presupuesto (origen=presupuesto).'
          items: { $ref: '#/components/schemas/PresupuestoExtraInput' }
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Descuento aplicado al total, opcional.'
        descuentoMotivo:
          type: string
          description: 'Justificación del descuento (persistida en PRESUPUESTO.descuento_motivo), opcional.'
        precioManualEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Precio total manual (IVA incluido). OBLIGATORIO cuando el motor devuelve `tarifa_a_consultar`
            (>50 invitados); su ausencia en ese caso produce 422. Ignorado en el caso normal.
    ConfirmarPresupuestoResponse:
      # Respuesta 201: el PRESUPUESTO creado (congelado) + la RESERVA resultante en pre_reserva.
      type: object
      required: [presupuesto, reserva]
      properties:
        presupuesto:
          allOf: [{ $ref: '#/components/schemas/Presupuesto' }]
          description: >-
            PRESUPUESTO congelado creado (`version=1`, `tarifaCongelada=true`, `estado='enviado'`,
            `ivaPorcentaje='21.00'`, desglose fiscal completo, `pdfUrl` si el PDF se generó).
        tarifaId:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA congelada usada; `null` en el caso `tarifa_a_consultar` (precio manual).'
        reparto:
          $ref: '#/components/schemas/RepartoPago'
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: 'RESERVA resultante: `estado=pre_reserva`, `ttlExpiracion = now() + ttl_prereserva_dias`.'
        consultasDescartadas:
          type: integer
          minimum: 0
          example: 0
          description: 'Recuento de RESERVA de cola (`2d`) pasadas a `2y` por el vaciado A16. `0` si no había cola.'

    ReservaExtra:
      type: object
      properties:
        idReservaExtra: { type: string, format: uuid }
        reservaId: { type: string, format: uuid }
        extraId: { type: string, format: uuid, nullable: true }
        facturaId: { type: string, format: uuid, nullable: true }
        conceptoLibre: { type: string, nullable: true }
        origen: { $ref: '#/components/schemas/OrigenExtra' }
        cantidad: { type: integer }
        precioUnitario: { $ref: '#/components/schemas/Importe' }
        subtotal: { $ref: '#/components/schemas/Importe' }
    CreateReservaExtraRequest:
      type: object
      required: [cantidad, origen]
      properties:
        extraId: { type: string, format: uuid, nullable: true }
        conceptoLibre: { type: string, description: 'Para extras fuera de catálogo' }
        cantidad: { type: integer, minimum: 1 }
        origen: { $ref: '#/components/schemas/OrigenExtra' }
        precioUnitario: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: 'Obligatorio si extraId es nulo' }

    # -------- Factura / Pago --------
    Factura:
      type: object
      properties:
        idFactura: { type: string, format: uuid }
        reservaId: { type: string, format: uuid }
        numeroFactura: { type: string, example: 'F-2026-0001', nullable: true, description: 'Asignado al enviar (borrador no tiene número)' }
        tipo: { $ref: '#/components/schemas/TipoFactura' }
        baseImponible: { $ref: '#/components/schemas/Importe' }
        ivaPorcentaje: { $ref: '#/components/schemas/Porcentaje' }
        ivaImporte: { $ref: '#/components/schemas/Importe' }
        total: { $ref: '#/components/schemas/Importe' }
        concepto: { type: string, nullable: true }
        pdfUrl: { type: string, nullable: true }
        estado: { $ref: '#/components/schemas/EstadoFactura' }
        fechaEmision: { type: string, format: date-time, nullable: true }
    CreateFacturaRequest:
      type: object
      required: [tipo]
      properties:
        tipo: { $ref: '#/components/schemas/TipoFactura' }
        concepto: { type: string }
    Pago:
      type: object
      properties:
        idPago: { type: string, format: uuid }
        facturaId: { type: string, format: uuid }
        importe: { $ref: '#/components/schemas/Importe' }
        fechaCobro: { type: string, format: date }
        justificanteDocId: { type: string, format: uuid, nullable: true }
    CreatePagoRequest:
      type: object
      required: [facturaId, importe, fechaCobro]
      properties:
        facturaId: { type: string, format: uuid }
        importe: { $ref: '#/components/schemas/Importe' }
        fechaCobro: { type: string, format: date }
        justificanteDocId: { type: string, format: uuid, nullable: true }

    # -------- Condiciones / Sub-procesos / Fianza --------
    CondicionesParticularesRequest:
      type: object
      required: [accion]
      properties:
        accion: { type: string, enum: [enviar, marcar_firmadas] }
        documentoId: { type: string, format: uuid, description: 'Documento firmado, en marcar_firmadas' }
    SubprocesosRequest:
      type: object
      properties:
        preEventoStatus: { $ref: '#/components/schemas/PreEventoStatus' }
        liquidacionStatus: { $ref: '#/components/schemas/LiquidacionStatus' }
        fianzaStatus: { $ref: '#/components/schemas/FianzaStatus' }
    # [US-036 / Gate 1] El schema placeholder `DevolucionFianzaRequest` (pre-US-036) queda REEMPLAZADO
    # por `RegistrarDevolucionFianzaRequest` (sección "Devolución de fianza (US-036)"), que añade
    # `fechaCobro`, `justificanteDocId` (patrón US-030, no multipart) y la semántica del motivo. Se
    # elimina para evitar drift: ya no lo referencia ningún path.

    # -------- Ficha operativa [US-025 / UC-20] --------
    # [US-025] Representación de la FICHA_OPERATIVA (1:1 con RESERVA, `reserva_id @unique`) devuelta
    # por GET y PATCH. Los 7 campos de contenido son nullable (la ficha se crea vacía en US-021).
    # `fichaCerrada`/`fechaCierre` reflejan el cierre (D-6/D-4) y `preEventoStatus` el sub-proceso
    # vigente de la RESERVA (pendiente|en_curso|cerrado). `fechaActualizacion` (@updatedAt) es
    # independiente de `fechaCierre` (D-4).
    FichaOperativa:
      type: object
      required: [idFicha, reservaId, fichaCerrada, preEventoStatus]
      properties:
        idFicha: { type: string, format: uuid }
        reservaId: { type: string, format: uuid }
        numInvitadosConfirmado: { type: integer, nullable: true }
        menuSeleccionado: { type: string, nullable: true }
        timingDetallado: { type: string, nullable: true }
        contactoEventoNombre: { type: string, nullable: true }
        contactoEventoTelefono: { type: string, nullable: true }
        notasOperativas: { type: string, nullable: true }
        briefingEquipo: { type: string, nullable: true }
        fichaCerrada:
          type: boolean
          description: '`true` una vez cerrada la ficha (POST .../cerrar).'
        fechaCierre:
          type: string
          format: date-time
          nullable: true
          description: >-
            Instante del último cierre/consolidación. `null` mientras la ficha no se ha cerrado; el
            backend la reescribe con `now()` en cada edición post-cierre (D-4).
        preEventoStatus:
          allOf: [{ $ref: '#/components/schemas/PreEventoStatus' }]
          description: 'Sub-proceso pre-evento de la RESERVA (pendiente|en_curso|cerrado).'

    # [US-025] Cuerpo de PATCH /reservas/{id}/ficha-operativa: guardado PARCIAL (D-5). Todos los
    # campos son OPCIONALES; solo se persiste el subconjunto presente. `numInvitadosConfirmado` es
    # nullable para permitir borrar el valor. No incluye `fichaCerrada`/`fechaCierre`: el cierre es
    # una acción dedicada (POST .../cerrar) y `fechaCierre` la gestiona el backend (D-4).
    GuardarFichaOperativaRequest:
      type: object
      additionalProperties: false
      properties:
        numInvitadosConfirmado: { type: integer, nullable: true }
        menuSeleccionado: { type: string, nullable: true }
        timingDetallado: { type: string, nullable: true }
        contactoEventoNombre: { type: string, nullable: true }
        contactoEventoTelefono: { type: string, nullable: true }
        notasOperativas: { type: string, nullable: true }
        briefingEquipo: { type: string, nullable: true }

    # [US-025] Respuesta 200 de POST /reservas/{id}/ficha-operativa/cerrar (D-6): la ficha cerrada
    # más `avisosCamposVacios`, la lista (posiblemente vacía) de nombres de campos de contenido que
    # quedaron sin rellenar. Es un aviso INFORMATIVO, nunca un error: el cierre no se bloquea por
    # campos vacíos.
    CerrarFichaOperativaResponse:
      allOf:
        - $ref: '#/components/schemas/FichaOperativa'
        - type: object
          required: [avisosCamposVacios]
          properties:
            avisosCamposVacios:
              type: array
              items: { type: string }
              description: >-
                Nombres (camelCase) de los campos de contenido que quedaron vacíos al cerrar
                (p. ej. `["menuSeleccionado","briefingEquipo"]`). Vacío si estaban todos rellenos.
              example: [menuSeleccionado, briefingEquipo]

    # [US-025] Error 409 de la ficha operativa cuando la RESERVA no está confirmada (D-3). Sigue el
    # patrón allOf ErrorResponse + campo semántico del resto del contrato, con el `code` fijado por
    # el Gate SDD (`ficha_no_disponible`) para que el frontend distinga "no disponible por estado"
    # de "no existe" (404). Conserva el envelope NestJS (statusCode/message).
    FichaOperativaNoDisponibleError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [ficha_no_disponible]
              description: >-
                Discriminador semántico del 409: la RESERVA está en un estado anterior a
                `reserva_confirmada`, así que la FICHA_OPERATIVA aún no existe.
              example: ficha_no_disponible

    # -------- Finalizar evento [US-034] --------
    # [US-034] Cuerpo de POST /reservas/{id}/finalizar-evento. La acción no toma parámetros de
    # negocio (la identidad de la RESERVA viaja en el path, el actor en el JWT). Se modela como
    # objeto opcional para dejar hueco a una confirmación futura sin romper el contrato; hoy no
    # requiere ningún campo. `additionalProperties: false` cierra el shape.
    FinalizarEventoRequest:
      type: object
      additionalProperties: false
      description: >-
        Cuerpo (opcional, vacío) de la acción de finalizar evento. No hay parámetros de negocio:
        la única entrada es la RESERVA (path) y el Gestor autenticado (JWT).
      properties: {}

    # [US-034 D-2/D-4] Resultado del disparo del email E5 (solicitud de IBAN). `enviado` y
    # `fallido` implican que se creó COMUNICACION (`codigoEmail='E5'`); `no_aplica` significa que
    # `fianzaEur` era `null` o `0` (guarda pura `debeEnviarseE5`), por lo que NO se envió E5 ni se
    # creó COMUNICACION. COMUNICACION es la fuente de verdad del estado del email (design.md §D-5).
    ResultadoE5:
      type: string
      enum: [enviado, fallido, no_aplica]
      description: >-
        `enviado`: E5 enviado al cliente (COMUNICACION.estado='enviado'). `fallido`: la transición
        se mantiene pero el proveedor falló (COMUNICACION.estado='fallido'); el Gestor puede
        reenviar desde la ficha (US futura). `no_aplica`: sin fianza (`fianzaEur` null o 0), no se
        envía E5.
    FinalizarEventoE5:
      type: object
      required: [resultado]
      description: Estado del disparo condicionado del email E5 tras finalizar el evento.
      properties:
        resultado: { $ref: '#/components/schemas/ResultadoE5' }
        comunicacionId:
          type: string
          format: uuid
          nullable: true
          description: >-
            ID de la COMUNICACION creada (E5), presente cuando `resultado` es `enviado` o
            `fallido`; `null` cuando `resultado='no_aplica'`.

    # [US-034 D-2/D-7] Respuesta 200 de POST /reservas/{id}/finalizar-evento: la RESERVA en
    # `post_evento` más el resultado del disparo de E5 (`e5`) y la advertencia no bloqueante de
    # documentación pendiente (`documentacionPendiente`). Mismo patrón allOf(Reserva) + campos de
    # resultado que usan otras acciones del contrato (p. ej. CerrarFichaOperativaResponse).
    FinalizarEventoResponse:
      allOf:
        - $ref: '#/components/schemas/Reserva'
        - type: object
          required: [e5, documentacionPendiente]
          properties:
            e5: { $ref: '#/components/schemas/FinalizarEventoE5' }
            documentacionPendiente:
              type: array
              items: { type: string }
              description: >-
                Ítems del checklist de documentación del evento (superficie de US-033) que quedaron
                sin subir. Advertencia INFORMATIVA no bloqueante: la finalización procede igualmente.
                Vacío (`[]`) si la documentación está completa o el checklist no aplica (fail-open,
                design.md §D-7).
              example: [dni_anverso, clausula_responsabilidad]

    # [US-034 D-3/D-8] Error 409 de POST /reservas/{id}/finalizar-evento: la RESERVA no está en
    # `evento_en_curso` (transición no permitida o carrera de doble finalización perdida). Sigue el
    # patrón allOf(ErrorResponse) + `code` semántico del resto del contrato (envelope NestJS).
    FinalizarEventoConflictError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [transicion_no_permitida]
              description: >-
                Discriminador del 409: la RESERVA no está en `evento_en_curso`, así que la
                transición `evento_en_curso → post_evento` no es aplicable (estado actual distinto
                o ya finalizada por una petición concurrente).
              example: transicion_no_permitida

    # -------- US-035: registrar IBAN de devolución --------
    # [US-035 D-5A] Cuerpo del PATCH /reservas/{id}/iban-devolucion: el único parámetro de negocio
    # es el IBAN que el cliente proporcionó. El backend lo valida por checksum mod-97 ANTES de
    # escribir (FA-01); el `pattern` aquí es un pre-filtro laxo de formato IBAN (país 2 letras + 2
    # dígitos de control + BBAN alfanumérico, 15–32 más), NO sustituye la validación mod-97 de dominio.
    RegistrarIbanDevolucionRequest:
      type: object
      additionalProperties: false
      required: [iban]
      properties:
        iban:
          type: string
          minLength: 15
          maxLength: 34
          pattern: '^[A-Za-z]{2}[0-9]{2}[A-Za-z0-9 ]{11,30}$'
          description: >-
            IBAN a registrar (se normaliza en servidor: mayúsculas, sin espacios). Se valida por
            checksum módulo 97 antes de persistir; un IBAN que no supere mod-97 devuelve 422 (FA-01).
          example: ES9121000418450200051332

    # [US-035 D-2/FA-03] Aviso opcional cuando el IBAN se guardó pero E8 no pudo enviarse. Su
    # presencia (no nulo) es la señal de FA-03 para la UI (alerta + botón de reenvío). Nulo cuando
    # E8 se envió correctamente. COMUNICACION es la fuente de verdad del estado del email.
    RegistrarIbanDevolucionAvisoEmail:
      type: object
      required: [codigo, mensaje]
      properties:
        codigo:
          type: string
          enum: [e8_fallido]
          description: 'Discriminador del aviso: el envío de E8 falló en el proveedor (IBAN sí guardado).'
          example: e8_fallido
        mensaje:
          type: string
          description: Mensaje para mostrar al gestor.
          example: 'IBAN guardado, pero E8 no pudo enviarse. Puedes reenviarlo desde la ficha.'
        comunicacionId:
          type: string
          format: uuid
          nullable: true
          description: ID de la COMUNICACION E8 en `estado='fallido'`, para el reenvío desde la ficha.

    # [US-035 D-2/D-5A] Respuesta 200 de PATCH /reservas/{id}/iban-devolucion. Lleva cuerpo (no 204)
    # para poder transmitir `avisoEmail` de FA-03 (IBAN guardado pero E8 fallido) sin revertir el
    # IBAN. `iban` es el valor normalizado persistido en `CLIENTE.iban_devolucion`. `avisoEmail` es
    # nulo cuando E8 se envió con éxito (COMUNICACION.estado='enviado').
    RegistrarIbanDevolucionResponse:
      type: object
      required: [iban, avisoEmail]
      properties:
        iban:
          type: string
          description: IBAN normalizado (mayúsculas, sin espacios) persistido en `CLIENTE.iban_devolucion`.
          example: ES9121000418450200051332
        avisoEmail:
          allOf:
            - $ref: '#/components/schemas/RegistrarIbanDevolucionAvisoEmail'
          nullable: true
          description: >-
            Aviso de FA-03: nulo cuando E8 se envió correctamente; presente cuando el IBAN quedó
            guardado pero E8 falló (COMUNICACION.estado='fallido').

    # [US-035 FA-04] Error 409 de PATCH /reservas/{id}/iban-devolucion: la RESERVA no está en
    # `post_evento` o no tiene fianza que devolver (`fianzaEur <= 0` o `null`). Sigue el patrón
    # allOf(ErrorResponse) + `code` semántico del resto del contrato (envelope NestJS).
    RegistrarIbanDevolucionConflictError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [estado_no_post_evento, sin_fianza]
              description: >-
                Discriminador del 409: `estado_no_post_evento` = la RESERVA no está en `post_evento`;
                `sin_fianza` = `fianzaEur <= 0` o `null` (no hay fianza que devolver, FA-04).
              example: sin_fianza

    # -------- Calendario [US-039] --------
    CalendarioRango:
      type: object
      description: Rango efectivo agregado por el backend (eco de los query params `desde`/`hasta`).
      required: [desde, hasta]
      properties:
        desde: { type: string, format: date }
        hasta: { type: string, format: date }
    CalendarioFecha:
      type: object
      description: |
        Agregación de UNA fecha ocupada del tenant. Solo aparecen fechas con bloqueo activo en
        `FECHA_BLOQUEADA`; las libres se omiten. Reúne el dato de pintado (`color`) y el del popover
        de detalle (cliente, subEstado, ttlExpiracion, reservaId) en la misma entrada.
      required: [fecha, color, estado, reservaId, cliente]
      properties:
        fecha: { type: string, format: date }
        color: { $ref: '#/components/schemas/ColorCalendario' }
        estado: { $ref: '#/components/schemas/EstadoReserva' }
        subEstado: { allOf: [{ $ref: '#/components/schemas/SubEstadoConsulta' }], nullable: true }
        reservaId:
          type: string
          format: uuid
          description: ID de la reserva bloqueante; enlace a la ficha completa.
        cliente:
          type: string
          description: Nombre del cliente de la reserva bloqueante (detalle del popover).
        ttlExpiracion:
          type: string
          format: date-time
          nullable: true
          description: |
            Instante de expiración del bloqueo blando (mismo modelo que `Reserva.ttlExpiracion` /
            `FechaBloqueada.ttlExpiracion`). El frontend deriva el "TTL restante" mostrado en el
            popover (p. ej. "2 días"). `null` si no aplica (bloqueo firme / fecha histórica).
        enCola:
          type: integer
          minimum: 0
          default: 0
          description: |
            Conteo de reservas en `subEstado='2d'` cuyo `consultaBloqueanteId` apunta a esta reserva
            bloqueante (indicador `🔁 N en cola`). `0` cuando no hay cola.
    CalendarioResponse:
      type: object
      description: Respuesta agregada del calendario de disponibilidad (US-039, lectura pura).
      required: [rango, fechas]
      properties:
        rango: { $ref: '#/components/schemas/CalendarioRango' }
        fechas:
          type: array
          description: Una entrada por fecha ocupada del rango. Vacío si el rango no tiene bloqueos.
          items: { $ref: '#/components/schemas/CalendarioFecha' }
    FechaBloqueada:
      type: object
      properties:
        idBloqueo: { type: string, format: uuid }
        fecha: { type: string, format: date }
        reservaId: { type: string, format: uuid }
        tipoBloqueo: { $ref: '#/components/schemas/TipoBloqueo' }
        ttlExpiracion: { type: string, format: date-time, nullable: true }
    BloquearFechaRequest:
      type: object
      required: [fecha, reservaId, tipoBloqueo]
      properties:
        fecha: { type: string, format: date }
        reservaId: { type: string, format: uuid }
        tipoBloqueo: { $ref: '#/components/schemas/TipoBloqueo' }

    # -------- Comunicaciones --------
    Comunicacion:
      type: object
      properties:
        idComunicacion: { type: string, format: uuid }
        reservaId: { type: string, format: uuid, nullable: true }
        clienteId: { type: string, format: uuid }
        codigoEmail: { $ref: '#/components/schemas/CodigoEmail' }
        asunto: { type: string }
        destinatarioEmail: { type: string, format: email }
        estado: { type: string, enum: [borrador, enviado, fallido] }
        fechaEnvio: { type: string, format: date-time, nullable: true }
    CreateComunicacionRequest:
      type: object
      required: [codigoEmail, destinatarioEmail, asunto]
      properties:
        codigoEmail: { $ref: '#/components/schemas/CodigoEmail' }
        destinatarioEmail: { type: string, format: email }
        asunto: { type: string }
        cuerpo: { type: string }
        guardarComoBorrador: { type: boolean, description: 'UC-36: guarda para revisión antes de enviar' }

    # -------- Documento --------
    Documento:
      type: object
      properties:
        idDocumento: { type: string, format: uuid }
        reservaId: { type: string, format: uuid, nullable: true }
        tipo: { $ref: '#/components/schemas/TipoDocumento' }
        nombreArchivo: { type: string }
        url: { type: string }
        mimeType: { type: string }
        tamanoBytes: { type: integer, nullable: true }

    # -------- Dashboard --------
    # [US-044] Vista de lectura agregada: 7 widgets del estado operativo del tenant (design.md
    # §D-1). Cada widget expone `items` + `total`; cada ítem enlaza a la ficha de la RESERVA
    # (`enlace`). No expone datos financieros ni `iban_devolucion` (§7.2 fuera de MVP).
    DashboardResponse:
      type: object
      description: Carga agregada de los 7 widgets del dashboard operativo (US-044, lectura pura).
      required:
        [hoyManana, pipeline, subProcesosCriticos, pendientes, consultasEnCola,
         visitasProgramadas, proximos30Dias]
      properties:
        hoyManana:
          allOf: [{ $ref: '#/components/schemas/DashboardWidget' }]
          description: >-
            Reservas con `fecha_evento ∈ {hoy, mañana}` en `reserva_confirmada` o
            `evento_en_curso`, ordenadas por `fecha_evento` ascendente.
        pipeline:
          allOf: [{ $ref: '#/components/schemas/DashboardWidget' }]
          description: >-
            Reservas `activo = true` agrupadas por `estado`/`sub_estado`; cada ítem representa
            una reserva del pipeline (Exploratoria/Con fecha/Pendiente invitados/En cola/Visita
            programada/Pre-reserva/Confirmada). El `total` es el recuento del pipeline activo.
        subProcesosCriticos:
          allOf: [{ $ref: '#/components/schemas/DashboardWidget' }]
          description: >-
            Reservas en `reserva_confirmada` con algún sub-proceso atrasado (pre-evento no
            cerrado con evento próximo, liquidación no cobrada o fianza no cobrada).
        pendientes:
          allOf: [{ $ref: '#/components/schemas/DashboardWidget' }]
          description: >-
            Reservas con una acción requerida (presupuesto `enviado` sin respuesta, TTL en las
            próximas 24 h, o factura `enviada` sin pago con vencimiento superado).
        consultasEnCola:
          allOf: [{ $ref: '#/components/schemas/DashboardWidget' }]
          description: Reservas en `sub_estado = 2d` (agrupables por `fecha_evento` en el front).
        visitasProgramadas:
          allOf: [{ $ref: '#/components/schemas/DashboardWidget' }]
          description: >-
            Reservas en `sub_estado = 2v` con `visita_programada_fecha` futura, ordenadas por
            `visita_programada_fecha` ascendente.
        proximos30Dias:
          allOf: [{ $ref: '#/components/schemas/DashboardProximos30DiasWidget' }]
          description: >-
            Reservas con `fecha_evento ∈ [hoy, hoy + 30 días]` (inclusive); cada ítem añade el
            `color` semántico canónico del Calendario (US-039 / §11.3).

    DashboardWidget:
      # [US-044] Widget genérico del dashboard: lista de ítems + recuento. Cada widget gestiona
      # su estado vacío de forma independiente (§FA-01): `items` vacío y `total = 0`.
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DashboardItem' }
        total:
          type: integer
          minimum: 0
          description: Nº total de elementos que satisfacen el criterio del widget.

    DashboardProximos30DiasWidget:
      # [US-044] Widget "Próximos 30 días": como DashboardWidget pero sus ítems incluyen el
      # `color` canónico derivado de (estado, subEstado), idéntico al del Calendario (US-039).
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DashboardItemProximos30Dias' }
        total:
          type: integer
          minimum: 0
          description: Nº de reservas con `fecha_evento` en `[hoy, hoy + 30 días]`.

    DashboardItem:
      # [US-044] Ítem de widget: identifica la RESERVA y enlaza a su ficha. Lectura pura, sin
      # datos financieros ni `iban_devolucion` (§7.2 fuera de MVP).
      type: object
      required: [reservaId, codigo, clienteNombre, estado, subEstado, fechaEvento, enlace]
      properties:
        reservaId: { type: string, format: uuid }
        codigo:
          type: string
          description: Código legible de la reserva.
        clienteNombre:
          type: string
          description: Nombre del cliente asociado a la reserva.
        estado: { $ref: '#/components/schemas/EstadoReserva' }
        subEstado:
          allOf: [{ $ref: '#/components/schemas/SubEstadoConsulta' }]
          nullable: true
          description: Sub-estado de consulta; `null` para reservas fuera de la fase de consulta.
        fechaEvento:
          type: string
          format: date
          nullable: true
          description: >-
            null cuando la reserva no tiene fecha de evento asignada (p.ej. estado 2a).
        enlace:
          type: string
          format: uri
          description: Enlace directo a la ficha de detalle de la RESERVA (§FA-02).

    DashboardItemProximos30Dias:
      # [US-044] Ítem del widget "Próximos 30 días": DashboardItem + color canónico (US-039).
      allOf:
        - $ref: '#/components/schemas/DashboardItem'
        - type: object
          required: [color]
          properties:
            color:
              allOf: [{ $ref: '#/components/schemas/ColorCalendario' }]
              description: >-
                Color semántico canónico derivado de `(estado, subEstado)`, idéntico al del
                Calendario (US-039 / §11.3): gris|ambar|verde|azul|rojo.

    # -------- Cron --------
    BarridoResponse:
      type: object
      properties:
        reservasExpiradas: { type: integer }
        fechasLiberadas: { type: integer }
        consultasPromovidas: { type: integer }
        recordatoriosEnviados: { type: integer }
        fichas:
          # [US-026 §D-2] Resumen del barrido de cierre automático de ficha operativa en T-1d
          # (automatización A10, `tarea=fichas`). Sigue la granularidad de `BarridoExpiracionResponse`
          # (US-012): recuentos agregados de un proceso de Sistema, sin exponer datos de negocio
          # sensibles ni identificadores de RESERVA. Presente cuando el barrido incluye la tarea
          # `fichas` (o `all`); ausente/nulo en barridos que no la ejecutan (compatibilidad).
          $ref: '#/components/schemas/BarridoFichasResumen'

    BarridoExpiracionResponse:
      # [US-012 §D-2] Resumen del barrido de expiración por TTL. Recuentos agregados de un
      # proceso de Sistema; no expone datos de negocio sensibles ni identificadores de RESERVA.
      type: object
      required: [candidatas, expiradas, promocionesDisparadas, fallos]
      properties:
        candidatas:
          type: integer
          minimum: 0
          description: >-
            Nº de RESERVA seleccionadas como candidatas (`ttl_expiracion < now()` AND
            `sub_estado ∈ {2b,2c,2v}` OR `estado = 'pre_reserva'`), cross-tenant.
          example: 5
        expiradas:
          type: integer
          minimum: 0
          description: >-
            Nº de candidatas efectivamente expiradas (transicionadas a `2x` /
            `reserva_cancelada` + fecha liberada) en esta ejecución. Menor que `candidatas`
            cuando una candidata dejó de serlo bajo lock (idempotencia/US-006) o falló.
          example: 4
        promocionesDisparadas:
          type: integer
          minimum: 0
          description: >-
            Nº de veces que el seam `PromocionColaPort` fue disparado, una por cada
            expiración con cola activa. Con US-018 implementado, cada disparo ejecuta la
            mecánica A15 completa (2d → 2b, re-bloqueo, reordenación FIFO).
          example: 1
        fallos:
          type: integer
          minimum: 0
          description: >-
            Nº de candidatas cuya expiración falló de forma aislada (rollback de su propia
            transacción, sin afectar al resto del lote).
          example: 0

    BarridoFichasResumen:
      # [US-026 §D-2/D-4] Resumen del barrido de cierre automático de la ficha operativa en T-1d
      # (automatización A10). Misma granularidad que `BarridoExpiracionResponse` (US-012):
      # recuentos agregados de un proceso de Sistema (`X-Cron-Token`, nunca JWT), sin exponer
      # datos de negocio sensibles ni identificadores de RESERVA. Idempotente: las fichas ya
      # cerradas no son candidatas, de modo que una 2.ª ejecución arroja `fichasCerradas = 0`.
      type: object
      required: [candidatas, fichasCerradas, fallos]
      properties:
        candidatas:
          type: integer
          minimum: 0
          description: >-
            Nº de RESERVA seleccionadas como candidatas del cierre A10, cross-tenant:
            `estado = 'reserva_confirmada'` AND `pre_evento_status != 'cerrado'` AND
            `date(fecha_evento) = date(hoy) + 1 día` (T-1d, fecha de calendario en la zona
            horaria de negocio, no por instante ni string formateado).
          example: 3
        fichasCerradas:
          type: integer
          minimum: 0
          description: >-
            Nº de fichas efectivamente cerradas en esta ejecución (`FICHA_OPERATIVA.ficha_cerrada
            = true` + `fecha_cierre = now()` + `RESERVA.pre_evento_status → cerrado` +
            `AUDIT_LOG accion='transicion'` origen Sistema). Menor que `candidatas` cuando una
            candidata dejó de serlo bajo transacción (idempotencia / cierre manual US-025
            concurrente) o falló.
          example: 2
        fallos:
          type: integer
          minimum: 0
          description: >-
            Nº de candidatas cuyo cierre falló de forma aislada (rollback de su propia
            transacción, sin afectar al resto del lote).
          example: 0

    BarridoEventosResponse:
      # [US-031 §D-2] Resumen del barrido de inicio automático de evento en T-0
      # (`POST /cron/barrido-eventos`, endpoint dedicado gemelo de `POST /cron/barrido-expiracion`).
      # Misma granularidad que `BarridoExpiracionResponse` (US-012): recuentos agregados de un
      # proceso de Sistema (`X-Cron-Token`, nunca JWT), sin exponer datos de negocio sensibles ni
      # identificadores de RESERVA. Idempotente: las RESERVA ya en `evento_en_curso` no son
      # candidatas, de modo que una 2.ª ejecución arroja `eventosIniciados = 0`.
      type: object
      required: [candidatas, eventosIniciados, precondicionesIncumplidas, fallos]
      properties:
        candidatas:
          type: integer
          minimum: 0
          description: >-
            Nº de RESERVA seleccionadas como candidatas del inicio de evento, cross-tenant:
            `estado = 'reserva_confirmada'` AND `date(fecha_evento) = date(hoy)` (T-0, fecha de
            calendario en la zona horaria de negocio, no por instante ni string formateado).
          example: 4
        eventosIniciados:
          type: integer
          minimum: 0
          description: >-
            Nº de candidatas efectivamente transicionadas `reserva_confirmada → evento_en_curso`
            en esta ejecución (con las tres precondiciones cumplidas + `AUDIT_LOG
            accion='transicion'` origen Sistema). Menor que `candidatas` cuando alguna dejó de
            serlo bajo lock (idempotencia / carrera con el forzado manual US-032) o falló.
          example: 2
        precondicionesIncumplidas:
          type: integer
          minimum: 0
          description: >-
            Nº de candidatas que NO transicionaron por no cumplir las tres precondiciones
            (`pre_evento_status = 'cerrado'` AND `liquidacion_status = 'cobrada'` AND
            `fianza_status = 'cobrada'`); generan una alerta crítica al gestor. El forzado manual
            de la transición es US-032.
          example: 1
        fallos:
          type: integer
          minimum: 0
          description: >-
            Nº de candidatas cuya transición falló de forma aislada (rollback de su propia
            transacción, sin afectar al resto del lote).
          example: 0

    # -------- Comunes --------
    PaginationMetadata:
      # [DECISIÓN F5-03] Forma del envoltorio de paginación no respaldada por fuente; ratificada como convención.
      type: object
      required: [total, page, limit, totalPages]
      properties:
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }
    ErrorResponse:
      # [DECISIÓN F5-01] Envoltorio de error = convención de NestJS (exception filter). Ratificado; documentar en spec.
      type: object
      required: [statusCode, message]
      properties:
        statusCode: { type: integer, example: 409 }
        message:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
          description: Mensaje(s) de error (formato de excepción de NestJS)
        error: { type: string, example: 'Conflict' }