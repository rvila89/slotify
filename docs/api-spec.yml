        codigoPostal: { type: string, minLength: 1, description: 'CĆ³digo postal fiscal del cliente.' }
        poblacion: { type: string, minLength: 1, description: 'PoblaciĆ³n fiscal del cliente.' }
        provincia: { type: string, minLength: 1, description: 'Provincia fiscal del cliente.' }

    # [US-014 #5 / design.md Ā§D-2] Respuesta 200: estado resultante de los cinco campos fiscales del
    # CLIENTE tras el PATCH parcial. Cada campo puede seguir siendo `null` si aĆŗn no se ha informado.
    # Refleja exactamente los campos fiscales del schema `Cliente`.
    ActualizarDatosFiscalesClienteResponse:
      type: object
      required: [dniNif, direccion, codigoPostal, poblacion, provincia]
