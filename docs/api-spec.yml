  # ============================ HISTĆRICO ============================
  # [US-042 / UC-32] Endpoint dedicado de bĆŗsqueda/filtrado del histĆ³rico de reservas CERRADAS.
  # Reemplaza el placeholder previo `GET /historico/reservas` (skeleton pre-US-042). Es una
  # capability propia (`historico`), NO se reutiliza `GET /reservas` (pipeline, US-049): el
  # pipeline excluye SIEMPRE `reserva_completada`/`reserva_cancelada` (invariante duro de su
  # spec) y el histĆ³rico necesita justo el complemento cerrado (design.md Ā§D-1). Lectura pura:
  # NO muta estado, NO produce bloqueos. Aislado por `tenant_id` del JWT (RLS); el `tenant_id`
  # NUNCA viaja en el path. El detalle en modo lectura reutiliza `GET /reservas/{id}`
  # (`ReservaDetalle`), sin endpoint de detalle nuevo (design.md Ā§D-1/Ā§D-4).
  /historico:
    get:
      tags: [Historico]
      operationId: listarHistorico
      summary: Buscar y filtrar en el histĆ³rico (UC-32 / US-042)
      description: |
        [US-042] Lista **paginada** de reservas en **estado cerrado** del tenant autenticado.
        Por defecto (sin `estadoFinal`) devuelve **solo** `reserva_completada`; `reserva_cancelada`
        es **opt-in** explĆ­cito. Nunca devuelve estados activos ni los terminales de consulta
        `2x`/`2y`/`2z` (esos se consultan desde el Pipeline). Resultados ordenados por
        `fechaEvento` **descendente** por defecto (no se expone parĆ”metro de orden en este change).

        Filtros estructurados (todos opcionales, combinados con **AND lĆ³gico** sobre el conjunto
        cerrado del tenant): `q` (full-text), `estadoFinal`, `fechaDesde`/`fechaHasta` (rango
        inclusivo sobre `fecha_evento`), `tipoEvento`, `importeMin`/`importeMax` (rango sobre
        `importe_total`). La bĆŗsqueda `q` opera sobre `CLIENTE.nombre`, `CLIENTE.apellidos`,
        `CLIENTE.email`, `RESERVA.codigo` y `RESERVA.notas` (y solo esos), de forma parametrizada
        (sin SQL raw ni inyecciĆ³n). Un rango sin coincidencias o un tĆ©rmino sin match devuelven
        `200` con `data: []`.

        PaginaciĆ³n obligatoria (`page >= 1`, `limit` 1..100; por defecto `page=1`, `limit=20`).
        `limit` fuera de rango ā `400`. Aislado por `tenant_id` del JWT + RLS; sin JWT ā `401`.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - in: query
          name: q
          schema: { type: string }
          description: >-
            BĆŗsqueda full-text sobre nombre/apellidos/email del cliente, cĆ³digo y notas de la
            reserva. Sin coincidencias ā `200` con `data: []`.
        - in: query
          name: estadoFinal
          schema:
            type: string
            enum: [reserva_completada, reserva_cancelada]
          description: >-
            Estado cerrado a listar. Ausente ā **solo** `reserva_completada`. Opt-in explĆ­cito de
            `reserva_cancelada`. Nunca se mezclan por defecto.
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
          description: LĆ­mite inferior inclusivo del rango sobre `fechaEvento`.
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
          description: LĆ­mite superior inclusivo del rango sobre `fechaEvento`.
        - in: query
          name: tipoEvento
          schema: { $ref: '#/components/schemas/TipoEvento' }
          description: Filtro exacto sobre `RESERVA.tipo_evento`.
        - in: query
          name: importeMin
          schema: { $ref: '#/components/schemas/Importe' }
          description: LĆ­mite inferior del rango sobre `importeTotal` (Decimal(10,2) como string).
        - in: query
          name: importeMax
          schema: { $ref: '#/components/schemas/Importe' }
          description: LĆ­mite superior del rango sobre `importeTotal` (Decimal(10,2) como string).
      responses:
        '200':
          description: >-
            HistĆ³rico paginado del tenant. `data` son filas ligeras de solo lectura
            (`ReservaHistorico`); `metadata` sigue el patrĆ³n de paginaciĆ³n del pipeline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaHistoricoListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /historico/reservas:
    get:
      tags: [Historico]
      deprecated: true
      summary: '[DEPRECADO US-042] Usa GET /historico'
      description: >-
        [DEPRECADO US-042] Placeholder previo (skeleton pre-US-042). Sustituido por el endpoint
        dedicado `GET /historico` (`operationId: listarHistorico`), que aĆ±ade filtros estructurados,
        paginaciĆ³n validada y una fila ligera `ReservaHistorico`. No usar en clientes nuevos.
      parameters:
