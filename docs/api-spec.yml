    FacturaDatosFiscalesIncompletosError:
      # 422: borrador invĆ”lido por datos fiscales del CLIENTE incompletos (design.md Ā§D-9). Bloquea la
      # aprobaciĆ³n y la generaciĆ³n del PDF hasta que el Gestor complete los datos del cliente. Enumera
      # los campos faltantes para que la UI los resalte. Sin efectos.
