        dniNif: { type: string, nullable: true, description: 'DNI/NIF fiscal persistido del cliente.' }
        direccion: { type: string, nullable: true, description: 'DirecciĆ³n fiscal persistida del cliente.' }
        codigoPostal: { type: string, nullable: true, description: 'CĆ³digo postal fiscal persistido del cliente.' }
        poblacion: { type: string, nullable: true, description: 'PoblaciĆ³n fiscal persistida del cliente.' }
        provincia: { type: string, nullable: true, description: 'Provincia fiscal persistida del cliente.' }

    # -------- Calendario [US-039] --------
