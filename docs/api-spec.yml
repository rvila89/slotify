            estĆ” en `borrador`** (ya `enviada` o `cobrada`; p. ej. doble aprobaciĆ³n). No se muta el
            estado ni se re-fija `fechaEmision`. El cuerpo aĆ±ade `codigo` y `motivo` al envelope.
          content:
