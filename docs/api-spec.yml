paths:
  # ============================ AUTH ============================
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesiÃģn (UC-01)
      description: Valida credenciales y devuelve un access token JWT. El refresh token se entrega en una cookie httpOnly.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: AutenticaciÃģn correcta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          # [US-001 FA-01] 401 genÃĐrico anti-enumeration: credenciales invÃĄlidas y cuenta
          # deshabilitada (activo=false) devuelven EXACTAMENTE el mismo shape y mensaje, para
          # no revelar si un email existe o estÃĄ deshabilitado. NO se usa 403 ni un mensaje
          # distinto que permita distinguir ambos casos.
          description: |
            AutenticaciÃģn fallida. Cubre tanto **credenciales invÃĄlidas** como **cuenta
            deshabilitada** (`activo=false`) con idÃĐntico cuerpo de error (decisiÃģn
            anti-enumeration deliberada). El cliente no puede distinguir ambos casos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa el refresh token de la cookie httpOnly para emitir un nuevo access token.
      # [F3-01] La autenticaciÃģn de este endpoint es la cookie de refresh, no el bearer.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Nuevo access token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesiÃģn (UC-02)
      description: |
        Cierra la sesiÃģn del **dispositivo actual**: limpia la cookie httpOnly de
        refresh. Es **best-effort / stateless** â no hay invalidaciÃģn server-side
        persistente del refresh token (decisiÃģn US-002 Â§1); el riesgo residual estÃĄ
        acotado por la cookie httpOnly + TTL del refresh (~7 dÃ­as).

        **Idempotente**: responde 200/204 SIEMPRE, tambiÃĐn en un segundo logout cuando
        la cookie de refresh estÃĄ ausente, expirada o es invÃĄlida; NUNCA devuelve 401
        por falta de cookie. Por eso la cookie de refresh es seguridad **opcional**.

        **No anÃģnimo**: actÃša Ãšnicamente sobre la cookie de refresh del propio llamante.
        No acepta un identificador de usuario de destino (ni en body ni en parÃĄmetros),
        por lo que no puede cerrar la sesiÃģn de otro usuario.

        **AuditorÃ­a (efecto de servidor)**: cuando el refresh token identifica a un
        usuario, el servidor registra en AUDIT_LOG `accion = logout`, `entidad = USUARIO`,
        `usuario_id` y `tenant_id` (bajo contexto RLS del tenant). Si no hay usuario
        identificable (doble logout sin cookie vÃĄlida), NO se audita.

        El **access token previo no se revoca** activamente: sigue siendo vÃĄlido hasta su
        expiraciÃģn natural (~15 min); es el frontend quien lo elimina de memoria.
        [F1-09] Se autentica con la cookie de refresh (no con el access token), para
        permitir el logout aunque el access token ya haya expirado (US-002).
      # [US-002 Â§2] Cookie de refresh OPCIONAL para preservar la idempotencia del doble
      # logout: la ausencia de cookie NO produce 401. El `{}` declara "sin autenticaciÃģn"
      # como alternativa vÃĄlida a `cookieAuth`, en lugar del `bearerAuth` global.
      security:
        - {}
        - cookieAuth: []
      responses:
        '200':
          description: SesiÃģn cerrada de forma idempotente (cuerpo vacÃ­o).
        '204':
          description: SesiÃģn cerrada (sin contenido).

  /auth/me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      description: '[F1-08] Soporte de restauraciÃģn de sesiÃģn del shell (US-000A/US-001).'
      responses:
        '200':
          description: Datos del usuario en sesiÃģn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================ RESERVAS ============================
  /reservas:
    get:
      tags: [Reservas]
      operationId: listarReservas
      summary: Listar reservas (pipeline)
      description: Lista paginada de reservas del tenant con filtros por estado, sub-estado, fecha y canal.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - in: query
          name: estado
          schema: { $ref: '#/components/schemas/EstadoReserva' }
        - in: query
          name: subEstado
          schema: { $ref: '#/components/schemas/SubEstadoConsulta' }
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
          description: BÃšsqueda por cÃģdigo, nombre de cliente o notas
      responses:
        '200':
          description: Reservas recuperadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Reservas]
      summary: Dar de alta un nuevo lead/consulta (UC-03)
      description: |
        Crea una reserva en estado `consulta`. El sub-estado resultante depende de `fechaEvento`:
        - SIN `fechaEvento` (US-003, alta exploratoria) â nace en `2a`, `ttlExpiracion = null`,
          SIN `FechaBloqueada`.
        - CON `fechaEvento` (estrictamente futura) y fecha LIBRE (US-004) â nace en `2b`, dispara
          el bloqueo blando atÃģmico (`FechaBloqueada` con `tipoBloqueo = blando`),
          `ttlExpiracion = now() + ttl_consulta_dias`. La respuesta incluye `tipoBloqueo = blando`.
        - CON `fechaEvento` bloqueada por una consulta en `2b` â nace en `2d` (cola), con
          `posicionCola` y `consultaBloqueanteId`, SIN nueva `FechaBloqueada`.
        - CON `fechaEvento` bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores
          â nace en `2a` exploratoria (`fechaDisponible = false` + `avisoDisponibilidad`
          informativo), sin bloqueo ni cola.

        El CLIENTE se crea/reutiliza de forma idempotente por `(tenant_id, email)`. El campo
        `comentarios` decide el flujo del email E1 (ver su descripciÃģn en `CreateReservaRequest`).
        Si hay `fechaEvento` + nÂš de invitados + horas, E1 incorpora la `tarifaEstimada` (motor
        UC-16); es tolerante: si la tarifa no puede calcularse, E1 sale sin precio y el alta no se
        bloquea.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaRequest'
      responses:
        '201':
          description: |
            Reserva creada (`CreateReservaResponse`). En el alta exploratoria sin fecha (US-003) el
            recurso tiene `estado = 'consulta'`, `subEstado = '2a'`, `ttlExpiracion = null` y los
            campos transitorios ausentes. Con fecha aparecen los campos derivados segÃšn el
            sub-estado: `tipoBloqueo`+`ttlExpiracion` (2b), `posicionCola`+`consultaBloqueanteId`
            (2d), `fechaDisponible`+`avisoDisponibilidad` (2a por fecha no disponible), y
            `tarifaEstimada` cuando E1 la incluye.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservaResponse'
        '400':
          # ValidaciÃģn de entrada (class-validator â exception filter de NestJS). El cuerpo es
          # ErrorResponse con `message` como array de strings (un mensaje por campo afectado).
          # Casos: obligatorios faltantes (cliente.nombre/apellidos/email/telefono), email mal
          # formado, canalEntrada fuera del enum, y [US-004] `fechaEvento` = hoy o fecha pasada
          # (debe ser estrictamente futura, > hoy). En cualquiera de ellos NO se crea RESERVA ni
          # FechaBloqueada.
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /reservas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Reservas]
      summary: Detalle de reserva
      responses:
        '200':
          description: Reserva recuperada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaDetalle'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reservas]
      summary: Actualizar datos de la reserva
      description: |
        ActualizaciÃģn parcial de los campos editables (invitados, duraciÃģn, tipo de evento, notasâĶ).
        No cambia el estado. [F1-07] El nÂš de invitados (US-007) y datos nÃšcleo del lead; la fecha de
        evento NO se asigna aquÃ­ sino vÃ­a /transiciones (ver [F1-01]).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservaRequest'
      responses:
        '200':
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/transiciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Ejecutar una transiciÃģn de estado (UC-04, UC-06, UC-10, UC-23, UC-25, UC-28)
      description: |
        Aplica una transiciÃģn de la mÃĄquina de estados de la reserva. El backend valida la
        transiciÃģn contra la tabla declarativa de transiciones y sus guardas. Cubre, entre otras:
        2.bâ2.c (pendiente invitados), â2.z (descartar por cliente), iniciar evento, finalizar
        evento y archivar. NOTA [US-005]: la asignaciÃģn de fecha (transiciÃģn 2.aâ2.b/2.d) NO se
        hace aquÃ­, sino en el endpoint dedicado `POST /reservas/{id}/fecha` (design.md Â§D-2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransicionRequest'
      responses:
        '200':
          description: TransiciÃģn aplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: TransiciÃģn no permitida o guarda no satisfecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservas/{id}/fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Asignar fecha a una consulta exploratoria â transiciÃģn 2.aâ2.b/2.d (UC-04 / US-005)
      description: |
        [US-005] TransiciÃģn de un agregado RESERVA **existente** en sub-estado `2a` (consulta
        exploratoria) hacia `2b` (consulta con fecha + bloqueo blando) o `2d` (cola), asignando
        `fechaEvento` y disparando el bloqueo atÃģmico de fecha en la **misma transacciÃģn**
        (`SELECT âĶ FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos).

        Difiere de `POST /reservas` (US-003/004, alta de un lead nuevo): aquÃ­ se **muta** un
        agregado ya en `2a`; el nÃšcleo de determinaciÃģn de sub-estado, bloqueo y cola se reutiliza
        (`determinarAltaConFecha` + `bloquearEnTx`, US-004/US-040).

        DeterminaciÃģn del sub-estado destino:
        - fecha **LIBRE** â `2b`, crea `FechaBloqueada` blanda, `ttlExpiracion = now() + ttl_consulta_dias`.
        - fecha bloqueada por una consulta en `2b` â se **ofrece cola**: `409` con
          `colaDisponible=true`; el cliente reenvÃ­a con `aceptarCola=true` para entrar en `2d`
          (`posicionCola`, `consultaBloqueanteId`). La RESERVA permanece en `2a` hasta confirmar.
        - fecha bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores â `409`
          con `colaDisponible=false` (no disponible, sin cola). La RESERVA permanece en `2a`.
        - **carrera D4** (otra transiciÃģn ganÃģ el bloqueo, `P2002`) â se re-deriva a oferta de cola
          (`409 colaDisponible=true`); con `aceptarCola=true` el reintento entra directo a `2d`.

        Flujo interactivo de la cola (FA-01) SIN estado servidor intermedio: la 1ÂŠ llamada informa
        (`409` + `colaDisponible`), la 2ÂŠ con `aceptarCola=true` confirma `2d`.

        Tras el COMMIT de `2aâ2b` se registra/envÃ­a (post-commit, **no bloqueante**) la comunicaciÃģn
        de confirmaciÃģn de bloqueo provisional (extensiÃģn de E1, motor US-045): un fallo de envÃ­o no
        revierte la transiciÃģn ni el bloqueo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarFechaRequest'
      responses:
        '200':
          description: |
            TransiciÃģn aplicada. Devuelve la RESERVA actualizada:
            - `2b`: `subEstado='2b'`, `fechaEvento`, `ttlExpiracion` (bloqueo blando creado).
            - `2d`: `subEstado='2d'`, `fechaEvento`, `posicionCola`, `consultaBloqueanteId`
              (entrada en cola; requiere `aceptarCola=true`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          # fechaEvento ausente, mal formada o NO estrictamente futura (= hoy o pasada). Regla
          # unificada `> hoy` (D-1, coherente con US-004/US-040). No se muta la RESERVA.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Fecha no asignable de inmediato; la RESERVA permanece en `2a`. El cuerpo aÃąade
            `colaDisponible` y `motivo` al envelope de error estÃĄndar:
            - `colaDisponible=true` â bloqueada por una consulta en `2b` (o carrera D4): se ofrece
              cola; reintentar con `aceptarCola=true` para entrar en `2d`.
            - `colaDisponible=false` â bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+:
              no disponible, sin cola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignarFechaConflictoError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO estÃĄ en sub-estado `2a` (p. ej. ya tiene
            fecha, estÃĄ en cola, en un estado terminal `2x/2y/2z` o mÃĄs avanzada). No se muta
            (F5-02: 409 = concurrencia, 422 = transiciÃģn/guarda invÃĄlida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # [US-051 Â§D-2.1] Cambio ATÃMICO de una fecha YA bloqueada. Endpoint DEDICADO (NO reutiliza
  # POST /reservas/{id}/fecha, que solo asigna la PRIMERA fecha 2aâ2b/2d): aquÃ­ la RESERVA ya
  # tiene fecha bloqueada (sub-estados 2b/2c/2v) y se pide moverla a otra fecha.
  /reservas/{id}/cambiar-fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Cambiar la fecha ya bloqueada de una RESERVA â operaciÃģn atÃģmica (US-051)
      description: |
        [US-051 Â§D-2.1] Cambia la `fechaEvento` de una RESERVA que **YA tiene una fecha
        bloqueada** (sub-estados `2b`/`2c`/`2v`) por otra fecha. Es una **Ãšnica transacciÃģn
        atÃģmica** (`SELECT âĶ FOR UPDATE` sobre la RESERVA y sobre `FECHA_BLOQUEADA(tenant_id,
        fecha_nueva)`; `UNIQUE(tenant_id, fecha)`; **sin Redis ni locks distribuidos** â
        `CLAUDE.md Â§Regla crÃ­tica: bloqueo atÃģmico de fecha`):

        1. Si la fecha nueva estÃĄ **LIBRE** â `bloquearFecha(tenant_id, fecha_nueva)`, actualiza
           `RESERVA.fecha_evento`, `liberarFecha(tenant_id, fecha_antigua)` y, si la fecha antigua
           tenÃ­a cola, dispara la **promociÃģn FIFO** (mecÃĄnica A15) del primero en cola.
        2. Si la fecha nueva estÃĄ **OCUPADA** por otra RESERVA â **rechaza con 409 sin tocar nada**
           (rollback total: la RESERVA conserva su fecha antigua y su bloqueo). A diferencia del
           alta/asignaciÃģn (`POST /reservas/{id}/fecha`), aquÃ­ **NO se ofrece cola** para la fecha
           nueva: el conflicto es terminal para esta operaciÃģn (por eso NO lleva `colaDisponible`).

        No cambia estado ni sub-estado (`estado='consulta'`, `subEstado` intacto). Registra
        `AUDIT_LOG` (`accion='actualizar'`, `entidad='RESERVA'`) con la fecha anterior y la nueva.
        La fecha NUNCA se muta por `PATCH /reservas/{id}` (Â§D-1): esa vÃ­a es solo para campos
        simples; toda mutaciÃģn de bloqueo pasa por aquÃ­ o por `POST /reservas/{id}/fecha`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambiarFechaRequest'
      responses:
        '200':
          description: |
