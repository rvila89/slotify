            `aceptado`/`rechazado` (no editable). Rollback total: sin nueva versiĆ³n ni lĆ­neas `RESERVA_EXTRA`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
