openapi: 3.0.0
info:
  title: Slotify API
  description: |
    API REST de **Slotify**, la plataforma SaaS de gestión integral para espacios
    boutique de eventos privados (masías, fincas, villas).

    La reserva es el agregado raíz: recorre toda la máquina de estados, desde los
    sub-estados de consulta (2.a–2.z) hasta `reserva_completada`. El bloqueo atómico
    de fecha se garantiza con la restricción `UNIQUE(tenant_id, fecha)` en PostgreSQL
    y transacciones `SELECT ... FOR UPDATE`.

    La API sigue arquitectura hexagonal + DDD sobre NestJS, es multi-tenant (RLS) y
    expone este contrato OpenAPI como fuente de verdad para generar el cliente HTTP
    type-safe del frontend.

    ## Convenciones
    - Lenguaje ubicuo del dominio en español (reservas, presupuestos, fianza…).
    - Autenticación JWT Bearer (access token de vida corta) + refresh token en cookie httpOnly.
    - Identificadores en formato UUID.
    - [F2-01] Importes monetarios como `string` decimal de 2 decimales (Decimal(10,2)), NUNCA coma flotante,
      para evitar errores de redondeo en facturación; porcentajes como `string` Decimal(4,2).
    - Todas las operaciones están aisladas por tenant (derivado del JWT, no del path).

    ## Salud / documentación
    - [DECISIÓN F1-03] `GET /api/health` y `GET /api/docs` son endpoints operativos/infra (US-000) y
      quedan FUERA de este contrato de negocio a propósito. Confirma si prefieres documentarlos aquí.

  version: 1.2.0
  contact:
    name: Equipo Slotify
  license:
    name: UNLICENSED

servers:
  # [DECISIÓN F5-06] Dominios no respaldados por ninguna fuente; confirma las URLs reales antes de publicar.
  - url: http://localhost:3000/api
    description: Servidor de desarrollo (backend NestJS)
  - url: https://api.slotify.app/api
    description: Servidor de producción

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autenticación y sesión (UC-01, UC-02)
  - name: Reservas
    description: Ciclo de vida de la reserva y transiciones de estado (UC-03 a UC-10, UC-23 a UC-28)
  - name: Cola
    description: Cola de espera de fechas bloqueadas (UC-11 a UC-13)
  - name: Presupuestos
    description: Pre-reserva, tarifas y presupuestos (UC-14 a UC-16)
  - name: Confirmacion
    description: Confirmación de reserva, pagos, facturas y condiciones particulares (UC-17 a UC-19)
  - name: Subprocesos
    description: Sub-procesos paralelos pre-evento, liquidación y fianza (UC-20 a UC-22, UC-26, UC-27)
  - name: Facturas
    description: Emisión de facturas y registro de pagos (UC-18, UC-21)
  - name: FichaOperativa
    description: Briefing operativo del evento (UC-20, UC-24)
  - name: Calendario
    description: Disponibilidad, bloqueo y liberación de fechas (UC-29 a UC-31)
  - name: Clientes
    description: Datos de contacto y fiscales de clientes (atributo de la reserva, no entidad de navegación)
  - name: Historico
    description: Búsqueda y exportación del histórico (UC-32, UC-33)
  - name: Dashboard
    description: KPIs operativos y financieros (UC-34)
  - name: Comunicaciones
    description: Envío y log de emails E1–E8 y manuales (UC-35, UC-36)
  - name: Documentos
    description: Subida y descarga de documentos polimórficos (UC-19, UC-24)
  - name: Cron
    description: Endpoint protegido de barrido periódico (TTLs, cola, recordatorios)

paths:
  # ============================ AUTH ============================
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión (UC-01)
      description: Valida credenciales y devuelve un access token JWT. El refresh token se entrega en una cookie httpOnly.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación correcta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          # [US-001 FA-01] 401 genérico anti-enumeration: credenciales inválidas y cuenta
          # deshabilitada (activo=false) devuelven EXACTAMENTE el mismo shape y mensaje, para
          # no revelar si un email existe o está deshabilitado. NO se usa 403 ni un mensaje
          # distinto que permita distinguir ambos casos.
          description: |
            Autenticación fallida. Cubre tanto **credenciales inválidas** como **cuenta
            deshabilitada** (`activo=false`) con idéntico cuerpo de error (decisión
            anti-enumeration deliberada). El cliente no puede distinguir ambos casos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: Usa el refresh token de la cookie httpOnly para emitir un nuevo access token.
      # [F3-01] La autenticación de este endpoint es la cookie de refresh, no el bearer.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Nuevo access token emitido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión (UC-02)
      description: |
        Cierra la sesión del **dispositivo actual**: limpia la cookie httpOnly de
        refresh. Es **best-effort / stateless** — no hay invalidación server-side
        persistente del refresh token (decisión US-002 §1); el riesgo residual está
        acotado por la cookie httpOnly + TTL del refresh (~7 días).

        **Idempotente**: responde 200/204 SIEMPRE, también en un segundo logout cuando
        la cookie de refresh está ausente, expirada o es inválida; NUNCA devuelve 401
        por falta de cookie. Por eso la cookie de refresh es seguridad **opcional**.

        **No anónimo**: actúa únicamente sobre la cookie de refresh del propio llamante.
        No acepta un identificador de usuario de destino (ni en body ni en parámetros),
        por lo que no puede cerrar la sesión de otro usuario.

        **Auditoría (efecto de servidor)**: cuando el refresh token identifica a un
        usuario, el servidor registra en AUDIT_LOG `accion = logout`, `entidad = USUARIO`,
        `usuario_id` y `tenant_id` (bajo contexto RLS del tenant). Si no hay usuario
        identificable (doble logout sin cookie válida), NO se audita.

        El **access token previo no se revoca** activamente: sigue siendo válido hasta su
        expiración natural (~15 min); es el frontend quien lo elimina de memoria.
        [F1-09] Se autentica con la cookie de refresh (no con el access token), para
        permitir el logout aunque el access token ya haya expirado (US-002).
      # [US-002 §2] Cookie de refresh OPCIONAL para preservar la idempotencia del doble
      # logout: la ausencia de cookie NO produce 401. El `{}` declara "sin autenticación"
      # como alternativa válida a `cookieAuth`, en lugar del `bearerAuth` global.
      security:
        - {}
        - cookieAuth: []
      responses:
        '200':
          description: Sesión cerrada de forma idempotente (cuerpo vacío).
        '204':
          description: Sesión cerrada (sin contenido).

  /auth/me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      description: '[F1-08] Soporte de restauración de sesión del shell (US-000A/US-001).'
      responses:
        '200':
          description: Datos del usuario en sesión
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================ RESERVAS ============================
  /reservas:
    get:
      tags: [Reservas]
      summary: Listar reservas (pipeline)
      description: Lista paginada de reservas del tenant con filtros por estado, sub-estado, fecha y canal.
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Limit' }
        - in: query
          name: estado
          schema: { $ref: '#/components/schemas/EstadoReserva' }
        - in: query
          name: subEstado
          schema: { $ref: '#/components/schemas/SubEstadoConsulta' }
        - in: query
          name: fechaDesde
          schema: { type: string, format: date }
        - in: query
          name: fechaHasta
          schema: { type: string, format: date }
        - in: query
          name: search
          schema: { type: string }
          description: Búsqueda por código, nombre de cliente o notas
      responses:
        '200':
          description: Reservas recuperadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Reservas]
      summary: Dar de alta un nuevo lead/consulta (UC-03)
      description: |
        Crea una reserva en estado `consulta`. El sub-estado resultante depende de `fechaEvento`:
        - SIN `fechaEvento` (US-003, alta exploratoria) → nace en `2a`, `ttlExpiracion = null`,
          SIN `FechaBloqueada`.
        - CON `fechaEvento` (estrictamente futura) y fecha LIBRE (US-004) → nace en `2b`, dispara
          el bloqueo blando atómico (`FechaBloqueada` con `tipoBloqueo = blando`),
          `ttlExpiracion = now() + ttl_consulta_dias`. La respuesta incluye `tipoBloqueo = blando`.
        - CON `fechaEvento` bloqueada por una consulta en `2b` → nace en `2d` (cola), con
          `posicionCola` y `consultaBloqueanteId`, SIN nueva `FechaBloqueada`.
        - CON `fechaEvento` bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores
          → nace en `2a` exploratoria (`fechaDisponible = false` + `avisoDisponibilidad`
          informativo), sin bloqueo ni cola.

        El CLIENTE se crea/reutiliza de forma idempotente por `(tenant_id, email)`. El campo
        `comentarios` decide el flujo del email E1 (ver su descripción en `CreateReservaRequest`).
        Si hay `fechaEvento` + nº de invitados + horas, E1 incorpora la `tarifaEstimada` (motor
        UC-16); es tolerante: si la tarifa no puede calcularse, E1 sale sin precio y el alta no se
        bloquea.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservaRequest'
      responses:
        '201':
          description: |
            Reserva creada (`CreateReservaResponse`). En el alta exploratoria sin fecha (US-003) el
            recurso tiene `estado = 'consulta'`, `subEstado = '2a'`, `ttlExpiracion = null` y los
            campos transitorios ausentes. Con fecha aparecen los campos derivados según el
            sub-estado: `tipoBloqueo`+`ttlExpiracion` (2b), `posicionCola`+`consultaBloqueanteId`
            (2d), `fechaDisponible`+`avisoDisponibilidad` (2a por fecha no disponible), y
            `tarifaEstimada` cuando E1 la incluye.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateReservaResponse'
        '400':
          # Validación de entrada (class-validator → exception filter de NestJS). El cuerpo es
          # ErrorResponse con `message` como array de strings (un mensaje por campo afectado).
          # Casos: obligatorios faltantes (cliente.nombre/apellidos/email/telefono), email mal
          # formado, canalEntrada fuera del enum, y [US-004] `fechaEvento` = hoy o fecha pasada
          # (debe ser estrictamente futura, > hoy). En cualquiera de ellos NO se crea RESERVA ni
          # FechaBloqueada.
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /reservas/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Reservas]
      summary: Detalle de reserva
      responses:
        '200':
          description: Reserva recuperada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservaDetalle'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Reservas]
      summary: Actualizar datos de la reserva
      description: |
        Actualización parcial de los campos editables (invitados, duración, tipo de evento, notas…).
        No cambia el estado. [F1-07] El nº de invitados (US-007) y datos núcleo del lead; la fecha de
        evento NO se asigna aquí sino vía /transiciones (ver [F1-01]).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservaRequest'
      responses:
        '200':
          description: Reserva actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/transiciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Ejecutar una transición de estado (UC-04, UC-06, UC-10, UC-23, UC-25, UC-28)
      description: |
        Aplica una transición de la máquina de estados de la reserva. El backend valida la
        transición contra la tabla declarativa de transiciones y sus guardas. Cubre, entre otras:
        2.b→2.c (pendiente invitados), →2.z (descartar por cliente), iniciar evento, finalizar
        evento y archivar. NOTA [US-005]: la asignación de fecha (transición 2.a→2.b/2.d) NO se
        hace aquí, sino en el endpoint dedicado `POST /reservas/{id}/fecha` (design.md §D-2).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransicionRequest'
      responses:
        '200':
          description: Transición aplicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          description: Transición no permitida o guarda no satisfecha
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reservas/{id}/fecha:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Asignar fecha a una consulta exploratoria — transición 2.a→2.b/2.d (UC-04 / US-005)
      description: |
        [US-005] Transición de un agregado RESERVA **existente** en sub-estado `2a` (consulta
        exploratoria) hacia `2b` (consulta con fecha + bloqueo blando) o `2d` (cola), asignando
        `fechaEvento` y disparando el bloqueo atómico de fecha en la **misma transacción**
        (`SELECT … FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos).

        Difiere de `POST /reservas` (US-003/004, alta de un lead nuevo): aquí se **muta** un
        agregado ya en `2a`; el núcleo de determinación de sub-estado, bloqueo y cola se reutiliza
        (`determinarAltaConFecha` + `bloquearEnTx`, US-004/US-040).

        Determinación del sub-estado destino:
        - fecha **LIBRE** → `2b`, crea `FechaBloqueada` blanda, `ttlExpiracion = now() + ttl_consulta_dias`.
        - fecha bloqueada por una consulta en `2b` → se **ofrece cola**: `409` con
          `colaDisponible=true`; el cliente reenvía con `aceptarCola=true` para entrar en `2d`
          (`posicionCola`, `consultaBloqueanteId`). La RESERVA permanece en `2a` hasta confirmar.
        - fecha bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada` o posteriores → `409`
          con `colaDisponible=false` (no disponible, sin cola). La RESERVA permanece en `2a`.
        - **carrera D4** (otra transición ganó el bloqueo, `P2002`) → se re-deriva a oferta de cola
          (`409 colaDisponible=true`); con `aceptarCola=true` el reintento entra directo a `2d`.

        Flujo interactivo de la cola (FA-01) SIN estado servidor intermedio: la 1ª llamada informa
        (`409` + `colaDisponible`), la 2ª con `aceptarCola=true` confirma `2d`.

        Tras el COMMIT de `2a→2b` se registra/envía (post-commit, **no bloqueante**) la comunicación
        de confirmación de bloqueo provisional (extensión de E1, motor US-045): un fallo de envío no
        revierte la transición ni el bloqueo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignarFechaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada:
            - `2b`: `subEstado='2b'`, `fechaEvento`, `ttlExpiracion` (bloqueo blando creado).
            - `2d`: `subEstado='2d'`, `fechaEvento`, `posicionCola`, `consultaBloqueanteId`
              (entrada en cola; requiere `aceptarCola=true`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '400':
          # fechaEvento ausente, mal formada o NO estrictamente futura (= hoy o pasada). Regla
          # unificada `> hoy` (D-1, coherente con US-004/US-040). No se muta la RESERVA.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Fecha no asignable de inmediato; la RESERVA permanece en `2a`. El cuerpo añade
            `colaDisponible` y `motivo` al envelope de error estándar:
            - `colaDisponible=true` → bloqueada por una consulta en `2b` (o carrera D4): se ofrece
              cola; reintentar con `aceptarCola=true` para entrar en `2d`.
            - `colaDisponible=false` → bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+:
              no disponible, sin cola.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsignarFechaConflictoError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO está en sub-estado `2a` (p. ej. ya tiene
            fecha, está en cola, en un estado terminal `2x/2y/2z` o más avanzada). No se muta
            (F5-02: 409 = concurrencia, 422 = transición/guarda inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/pendiente-invitados:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Marcar consulta como pendiente de invitados — transición 2.b→2.c (UC-06 / US-007)
      description: |
        [US-007] Transición de un agregado RESERVA **existente** en sub-estado `2b` (consulta con
        fecha + bloqueo blando vigente) hacia `2c` (pendiente de número de invitados). En una
        **única transacción** (`SELECT … FOR UPDATE` sobre la fila bloqueante + `UNIQUE(tenant_id,
        fecha)`; sin Redis ni locks distribuidos) ejecuta las **cuatro** operaciones, all-or-nothing:
        1. RESERVA → `subEstado='2c'` y `ttlExpiracion = ttlExpiracion_actual + ttl_consulta_dias`
           (extensión derivada de `TENANT_SETTINGS.ttl_consulta_dias`, **nunca hardcodeada**;
           reutiliza la primitiva atómica `resolverPlanBloqueo({ fase: '2.c' }) → extend`, US-040).
        2. **UPDATE** del `ttl_expiracion` de la fila de `FechaBloqueada` de esa RESERVA al mismo
           nuevo valor (no inserta; la fila ya existe, a diferencia de US-005).
        3. **Vaciado atómico de la cola (A16)**: todas las RESERVA con
           `consultaBloqueanteId = id de esta RESERVA` y `subEstado='2d'` pasan a `subEstado='2y'`
           (descartada por cola, **terminal**), con `posicionCola=null` y `consultaBloqueanteId=null`.
           Si la cola está vacía afecta a 0 filas y la transición se completa igualmente.
        4. `AUDIT_LOG accion='transicion'` de la principal (`2b→2c`) y de cada descartada (`2d→2y`).

        El cuerpo es vacío (`{}`): la acción no toma parámetros; el TTL se deriva del setting del
        tenant. Los **emails automáticos** de descarte de cola (A16) y el email de solicitud de
        invitados de UC-06 paso 7 quedan **fuera de alcance en MVP** (📐 solo diseñados / gap de
        spec sin E-code); solo se implementa la mecánica de la transición.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PendienteInvitadosRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada (`subEstado='2c'`, `ttlExpiracion`
            extendido) y `consultasDescartadas`: recuento de RESERVA de cola pasadas a `2y`
            (feedback para la UI; 0 si no había cola).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendienteInvitadosResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Bloqueo no vigente: la RESERVA NO tiene una fila activa en `FechaBloqueada` para
            `(tenant_id, fechaEvento)`, o su `ttl_expiracion < ahora` (bloqueo expirado). La RESERVA
            no se modifica. El cuerpo añade `motivo` al envelope de error estándar (F5-02: 409 =
            conflicto/precondición de bloqueo; 422 = guarda de transición inválida).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BloqueoNoVigenteError'
        '422':
          description: |
            Guarda de origen no satisfecha: la RESERVA NO está en sub-estado `2b` (p. ej. `2a`, `2c`,
            `2v` o un estado terminal `2x/2y/2z`/`reserva_cancelada`/`reserva_completada`, inmutables).
            No se muta la RESERVA, ni su `FechaBloqueada`, ni ninguna RESERVA de cola (F5-02: 409 =
            concurrencia/precondición, 422 = transición/guarda inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/extender-bloqueo:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Extender plazo del bloqueo blando — prórroga pura del TTL (UC-05 / US-006)
      operationId: extenderBloqueo
      description: |
        [US-006] **Override manual del Gestor** que extiende el `ttlExpiracion` del **bloqueo
        blando vigente** de un agregado RESERVA **existente** antes de que expire, **sin liberar la
        fecha** ni disparar la promoción de cola. Aplica cuando hay bloqueo blando activo:
        `subEstado ∈ {2b, 2c, 2v}` O `estado = 'pre_reserva'`, con `ttlExpiracion > ahora` y **fila
        activa en `FechaBloqueada`** (`tipoBloqueo = 'blando'`).

        A diferencia de US-005/007/008 —que son **transiciones de máquina de estados** (cambian
        `subEstado`)— esta operación es una **prórroga pura del TTL**: **NO** cambia `estado`,
        `subEstado`, `tipoBloqueo` ni `fecha`. En una **única transacción** (`SELECT … FOR UPDATE`
        sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos)
        ejecuta, all-or-nothing:
        1. RESERVA → `ttlExpiracion = ttlExpiracion_actual + dias` (la base es el `ttlExpiracion`
           **actual**, no `now()`; `dias` lo indica el gestor, **no** se deriva de
           `ttl_consulta_dias`).
        2. **UPDATE** del `ttl_expiracion` de la fila de `FechaBloqueada` de esa RESERVA al **mismo
           nuevo valor** (no inserta; la fila ya existe).
        3. `AUDIT_LOG accion='actualizar'`, `entidad='RESERVA'`, con
           `datos_anteriores.ttl_expiracion` (valor previo) y `datos_nuevos.ttl_expiracion` (nuevo).

        Los recordatorios automáticos (A3/A4/A5) se **reprograman implícitamente**: se derivan del
        `ttlExpiracion` y los dispara el barrido periódico (patrón estado-en-fila + barrido,
        `architecture.md §2.5`; barrido US-012). No se introduce ni se toca ningún scheduler. No se
        envía email al cliente al extender (UC-05 no lo describe).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtenderBloqueoRequest'
      responses:
        '200':
          description: |
            Extensión aplicada. Devuelve la RESERVA actualizada con el **nuevo** `ttlExpiracion`
            (= `ttlExpiracion` anterior + `dias`); `estado`, `subEstado`, `tipoBloqueo` y `fecha`
            permanecen sin cambios.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            **Conflicto con el estado del bloqueo en BD** (D-3); la RESERVA no se modifica. El cuerpo
            añade `motivo` al envelope de error estándar. Casos:
            - **TTL ya expirado** (`ttlExpiracion < ahora`): el bloqueo ya caducó; una extensión no
              puede "deshacer" una expiración ya ejecutada por el barrido.
            - **Bloqueo firme** (`estado = 'reserva_confirmada'`, `tipoBloqueo = 'firme'`, **sin
              TTL**): no hay TTL que extender.
            - **Sin fila bloqueante blanda vigente**: la RESERVA no tiene una fila activa en
              `FechaBloqueada` para `(tenant_id, fechaEvento)`.
            (F5-02: 409 = conflicto/precondición de bloqueo; 422 = guarda de estado / validación.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtenderBloqueoConflictoError'
        '422':
          description: |
            **Precondición de estado no extensible o cuerpo inválido** (D-3); la RESERVA no se muta.
            Casos:
            - **Estado sin bloqueo activo extensible**: `subEstado = '2a'` (sin fecha bloqueada) o un
              estado terminal (`2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`). El predicado
              declarativo `esEstadoConBloqueoBlandoExtensible` rechaza estos estados antes de tocar BD.
            - **`dias` inválido**: `0`, negativo o no entero (validación de cuerpo defensiva en
              servidor): "El número de días de extensión debe ser un entero positivo (≥ 1)".
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/visita:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Programar visita al espacio — transición 2.a/2.b/2.c→2.v (UC-07 / US-008)
      operationId: programarVisita
      description: |
        [US-008] Transición de un agregado RESERVA **existente** en sub-estado `2a`
        (exploratoria con `fechaEvento` definida), `2b` (con fecha + bloqueo blando) o `2c`
        (pendiente de invitados) hacia `2v` (visita programada). En una **única transacción**
        (`SELECT … FOR UPDATE` sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis
        ni locks distribuidos) ejecuta, all-or-nothing:
        1. RESERVA → `subEstado='2v'`, `visitaProgramadaFecha=fecha`, `visitaProgramadaHora=hora`,
           `visitaRealizada=false`.
        2. **INSERT-o-UPDATE** (upsert por `UNIQUE(tenant_id, fechaEvento)`) de `FechaBloqueada`
           con `ttlExpiracion = visitaProgramadaFecha + 1 día (23:59:59)` y `tipoBloqueo='blando'`:
           si venía de `2b`/`2c` (fila existente) se **actualiza** el TTL; si venía de `2a` (sin
           bloqueo) se **crea** la fila. El TTL deriva de la fecha de visita, **no** del setting
           `ttl_consulta_dias` (reutiliza la primitiva `resolverPlanBloqueo({ fase: '2.v' })`,
           US-040). El setting `TENANT_SETTINGS.max_dias_programar_visita` solo acota la **ventana
           de entrada** de `fecha`, no el TTL.
        3. `AUDIT_LOG accion='transicion'` (`datos_anteriores.sub_estado` ∈ {2a,2b,2c},
           `datos_nuevos.sub_estado='2v'`, `datos_nuevos.visita_programada_fecha`).

        Tras el COMMIT se dispara (post-commit, **no bloqueante**, motor de email US-045) el email
        **E6** de confirmación de visita y se registra en `COMUNICACION` (`codigo_email='E6'`,
        `estado='enviado'`, `reservaId`, `clienteId`): un fallo de envío **no** revierte la
        transición ni el bloqueo (design.md §D-6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramarVisitaRequest'
      responses:
        '200':
          description: |
            Transición aplicada. Devuelve la RESERVA actualizada: `subEstado='2v'`,
            `visitaProgramadaFecha`, `visitaProgramadaHora`, `visitaRealizada=false` y el nuevo
            `ttlExpiracion` del bloqueo (= fecha de visita + 1 día 23:59:59).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          # Cuerpo mal formado: `fecha`/`hora` ausentes o con formato inválido (no `date` / `HH:mm`).
          # La validación de dominio (ventana de fecha / guarda de origen) se reporta como 422.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Consulta en cola (`subEstado='2d'`): no es posible programar una visita directamente;
            la consulta debe ser **promovida primero** (`POST /reservas/{id}/promover`, UC-12). La
            RESERVA no se modifica. El cuerpo añade `motivo` al envelope de error estándar (F5-02:
            409 = conflicto/precondición de estado; 422 = guarda de transición/validación inválida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramarVisitaConflictoError' }
        '422':
          description: |
            No se puede transicionar a `2v`. Casos (la RESERVA NO se modifica):
            - **Guarda de origen**: el sub-estado de origen no es `2a`/`2b`/`2c` (p. ej. `2v` ya
              programada, o un terminal `2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`,
              inmutables).
            - **`2a` sin `fechaEvento`**: debe introducirse la fecha del evento antes de programar
              la visita.
            - **Fecha fuera de ventana**: `fecha ≤ hoy` (debe ser futura) o
              `fecha > hoy + TENANT_SETTINGS.max_dias_programar_visita` (fuera del límite).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Reservas]
      summary: Registrar resultado de visita (UC-08)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultadoVisitaRequest'
      responses:
        '200':
          description: Resultado registrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

