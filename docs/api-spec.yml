        idExtra: { type: string, format: uuid }
        nombre: { type: string }
        descripcion: { type: string, nullable: true }
        precioUnitario: { $ref: '#/components/schemas/Importe' }
        activo: { type: boolean }

    # -------- Tarifa / Presupuesto / Extra de reserva --------
    # [US-016 / D-1] Esquema canĆ³nico del motor de tarifa (calculo-tarifa).
    # Nombres de campo en snake_case por decisiĆ³n de diseĆ±o D-1 ya aprobada por el gate humano
    # (design.md Ā§D-1): el contrato DEBE usar este esquema tal cual. Los tests TDD y los DTOs
    # backend (@nestjs/swagger) se alinean con estos nombres exactos.
    CalculoTarifaExtraInput:
      # Un extra solicitado al motor: referencia al catĆ”logo del tenant + cantidad.
      type: object
      required: [extra_id, cantidad]
      properties:
        extra_id: { type: string, format: uuid, description: 'ID del EXTRA del catĆ”logo del tenant.' }
        cantidad: { type: integer, minimum: 1, description: 'Unidades del extra (>= 1).' }
    CalculoTarifaRequest:
      # Input del motor (US-016 Ā§Reglas de ValidaciĆ³n). num_ninos_menores4 NO es input del motor.
      type: object
      required: [fecha_evento, duracion_horas, num_adultos_ninos_mayores4]
      properties:
        fecha_evento:
          type: string
          format: date
          description: 'Fecha del evento (YYYY-MM-DD). Debe ser estrictamente futura: no nula, no pasada y no el mismo dĆ­a que la llamada (comparaciĆ³n por dĆ­a natural UTC).'
        duracion_horas: { $ref: '#/components/schemas/DuracionHoras' }
        num_adultos_ninos_mayores4:
          type: integer
          minimum: 0
          description: 'Adultos + niĆ±os mayores de 4 aĆ±os. Los menores de 4 (num_ninos_menores4) no cuentan ni se pasan.'
        extras:
          type: array
          default: []
          description: 'Extras a sumar. Puede ser []. Solo se evalĆŗan en el caso normal (no en tarifa_a_consultar).'
          items: { $ref: '#/components/schemas/CalculoTarifaExtraInput' }
    CalculoTarifaResponse:
      # Esquema de salida canĆ³nico unificado (D-1): vĆ”lido para el caso normal y para tarifa_a_consultar.
      # temporada y tarifa_a_consultar SIEMPRE presentes; los otros cuatro son null si tarifa_a_consultar=true.
      # Importes como number (EUR ya redondeados a cĆ©ntimos, IVA 21% incluido en precio_tarifa_eur) por D-1/D-4;
      # NO se usa el wrapper Importe (string) aquĆ­: es la salida del motor, no una columna Decimal de BD.
      type: object
      required: [temporada, tarifa_a_consultar, precio_tarifa_eur, extras_total_eur, total_eur, tarifa_id]
      properties:
        temporada:
          allOf: [{ $ref: '#/components/schemas/Temporada' }]
          description: 'Temporada resuelta para el mes de fecha_evento. SIEMPRE presente (tambiĆ©n en a_consultar).'
        tarifa_a_consultar:
          type: boolean
          description: 'true cuando num_adultos_ninos_mayores4 > 50 (tramo +51 sin tarifa): precio manual. SIEMPRE presente.'
        precio_tarifa_eur:
          type: number
          nullable: true
          description: 'Precio de la TARIFA en EUR (IVA 21% incluido). null si tarifa_a_consultar=true.'
        extras_total_eur:
          type: number
          nullable: true
          description: 'Suma de subtotales de extras (precio_eur x cantidad). null si tarifa_a_consultar=true.'
        total_eur:
          type: number
          nullable: true
          description: 'precio_tarifa_eur + extras_total_eur. null si tarifa_a_consultar=true.'
        tarifa_id:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA usada. null si tarifa_a_consultar=true.'
    # -------- Errores de dominio del motor de tarifa (US-016 D-3) --------
    # Reutilizan el envelope NestJS (ErrorResponse) y aĆ±aden `codigo` (error de dominio) + `detalle` diagnĆ³stico.
    CalculoTarifaTarifaNoConfiguradaError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, detalle]
          properties:
            codigo: { type: string, enum: [TARIFA_NO_CONFIGURADA] }
            detalle:
              type: object
              required: [temporada, duracion_horas, num_invitados]
              properties:
                temporada: { $ref: '#/components/schemas/Temporada' }
                duracion_horas: { $ref: '#/components/schemas/DuracionHoras' }
                num_invitados: { type: integer }
              description: 'ParĆ”metros de bĆŗsqueda sin fila de TARIFA vigente (tarifario incompleto, num_invitados <= 50).'
    CalculoTarifaExtraNoEncontradoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, detalle]
          properties:
            codigo: { type: string, enum: [EXTRA_NO_ENCONTRADO] }
            detalle:
              type: object
              required: [extra_id, motivo]
              properties:
                extra_id: { type: string, format: uuid }
                motivo:
                  type: string
