        '422':
          description: |
            ValidaciĆ³n de negocio sin efectos (F5-02: 422 = guarda/validaciĆ³n invĆ”lida). Casos:
            - **Datos fiscales/de la reserva incompletos (FA-01)**: falta `dniNif`/`direccion`/
              `codigoPostal`/`poblacion`/`provincia` del CLIENTE o datos de la RESERVA ā el cuerpo
