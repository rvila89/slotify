  # ============================ US-014: PRESUPUESTO (preview + confirmar) ============================
  # [US-014 / UC-14] Dos endpoints dedicados que sustituyen al POST /reservas/{id}/presupuestos (plural,
  # DEPRECADO abajo). DecisiĆ³n de contrato D-8 (Gate SDD aprobado): preview NO persiste, confirmar es la
  # transacciĆ³n Ćŗnica (PRESUPUESTO + pre_reserva + bloqueo 7d + vaciado cola A16 + AUDIT_LOG) + E2
  # post-commit. Mapeo HTTP heredado de F5-02: 409 = conflicto/concurrencia (UNIQUE tenant_id+fecha /
  # guarda de estado); 422 = validaciĆ³n/guarda de negocio (datos fiscales, tarifario, precio manual).
  /reservas/{id}/presupuesto/preview:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Calcular borrador del presupuesto sin persistir (UC-14 / US-014)
      operationId: previewPresupuesto
      description: |
        [US-014] Calcula el **borrador editable** del presupuesto de la RESERVA `{id}` delegando el
        cĆ”lculo al **motor de tarifa** (US-016, capability `calculo-tarifa`). **NO persiste** nada: no
        crea PRESUPUESTO, no muta `RESERVA.estado`/`subEstado`/`ttlExpiracion` ni `FechaBloqueada`, y no
        envĆ­a ningĆŗn email. Es una operaciĆ³n de solo cĆ”lculo para revisar y ajustar antes de confirmar.

        **Guarda de origen** (mĆ”quina de estados declarativa): solo se permite sobre una RESERVA en
        `estado='consulta'` con `subEstado ā {2a,2b,2c,2v}` y **sin** PRESUPUESTO `enviado`/`aceptado`
        previo. El origen `2d` (cola), los terminales (`2x`/`2y`/`2z`) y `pre_reserva`+ se rechazan
        **antes** de invocar el motor de tarifa.

        **ValidaciĆ³n fiscal previa** (sĆ­ncrona, antes del motor): la RESERVA debe tener `fechaEvento`
        (futura vĆ”lida), `duracionHoras`, `numAdultosNinosMayores4 ā„ 1`, `tipoEvento`, y el CLIENTE
        **todos** los datos fiscales no nulos (`dniNif`, `direccion`, `codigoPostal`, `poblacion`,
        `provincia`). Si falta alguno ā 422 enumerando los campos faltantes.

        **Caso `tarifa_a_consultar`** (>50 invitados): el motor devuelve importes `null`; la respuesta
        propaga `tarifaAConsultar=true` y el desglose fiscal queda `null` salvo que se envĆ­e
        `precioManualEur`, con el que se recalcula el desglose (base = total / 1.21, IVA 21%).
      requestBody:
