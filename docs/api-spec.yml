        El cuerpo es vacĆ­o (`{}`): la acciĆ³n no toma parĆ”metros; el TTL se deriva del setting del
        tenant. Los **emails automĆ”ticos** de descarte de cola (A16) y el email de solicitud de
        invitados de UC-06 paso 7 quedan **fuera de alcance en MVP** (š solo diseĆ±ados / gap de
