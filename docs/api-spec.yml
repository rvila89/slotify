    # US-028 (LiquidacionError). No se inventan formatos, wrappers ni paginaciĆ³n.
    PagoLiquidacion:
      # Vista de lectura del PAGO conciliado contra la factura de liquidaciĆ³n (er-diagram Ā§3.13 PAGO).
      # `tenant_id` NO se expone en el DTO (viaja/deriva del JWT, RLS); nunca en path ni body.
