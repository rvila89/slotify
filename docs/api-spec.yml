          # (datos fiscales, tarifario, guarda de origen) se reporta como 422/409.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Guarda de origen / precondiciĆ³n de estado (F5-02: 409 = conflicto de estado). La RESERVA no
            es un origen vĆ”lido: estĆ” en `2d` (cola), en un terminal (`2x`/`2y`/`2z`), en `pre_reserva`+,
            o ya tiene un PRESUPUESTO `enviado`/`aceptado` (remite a la ediciĆ³n, UC-15). No se ejecuta el
            motor de tarifa ni se muta nada.
