            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /facturas/{id}/aprobar:
    parameters:
      - { $ref: '#/components/parameters/IdGenerico' }
    post:
      tags: [Facturacion]
      summary: Aprobar el borrador de la factura de seĆ±al ā borrador ā enviada (UC-18 / US-022)
      operationId: aprobarFactura
      description: |
        [US-022] El **Gestor aprueba** el borrador de la factura de seĆ±al `{id}`. Precondiciones
        (validadas en servidor, autoritativas): la FACTURA estĆ” en `estado='borrador'`, tiene
        `pdfUrl` (PDF disponible) y **datos fiscales vĆ”lidos** (borrador no invĆ”lido). Si se
        cumplen, en una transacciĆ³n: `estado ā 'enviada'`, se fija `fechaEmision` con el timestamp
        actual y la factura queda **lista para adjuntarse en E3**.

