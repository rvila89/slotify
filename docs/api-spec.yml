  # [DECISIĆN F1-02] AcciĆ³n de aprobar/enviar factura (US-028). Cierra la laguna "SIN ENDPOINT".
  # Confirma este enfoque (acciĆ³n dedicada) frente a un PATCH /facturas/{id} con cambio de estado.
