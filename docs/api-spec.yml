    # [US-032 D-1] Respuesta 200 de POST /reservas/{id}/forzar-inicio-evento: la RESERVA re-leĆ­da
    # post-commit (ya en `evento_en_curso`) mĆ”s `forzadoPorGestor` (siempre true, marca del override
