          nullable: true
          description: >-
            [reserva-viva] Precio total manual (IVA incluido) para el caso `tarifaAConsultar=true`
            (`numAdultosNinosMayores4 > 50` o sin TARIFA configurada). Obligatorio cuando el motor
            devuelve `tarifaAConsultar=true`; su ausencia en ese caso ā 422. Ignorado si el motor
            resuelve una tarifa.
        numInvitadosConfirmado:
          type: integer
          nullable: true
          deprecated: true
          description: >-
            DEPRECATED [reserva-viva]: ya no escribe el aforo estructural (es un valor DERIVADO del
            desglose de invitados, ver `numAdultosNinosMayores4`/`numNinosMenores4`). Se conserva
            por backward-compat; el backend lo ignora como fuente de aforo estructural.
        contactoEventoNombre: { type: string, nullable: true }
        contactoEventoTelefono: { type: string, nullable: true }
        contactoEventoCorreo: { type: string, nullable: true }
        horaLlegada: { type: string, nullable: true }
        duracion:
          type: string
          nullable: true
          deprecated: true
          description: >-
            DEPRECATED [reserva-viva]: duraciĆ³n como texto libre; ya no escribe la duraciĆ³n
            estructural (usar `duracionHoras`, enum `{4,8,12}`). Se conserva por backward-compat.
        notasOperativas: { type: string, nullable: true }
        briefingEquipo: { type: string, nullable: true }

    # [reserva-viva] Resultado del RECĆLCULO en cascada disparado por un PATCH que cambia un campo
    # estructural (aforo/duraciĆ³n) dentro de la ventana viva. Va dentro de
    # GuardarFichaOperativaResponse. Importes como Decimal(10,2) string. Las versiones son las
    # filas REGENERADAS (PRESUPUESTO de modificaciĆ³n + FACTURA de liquidaciĆ³n). Cuando el guardado
    # no toca campos estructurales (no-op de recĆ”lculo), `recalculo` es `null` en la respuesta.
    RecalculoResultado:
      type: object
      required: [tarifaAConsultar]
      description: >-
        Snapshot del recĆ”lculo en cascada: nuevo total re-congelado, pago inicial (seĆ±al FIJA, no
        recalculada) y liquidaciĆ³n restante, mĆ”s las versiones regeneradas de presupuesto y
        liquidaciĆ³n. En el caso `tarifaAConsultar=true` sin `precioManualEur` los importes son
        `null` (el Gestor debe introducir el precio).
      properties:
        tarifaAConsultar:
          type: boolean
          description: >-
            `true` cuando `numAdultosNinosMayores4 > 50` o no hay TARIFA configurada: el motor no
            resuelve precio y se exige `precioManualEur`. Si se enviĆ³ `precioManualEur`, los
            importes de abajo se derivan de Ć©l.
        nuevoTotal:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          nullable: true
          description: >-
            Nuevo `RESERVA.importe_total` re-congelado por el recĆ”lculo. `null` si
            `tarifaAConsultar=true` sin `precioManualEur`.
        pagoInicial:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          nullable: true
          description: >-
            "Pago inicial ya realizado" = `RESERVA.importe_senal` congelado (importe FIJO, NO
            recalculado sobre el nuevo total). `null` si no aplica.
        liquidacionRestante:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          nullable: true
          description: >-
            "LiquidaciĆ³n restante" = `nuevoTotal ā pagoInicial` (= `RESERVA.importe_liquidacion`
            re-congelado). `null` si `tarifaAConsultar=true` sin `precioManualEur`.
        versionPresupuesto:
          type: integer
          nullable: true
          description: >-
            `version` de la nueva fila de PRESUPUESTO de modificaciĆ³n generada (`MAX(version)+1`).
            `null` si no se regenerĆ³ presupuesto.
        versionLiquidacion:
          type: integer
          nullable: true
          description: >-
            VersiĆ³n/identificador de la FACTURA de liquidaciĆ³n regenerada. `null` si no se regenerĆ³
            liquidaciĆ³n.

    # [reserva-viva] Respuesta 200 del PATCH /reservas/{id}/ficha-operativa: la FichaOperativa
    # (con pre-relleno y campos estructurados) MĆS el resultado del recĆ”lculo. `recalculo` es
    # `null` cuando el guardado no tocĆ³ aforo/duraciĆ³n estructural (no hubo recĆ”lculo). PatrĆ³n
    # allOf(FichaOperativa) + campo de resultado, como CerrarFichaOperativaResponse.
    GuardarFichaOperativaResponse:
      allOf:
        - $ref: '#/components/schemas/FichaOperativa'
        - type: object
          properties:
            recalculo:
              allOf: [{ $ref: '#/components/schemas/RecalculoResultado' }]
              nullable: true
              description: >-
                Resultado del recĆ”lculo en cascada, o `null` si el guardado no cambiĆ³ ningĆŗn campo
                estructural (aforo/duraciĆ³n) y por tanto no disparĆ³ recĆ”lculo.

    # [US-025] Respuesta 200 de POST /reservas/{id}/ficha-operativa/cerrar (D-6): la ficha cerrada
    # mĆ”s `avisosCamposVacios`, la lista (posiblemente vacĆ­a) de nombres de campos de contenido que
    # quedaron sin rellenar. Es un aviso INFORMATIVO, nunca un error: el cierre no se bloquea por
    # campos vacĆ­os.
    CerrarFichaOperativaResponse:
