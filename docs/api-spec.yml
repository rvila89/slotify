             (`CONDICIONES_REQUERIDAS` / `FORMATO_NO_PERMITIDO` / `TAMANO_EXCEDIDO`); sin efectos.
        2. Sube el fichero firmado al almacĆ©n de documentos (clave por reserva versionada, se conservan
