    # -------- 6.4b / US-023: EnvĆ­o de la factura de seĆ±al (40%) + condiciones por E3 (facturacion) --------
    # [US-023 / UC-18] Request/response del envĆ­o atĆ³mico de la factura de seĆ±al. El cuerpo es VACĆO (la
    # seĆ±al no se negocia). La respuesta reutiliza el schema `Factura` para la factura emitida y aĆ±ade los
