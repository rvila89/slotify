           (guarda pura reutilizada de US-031). El resultado **NO veta** la transiciĆ³n (a diferencia
           de US-031): solo alimenta la evidencia de auditorĆ­a. La lista `faltantes` se persiste en
           `AUDIT_LOG.datos_nuevos.precondiciones_incumplidas` (puede ser `[]` si por un caso borde
           las tres estaban cumplidas al forzar).
