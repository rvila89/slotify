    description: >-
      Vista de lectura agregada operativa: 7 widgets del estado de las reservas del tenant
      (UC-34 / US-044). No incluye el dashboard financiero ni KPIs avanzados (Â§7.2, fuera de MVP).
  - name: Comunicaciones
    description: EnvÃ­o y log de emails E1âE8 y manuales (UC-35, UC-36)
  - name: Documentos
