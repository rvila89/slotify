  # ============================ DASHBOARD ============================
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Visualizar dashboard operativo (UC-34 / US-044)
      operationId: consultarDashboard
      description: |
        [US-044] Vista de **lectura pura** (NO muta estado) que agrega en una sola respuesta
        el estado operativo del tenant en **7 widgets** (Ā§7.1 SlotifyGeneralSpecs, design.md
        Ā§D-1: un Ćŗnico endpoint agregado en vez de 7). Cada widget devuelve sus `items` y el
        `total` de elementos que satisfacen su criterio; cada Ć­tem enlaza a la ficha de la
        `RESERVA` (`enlace`). El widget `proximos30Dias` aĆ±ade el `color` semĆ”ntico canĆ³nico
        derivado del par `(estado, subEstado)`, el **mismo cĆ³digo cromĆ”tico que el Calendario
        (US-039 / Ā§11.3)** ā reutilizado, no reimplementado (design.md Ā§D-2).

        Widgets (design.md Ā§D-1):
        - **hoyManana**: reservas con `fecha_evento ā {hoy, maĆ±ana}` en `reserva_confirmada`
          o `evento_en_curso`, ordenadas por `fecha_evento` asc.
        - **pipeline**: recuento de reservas `activo = true` agrupado por `estado`/`sub_estado`
          (Exploratoria, Con fecha, Pendiente invitados, En cola, Visita programada,
          Pre-reserva, Confirmada).
        - **subProcesosCriticos**: `reserva_confirmada` con sub-proceso atrasado
          (`pre_evento_status ā  cerrado` con evento prĆ³ximo, `liquidacion_status ā  cobrada`
          o `fianza_status ā  cobrada`).
        - **pendientes**: acciones requeridas (presupuesto `enviado` sin respuesta, TTL en las
          prĆ³ximas 24 h, factura `enviada` sin pago con vencimiento superado).
        - **consultasEnCola**: reservas en `sub_estado = 2d`, agrupables por `fecha_evento`.
        - **visitasProgramadas**: `sub_estado = 2v` con `visita_programada_fecha` futura,
          ordenadas por `visita_programada_fecha` asc.
        - **proximos30Dias**: reservas con `fecha_evento ā [hoy, hoy + 30 dĆ­as]` (inclusive),
