      # El sistema reintenta automĆ”ticamente; la aprobaciĆ³n queda bloqueada hasta que pdfUrl exista.
      # Distinto de DATOS_FISCALES_INCOMPLETOS (fallo de datos que NO se reintenta solo). Sin efectos.
