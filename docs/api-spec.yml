              type: object
              required: [mes]
              properties:
                mes: { type: integer, minimum: 1, maximum: 12, description: 'Mes (1-12) sin fila en TEMPORADA_CALENDARIO del tenant.' }
    Presupuesto:
      type: object
      properties:
        idPresupuesto: { type: string, format: uuid }
        reservaId: { type: string, format: uuid }
        version: { type: integer }
        baseImponible: { $ref: '#/components/schemas/Importe' }
        ivaPorcentaje: { $ref: '#/components/schemas/Porcentaje' }
        ivaImporte: { $ref: '#/components/schemas/Importe' }
        total: { $ref: '#/components/schemas/Importe' }
        descuentoEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        descuentoMotivo: { type: string, nullable: true }
        pdfUrl: { type: string, nullable: true }
        estado: { $ref: '#/components/schemas/EstadoPresupuesto' }
        fechaEnvio: { type: string, format: date-time, nullable: true }
        metodoPago:
          allOf: [{ $ref: '#/components/schemas/MetodoPago' }]
          nullable: true
          description: '[6.2] MĆ©todo de pago con el que se generĆ³ (nullable en filas de 6.1b con backfill a `transferencia`).'
        regimenIva:
          allOf: [{ $ref: '#/components/schemas/RegimenIva' }]
          nullable: true
          description: '[6.2] RĆ©gimen fiscal derivado del mĆ©todo de pago (nullable en filas de 6.1b con backfill a `con_iva`).'
        numeroPresupuesto:
          type: string
          nullable: true
          pattern: '^\d{7}$'
          example: '2026001'
          description: >-
            [6.2] NĆŗmero de presupuesto con formato `AAAANNN` (aĆ±o + contador de 3 dĆ­gitos). Asignado en la
            confirmaciĆ³n desde la secuencia del rĆ©gimen (doble numeraciĆ³n por tenant/aĆ±o/rĆ©gimen).
    CreatePresupuestoRequest:
      type: object
      properties:
        descuentoEur: { $ref: '#/components/schemas/Importe' }
        descuentoMotivo: { type: string }
        extras:
          type: array
          items: { $ref: '#/components/schemas/CreateReservaExtraRequest' }
    UpdatePresupuestoRequest:
      type: object
      properties:
        descuentoEur: { $ref: '#/components/schemas/Importe' }
        descuentoMotivo: { type: string }
        enviar: { type: boolean, description: 'Si true, marca como enviado y dispara el email' }

    # -------- US-014: Presupuesto preview (borrador, no persiste) + confirmar (pre_reserva) --------
    # [US-014 / UC-14] Reutiliza los tipos existentes (Importe string, Porcentaje string, Reserva,
    # EstadoPresupuesto) y el esquema del motor de tarifa (CalculoTarifaExtraInput / CalculoTarifaResponse,
    # snake_case por D-1). Los payloads propios de US-014 siguen la convenciĆ³n camelCase del contrato de
    # negocio (baseImponible, descuentoEur, precioManualEur), no la snake_case del motor.
    PresupuestoExtraInput:
      # Un extra seleccionado por el Gestor para el presupuesto: referencia al catĆ”logo + cantidad.
      # Reutiliza la forma de CalculoTarifaExtraInput (extra_id/cantidad) que consume el motor de tarifa.
      type: object
      required: [extra_id, cantidad]
      properties:
        extra_id: { type: string, format: uuid, description: 'ID del EXTRA del catĆ”logo del tenant.' }
        cantidad: { type: integer, minimum: 1, description: 'Unidades del extra (>= 1).' }
    RepartoPago:
      # Reparto informativo 40% seĆ±al / 60% liquidaciĆ³n + fianza que se muestra en el borrador y en el PDF.
      # Importes string (Decimal 10,2). NO crea FACTURA en este change (solo texto informativo del PDF).
      type: object
      required: [senalEur, liquidacionEur, fianzaEur]
      properties:
        senalEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: '40% del total (seĆ±al). Derivado de TENANT_SETTINGS.pct_senal.' }
        liquidacionEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: '60% del total (liquidaciĆ³n).' }
        fianzaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: 'Fianza (TENANT_SETTINGS.fianza_default_eur), fuera del total.' }
    DesgloseFiscal:
      # Desglose fiscal congelado (D-5): base + IVA + total. Presente en el borrador (preview) y
      # persistido en el PRESUPUESTO al confirmar. La base es la MISMA en ambos regĆ­menes; el rĆ©gimen
      # (6.2) decide si se le suma el IVA. CON IVA: total = base + IVA21; ivaImporte = total - base.
      # SIN IVA: total = base; ivaPorcentaje = "0.00"; ivaImporte = "0.00".
      type: object
      required: [baseImponible, ivaPorcentaje, ivaImporte, total]
      properties:
        baseImponible: { $ref: '#/components/schemas/Importe' }
        ivaPorcentaje: { allOf: [{ $ref: '#/components/schemas/Porcentaje' }], description: '"21.00" en rĆ©gimen con_iva; "0.00" en sin_iva (6.2).' }
        ivaImporte: { $ref: '#/components/schemas/Importe' }
        total: { $ref: '#/components/schemas/Importe' }
    PreviewPresupuestoRequest:
      # Body del preview. `metodoPago` es OBLIGATORIO (6.2): fija el rĆ©gimen fiscal que rige el borrador
      # (importe/variante CON o SIN IVA). El resto simula extras/descuento/precio manual.
      type: object
      additionalProperties: false
      required: [metodoPago]
      properties:
        metodoPago:
          allOf: [{ $ref: '#/components/schemas/MetodoPago' }]
          description: >-
            [6.2] MĆ©todo de pago elegido por el Gestor. OBLIGATORIO. Determina el rĆ©gimen fiscal del
            borrador (`transferencia ā con_iva`, `efectivo ā sin_iva`) y con ello el desglose/total y la
            variante del PDF.
        extras:
          type: array
          default: []
          description: 'Extras a incluir en el borrador. Se pasan al motor de tarifa para sumar subtotales.'
          items: { $ref: '#/components/schemas/PresupuestoExtraInput' }
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Descuento a restar del total, opcional.'
        precioManualEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Precio total manual (IVA incluido) para el caso `tarifaAConsultar=true` (>50 invitados). Si se
            envĆ­a, el desglose fiscal se recalcula a partir de Ć©l; ignorado en el caso normal.
    PresupuestoPreviewResponse:
      # Resultado del cĆ”lculo del borrador (NO persistido). Combina el output canĆ³nico del motor de tarifa
      # (tarifa) con el desglose fiscal derivado, los extras, el reparto 40/60/fianza y las banderas de flujo.
      type: object
      required: [tarifaAConsultar, tarifa, extrasTotalEur, regimenIva]
      properties:
        tarifaAConsultar:
          type: boolean
          description: '`true` cuando el motor no tiene tarifa para el tramo (>50 invitados): habilita precio manual.'
        regimenIva:
          allOf: [{ $ref: '#/components/schemas/RegimenIva' }]
          description: >-
            [6.2] RĆ©gimen fiscal derivado del `metodoPago` del request. Fija la variante del borrador:
            `con_iva` (base + IVA 21%) o `sin_iva` (total = base, sin IVA).
        tarifa:
          allOf: [{ $ref: '#/components/schemas/CalculoTarifaResponse' }]
          description: 'Salida canĆ³nica del motor de tarifa (US-016, snake_case). Importes null si tarifaAConsultar.'
        extrasTotalEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Suma de subtotales de extras (Decimal string). "0.00" si no hay extras.'
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          nullable: true
          description: 'Descuento aplicado en el borrador, si el Gestor lo indicĆ³.'
        desglose:
          allOf: [{ $ref: '#/components/schemas/DesgloseFiscal' }]
          nullable: true
          description: >-
            Desglose fiscal (base/IVA/total). `null` cuando `tarifaAConsultar=true` y no se enviĆ³
            `precioManualEur` (el Gestor debe introducir el precio para completar el desglose).
        reparto:
          allOf: [{ $ref: '#/components/schemas/RepartoPago' }]
          nullable: true
          description: 'Reparto 40%/60% + fianza. `null` mientras el total sea desconocido (tarifa a consultar sin precio).'
    ConfirmarPresupuestoRequest:
      # Body de la confirmaciĆ³n (crea el PRESUPUESTO congelado + activa pre_reserva).
      # `metodoPago` es OBLIGATORIO (6.2): determina el rĆ©gimen fiscal persistido, la variante del PDF y la
      # secuencia de numeraciĆ³n. Su ausencia produce error de validaciĆ³n (422/400) sin crear PRESUPUESTO.
      type: object
      required: [metodoPago]
      properties:
        metodoPago:
          allOf: [{ $ref: '#/components/schemas/MetodoPago' }]
          description: >-
            [6.2] MĆ©todo de pago elegido por el Gestor. OBLIGATORIO. Deriva el `regimenIva` persistido
            (`transferencia ā con_iva`, `efectivo ā sin_iva`), que fija el desglose/total, la variante del
            PDF y la secuencia de `numeroPresupuesto` (doble numeraciĆ³n por rĆ©gimen).
        extras:
          type: array
          default: []
          description: 'Extras definitivos del presupuesto (origen=presupuesto).'
          items: { $ref: '#/components/schemas/PresupuestoExtraInput' }
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Descuento aplicado al total, opcional.'
        descuentoMotivo:
          type: string
          description: 'JustificaciĆ³n del descuento (persistida en PRESUPUESTO.descuento_motivo), opcional.'
        precioManualEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Precio total manual (IVA incluido). OBLIGATORIO cuando el motor devuelve `tarifa_a_consultar`
            (>50 invitados); su ausencia en ese caso produce 422. Ignorado en el caso normal.
    ConfirmarPresupuestoResponse:
      # Respuesta 201: el PRESUPUESTO creado (congelado) + la RESERVA resultante en pre_reserva.
      type: object
      required: [presupuesto, reserva]
      properties:
        presupuesto:
          allOf: [{ $ref: '#/components/schemas/Presupuesto' }]
          description: >-
            PRESUPUESTO congelado creado (`version=1`, `tarifaCongelada=true`, `estado='enviado'`,
            `ivaPorcentaje='21.00'`, desglose fiscal completo, `pdfUrl` si el PDF se generĆ³).
        tarifaId:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA congelada usada; `null` en el caso `tarifa_a_consultar` (precio manual).'
        reparto:
          $ref: '#/components/schemas/RepartoPago'
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: 'RESERVA resultante: `estado=pre_reserva`, `ttlExpiracion = now() + ttl_prereserva_dias`.'
        consultasDescartadas:
          type: integer
          minimum: 0
          example: 0
          description: 'Recuento de RESERVA de cola (`2d`) pasadas a `2y` por el vaciado A16. `0` si no habĆ­a cola.'

    # -------- US-015: Editar / reenviar presupuesto en pre_reserva (UC-15) --------
    # [US-015 / UC-15] EdiciĆ³n versionada + reenvĆ­o sin cambios. Reutiliza los tipos de US-014 (Importe/
    # Porcentaje string, DesgloseFiscal, RepartoPago, Presupuesto, Reserva, MetodoPago, RegimenIva,
    # CalculoTarifaResponse) y los errores de dominio (PresupuestoGuardaOrigenError 409,
    # PresupuestoDatosFiscalesError / PresupuestoPrecioManualRequeridoError 422). Solo se aĆ±aden los
    # payloads propios de la ediciĆ³n. `tenant_id`/`usuario_id` NUNCA en el body (van en el JWT).
    EdicionExtraInput:
      # Una lĆ­nea de extra propuesta en la ediciĆ³n. A diferencia de PresupuestoExtraInput (motor de tarifa,
      # snake_case), este payload sigue la convenciĆ³n camelCase del contrato de negocio y admite `conceptoLibre`
      # para extras fuera de catĆ”logo. El body NUNCA dicta el `precioUnitario`: el server lo CONGELA con el
      # precio actual del EXTRA del catĆ”logo (lĆ­neas nuevas) o conserva el congelado (lĆ­neas existentes).
      type: object
      required: [cantidad]
      properties:
        extraId:
          type: string
          format: uuid
          nullable: true
          description: 'ID del EXTRA del catĆ”logo del tenant. Null para un extra fuera de catĆ”logo (usa `conceptoLibre`).'
        conceptoLibre:
          type: string
          nullable: true
          description: 'DescripciĆ³n del extra fuera de catĆ”logo (cuando `extraId` es null). El precio de estos lo fija el server.'
        cantidad:
          type: integer
          minimum: 1
          description: 'Unidades del extra (>= 1). Recalcula `subtotal = precioUnitario Ć cantidad` sin cambiar el precio congelado.'
    EdicionPresupuestoPreviewRequest:
      # Body del preview de ediciĆ³n. Todos los campos editables son opcionales salvo `metodoPago` (fija el
      # rĆ©gimen fiscal del borrador). `extras` sustituye el conjunto propuesto de lĆ­neas (el server congela
      # precios). Sin persistir nada.
      type: object
      additionalProperties: false
      required: [metodoPago]
      properties:
        metodoPago:
          allOf: [{ $ref: '#/components/schemas/MetodoPago' }]
          description: >-
            [6.2] MĆ©todo de pago elegido por el Gestor. OBLIGATORIO. Determina el rĆ©gimen fiscal del borrador
            (`transferencia ā con_iva`, `efectivo ā sin_iva`) y con ello el desglose/total y la variante del PDF.
        numAdultosNinosMayores4:
          type: integer
          minimum: 1
          description: 'Nuevo nĀŗ de invitados (adultos + niĆ±os > 4 aĆ±os). Si cambia de tramo, recalcula la tarifa vĆ­a motor US-016.'
        duracionHoras:
          type: integer
          enum: [4, 8, 12]
          description: 'Nueva duraciĆ³n del evento en horas. Solo `{4,8,12}`; recalcula la tarifa. Fuera de rango ā 422.'
        extras:
          type: array
          default: []
          description: 'Conjunto propuesto de lĆ­neas de extras. El server congela el `precioUnitario` de las lĆ­neas nuevas.'
          items: { $ref: '#/components/schemas/EdicionExtraInput' }
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Descuento a restar del total. `>= 0` y `<= baseImponible` (si no, 422).'
        descuentoMotivo:
          type: string
          description: 'JustificaciĆ³n del descuento, opcional.'
        precioManualEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Precio total manual (IVA incluido) para el caso `tarifaAConsultar=true` (>50 invitados). Si se envĆ­a,
            el desglose fiscal se recalcula a partir de Ć©l; ignorado en el caso normal.
    EdicionPresupuestoPreviewResponse:
      # Resultado del recĆ”lculo del borrador de ediciĆ³n (NO persistido). Combina el output del motor de tarifa
      # con el desglose fiscal, las lĆ­neas de extras con precio congelado por el server, el reparto y las banderas.
      type: object
      required: [tarifaAConsultar, tarifa, extrasTotalEur, regimenIva, lineasExtras]
      properties:
        tarifaAConsultar:
          type: boolean
          description: '`true` cuando el motor no tiene tarifa para el tramo (>50 invitados): habilita precio manual.'
        regimenIva:
          allOf: [{ $ref: '#/components/schemas/RegimenIva' }]
          description: '[6.2] RĆ©gimen fiscal derivado del `metodoPago` del request (`con_iva` o `sin_iva`).'
        tarifa:
          allOf: [{ $ref: '#/components/schemas/CalculoTarifaResponse' }]
          description: 'Salida canĆ³nica del motor de tarifa (US-016, snake_case). Importes null si tarifaAConsultar.'
        lineasExtras:
          type: array
          description: >-
            LĆ­neas de extras del borrador con el `precioUnitario` **congelado por el server** (no lo dicta el
            body) y el `subtotal = precioUnitario Ć cantidad`. Reutiliza el schema `ReservaExtra` (sin persistir).
          items: { $ref: '#/components/schemas/ReservaExtra' }
        extrasTotalEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Suma de subtotales de las lĆ­neas de extras (Decimal string). "0.00" si no hay extras.'
        descuentoEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          nullable: true
          description: 'Descuento aplicado en el borrador, si el Gestor lo indicĆ³.'
        desglose:
          allOf: [{ $ref: '#/components/schemas/DesgloseFiscal' }]
          nullable: true
          description: >-
            Desglose fiscal (base/IVA/total). `null` cuando `tarifaAConsultar=true` y no se enviĆ³
            `precioManualEur` (el Gestor debe introducir el precio para completar el desglose).
        reparto:
          allOf: [{ $ref: '#/components/schemas/RepartoPago' }]
          nullable: true
          description: 'Reparto 40%/60% + fianza. `null` mientras el total sea desconocido (tarifa a consultar sin precio).'
    EdicionPresupuestoRequest:
      # Body de la confirmaciĆ³n de la ediciĆ³n: crea PRESUPUESTO version=MAX+1. `enviar` decide enviado/borrador.
      # Hereda todos los campos editables del preview + `enviar`. El server congela precios de extras.
      allOf:
        - $ref: '#/components/schemas/EdicionPresupuestoPreviewRequest'
        - type: object
          required: [enviar]
          properties:
            enviar:
              type: boolean
              description: >-
                `true` ā nueva versiĆ³n en `estado='enviado'`, consume un `numeroPresupuesto` `AAAANNN` nuevo,
                regenera el PDF y dispara el email E2 (`COMUNICACION` con `esReenvio=true`) + `AUDIT_LOG`.
                `false` ā nueva versiĆ³n en `estado='borrador'`, `numeroPresupuesto=null`, sin COMUNICACION ni email.
    EdicionPresupuestoResponse:
      # Respuesta 201: la nueva versiĆ³n del PRESUPUESTO creada (congelada) + el reparto + la RESERVA (sigue en
      # pre_reserva). Con enviar=true incluye la COMUNICACION E2 registrada; con enviar=false, `comunicacion=null`.
      type: object
      required: [presupuesto, reserva]
      properties:
        presupuesto:
          allOf: [{ $ref: '#/components/schemas/Presupuesto' }]
          description: >-
            Nueva versiĆ³n del PRESUPUESTO (`version = anterior + 1`, `tarifaCongelada=true`). Con `enviar=true`:
            `estado='enviado'`, `numeroPresupuesto` asignado. Con `enviar=false`: `estado='borrador'`,
            `numeroPresupuesto=null`.
        tarifaId:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA congelada usada; `null` en el caso `tarifa_a_consultar` (precio manual).'
        lineasExtras:
          type: array
          description: 'LĆ­neas `RESERVA_EXTRA` persistidas con `precioUnitario` congelado por el server.'
          items: { $ref: '#/components/schemas/ReservaExtra' }
        reparto:
          $ref: '#/components/schemas/RepartoPago'
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: 'RESERVA resultante: `estado` sigue `pre_reserva`, `ttlExpiracion` SIN cambios (no se extiende el bloqueo).'
        comunicacion:
          allOf: [{ $ref: '#/components/schemas/Comunicacion' }]
          nullable: true
          description: >-
            COMUNICACION E2 registrada cuando `enviar=true` (`codigoEmail='E2'`, `esReenvio=true`,
            `estado='enviado'`). `null` cuando `enviar=false` (borrador, sin email).
    ReenviarPresupuestoRequest:
      # Body del reenvĆ­o sin cambios (opcional). Sin campos editables: opera sobre la versiĆ³n vigente derivada
      # por el server. Se admite un objeto vacĆ­o/ausente. `metodoPago` NO se re-elige (se conserva el vigente).
      type: object
      additionalProperties: false
      properties: {}
    ReenviarPresupuestoResponse:
      # Respuesta 200 del reenvĆ­o sin cambios: NO versiona ni consume nĆŗmero; devuelve el PRESUPUESTO vigente
      # (sin cambios) y la COMUNICACION E2 registrada (esReenvio=true).
      type: object
      required: [presupuesto, comunicacion]
      properties:
        presupuesto:
          allOf: [{ $ref: '#/components/schemas/Presupuesto' }]
          description: 'PRESUPUESTO vigente (`MAX(version)`) reenviado SIN cambios (misma `version`, mismo `numeroPresupuesto`), en `estado=enviado`.'
        comunicacion:
          allOf: [{ $ref: '#/components/schemas/Comunicacion' }]
          description: 'COMUNICACION E2 registrada por el reenvĆ­o (`codigoEmail=E2`, `esReenvio=true`, `estado=enviado`).'

    ReservaExtra:
      type: object
      properties:
        idReservaExtra: { type: string, format: uuid }
        reservaId: { type: string, format: uuid }
        extraId: { type: string, format: uuid, nullable: true }
        facturaId: { type: string, format: uuid, nullable: true }
        conceptoLibre: { type: string, nullable: true }
        origen: { $ref: '#/components/schemas/OrigenExtra' }
        cantidad: { type: integer }
        precioUnitario: { $ref: '#/components/schemas/Importe' }
        subtotal: { $ref: '#/components/schemas/Importe' }
    CreateReservaExtraRequest:
      type: object
      required: [cantidad, origen]
      properties:
        extraId: { type: string, format: uuid, nullable: true }
        conceptoLibre: { type: string, description: 'Para extras fuera de catĆ”logo' }
        cantidad: { type: integer, minimum: 1 }
        origen: { $ref: '#/components/schemas/OrigenExtra' }
        precioUnitario: { allOf: [{ $ref: '#/components/schemas/Importe' }], description: 'Obligatorio si extraId es nulo' }

    # -------- Factura / Pago --------
    Factura:
      type: object
