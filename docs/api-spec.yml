          nullable: true
          description: >-
            [reserva-viva] Adultos y niĆ±os > 4 (determina el tramo del tarifario). Se persiste sobre
            `RESERVA.numAdultosNinosMayores4`; si cambia dispara el recĆ”lculo. Negativo ā 400/422.
            `> 50` resuelve a `tarifaAConsultar` (exige `precioManualEur`).
        numNinosMenores4:
          type: integer
