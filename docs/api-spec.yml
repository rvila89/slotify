  /reservas/{id}/facturas/liquidacion/cobro:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Registrar el cobro de la factura de liquidaciĆ³n (UC-21 pasos 7-10 / US-029)
      operationId: registrarCobroLiquidacion
      description: |
        [US-029 / UC-21 pasos 7-10] El **Gestor registra el cobro** del 60 % restante de la RESERVA
        `{id}` cuando recibe la transferencia bancaria externa (Slotify **registra**, no procesa el
        pago; sin pasarela en MVP). PrecondiciĆ³n: `RESERVA.liquidacionStatus='facturada'` y su
        `FACTURA (tipo='liquidacion').estado='enviada'` (dejado por US-028).

        En una **Ćŗnica unidad de trabajo atĆ³mica** (tx + RLS del tenant del JWT), releyendo el estado
        de la RESERVA con `SELECT ... FOR UPDATE` para serializar el doble cobro concurrente (lock de
        fila PostgreSQL, **nunca** locks distribuidos; design.md Ā§D-2):
        1. Crea un registro `PAGO` con `facturaId` de la factura de liquidaciĆ³n, `importe` (el importe
           real cobrado), `fechaCobro` y, si se adjunta, `justificanteDocId` (referencia a un DOCUMENTO
           `tipo='justificante_pago'` **ya subido**; opcional, `null` si no se adjunta).
        2. Transiciona `FACTURA (liquidacion).estado='cobrada'`.
        3. Transiciona `RESERVA.liquidacionStatus='cobrada'` (habilita una de las 3 precondiciones de
           `evento_en_curso`, US-031; NO transiciona `RESERVA.estado`).
        4. Registra `AUDIT_LOG` (`crear` del PAGO; `actualizar` de FACTURA y RESERVA; la discrepancia
           si la hubo).

        **Discrepancia de importe (alerta, NO bloquea)**: si `importe` difiere de `FACTURA.total`, el
        cobro se registra igualmente con el importe real y la respuesta 200 incluye `alertaDiscrepancia`
        (importe facturado, cobrado y diferencia) para que el Gestor la concilie. NO es un error.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrarCobroLiquidacionRequest' }
      responses:
        '200':
          description: |
            Cobro registrado. La liquidaciĆ³n queda en `estado='cobrada'` y `liquidacionStatus='cobrada'`.
            Devuelve el `PAGO` creado, la `FACTURA` de liquidaciĆ³n actualizada, el `liquidacionStatus`
            resultante y, **solo si hubo discrepancia de importe**, `alertaDiscrepancia` (informativa,
            no bloqueante).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarCobroLiquidacionResponse' }
        '400':
          description: |
            ValidaciĆ³n de entrada (F5-01). El `importe` no es Decimal(10,2) positivo (`> 0`) o
            `fechaCobro` no es una fecha vĆ”lida `<= hoy` (futura o mal formada): `COBRO_INVALIDO`. No se
            crea `PAGO` ni cambia el estado. Cuerpo = envelope estĆ”ndar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroLiquidacionError' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS), no tiene factura de liquidaciĆ³n
            (`FACTURA_LIQUIDACION_NO_ENCONTRADA`), o el `justificanteDocId` indicado no existe en el
            tenant (`JUSTIFICANTE_NO_ENCONTRADO`). No se muta nada. Cuerpo + `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroLiquidacionError' }
        '409':
          description: |
            Conflicto de precondiciĆ³n de estado (F5-02: 409), sin efectos, releĆ­do bajo
            `SELECT ... FOR UPDATE`:
            - `LIQUIDACION_YA_COBRADA` ā la liquidaciĆ³n ya estĆ” `cobrada` (**doble cobro**, incl. dos
              peticiones concurrentes: solo la primera registra el PAGO). "La liquidaciĆ³n ya estĆ”
              marcada como cobrada".
            - `LIQUIDACION_NO_FACTURADA` ā `liquidacionStatus='pendiente'` (la factura de liquidaciĆ³n
              aĆŗn no fue enviada, US-028 no ejecutada). "La factura de liquidaciĆ³n debe estar enviada
              antes de registrar su cobro".
            Cuerpo = envelope estĆ”ndar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CobroLiquidacionError' }

  /reservas/{id}/facturas/fianza/cobro:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Registrar el cobro del recibo de la fianza (UC-22 pasos 5-9 / US-030)
      operationId: registrarCobroFianza
      description: |
        [US-030 / UC-22 pasos 5-9] El **Gestor registra el cobro** de la fianza (depĆ³sito reembolsable)
        de la RESERVA `{id}` cuando recibe el ingreso externo (Slotify **registra**, no procesa el pago;
        sin pasarela en MVP). PrecondiciĆ³n del happy path: `RESERVA.fianzaStatus='recibo_enviado'` y su
        `FACTURA (tipo='fianza').estado='enviada'` (dejado por US-028).

        En una **Ćŗnica unidad de trabajo atĆ³mica** (tx + RLS del tenant del JWT), releyendo el estado de
        la RESERVA con `SELECT ... FOR UPDATE` para serializar el doble cobro concurrente (lock de fila
        PostgreSQL, **nunca** locks distribuidos; design.md Ā§D-1):
        1. Crea un registro `PAGO` con `facturaId` del recibo de fianza, `importe` (el importe real
           cobrado), `fechaCobro` y, si se adjunta, `justificanteDocId` (referencia a un DOCUMENTO
           `tipo='justificante_pago'` **ya subido**; opcional, `null` si no se adjunta).
        2. Transiciona `FACTURA (fianza).estado='cobrada'`.
        3. Transiciona `RESERVA.fianzaStatus='cobrada'`, y establece `RESERVA.fianzaEur=importe` y
           `RESERVA.fianzaCobradaFecha=fechaCobro` (habilita la 3.ĀŖ de las 3 precondiciones de
           `evento_en_curso`, US-031; NO transiciona `RESERVA.estado`).
        4. Registra `AUDIT_LOG` (`crear` del PAGO/DOCUMENTO; `actualizar` de FACTURA y RESERVA; y la
           traza del flujo excepcional "Negociable" si se cobrĆ³ sobre `pendiente`).

        **PolĆ­tica "Negociable" (design.md Ā§D-2, diverge de US-029)**: si `RESERVA.fianzaStatus='pendiente'`
        (el recibo de fianza nunca se enviĆ³), el cobro **NO se bloquea de forma dura**. Sin
        `confirmarSinRecibo=true` en el body, la respuesta es **200 con `confirmacionRequerida`** (aviso, NO
        crea PAGO ni FACTURA) para que el frontend muestre el diĆ”logo y reintente; con `confirmarSinRecibo=true`,
        el cobro se registra igualmente (si la FACTURA(fianza) estĆ” en `borrador` salta `borrador ā cobrada`;
        si no existe se crea al vuelo `cobrada`) y el flujo excepcional queda trazado en `AUDIT_LOG`.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        required: true
