    Usuario:
      type: object
      properties:
        idUsuario: { type: string, format: uuid }
        email: { type: string, format: email }
        nombre: { type: string }
        apellidos: { type: string, nullable: true }
        rol: { type: string, enum: [gestor, admin, operario] }

    # -------- Reserva --------
    Reserva:
      type: object
      properties:
        idReserva: { type: string, format: uuid }
        codigo: { type: string, example: 'SLO-2026-0001' }
        clienteId: { type: string, format: uuid }
        estado: { $ref: '#/components/schemas/EstadoReserva' }
        subEstado: { $ref: '#/components/schemas/SubEstadoConsulta' }
        canalEntrada: { $ref: '#/components/schemas/CanalEntrada' }
        fechaEvento: { type: string, format: date, nullable: true }
        duracionHoras: { allOf: [{ $ref: '#/components/schemas/DuracionHoras' }], nullable: true }
        tipoEvento: { allOf: [{ $ref: '#/components/schemas/TipoEvento' }], nullable: true }
        numAdultosNinosMayores4: { type: integer, nullable: true }
        numNinosMenores4: { type: integer, nullable: true }
        numInvitadosFinal: { type: integer, nullable: true }
        importeTotal: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        importeSenal: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        importeLiquidacion: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        ttlExpiracion: { type: string, format: date-time, nullable: true }
        # [F2-02] Campos del ER que el recurso de lectura omitГ­a (visita US-008/009, fianza US-030/036, cond. part. US-024)
        visitaProgramadaFecha: { type: string, format: date, nullable: true }
        visitaProgramadaHora: { type: string, nullable: true, example: '17:30' }
        visitaRealizada: { type: boolean, nullable: true }
        fianzaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        fianzaCobradaFecha: { type: string, format: date, nullable: true }
        fianzaDevueltaFecha: { type: string, format: date, nullable: true }
        fianzaDevueltaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        condPartFirmadas: { type: boolean, nullable: true }
        condPartFechaEnvio: { type: string, format: date-time, nullable: true }
        condPartFechaFirma: { type: string, format: date-time, nullable: true }
        preEventoStatus: { $ref: '#/components/schemas/PreEventoStatus' }
        liquidacionStatus: { $ref: '#/components/schemas/LiquidacionStatus' }
        fianzaStatus: { $ref: '#/components/schemas/FianzaStatus' }
        posicionCola: { type: integer, nullable: true }
        consultaBloqueanteId: { type: string, format: uuid, nullable: true }
        notas: { type: string, nullable: true }
        fechaCreacion: { type: string, format: date-time }
      required: [idReserva, codigo, clienteId, estado, canalEntrada]
    ReservaDetalle:
      allOf:
        - $ref: '#/components/schemas/Reserva'
        - type: object
          properties:
            cliente: { $ref: '#/components/schemas/Cliente' }
            extras:
              type: array
              items: { $ref: '#/components/schemas/ReservaExtra' }
            presupuestos:
              type: array
              items: { $ref: '#/components/schemas/Presupuesto' }
            facturas:
              type: array
              items: { $ref: '#/components/schemas/Factura' }
    ReservaListResponse:
      type: object
      required: [data, metadata]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Reserva' }
        metadata: { $ref: '#/components/schemas/PaginationMetadata' }
    # [US-004] Respuesta del alta (POST /reservas). Extiende `Reserva` con campos transitorios,
    # NO persistidos en la RESERVA, derivados del sub-estado resultante del alta con fecha. Todos
    # son OPCIONALES (ausentes en el alta sin fecha US-003 в†’ compat. hacia atrГЎs garantizada).
    CreateReservaResponse:
      allOf:
        - $ref: '#/components/schemas/Reserva'
        - type: object
          properties:
            tipoBloqueo:
              allOf: [{ $ref: '#/components/schemas/TipoBloqueo' }]
              nullable: true
              description: >-
                Presente (= `blando`) cuando el alta nace en `2b` y crea la `FechaBloqueada` blanda.
                Espejo del `tipo_bloqueo` de la fila `FechaBloqueada` reciГ©n insertada; no es una
                columna de RESERVA. Ausente/null en `2a` y `2d`.
            fechaDisponible:
              type: boolean
              nullable: true
              description: >-
                Flag de disponibilidad de `fechaEvento`. `false` cuando el alta cae en `2a` por estar
                la fecha bloqueada por un estado no encolable (`2c`/`2v`/`pre_reserva`/
                `reserva_confirmada` o posteriores). Ausente/null en el alta sin fecha (US-003).
            avisoDisponibilidad:
              type: string
              nullable: true
              description: >-
                Mensaje informativo para la UI cuando la fecha no estГЎ disponible (alta degradada a
                `2a` exploratoria). Ausente/null cuando la fecha sГ­ se pudo bloquear (`2b`) o encolar
                (`2d`), y en el alta sin fecha.
            tarifaEstimada:
              allOf: [{ $ref: '#/components/schemas/TarifaEstimada' }]
              nullable: true
              description: >-
                [D-4] Tarifa estimada que viaja en la comunicaciГіn E1, calculada por el motor UC-16
                SOLO si hay `fechaEvento` + nВє de invitados + horas. Es DECORATIVA (no se persiste
                como importe congelado de la RESERVA, eso es UC-14) y TOLERANTE: si faltan datos o el
                cГЎlculo no es posible (temporada/tarifa no configurada, >50 invitados), se OMITE y E1
                sale con el dossier general sin precio, sin bloquear el alta. Objeto camelCase propio
                del envelope del alta (NO el `CalculoTarifaResponse` snake_case del motor UC-16).
    TarifaEstimada:
      # Objeto DECORATIVO (camelCase) anidado en CreateReservaResponse.tarifaEstimada (US-004 В§D-4).
      # Espejo del subconjunto que el alta emite en la comunicaciГіn E1; NO es la salida del motor de
      # tarifa US-016 (eso es CalculoTarifaResponse, snake_case, no se toca). Importes como number
      # (EUR ya redondeados a cГ©ntimos, IVA 21% incluido), igual que el motor. Es TOLERANTE: todos los
      # campos son opcionales y los importes/ids nullable, porque el cГЎlculo puede no ser posible.
      type: object
      properties:
        temporada:
          type: string
          description: 'Temporada resuelta para el mes de fechaEvento. Puede omitirse si no se calculГі.'
        tarifaAConsultar:
          type: boolean
          description: 'true cuando numAdultosNinosMayores4 > 50 (tramo +51 sin tarifa): precio manual.'
        precioTarifaEur:
          type: number
          nullable: true
          description: 'Precio de la TARIFA en EUR (IVA 21% incluido). null si tarifaAConsultar=true.'
        extrasTotalEur:
          type: number
          nullable: true
          description: 'Suma de subtotales de extras (precioEur x cantidad). null si tarifaAConsultar=true.'
        totalEur:
          type: number
          nullable: true
          description: 'precioTarifaEur + extrasTotalEur. null si tarifaAConsultar=true.'
        tarifaId:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA usada. null si tarifaAConsultar=true.'
    CreateReservaRequest:
      type: object
      required: [canalEntrada, cliente]
      properties:
        canalEntrada: { $ref: '#/components/schemas/CanalEntrada' }
        fechaEvento:
          type: string
          format: date
          nullable: true
          description: >-
            [US-004] OPCIONAL. Fecha del evento (YYYY-MM-DD). Si se OMITE в†’ alta exploratoria
            US-003: la reserva nace en `2a`, `ttlExpiracion = null`, SIN `FechaBloqueada`.
            Si se ENVГЌA debe ser ESTRICTAMENTE FUTURA (> hoy, dГ­a natural): el servidor rechaza
            con 400 la fecha de HOY o anterior, sin crear RESERVA ni `FechaBloqueada` (regla
            unificada `validarFechaFutura`, US-040; divergencia aprobada en Gate 1 frente a la
            ficha que admitГ­a в‰Ґ hoy). Con fecha vГЎlida el sub-estado resultante (`2b` / `2d` /
            `2a`) lo determina el estado de la fecha (ver la descripciГіn del endpoint).
        tipoEvento: { $ref: '#/components/schemas/TipoEvento' }
        duracionHoras: { $ref: '#/components/schemas/DuracionHoras' }
        numAdultosNinosMayores4: { type: integer }
        numNinosMenores4: { type: integer }
        notas: { type: string }
        comentarios:
          type: string
          maxLength: 2000
          description: >-
            [US-003] Comentarios libres del gestor sobre el lead en el momento del alta. Su
            PRESENCIA/AUSENCIA decide el flujo del email E1 (respuesta inicial automГЎtica):
            SIN `comentarios` (omitido o vacГ­o) в†’ la COMUNICACION E1 se persiste con
            `estado='enviado'` y se dispara el auto-envГ­o de la respuesta inicial;
            CON `comentarios` в†’ la COMUNICACION E1 se persiste con `estado='borrador'`, NO se
            envГ­a, y la UI alerta al gestor de un borrador pendiente de revisiГіn. Es distinto de
            `notas` (anotaciones internas que NO afectan al envГ­o de E1).
        cliente: { $ref: '#/components/schemas/CreateClienteRequest' }
    UpdateReservaRequest:
      type: object
      properties:
        tipoEvento: { $ref: '#/components/schemas/TipoEvento' }
        duracionHoras: { $ref: '#/components/schemas/DuracionHoras' }
        numAdultosNinosMayores4: { type: integer }
        numNinosMenores4: { type: integer }
        numInvitadosFinal: { type: integer }
        notas: { type: string }
    TransicionRequest:
      type: object
      required: [estadoDestino]
      properties:
        estadoDestino: { $ref: '#/components/schemas/EstadoReserva' }
        subEstadoDestino: { $ref: '#/components/schemas/SubEstadoConsulta' }
        # [F1-01 RESUELTO por US-005] La asignaciГіn de fecha 2.aв†’2.b/2.d se trasladГі a su endpoint
        # dedicado `POST /reservas/{id}/fecha` (design.md В§D-2). Este campo queda DEPRECADO aquГ­ y se
        # conserva solo por compatibilidad; no debe usarse para asignar fecha.
        fechaEvento:
          type: string
          format: date
          nullable: true
          deprecated: true
          description: >-
            DEPRECADO (US-005): usa `POST /reservas/{id}/fecha` para asignar la fecha y disparar el
            bloqueo atГіmico. Se mantiene por compatibilidad; no realiza la asignaciГіn de fecha.
        motivo: { type: string, description: 'Obligatorio en cancelaciones/descartes' }
    ProgramarVisitaRequest:
      type: object
      required: [visitaFecha, visitaHora]
      properties:
        visitaFecha: { type: string, format: date }
        visitaHora: { type: string, example: '17:30' }
    ResultadoVisitaRequest:
      type: object
      required: [visitaRealizada]
      properties:
        visitaRealizada: { type: boolean }
        notas: { type: string }
    AsignarFechaRequest:
      # [US-005] Cuerpo de POST /reservas/{id}/fecha: transiciГіn 2aв†’2b/2d sobre una RESERVA existente.
      type: object
      required: [fechaEvento]
      properties:
        fechaEvento:
          type: string
          format: date
          description: >-
            OBLIGATORIO. Fecha del evento (YYYY-MM-DD). Debe ser ESTRICTAMENTE FUTURA (> hoy, dГ­a
            natural): el servidor rechaza con 400 la fecha de HOY o anterior, sin mutar la RESERVA
            (regla unificada `validarFechaFutura`, US-040; coherente con US-004; divergencia
            aprobada en Gate frente a la ficha US-005 que admitГ­a в‰Ґ hoy).
        aceptarCola:
          type: boolean
          description: >-
            OPCIONAL. Resuelve el flujo interactivo de cola (FA-01) sin estado servidor intermedio.
            Si la fecha estГЎ bloqueada por una consulta en `2b` (o en carrera D4): con `false`/ausente
            el servidor responde `409 colaDisponible=true` (informa y ofrece cola) y la RESERVA sigue
            en `2a`; con `true` el reintento confirma la entrada en cola (`2d`). No tiene efecto si la
            fecha estГЎ libre (в†’ `2b`) ni si estГЎ bloqueada por un estado no encolable (в†’ `409
            colaDisponible=false`).

    # -------- Cola --------
    ColaItem:
      type: object
      properties:
        idReserva: { type: string, format: uuid }
        codigo: { type: string }
        posicionCola: { type: integer }
        clienteNombre: { type: string }
    # [US-005] Error 409 de POST /reservas/{id}/fecha. Sigue el patrГіn de errores de dominio de
    # US-016 (allOf ErrorResponse + campos especГ­ficos): conserva el envelope NestJS
    # (`statusCode`/`message`) y aГ±ade los campos de dominio `colaDisponible`/`motivo` que dirigen el
    # flujo interactivo de cola. US-004 (alta con fecha) NO tiene un 409 equivalente porque
    # auto-resuelve a `2d`/`2a` sin interacciГіn; por eso se reutiliza el patrГіn de US-016 (justifica
    # la divergencia respecto a US-004, que no aplica aquГ­).
    AsignarFechaConflictoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [colaDisponible, motivo]
          properties:
            colaDisponible:
              type: boolean
              description: >-
                `true` cuando la fecha estГЎ bloqueada por una consulta en `2b` (o carrera D4): se
                ofrece cola, reintentar con `aceptarCola=true` para entrar en `2d`. `false` cuando
                estГЎ bloqueada por `2c`/`2v`/`pre_reserva`/`reserva_confirmada`+: no disponible.
            motivo:
              type: string
              description: 'Mensaje informativo para la UI sobre por quГ© la fecha no se pudo asignar.'

    # -------- Cliente --------
    Cliente:
      type: object
      properties:
        idCliente: { type: string, format: uuid }
        nombre: { type: string }
        apellidos: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        telefono: { type: string, nullable: true }
        dniNif: { type: string, nullable: true }
        direccion: { type: string, nullable: true }
        codigoPostal: { type: string, nullable: true }
        poblacion: { type: string, nullable: true }
        provincia: { type: string, nullable: true }
        ibanDevolucion: { type: string, nullable: true }
      required: [idCliente, nombre]
    CreateClienteRequest:
      # [US-003] Datos de contacto mГ­nimos del lead, embebidos en el alta de reserva.
      # nombre, apellidos, email y telefono son OBLIGATORIOS (canal_entrada va en CreateReservaRequest).
      type: object
      required: [nombre, apellidos, email, telefono]
      properties:
        nombre: { type: string, minLength: 1, maxLength: 100, description: 'Obligatorio, no vacГ­o, mГЎx 100.' }
        apellidos: { type: string, minLength: 1, maxLength: 100, description: 'Obligatorio, no vacГ­o, mГЎx 100.' }
        email:
          type: string
          format: email
          # RFC 5322 bГЎsico (forma local@dominio.tld, sin espacios). ValidaciГіn dura adicional al format.
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          maxLength: 254
          description: 'Obligatorio. Formato email RFC 5322 bГЎsico. Idempotencia de CLIENTE por (tenant_id, email).'
        telefono: { type: string, minLength: 1, description: 'Obligatorio, no vacГ­o.' }
        dniNif: { type: string }
        direccion: { type: string }
        codigoPostal: { type: string }
        poblacion: { type: string }
        provincia: { type: string }
    UpdateClienteRequest:
      # PATCH parcial (US-035): todos los campos opcionales (p. ej. registrar solo el IBAN).
      # NO hereda los `required` de CreateClienteRequest a propГіsito.
      type: object
      properties:
        nombre: { type: string, minLength: 1, maxLength: 100 }
        apellidos: { type: string, minLength: 1, maxLength: 100 }
        email:
          type: string
          format: email
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          maxLength: 254
        telefono: { type: string, minLength: 1 }
        dniNif: { type: string }
        direccion: { type: string }
        codigoPostal: { type: string }
        poblacion: { type: string }
        provincia: { type: string }
        ibanDevolucion: { type: string }

    # -------- CatГЎlogo de extras [F2-04] --------
    Extra:
      type: object
      properties:
        idExtra: { type: string, format: uuid }
        nombre: { type: string }
        descripcion: { type: string, nullable: true }
        precioUnitario: { $ref: '#/components/schemas/Importe' }
        activo: { type: boolean }

    # -------- Tarifa / Presupuesto / Extra de reserva --------
    # [US-016 / D-1] Esquema canГіnico del motor de tarifa (calculo-tarifa).
    # Nombres de campo en snake_case por decisiГіn de diseГ±o D-1 ya aprobada por el gate humano
    # (design.md В§D-1): el contrato DEBE usar este esquema tal cual. Los tests TDD y los DTOs
    # backend (@nestjs/swagger) se alinean con estos nombres exactos.
    CalculoTarifaExtraInput:
      # Un extra solicitado al motor: referencia al catГЎlogo del tenant + cantidad.
      type: object
      required: [extra_id, cantidad]
      properties:
        extra_id: { type: string, format: uuid, description: 'ID del EXTRA del catГЎlogo del tenant.' }
        cantidad: { type: integer, minimum: 1, description: 'Unidades del extra (>= 1).' }
    CalculoTarifaRequest:
      # Input del motor (US-016 В§Reglas de ValidaciГіn). num_ninos_menores4 NO es input del motor.
      type: object
      required: [fecha_evento, duracion_horas, num_adultos_ninos_mayores4]
      properties:
        fecha_evento:
          type: string
          format: date
          description: 'Fecha del evento (YYYY-MM-DD). Debe ser estrictamente futura: no nula, no pasada y no el mismo dГ­a que la llamada (comparaciГіn por dГ­a natural UTC).'
        duracion_horas: { $ref: '#/components/schemas/DuracionHoras' }
        num_adultos_ninos_mayores4:
          type: integer
          minimum: 0
          description: 'Adultos + niГ±os mayores de 4 aГ±os. Los menores de 4 (num_ninos_menores4) no cuentan ni se pasan.'
        extras:
          type: array
          default: []
          description: 'Extras a sumar. Puede ser []. Solo se evalГєan en el caso normal (no en tarifa_a_consultar).'
          items: { $ref: '#/components/schemas/CalculoTarifaExtraInput' }
    CalculoTarifaResponse:
      # Esquema de salida canГіnico unificado (D-1): vГЎlido para el caso normal y para tarifa_a_consultar.
      # temporada y tarifa_a_consultar SIEMPRE presentes; los otros cuatro son null si tarifa_a_consultar=true.
      # Importes como number (EUR ya redondeados a cГ©ntimos, IVA 21% incluido en precio_tarifa_eur) por D-1/D-4;
      # NO se usa el wrapper Importe (string) aquГ­: es la salida del motor, no una columna Decimal de BD.
      type: object
      required: [temporada, tarifa_a_consultar, precio_tarifa_eur, extras_total_eur, total_eur, tarifa_id]
      properties:
        temporada:
          allOf: [{ $ref: '#/components/schemas/Temporada' }]
          description: 'Temporada resuelta para el mes de fecha_evento. SIEMPRE presente (tambiГ©n en a_consultar).'
        tarifa_a_consultar:
          type: boolean
          description: 'true cuando num_adultos_ninos_mayores4 > 50 (tramo +51 sin tarifa): precio manual. SIEMPRE presente.'
        precio_tarifa_eur:
          type: number
          nullable: true
          description: 'Precio de la TARIFA en EUR (IVA 21% incluido). null si tarifa_a_consultar=true.'
        extras_total_eur:
          type: number
          nullable: true
          description: 'Suma de subtotales de extras (precio_eur x cantidad). null si tarifa_a_consultar=true.'
        total_eur:
          type: number
          nullable: true
          description: 'precio_tarifa_eur + extras_total_eur. null si tarifa_a_consultar=true.'
        tarifa_id:
          type: string
          format: uuid
          nullable: true
          description: 'ID de la fila TARIFA usada. null si tarifa_a_consultar=true.'
    # -------- Errores de dominio del motor de tarifa (US-016 D-3) --------
    # Reutilizan el envelope NestJS (ErrorResponse) y aГ±aden `codigo` (error de dominio) + `detalle` diagnГіstico.
    CalculoTarifaTarifaNoConfiguradaError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, detalle]
          properties:
            codigo: { type: string, enum: [TARIFA_NO_CONFIGURADA] }
            detalle:
              type: object
              required: [temporada, duracion_horas, num_invitados]
              properties:
                temporada: { $ref: '#/components/schemas/Temporada' }
                duracion_horas: { $ref: '#/components/schemas/DuracionHoras' }
                num_invitados: { type: integer }
              description: 'ParГЎmetros de bГєsqueda sin fila de TARIFA vigente (tarifario incompleto, num_invitados <= 50).'
