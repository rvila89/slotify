        cuerpo:
          type: string
          minLength: 1
          description: 'Cuerpo editado por el gestor. Si se omite, se envĆ­a el cuerpo original del borrador.'
    CrearEmailManualRequest:
      # [US-046] Email manual desde la ficha. `asunto` y `cuerpo` OBLIGATORIOS. El destinatario es el
      # CLIENTE.email de la RESERVA (no se pasa en el body); `codigoEmail='manual'` lo fija el server.
      type: object
      required: [asunto, cuerpo]
      properties:
        asunto: { type: string, minLength: 1 }
        cuerpo: { type: string, minLength: 1 }
    ComunicacionEstadoConflictoError:
      # 409: la COMUNICACION no estĆ” en `borrador` (ya `enviado`/`fallido`); no es enviable/descartable.
      # Sin efectos. Mismo patrĆ³n allOf ErrorResponse + `codigo` que el resto del contrato (US-014/US-015).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, estadoActual]
          properties:
            codigo: { type: string, enum: [ESTADO_NO_BORRADOR] }
            estadoActual:
              allOf: [{ $ref: '#/components/schemas/EstadoComunicacion' }]
              description: 'Estado actual de la COMUNICACION que impide la acciĆ³n (p. ej. `enviado`/`fallido`).'
    ComunicacionDestinatarioInvalidoError:
      # 422: destinatario (CLIENTE.email) invĆ”lido (RFC 5321) o nulo. Al enviar un borrador, la fila
      # PERMANECE en `borrador` (no `fallido`): no se intentĆ³ el envĆ­o. En el manual, no se crea la fila.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo: { type: string, enum: [DESTINATARIO_INVALIDO] }
    ComunicacionProveedorError:
      # 502: el proveedor de email fallĆ³ al enviar (Gate 1 D-2). La COMUNICACION queda persistida en
      # `fallido` (sin fechaEnvio) + AUDIT_LOG; sin reintento automĆ”tico. Se expone como error HTTP para
      # que el frontend lo capture por status. Mismo envelope NestJS + `codigo` de dominio.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo: { type: string, enum: [PROVEEDOR_EMAIL_FALLIDO] }
    ComunicacionDuplicadaError:
      # 409 (change solicitud-datos-presupuesto-borrador): ya existe una COMUNICACION de la terna
      # (reservaId, 'E1', 'solicitud_datos') en estado='enviado'. La solicitud ya se enviĆ³ y no se
      # puede reenviar (una sola vez), respaldado por el Ć­ndice UNIQUE parcial. Sin efectos. Mismo
      # patrĆ³n allOf ErrorResponse + `codigo` que el resto del contrato.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo: { type: string, enum: [COMUNICACION_DUPLICADA] }
    ComunicacionDatosCompletosError:
      # 422 (change solicitud-datos-presupuesto-borrador): los datos fiscales del cliente ya estĆ”n
      # completos, no procede solicitarlos (defensa en profundidad). No se crea ninguna COMUNICACION.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo: { type: string, enum: [DATOS_FISCALES_COMPLETOS] }

