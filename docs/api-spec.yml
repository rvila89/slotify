      tags: [Facturacion]
      summary: Listar las facturas de la reserva, filtrables por tipo (US-022 / US-027)
      operationId: listarFacturasReserva
      description: |
        [US-027 / UC-21 / UC-22] Devuelve la **colecciĆ³n de todas las FACTURA** de la RESERVA `{id}`
        (`senal`, `liquidacion`, `fianza`), cada una con su desglose fiscal (base + IVA 21 % + total),
        `estado` del ciclo de vida (`borrador` ā `enviada` ā `cobrada`), `numeroFactura` (`null` en
        `borrador`), `pdfUrl`, `fechaEmision` y los flags derivados de la UI. Vista de **solo lectura**:
        no crea ni muta ninguna FACTURA.

        Los borradores de **liquidaciĆ³n** (`total = importeLiquidacion + Ī£ extras con factura_id nulo`)
        y de **fianza** (`total = fianza_default_eur`) los crea el sistema como **efecto post-commit**
        de la activaciĆ³n de los sub-procesos de la confirmaciĆ³n (US-021 / US-027), no un endpoint
        pĆŗblico. Si `fianza_default_eur = 0`, la factura de fianza **no existe** y no aparece en la
        colecciĆ³n.

        **Alerta al Gestor (derivada, NO endpoint nuevo)**: "Documentos de liquidaciĆ³n y fianza
        pendientes de revisiĆ³n" se **deriva en el frontend** de esta colecciĆ³n ā hay documentos
        pendientes cuando existen facturas con `estado='borrador'` de `tipo` `liquidacion`/`fianza`.
        Si la fianza se omitiĆ³ (`fianza_default_eur = 0`), solo aparece el borrador de liquidaciĆ³n y
        la alerta menciona solo la liquidaciĆ³n. Aislada por `tenant_id` del JWT (RLS); nunca en el path.
      parameters:
        - in: query
          name: tipo
          required: false
          schema: { $ref: '#/components/schemas/TipoFactura' }
          description: >-
            Filtro OPCIONAL por tipo de factura (`senal`, `liquidacion`, `fianza`, `complementaria`).
            Si se omite, devuelve todas las facturas de la reserva.
      responses:
        '200':
          description: |
            ColecciĆ³n de facturas de la reserva (`FacturaDto[]`), opcionalmente filtrada por `tipo`.
            Cada elemento incluye desglose fiscal, `estado`, `numeroFactura` (`null` en `borrador`),
            `pdfUrl` (`null` si aĆŗn no generado), `fechaEmision` y los flags `esBorradorInvalido`/
            `pdfPendiente`.
          content:
