  # ============================ CRON ============================
  /cron/barrido:
    post:
      tags: [Cron]
      summary: Barrido periĆ³dico de TTLs, cola, recordatorios y cierre de fichas
      description: |
        Endpoint protegido (token de servicio `X-Cron-Token`, nunca JWT) invocado por el cron.
        Es idempotente: barre reservas con `ttl_expiracion` vencido, las expira (2.bā2.x),
        libera la fecha, promueve la cola y dispara recordatorios automĆ”ticos. No depende del
        reloj exacto.

        Con `tarea=fichas` (o `all`) ejecuta ademĆ”s el **cierre automĆ”tico de la ficha
        operativa en T-1d** ([US-026], automatizaciĆ³n A10): selecciona cross-tenant las RESERVA
        en `reserva_confirmada` con `pre_evento_status != 'cerrado'` y `date(fecha_evento) =
        date(hoy) + 1 dĆ­a`, y por cada una, en su **propia transacciĆ³n** bajo el contexto RLS
        del tenant de la RESERVA (cross-tenant read / RLS write), re-evalĆŗa la guarda y aplica
        la mutaciĆ³n de cierre reutilizada de US-025 (`FICHA_OPERATIVA.ficha_cerrada = true`,
        `fecha_cierre = now()`, `RESERVA.pre_evento_status ā cerrado`, `AUDIT_LOG
        accion='transicion'` origen Sistema, causa `A10`). **Idempotente**: las fichas ya
        cerradas (por un pase previo o por cierre manual US-025) no son candidatas ā N
        ejecuciones = 1 cierre y 1 auditorĆ­a. El **fallo de una candidata no aborta el lote**
        (fallo aislado por RESERVA). El resumen del cierre de fichas se devuelve en
        `BarridoResponse.fichas` (`candidatas`, `fichasCerradas`, `fallos`). No envĆ­a email ni
        resumen al cliente (out-of-scope, sin cĆ³digo E).
      # [DECISIĆN granularidad] El parĆ”metro `tarea` permite invocar/testear cada barrido por separado,
      # imprescindible para aislar tests de concurrencia (US-012/018/026/031/037). Confirma este enfoque
      # frente a un Ćŗnico barrido monolĆ­tico.
      parameters:
        - in: query
          name: tarea
          schema:
            type: string
            enum: [expiracion, cola, fichas, eventos, archivado, recordatorios, all]
            default: all
          description: Barrido concreto a ejecutar (por defecto todos)
      security:
        - cronToken: []
      responses:
        '200':
          description: Barrido ejecutado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cron/barrido-expiracion:
    post:
      tags: [Cron]
      operationId: barridoExpiracion
      summary: Barrido de expiraciĆ³n de consultas por TTL agotado (UC-09 / US-012)
      description: |
        [US-012] Endpoint **interno protegido** invocado por el cron scheduler
        (`@nestjs/schedule`) para expirar las consultas cuyo bloqueo blando ha agotado su
        TTL (automatizaciones A4/A5/A21/A21b). Cierra el patrĆ³n obligatorio "estado en fila
        + barrido periĆ³dico" (`CLAUDE.md Ā§Jobs asĆ­ncronos`; skill `async-jobs`): NUNCA
        Lambda/EventBridge ni timers exactos; el trabajo pendiente es estado en la BBDD
        (`RESERVA.ttl_expiracion` + `estado`/`sub_estado`).

        AutenticaciĆ³n **service-to-service** mediante la cabecera `X-Cron-Token` (comparada
        con `CRON_TOKEN` del entorno vĆ­a `CronTokenGuard`), **NO** el JWT de usuario: sin
        token vĆ”lido devuelve `401`. El scheduler no ejecuta lĆ³gica de negocio, solo dispara
        este endpoint (invocable tambiĆ©n manualmente/por otro scheduler externo y testeable
        por HTTP).

        Selecciona todas las RESERVA con `ttl_expiracion < now()` **AND** (`sub_estado ā
        {'2b','2c','2v'}` **OR** `estado = 'pre_reserva'`) comparando **instantes**
        (`timestamptz`), nunca fechas formateadas, y por cada una, en su **propia
        transacciĆ³n** serializada (`SELECT ā¦ FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin
        Redis ni locks distribuidos), bajo el **contexto RLS del tenant** de la RESERVA:
        transiciona al estado terminal por TTL (`2b/2c/2v ā 2x`, `pre_reserva ā
        reserva_cancelada`, mapa declarativo), libera la fila de `FECHA_BLOQUEADA`
        (`liberarFecha()`, US-041, causa `TTL`) y, si la RESERVA tenĆ­a cola activa
        (`2.b`/`2.v` con cola heredada), **dispara** el seam `PromocionColaPort` exactamente
        una vez. El adaptador real `PromocionColaPrismaAdapter` (US-018) materializa la
        mecĆ”nica A15: `2d ā 2b`, re-bloqueo atĆ³mico vĆ­a `bloquearFecha()` y reordenaciĆ³n
        FIFO en una sola transacciĆ³n, serializada por `SELECT ā¦ FOR UPDATE` sobre RESERVA
        `2d` (la fila de `FECHA_BLOQUEADA` ya no existe en ese punto).

        **Idempotente** (D-4): las RESERVA ya terminales no son candidatas (la guarda de
        origen las excluye) y el `DELETE` de `FECHA_BLOQUEADA` con 0 filas es Ć©xito
        silencioso; N ejecuciones sobre la misma RESERVA = 1 sola transiciĆ³n y 1 sola
        auditorĆ­a (`accion='transicion'`, `entidad='RESERVA'`). El **fallo de una candidata
        no aborta el lote** (fallo aislado por RESERVA); el resumen registra los fallos.
      security:
        - cronToken: []
      responses:
        '200':
          description: |
            Barrido ejecutado. Devuelve un **resumen** del barrido (sin datos de negocio
            sensibles): candidatas evaluadas, expiradas efectivamente, promociones de cola
            disparadas y fallos aislados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoExpiracionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cron/barrido-eventos:
    post:
      tags: [Cron]
      operationId: barridoEventos
      summary: Barrido de inicio automĆ”tico del evento en T-0 (UC-23 / US-031)
      description: |
        [US-031] Endpoint **interno protegido** invocado por el cron scheduler
        (`@nestjs/schedule`) para iniciar automĆ”ticamente el evento en su dĆ­a (T-0), actor
        Sistema. Cierra el patrĆ³n obligatorio "estado en fila + barrido periĆ³dico"
        (`CLAUDE.md Ā§Jobs asĆ­ncronos`; skill `async-jobs`): NUNCA Lambda/EventBridge ni timers
        exactos; el trabajo pendiente es estado en la BBDD (`RESERVA.estado` + `fecha_evento`).
        El `@Cron` se dispara **una vez al dĆ­a a las 00:00**; endpoint dedicado, gemelo de
        `POST /cron/barrido-expiracion` (US-012), en el mĆ³dulo `reservas`.

        AutenticaciĆ³n **service-to-service** mediante la cabecera `X-Cron-Token` (comparada
        con `CRON_TOKEN` del entorno vĆ­a `CronTokenGuard`), **NO** el JWT de usuario: sin
        token vĆ”lido devuelve `401`. El scheduler no ejecuta lĆ³gica de negocio, solo dispara
        este endpoint (invocable tambiĆ©n manualmente/por otro scheduler externo y testeable
        por HTTP).

        Selecciona **cross-tenant** las RESERVA con `estado = 'reserva_confirmada'` **AND**
        `date(fecha_evento) = date(hoy)` (T-0, filtro **estricto** por fecha de calendario en
        la zona horaria de negocio, no por instante ni string formateado). Por cada candidata,
        en su **propia transacciĆ³n** bajo el contexto RLS del tenant de la RESERVA (cross-tenant
        read / RLS write) y con `SELECT ā¦ FOR UPDATE` sobre la fila, re-evalĆŗa la guarda de
        origen y **las tres precondiciones en una Ćŗnica lectura** (`pre_evento_status =
        'cerrado'` AND `liquidacion_status = 'cobrada'` AND `fianza_status = 'cobrada'`): si se
        cumplen, transiciona atĆ³micamente `reserva_confirmada ā evento_en_curso` y registra
        `AUDIT_LOG accion='transicion'` origen Sistema (`datos_anteriores={estado:reserva_confirmada}`,
        `datos_nuevos={estado:evento_en_curso}`); si no, **no transiciona** y emite una **alerta
        crĆ­tica** al gestor con las precondiciones incumplidas (el forzado manual es US-032,
        fuera de alcance). Emite ademĆ”s la **A29 no bloqueante** cuando `cond_part_firmadas =
        false`, con independencia del resultado de la transiciĆ³n.

        **Idempotente**: las RESERVA ya en `evento_en_curso` (por un pase previo o por el gestor
        US-032) no son candidatas ā N ejecuciones = 1 transiciĆ³n y 1 auditorĆ­a; la re-evaluaciĆ³n
        bajo el lock hace que un pase concurrente re-lea el `estado` ya actualizado y la UPDATE
        afecte 0 filas (no-op sin error). El **fallo de una candidata no aborta el lote** (fallo
        aislado por RESERVA); el resumen registra los fallos. No envĆ­a email ni briefing
        (out-of-scope, sin cĆ³digo E); la vista mĆ³vil "evento en curso" consume `RESERVA.estado`
        de `GET /reservas` (US-049/US-033/US-034).
      security:
        - cronToken: []
      responses:
        '200':
          description: |
            Barrido ejecutado. Devuelve un **resumen** del barrido (sin datos de negocio
            sensibles): candidatas evaluadas, eventos efectivamente iniciados, precondiciones
            incumplidas (alerta crĆ­tica) y fallos aislados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoEventosResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cron/barrido-completadas:
    post:
      tags: [Cron]
      operationId: barridoCompletadas
      summary: Barrido de archivado automĆ”tico de la reserva en T+7d (UC-28 / US-037)
      description: |
        [US-037] Endpoint **interno protegido** invocado por el cron scheduler
        (`@nestjs/schedule`) para archivar automĆ”ticamente la RESERVA en `post_evento` una vez
        transcurridos **7 dĆ­as naturales** desde su entrada en ese estado (T+7d), actor Sistema,
        cerrando el ciclo de vida del agregado (`post_evento ā reserva_completada`, terminal e
        inmutable). Cierra el patrĆ³n obligatorio "estado en fila + barrido periĆ³dico"
        (`CLAUDE.md Ā§Jobs asĆ­ncronos`; skill `async-jobs`): NUNCA Lambda/EventBridge ni timers
        exactos; el trabajo pendiente es estado en la BBDD (`RESERVA.estado = post_evento` + el
        momento de entrada a `post_evento` + `fianza_status`/`fianza_eur`). El `@Cron` se dispara
        **una vez al dĆ­a**; endpoint dedicado, gemelo de `POST /cron/barrido-eventos` (US-031) y
        `POST /cron/barrido-expiracion` (US-012), en el mĆ³dulo `reservas`.

        AutenticaciĆ³n **service-to-service** mediante la cabecera `X-Cron-Token` (comparada
        con `CRON_TOKEN` del entorno vĆ­a `CronTokenGuard`), **NO** el JWT de usuario: sin
        token vĆ”lido devuelve `401`. El scheduler no ejecuta lĆ³gica de negocio, solo dispara
        este endpoint (invocable tambiĆ©n manualmente/por otro scheduler externo y testeable
        por HTTP).

        Selecciona **cross-tenant** las RESERVA con `estado = 'post_evento'` **AND** antigĆ¼edad
        en `post_evento` ā„ 7 dĆ­as naturales (T+7d, filtro **estricto** por fecha de calendario en
        la zona horaria de negocio, no por instante ni string formateado). Por cada candidata,
        en su **propia transacciĆ³n** bajo el contexto RLS del tenant de la RESERVA (cross-tenant
        read / RLS write) y con `SELECT ā¦ FOR UPDATE` sobre la fila, re-evalĆŗa la guarda de origen
        (`post_evento ā reserva_completada`) y la **guarda pura de fianza resuelta**
        (`fianza_status ā {devuelta, retenida_parcial}` OR `fianza_eur <= 0` OR `fianza_eur =
        null`): si la fianza estĆ” **resuelta**, transiciona atĆ³micamente `post_evento ā
        reserva_completada` y registra `AUDIT_LOG accion='transicion'` origen Sistema
        (`datos_anteriores={estado:post_evento}`, `datos_nuevos={estado:reserva_completada,
        causa:'T+7d'}`), dejando la RESERVA consultable/filtrable en HistĆ³rico; si la fianza estĆ”
        **pendiente**, **no transiciona** y emite una **alerta interna** al gestor (FA-01) con
        anti-duplicaciĆ³n (no re-emite la misma alerta en pases sucesivos). No hay side-effects
        sobre `FECHA_BLOQUEADA`, cola, `FICHA_OPERATIVA` ni facturaciĆ³n, y no envĆ­a email alguno.

        **Idempotente**: las RESERVA ya en `reserva_completada` (por un pase previo o por el
        archivado manual del gestor, US-038) no son candidatas ā N ejecuciones = 1 transiciĆ³n y 1
        auditorĆ­a; la re-evaluaciĆ³n bajo el lock hace que un pase concurrente re-lea el `estado` ya
        actualizado y la UPDATE afecte 0 filas (no-op sin error), lo que tambiĆ©n resuelve la carrera
        con US-038 sobre la misma guarda. El **fallo de una candidata no aborta el lote** (fallo
        aislado por RESERVA); el resumen registra los fallos.
      security:
        - cronToken: []
      responses:
        '200':
          description: |
            Barrido ejecutado. Devuelve un **resumen** del barrido (sin datos de negocio
            sensibles): candidatas evaluadas, reservas efectivamente archivadas, alertas de
            fianza pendiente emitidas (FA-01) y fallos aislados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarridoCompletadasResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT de vida corta. `tenant_id` y `rol` van firmados en el payload.
    cookieAuth:
      # [F3-01] Modela explĆ­citamente el refresh token en cookie httpOnly+Secure+SameSite (architecture Ā§2.8).
      type: apiKey
      in: cookie
      name: refresh_token
      description: Refresh token en cookie httpOnly+Secure+SameSite. Inaccesible desde JavaScript (anti-XSS).
    cronToken:
      # [DECISIĆN F5-05] Nombre de cabecera no respaldado por fuente. Confirma el mecanismo de auth
      # service-to-service (p. ej. secreto fuerte en variable de entorno).
      type: apiKey
      in: header
      name: X-Cron-Token
      description: Token de servicio para el endpoint de barrido del cron.

  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
      description: NĆŗmero de pĆ”gina
    Limit:
      # [DECISIĆN F5-04] default=20 y maximum=100 son convenciĆ³n, no fuente. Confirma con el PO.
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Elementos por pĆ”gina
    IdReserva:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
      description: ID de la reserva
    IdComunicacion:
      # [US-046] ID de la COMUNICACION en las acciones de comunicaciones de una reserva
      # (enviar/descartar borrador). Scoped por la RESERVA y el tenant del JWT (RLS).
      in: path
      name: idComunicacion
      required: true
      schema: { type: string, format: uuid }
      description: ID de la comunicaciĆ³n (COMUNICACION) sobre la que se actĆŗa
    IdGenerico:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
      description: Identificador del recurso

  responses:
    # [DECISIĆN F5-02] Mapeo HTTP ratificado: 409 = conflicto/concurrencia (violaciĆ³n UNIQUE determinista),
    # 422 = transiciĆ³n/guarda invĆ”lida. Documentar como decisiĆ³n en la spec.
    Unauthorized:
      description: No autenticado o token invĆ”lido
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Recurso no encontrado en el tenant
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Error de validaciĆ³n de entrada
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflicto de estado o de concurrencia (p. ej. fecha ya bloqueada)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      # [US-005] Autenticado pero sin rol/permiso suficiente. Distinto de 401 (sin sesiĆ³n).
      description: Autenticado pero sin rol/permiso suficiente para la operaciĆ³n
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      # [US-001] Rate-limiting provisto por el guard self-contained LoginThrottleGuard (por IP+email). No altera el schema de peticiĆ³n.
      description: Demasiadas peticiones (rate-limit excedido)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    # -------- Tipos monetarios [F2-01] --------
    Importe:
      type: string
      pattern: '^-?\d+\.\d{2}$'
      example: '1234.56'
      description: Importe monetario en EUR, Decimal(10,2) serializado como string para evitar coma flotante.
    Porcentaje:
      type: string
      pattern: '^\d+\.\d{2}$'
      example: '21.00'
      description: Porcentaje, Decimal(4,2) serializado como string.

    # -------- Enums --------
    EstadoReserva:
      type: string
      enum: [consulta, pre_reserva, reserva_confirmada, evento_en_curso, post_evento, reserva_completada, reserva_cancelada]
    SubEstadoConsulta:
      type: string
      enum: ['2a', '2b', '2c', '2d', '2v', '2x', '2y', '2z']
    VistaCalendario:
      # [US-039] Vista de render del calendario; informativa (no altera el dataset del rango).
      type: string
      enum: [mes, semana, dia, lista]
    ColorCalendario:
      # [US-039] Color semĆ”ntico canĆ³nico (SlotifyGeneralSpecs Ā§11.3) derivado de (estado, subEstado)
      # de la reserva bloqueante. Token lĆ³gico; el frontend lo mapea a su token Tailwind (US-000A).
      type: string
      enum: [gris, ambar, verde, azul, rojo]
    CanalEntrada:
      type: string
      enum: [web, email, whatsapp, instagram, telefono, cocopool, holaplace]
    DuracionHoras:
      type: integer
      enum: [4, 8, 12]
    TipoEvento:
      type: string
      enum: [boda, corporativo, privado, otro, cumpleanos]
    Temporada:
      type: string
      enum: [alta, media, baja]
    TipoBloqueo:
      type: string
      enum: [blando, firme]
    OrigenExtra:
      type: string
      enum: [presupuesto, anadido_post_confirmacion]
    TipoFactura:
      type: string
      enum: [senal, liquidacion, fianza, complementaria]
    EstadoPresupuesto:
      type: string
      enum: [borrador, enviado, aceptado, rechazado]
    MetodoPago:
      # [US-014 / 6.2] MĆ©todo de pago elegido por el Gestor al generar el presupuesto. Determina el
      # rĆ©gimen fiscal (RegimenIva): transferencia ā con_iva; efectivo ā sin_iva. Viaja en el body del
      # request (preview y confirmar); el rĆ©gimen es la consecuencia derivada, nunca una entrada.
      type: string
      enum: [transferencia, efectivo]
    RegimenIva:
      # [US-014 / 6.2] RĆ©gimen fiscal derivado del mĆ©todo de pago. con_iva = base + IVA 21% (total mayor);
      # sin_iva = base sin IVA (total menor). Condiciona el desglose fiscal, la variante del PDF y la
      # secuencia de numeraciĆ³n. No se envĆ­a en el request: es la salida calculada del rĆ©gimen.
      type: string
      enum: [con_iva, sin_iva]
    EstadoFactura:
      type: string
      enum: [borrador, enviada, cobrada]
    FianzaStatus:
      type: string
      enum: [pendiente, recibo_enviado, cobrada, devuelta, retenida_parcial]
    PreEventoStatus:
      type: string
      enum: [pendiente, en_curso, cerrado]
    LiquidacionStatus:
      type: string
      enum: [pendiente, facturada, cobrada]
    TipoDocumento:
      type: string
      enum: [dni_anverso, dni_reverso, clausula_responsabilidad, condiciones_particulares, justificante_pago, presupuesto, factura, otro]
    # [US-033] Subconjunto de TipoDocumento con los tres documentos OBLIGATORIOS del evento. Se
    # declara aparte para que el multipart `tipo` y el checklist validen solo estos tres por enum
    # (design.md Ā§D-endpoints); el enum completo TipoDocumento sigue siendo el del schema Documento.
    TipoDocumentoEvento:
      type: string
      enum: [dni_anverso, dni_reverso, clausula_responsabilidad]
    CodigoEmail:
      type: string
      enum: [E1, E2, E3, E4, E5, E6, E7, E8, manual]

    # -------- Auth --------
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    LoginResponse:
      type: object
      required: [accessToken, usuario]
      properties:
        accessToken: { type: string, description: JWT de vida corta (~15 min) }
        usuario: { $ref: '#/components/schemas/Usuario' }
    Usuario:
      type: object
      properties:
        idUsuario: { type: string, format: uuid }
        email: { type: string, format: email }
        nombre: { type: string }
        apellidos: { type: string, nullable: true }
        rol: { type: string, enum: [gestor, admin, operario] }

    # -------- Reserva --------
    Reserva:
      type: object
      properties:
        idReserva: { type: string, format: uuid }
        codigo: { type: string, example: 'SLO-2026-0001' }
        clienteId: { type: string, format: uuid }
        estado: { $ref: '#/components/schemas/EstadoReserva' }
        subEstado: { $ref: '#/components/schemas/SubEstadoConsulta' }
        canalEntrada: { $ref: '#/components/schemas/CanalEntrada' }
        fechaEvento: { type: string, format: date, nullable: true }
        duracionHoras: { allOf: [{ $ref: '#/components/schemas/DuracionHoras' }], nullable: true }
        tipoEvento: { allOf: [{ $ref: '#/components/schemas/TipoEvento' }], nullable: true }
        # [US-051 Ā§D-5] Hora de inicio prevista del evento (RESERVA.horario, migraciĆ³n
        # 20260717150000_add_idioma_horario_to_reserva de US-047). Cambio aditivo/nullable.
        horario: { type: string, nullable: true, pattern: '^\d{2}:\d{2}$', example: '11:00' }
        numAdultosNinosMayores4: { type: integer, nullable: true }
        numNinosMenores4: { type: integer, nullable: true }
        numInvitadosFinal: { type: integer, nullable: true }
        importeTotal: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        importeSenal: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        importeLiquidacion: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        ttlExpiracion: { type: string, format: date-time, nullable: true }
        # [F2-02] Campos del ER que el recurso de lectura omitĆ­a (visita US-008/009, fianza US-030/036, cond. part. US-024)
        visitaProgramadaFecha: { type: string, format: date, nullable: true }
        visitaProgramadaHora: { type: string, nullable: true, example: '17:30' }
        visitaRealizada: { type: boolean, nullable: true }
        fianzaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        fianzaCobradaFecha: { type: string, format: date, nullable: true }
        fianzaDevueltaFecha: { type: string, format: date, nullable: true }
        fianzaDevueltaEur: { allOf: [{ $ref: '#/components/schemas/Importe' }], nullable: true }
        # [US-036 / Gate 1 G1-1] Motivo de retenciĆ³n de la fianza. Campo dedicado nuevo
        # `RESERVA.motivo_retencion` (String? @db.Text; migraciĆ³n aditiva la aplica el backend).
        # Se puebla solo en devoluciĆ³n parcial (`fianza_status='retenida_parcial'`); `null` en
        # devoluciĆ³n completa (`devuelta`) y antes de registrar la devoluciĆ³n.
        motivoRetencion: { type: string, nullable: true, description: 'Motivo de retenciĆ³n de la fianza (solo en retenida_parcial; null en devuelta / sin devolver).' }
        condPartFirmadas: { type: boolean, nullable: true }
        condPartFechaEnvio: { type: string, format: date-time, nullable: true }
        condPartFechaFirma: { type: string, format: date-time, nullable: true }
        preEventoStatus: { $ref: '#/components/schemas/PreEventoStatus' }
        liquidacionStatus: { $ref: '#/components/schemas/LiquidacionStatus' }
        fianzaStatus: { $ref: '#/components/schemas/FianzaStatus' }
        posicionCola: { type: integer, nullable: true }
        consultaBloqueanteId: { type: string, format: uuid, nullable: true }
        notas: { type: string, nullable: true }
        fechaCreacion: { type: string, format: date-time }
        # [US-049] Campos derivados de presentaciĆ³n para el pipeline (Kanban/Listado). OPCIONALES
        # (cambio aditivo): el backend del GET /reservas los proyecta; los demĆ”s endpoints que
        # heredan `Reserva` (ReservaDetalle, CreateReservaResponse, FichaConsulta) pueden omitirlos.
        nombreEvento:
          type: string
          description: >-
            Nombre del evento derivado del cliente asociado como
            `{cliente.nombre} {cliente.apellidos}`, con fallback al `codigo` de la reserva cuando no
            hay cliente resoluble. Campo de presentaciĆ³n, no persistido en RESERVA.
        progressLogistica:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            Progreso de logĆ­stica/pre-evento (0-100) derivado de `preEventoStatus`:
            `pendiente=0`, `en_curso=50`, `cerrado=100`. En estados de consulta (`2a`, `2b`, `2c`,
            `2d`, `2v`) y en `pre_reserva` arranca en `0` (aĆŗn no hay sub-proceso de pre-evento).
        progressLiquidacion:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            Progreso de liquidaciĆ³n (0-100) derivado de `liquidacionStatus`:
            `pendiente=0`, `facturada=50`, `cobrada=100`. En estados de consulta (`2a`, `2b`, `2c`,
            `2d`, `2v`) y en `pre_reserva` arranca en `0` (aĆŗn no hay liquidaciĆ³n en curso).
        # [US-047] Campo de presentaciĆ³n para el pipeline. Como el resto de derivados US-049 es
        # OPCIONAL y aditivo: solo lo proyecta el GET /reservas; los endpoints que heredan `Reserva`
        # (ReservaDetalle, CreateReservaResponse, FichaConsulta) pueden omitirlo.
        tieneBorradorE1Pendiente:
          type: boolean
          description: >
            true cuando existe una comunicaciĆ³n de tipo E1 en estado borrador para esta reserva.
            Calculado en cada fetch; se vuelve false automĆ”ticamente al pasar el borrador a enviado o fallido.
      required: [idReserva, codigo, clienteId, estado, canalEntrada]
    ReservaDetalle:
      allOf:
        - $ref: '#/components/schemas/Reserva'
        - type: object
          properties:
            comentarios:
              type: string
              nullable: true
              description: >-
                [mejoras-detalle-consulta] Comentario libre que el gestor/cliente dejĆ³ al
                crear la consulta (`CreateReservaRequest.comentarios`), persistido en RESERVA.
                Solo lectura; distinto de `notas` (anotaciones internas editables). Solo se
                expone en el detalle.
            cliente: { $ref: '#/components/schemas/Cliente' }
            extras:
              type: array
              items: { $ref: '#/components/schemas/ReservaExtra' }
            presupuestos:
              type: array
              items: { $ref: '#/components/schemas/Presupuesto' }
            facturas:
              type: array
              items: { $ref: '#/components/schemas/Factura' }
    ReservaListResponse:
      type: object
      required: [data, metadata]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Reserva' }
        metadata: { $ref: '#/components/schemas/PaginationMetadata' }
    # [US-042] Fila LIGERA del histĆ³rico (GET /historico). Schema propio (NO reutiliza `Reserva`)
    # a propĆ³sito (design.md Ā§D-1/Ā§D-4): las filas cerradas no necesitan los campos derivados del
    # pipeline (`progressLogistica`/`progressLiquidacion`, US-049) ni los transitorios de consulta/
    # cola/visita (`ttlExpiracion`, `posicionCola`, `consultaBloqueanteId`, `visitaProgramada*`).
    # Un schema dedicado mantiene los contratos de `pipeline` e `historico` desacoplados. Incluye
    # el subconjunto de presentaciĆ³n que la tabla del histĆ³rico consume (US-042 Ā§Happy Path:
    # cĆ³digo, cliente nombre+apellidos, fechaEvento, tipoEvento, importeTotal, estado). El detalle
    # completo se obtiene aparte con `GET /reservas/{id}` (`ReservaDetalle`).
    ReservaHistorico:
