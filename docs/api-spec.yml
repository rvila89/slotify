  # ============================ COMUNICACIONES ============================
  # [US-046 / UC-36] Primera superficie HTTP del mĆ³dulo `comunicaciones` (motor US-045).
  # Sub-recurso de la RESERVA (Gate 1 D-2, OpciĆ³n A): coherente con `/reservas/{id}/presupuesto/...`.
  # Acciones sobre borradores como verbos POST. Todo scoped por el tenant del JWT (RLS); el
  # `tenant_id` NUNCA viaja en el path. El gestor edita SOLO `asunto`/`cuerpo`; `codigoEmail` y
  # `destinatarioEmail` NO son editables.
  /reservas/{id}/comunicaciones:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Comunicaciones]
      summary: Listar las comunicaciones de una reserva (UC-36 / US-046)
      operationId: listarComunicacionesReserva
      description: |
        [US-046] Lista TODAS las `COMUNICACION` de la RESERVA `{id}` (secciĆ³n "Comunicaciones" de la
        ficha), ordenadas por `fechaCreacion` descendente. Devuelve el historial COMPLETO: todas las
        filas (una por evento del ciclo de vida), SIN deduplicar por `codigoEmail`/`subtipo`. Cada
        Ć­tem trae `codigoEmail`, `subtipo` (nullable: el evento del ciclo de vida que generĆ³ el E1;
        `NULL` para E2āE8, `manual` y filas legadas), `estado` (`borrador`/`enviado`/`fallido`),
        `asunto`, `destinatarioEmail`, `fechaCreacion`, `fechaEnvio` (nullable), `esReenvio` y el flag
        derivado `accionable` (`true` solo si `estado='borrador'`: la fila puede enviarse o
        descartarse; `enviado`/`fallido` son de solo lectura). Scoped por el tenant del JWT (RLS);
        nunca cross-tenant.
      responses:
        '200':
          description: Comunicaciones de la reserva (posiblemente vacĆ­o).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ComunicacionListItem' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/comunicaciones/{idComunicacion}/enviar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
      - { $ref: '#/components/parameters/IdComunicacion' }
    post:
      tags: [Comunicaciones]
      summary: Revisar y confirmar el envĆ­o de un borrador (UC-36 / US-046)
      operationId: enviarBorradorComunicacion
      description: |
        [US-046] Confirma el envĆ­o de la `COMUNICACION` `{idComunicacion}` de la RESERVA `{id}`, que debe
        estar en `estado='borrador'`. Reutiliza el camino de envĆ­o del motor de `comunicaciones`
        (US-045: `EnviarEmailPort` ā `actualizarEstado`). El body es **opcional** y solo admite `asunto`
        y `cuerpo` editados por el gestor; el `asunto`/`cuerpo` **persistido refleja lo efectivamente
        enviado**. `codigoEmail` y `destinatarioEmail` NO son editables.

        **Orden de guardas (Gate 1 D-2)**:
        - `409` ā la fila NO estĆ” en `borrador` (ya `enviado`/`fallido`): idempotencia de la acciĆ³n
          manual, sin efectos (`enviado` es terminal, no se revierte).
        - `422` ā `destinatarioEmail`/`CLIENTE.email` invĆ”lido (RFC 5321) o nulo: **NO se intenta el
          envĆ­o**, la fila **permanece en `borrador`**; el mensaje invita a completar el email del cliente.
        - `502` ā el proveedor de email falla: la fila queda persistida en `estado='fallido'` (sin
          `fechaEnvio`) + `AUDIT_LOG`, y el endpoint responde `502` (sin reintento automĆ”tico; el gestor
          puede reintentar). El fallo del proveedor se expresa como error HTTP para que el `onError` del
          frontend lo capture por status.

        **Invariantes**: no muta `RESERVA.estado` ni `FECHA_BLOQUEADA` (solo lee cliente/reserva).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EnviarBorradorRequest' }
      responses:
        '200':
          description: |
            Borrador enviado. Devuelve la `COMUNICACION` resultante (`estado='enviado'`, `fechaEnvio` no
            nulo, con el `asunto`/`cuerpo` efectivamente enviado).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comunicacion' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (409). La `COMUNICACION` no estĆ” en `borrador` (ya `enviado`/`fallido`):
            no es enviable. Sin efectos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ComunicacionEstadoConflictoError' }
        '422':
          description: |
            Destinatario invĆ”lido (422). `destinatarioEmail`/`CLIENTE.email` no es vĆ”lido (RFC 5321) o es
            nulo: no se intenta el envĆ­o y la fila **permanece en `borrador`**.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ComunicacionDestinatarioInvalidoError' }
        '502':
          description: |
            Fallo del proveedor de email (502). Se intentĆ³ el envĆ­o y el proveedor fallĆ³: la
            `COMUNICACION` queda persistida en `estado='fallido'` (sin `fechaEnvio`) + `AUDIT_LOG`. Sin
            reintento automĆ”tico.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ComunicacionProveedorError' }

