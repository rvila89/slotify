            se omite o es `null`, el cobro se registra sin justificante (`PAGO.justificanteDocId=null`) y
            avanza igualmente a `cobrada`. Un id inexistente en el tenant ā 404 `JUSTIFICANTE_NO_ENCONTRADO`.
    AlertaDiscrepanciaCobro:
      # [US-029 Ā§D-3] Alerta INFORMATIVA de discrepancia de importe. Presente en la respuesta 200 SOLO
      # si el importe cobrado difiere del facturado. NO es un error: el cobro se registra igualmente.
      type: object
      required: [importeFacturado, importeCobrado, diferencia]
      properties:
        importeFacturado:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Total de la FACTURA de liquidaciĆ³n (`Factura.total`), Decimal(10,2) como string.'
        importeCobrado:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Importe realmente cobrado (`Pago.importe`), Decimal(10,2) como string.'
        diferencia:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Diferencia `importeFacturado - importeCobrado` (Decimal(10,2) como string; positiva si se
            cobrĆ³ de menos, negativa si de mĆ”s). La conciliaciĆ³n se delega al Gestor.
    RegistrarCobroLiquidacionResponse:
      type: object
      required: [pago, liquidacion, liquidacionStatus]
      properties:
        pago:
          allOf: [{ $ref: '#/components/schemas/PagoLiquidacion' }]
          description: 'El PAGO creado (con el importe real y, si se adjuntĆ³, `justificanteDocId`).'
        liquidacion:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          description: 'Factura de liquidaciĆ³n actualizada (`estado=cobrada`).'
        liquidacionStatus:
          allOf: [{ $ref: '#/components/schemas/LiquidacionStatus' }]
          description: 'Sub-proceso de liquidaciĆ³n de la RESERVA tras el cobro (`cobrada`).'
        alertaDiscrepancia:
          allOf: [{ $ref: '#/components/schemas/AlertaDiscrepanciaCobro' }]
          nullable: true
          description: >-
            Presente SOLO si `pago.importe !== liquidacion.total`. Alerta informativa (no bloqueante);
            `null`/ausente cuando el importe cobrado coincide con el facturado.
    CobroLiquidacionError:
      # Envelope estĆ”ndar NestJS (ErrorResponse: statusCode/message/error) + `codigo` de dominio y
      # `motivo` legible. Cubre 400/404/409 de la acciĆ³n de cobro de US-029. La discrepancia de importe
      # NO es un error (va en la respuesta 200 como `alertaDiscrepancia`).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - COBRO_INVALIDO
                - FACTURA_LIQUIDACION_NO_ENCONTRADA
                - JUSTIFICANTE_NO_ENCONTRADO
                - LIQUIDACION_YA_COBRADA
                - LIQUIDACION_NO_FACTURADA
              description: >-
                CĆ³digo de error de dominio: `COBRO_INVALIDO` (400: `importe <= 0` o `fechaCobro` futura/
                invĆ”lida), `FACTURA_LIQUIDACION_NO_ENCONTRADA`/`JUSTIFICANTE_NO_ENCONTRADO` (404),
                `LIQUIDACION_YA_COBRADA` (409, doble cobro), `LIQUIDACION_NO_FACTURADA` (409,
                `liquidacionStatus='pendiente'`).
            motivo:
              type: string
              description: >-
                Mensaje legible para la UI ("La liquidaciĆ³n ya estĆ” marcada como cobrada", "La factura
                de liquidaciĆ³n debe estar enviada antes de registrar su cobro").

    # -------- Cobro de fianza (US-030) --------
    RegistrarCobroFianzaRequest:
      # [US-030 Ā§D-3] Cuerpo de la acciĆ³n de cobro de fianza. `justificanteDocId` OPCIONAL: referencia a
      # un DOCUMENTO ya subido por el flujo de documentos existente (design.md Ā§D-5); si se omite, el cobro
      # es vĆ”lido igualmente y el PAGO queda con justificante_doc_id=NULL. `confirmarSinRecibo` materializa
      # la polĆ­tica "Negociable" (design.md Ā§D-2) para `fianzaStatus='pendiente'`.
      type: object
      required: [importe, fechaCobro]
      additionalProperties: false
      properties:
        importe:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Importe REAL cobrado (Importe string Decimal(10,2), p. ej. `"1000.00"`). DEBE ser `> 0`
            (`0`/negativo ā 400 `COBRO_INVALIDO`). Se registra como `RESERVA.fianzaEur`.
        fechaCobro:
          type: string
          format: date
          example: '2026-07-10'
          description: >-
            Fecha del cobro (DATE). DEBE ser una fecha vĆ”lida `<= RESERVA.fechaEvento` (relativo al
            evento, NO a hoy; posterior al evento o mal formada ā 400 `COBRO_INVALIDO`). `fechaCobro =
            fechaEvento` (cobro en T-0) es vĆ”lida y se procesa como el happy path.
        justificanteDocId:
          type: string
          format: uuid
          nullable: true
          description: >-
            OPCIONAL. Referencia a un DOCUMENTO (`tipo='justificante_pago'`) YA subido en el tenant. Si
            se omite o es `null`, el cobro se registra sin justificante (`PAGO.justificanteDocId=null`) y
            avanza igualmente a `cobrada`. Un id inexistente en el tenant ā 404 `JUSTIFICANTE_NO_ENCONTRADO`.
        confirmarSinRecibo:
          type: boolean
          default: false
          description: >-
            PolĆ­tica "Negociable" (design.md Ā§D-2). Solo relevante si `fianzaStatus='pendiente'` (el recibo
            de fianza nunca se enviĆ³). Ausente o `false` sobre `pendiente` ā respuesta 200
            `confirmacion_requerida` (aviso, NO crea PAGO). `true` ā el Gestor confirma el cobro sin recibo
            enviado: se registra igualmente (FACTURA(fianza) `borrador ā cobrada` o creada al vuelo
            `cobrada`) y se traza el flujo excepcional en `AUDIT_LOG`. Irrelevante sobre `recibo_enviado`.
    RegistrarCobroFianzaResponse:
      # Respuesta discriminada por `resultado`: el frontend distingue el cobro efectivo de la respuesta
      # "confirmaciĆ³n requerida" (polĆ­tica Negociable) para mostrar el diĆ”logo y reintentar con
      # confirmarSinRecibo=true. NO es un error 4xx: la Negociable es un aviso no bloqueante (design.md Ā§D-2).
      oneOf:
        - $ref: '#/components/schemas/RegistrarCobroFianzaCobrado'
        - $ref: '#/components/schemas/RegistrarCobroFianzaConfirmacionRequerida'
      discriminator:
        propertyName: resultado
        mapping:
          cobrado: '#/components/schemas/RegistrarCobroFianzaCobrado'
          confirmacion_requerida: '#/components/schemas/RegistrarCobroFianzaConfirmacionRequerida'
    RegistrarCobroFianzaCobrado:
      # Cobro registrado: PAGO creado + FACTURA(fianza) cobrada + fianzaStatus='cobrada' + fianzaEur +
      # fianzaCobradaFecha. `resultado='cobrado'` discrimina esta forma en el oneOf.
      type: object
      required: [resultado, pago, facturaFianza, fianzaStatus, fianzaEur, fianzaCobradaFecha]
      properties:
        resultado:
          type: string
          enum: [cobrado]
          description: 'Discriminador: el cobro se registrĆ³ correctamente.'
        pago:
          allOf: [{ $ref: '#/components/schemas/PagoLiquidacion' }]
          description: >-
            El PAGO creado (con el importe real y, si se adjuntĆ³, `justificanteDocId`). Misma forma de
            lectura del PAGO que en US-029 (`facturaId` = recibo de fianza).
        facturaFianza:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          description: 'Recibo de fianza actualizado (`estado=cobrada`); creado al vuelo si no existĆ­a (D-2b).'
        fianzaStatus:
          allOf: [{ $ref: '#/components/schemas/FianzaStatus' }]
          description: 'Sub-proceso de fianza de la RESERVA tras el cobro (`cobrada`).'
        fianzaEur:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Importe cobrado registrado en `RESERVA.fianzaEur` (Decimal(10,2) como string).'
        fianzaCobradaFecha:
          type: string
          format: date
          example: '2026-07-10'
          description: 'Fecha del cobro registrada en `RESERVA.fianzaCobradaFecha` (= `fechaCobro`).'
    RegistrarCobroFianzaConfirmacionRequerida:
      # PolĆ­tica "Negociable" (design.md Ā§D-2): fianzaStatus='pendiente' sin confirmarSinRecibo=true.
      # NO crea PAGO ni FACTURA ni cambia estado. El frontend muestra el aviso y reintenta con el flag.
      # `resultado='confirmacion_requerida'` discrimina esta forma en el oneOf.
      type: object
      required: [resultado, codigo, mensaje, reintentarCon]
      properties:
        resultado:
          type: string
          enum: [confirmacion_requerida]
          description: 'Discriminador: aviso no bloqueante; NO se registrĆ³ el cobro.'
        codigo:
          type: string
          enum: [RECIBO_FIANZA_NO_ENVIADO]
          description: 'CĆ³digo del aviso Negociable (recibo de fianza nunca enviado, `fianzaStatus=pendiente`).'
        mensaje:
          type: string
          example: 'El recibo de fianza no ha sido enviado al cliente. ĀæDesea registrar el cobro igualmente?'
          description: 'Texto del diĆ”logo de confirmaciĆ³n que muestra el frontend.'
        reintentarCon:
          type: object
          required: [confirmarSinRecibo]
          description: 'Indica al frontend cĆ³mo reintentar para forzar el cobro tras la confirmaciĆ³n del Gestor.'
          properties:
            confirmarSinRecibo:
              type: boolean
              enum: [true]
              description: 'Reenviar la misma peticiĆ³n con `confirmarSinRecibo: true` para registrar el cobro.'
    CobroFianzaError:
      # Envelope estĆ”ndar NestJS (ErrorResponse: statusCode/message/error) + `codigo` de dominio y `motivo`
      # legible. Cubre 400/404/409 de la acciĆ³n de cobro de fianza (US-030). La polĆ­tica "Negociable" NO es
      # un error: viaja en la respuesta 200 como `RegistrarCobroFianzaConfirmacionRequerida`.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - COBRO_INVALIDO
                - FACTURA_FIANZA_NO_ENCONTRADA
                - JUSTIFICANTE_NO_ENCONTRADO
                - FIANZA_YA_COBRADA
              description: >-
                CĆ³digo de error de dominio: `COBRO_INVALIDO` (400: `importe <= 0` o `fechaCobro` posterior
                a `fechaEvento`/invĆ”lida), `FACTURA_FIANZA_NO_ENCONTRADA`/`JUSTIFICANTE_NO_ENCONTRADO`
                (404), `FIANZA_YA_COBRADA` (409, doble cobro).
            motivo:
              type: string
              description: >-
                Mensaje legible para la UI ("La fianza ya estĆ” marcada como cobrada").

    # -------- DevoluciĆ³n de fianza (US-036) --------
    RegistrarDevolucionFianzaRequest:
      # [US-036 / Gate 1] Cuerpo application/json (NO multipart, G1-3) de la acciĆ³n de devoluciĆ³n de
      # fianza. Naming camelCase y estilo alineados con RegistrarCobroFianzaRequest (US-030).
      # `justificanteDocId` OPCIONAL: referencia a un DOCUMENTO (`tipo='justificante_pago'`) YA subido
      # por `POST /documentos`; si se omite, la devoluciĆ³n es vĆ”lida igualmente (FA-04) con aviso.
      # `motivoRetencion` obligatorio SOLO si el resultado es parcial (importeDevuelto < fianzaEur).
      type: object
      required: [importeDevuelto, fechaCobro]
      additionalProperties: false
      properties:
        importeDevuelto:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Importe devuelto (Importe string Decimal(10,2), p. ej. `"1000.00"`). DEBE ser
            `0.00 ā¤ x ā¤ RESERVA.fianzaEur`. `"0.00"` es vĆ”lido (retenciĆ³n total). `x > fianzaEur`
            ā 400 `IMPORTE_SUPERA_FIANZA` (FA-02). `== fianzaEur` ā `devuelta`; `< fianzaEur` ā
            `retenida_parcial`.
        fechaCobro:
          type: string
          format: date
          example: '2026-07-10'
          description: >-
            Fecha real del abono de la devoluciĆ³n (DATE). DEBE ser `>= RESERVA.fianzaCobradaFecha`
            (anterior o mal formada ā 400 `FECHA_DEVOLUCION_INVALIDA`, FA-03). Naming `fechaCobro`
            por coherencia con US-030.
        motivoRetencion:
          type: string
          nullable: true
          description: >-
            Motivo de la retenciĆ³n. OBLIGATORIO solo en devoluciĆ³n parcial (`importeDevuelto <
            fianzaEur` ā `retenida_parcial`); si falta en ese caso ā 400 `MOTIVO_RETENCION_REQUERIDO`.
            En devoluciĆ³n completa (`devuelta`) se ignora / `null`. Se persiste en
            `RESERVA.motivoRetencion` (campo dedicado, G1-1).
        justificanteDocId:
          type: string
          format: uuid
          nullable: true
          description: >-
            OPCIONAL. Referencia a un DOCUMENTO (`tipo='justificante_pago'`) YA subido en el tenant
            (vĆ­a `POST /documentos`, NO multipart aquĆ­ ā G1-3). Omitido o `null` ā la devoluciĆ³n se
            registra sin justificante (FA-04) con `avisoSinJustificante=true`. Un id inexistente en el
            tenant ā 404 `JUSTIFICANTE_NO_ENCONTRADO` (misma semĆ”ntica que US-030).
    RegistrarDevolucionFianzaResponse:
      # Respuesta 200: RESERVA actualizada (patrĆ³n allOf de US-021/US-030 reutilizando el schema
      # Reserva) + el DOCUMENTO justificante si se referenciĆ³ + aviso FA-04 si se registrĆ³ sin Ć©l.
      type: object
      required: [reserva, avisoSinJustificante]
      properties:
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: >-
            La RESERVA actualizada: `fianzaStatus` derivado (`devuelta`|`retenida_parcial`),
            `fianzaDevueltaEur`, `fianzaDevueltaFecha` y `motivoRetencion` (si parcial).
        documentoJustificante:
          allOf: [{ $ref: '#/components/schemas/Documento' }]
          nullable: true
          description: >-
            El DOCUMENTO justificante vinculado (`tipo='justificante_pago'`), o `null`/ausente si no
            se referenciĆ³ (FA-04).
        avisoSinJustificante:
          type: boolean
          description: >-
            `true` si la devoluciĆ³n se registrĆ³ sin justificante (FA-04); el frontend muestra el
            aviso "DevoluciĆ³n registrada sin justificante. Puedes adjuntarlo mĆ”s tarde.".
    DevolucionFianzaError:
      # Envelope estĆ”ndar NestJS (ErrorResponse: statusCode/message/error) + `codigo` de dominio y
      # `motivo` legible. Cubre 400/404/409 de la acciĆ³n de devoluciĆ³n de fianza (US-036). Mismo
      # patrĆ³n y cĆ³digos reutilizados que CobroFianzaError (US-030): JUSTIFICANTE_NO_ENCONTRADO (404).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - IMPORTE_SUPERA_FIANZA
                - FECHA_DEVOLUCION_INVALIDA
                - MOTIVO_RETENCION_REQUERIDO
                - JUSTIFICANTE_NO_ENCONTRADO
                - PRECONDICION_NO_CUMPLIDA
                - DEVOLUCION_YA_REGISTRADA
              description: >-
                CĆ³digo de error de dominio: `IMPORTE_SUPERA_FIANZA` (400, FA-02: importe > fianzaEur o
                negativo), `FECHA_DEVOLUCION_INVALIDA` (400, FA-03: fecha < fianzaCobradaFecha),
                `MOTIVO_RETENCION_REQUERIDO` (400, parcial sin motivo), `JUSTIFICANTE_NO_ENCONTRADO`
                (404, reutilizado de US-030), `PRECONDICION_NO_CUMPLIDA` (409, estadoā post_evento /
                fianzaStatusā cobrada / iban_devolucion null), `DEVOLUCION_YA_REGISTRADA` (409, doble
                registro sobre estado final irreversible).
            motivo:
              type: string
              description: >-
                Mensaje legible para la UI ("El importe a devolver no puede superar la fianza
                cobrada").

    # -------- Cliente --------
    Cliente:
      type: object
      properties:
        idCliente: { type: string, format: uuid }
        nombre: { type: string }
        apellidos: { type: string, nullable: true }
        email: { type: string, format: email, nullable: true }
        telefono: { type: string, nullable: true }
        dniNif: { type: string, nullable: true }
        direccion: { type: string, nullable: true }
