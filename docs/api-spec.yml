            servicio de PDF fallĆ³ al enviar E4. La transacciĆ³n REVIERTE por completo (la liquidaciĆ³n
            sigue en `borrador`, sin nĆŗmero ni cambios de status). El Gestor puede reintentar la acciĆ³n.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LiquidacionError' }
        '503':
          description: |
