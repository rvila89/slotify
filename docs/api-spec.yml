    # de dominio `motivo`): conserva el envelope NestJS (statusCode/message) y aĆ±ade `motivo`. NO
    # reutiliza AsignarFechaConflictoError porque aquĆ­ NO se ofrece cola para la fecha nueva (no
    # aplica `colaDisponible`): el conflicto es terminal y la RESERVA conserva su fecha antigua.
    CambiarFechaConflictoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [motivo]
          properties:
            motivo:
              type: string
              description: >-
                Motivo del conflicto: la fecha destino no estĆ” disponible (bloqueada por otra
                RESERVA). El cambio se rechaza sin efectos (rollback total).
              example: 'La fecha destino no estĆ” disponible: ya estĆ” bloqueada por otra reserva.'

    # -------- TransiciĆ³n 2.bā2.c (US-007) --------
    # [US-007] Body de POST /reservas/{id}/pendiente-invitados. La acciĆ³n no toma parĆ”metros (el TTL
    # se deriva de TENANT_SETTINGS.ttl_consulta_dias); se modela como objeto vacĆ­o para mantener un
    # requestBody JSON explĆ­cito coherente con las demĆ”s transiciones de la RESERVA.
    PendienteInvitadosRequest:
      type: object
      additionalProperties: false
      description: 'Cuerpo vacĆ­o. La transiciĆ³n 2.bā2.c no requiere parĆ”metros (TTL derivado del setting del tenant).'
    # [US-007] Respuesta 200 de la transiciĆ³n 2.bā2.c. Reutiliza el schema Reserva (que ya expone
    # subEstado y ttlExpiracion) y le aĆ±ade consultasDescartadas: recuento de RESERVA de cola
    # (2.d) pasadas a 2.y por el vaciado A16, para el feedback de la UI. Es un wrapper de respuesta
    # (no un campo del agregado RESERVA), por eso se modela como objeto con `reserva` +
    # `consultasDescartadas` en vez de inflar el schema Reserva con un dato transitorio.
    PendienteInvitadosResponse:
      type: object
      required: [reserva, consultasDescartadas]
      properties:
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: 'RESERVA actualizada: subEstado=`2c`, ttlExpiracion extendido.'
        consultasDescartadas:
          type: integer
          minimum: 0
          example: 3
          description: >-
            Recuento de RESERVA de cola (`subEstado='2d'`) que el vaciado A16 pasĆ³ a `2y` (terminal).
            `0` cuando la consulta no bloqueaba ninguna cola.
    # [US-007] Error 409 de POST /reservas/{id}/pendiente-invitados (bloqueo no vigente). Sigue el
    # mismo patrĆ³n que AsignarFechaConflictoError de US-005 (allOf ErrorResponse + campo de dominio):
    # conserva el envelope NestJS (statusCode/message) y aĆ±ade `motivo`. No reutiliza
    # AsignarFechaConflictoError porque aquĆ­ NO se ofrece cola (no aplica `colaDisponible`).
    BloqueoNoVigenteError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [motivo]
          properties:
            motivo:
              type: string
              description: >-
                Motivo por el que la transiciĆ³n a `2c` no es posible: la RESERVA no tiene fecha
                bloqueada activa, o el bloqueo ya expirĆ³ (`ttl_expiracion < ahora`).

    # [US-006] Error 409 de POST /reservas/{id}/extender-bloqueo (conflicto con el estado del bloqueo
    # en BD). Mismo patrĆ³n que BloqueoNoVigenteError de US-007 (allOf ErrorResponse + campo de dominio
    # `motivo`): conserva el envelope NestJS (statusCode/message) y aĆ±ade `motivo`. No reutiliza
    # BloqueoNoVigenteError por claridad semĆ”ntica: aquĆ­ el 409 agrupa tres conflictos del bloqueo
    # (TTL expirado, bloqueo firme sin TTL, o sin fila bloqueante blanda vigente). D-3: 409 =
    # conflicto/precondiciĆ³n del bloqueo en BD; 422 = precondiciĆ³n de estado no extensible o `dias`
    # invĆ”lido.
    ExtenderBloqueoConflictoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [motivo]
          properties:
            motivo:
              type: string
              description: >-
                Motivo por el que el bloqueo no se puede extender: el TTL ya expirĆ³
                (`ttl_expiracion < ahora`), el bloqueo es firme (`reserva_confirmada`, sin TTL), o la
                RESERVA no tiene una fila bloqueante blanda vigente en `FechaBloqueada`.

    # -------- TransiciĆ³n 2.a/2.b/2.cā2.v (US-008) --------
    # [US-008] Error 409 de POST /reservas/{id}/visita: consulta en cola (2.d). Mismo patrĆ³n que
    # BloqueoNoVigenteError de US-007 (allOf ErrorResponse + campo de dominio `motivo`): conserva el
    # envelope NestJS (statusCode/message) y aĆ±ade `motivo` con el mensaje UC-12. No reutiliza
    # BloqueoNoVigenteError por claridad semĆ”ntica (aquĆ­ el conflicto es el estado de cola, no un
    # bloqueo expirado). 409 = precondiciĆ³n de estado (cola); las guardas de origen / ventana ā 422.
    ProgramarVisitaConflictoError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [motivo]
          properties:
            motivo:
              type: string
              example: >-
                No es posible programar una visita para una consulta en cola. La consulta debe ser
                promovida primero (UC-12).
              description: >-
                Motivo por el que la visita no se puede programar: la RESERVA estĆ” en cola
                (`subEstado='2d'`) y debe promoverse primero (UC-12).

    # -------- Errores de dominio de US-014 (generar presupuesto / activar pre_reserva) --------
    # Reutilizan el envelope NestJS (ErrorResponse: statusCode/message) + `codigo` de dominio, mismo
    # patrĆ³n que los errores del motor de tarifa (US-016) y AsignarFechaConflictoError (US-005). No se
    # inventan formatos nuevos.
    PresupuestoDatosFiscalesError:
      # 422 FA-01: datos fiscales/de la reserva incompletos. Enumera los campos faltantes para que la UI
      # los resalte. NingĆŗn efecto: sin PRESUPUESTO, RESERVA y FechaBloqueada intactas.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, camposFaltantes]
          properties:
            codigo: { type: string, enum: [DATOS_FISCALES_INCOMPLETOS] }
            camposFaltantes:
              type: array
              minItems: 1
              description: >-
                Campos no nulos requeridos que faltan. Del CLIENTE: `dniNif`, `direccion`, `codigoPostal`,
                `poblacion`, `provincia`. De la RESERVA: `fechaEvento`, `duracionHoras`,
                `numAdultosNinosMayores4`, `tipoEvento`.
              items:
                type: string
                enum: [dniNif, direccion, codigoPostal, poblacion, provincia, fechaEvento, duracionHoras, numAdultosNinosMayores4, tipoEvento]
    PresupuestoPrecioManualRequeridoError:
      # 422 FA-02: el motor devolviĆ³ tarifa_a_consultar (>50 invitados) y el body de confirmaciĆ³n no trae
      # precioManualEur. Sin efectos.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo: { type: string, enum: [PRECIO_MANUAL_REQUERIDO] }
    PresupuestoGuardaOrigenError:
      # 409: la RESERVA no es origen vĆ”lido para generar/confirmar presupuesto (2d/terminal/pre_reserva+),
      # o ya existe un PRESUPUESTO enviado/aceptado, o carrera "Fecha no disponible" (UNIQUE tenant+fecha).
      # Sin efectos (rollback total en la confirmaciĆ³n). Mismo patrĆ³n allOf ErrorResponse + campo de dominio.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, motivo]
          properties:
            codigo:
              type: string
              enum: [ORIGEN_INVALIDO, PRESUPUESTO_YA_EXISTE, FECHA_NO_DISPONIBLE, CONDICIONES_NO_CONFIGURADAS]
              description: >-
                `ORIGEN_INVALIDO` (2d/terminal/pre_reserva+); `PRESUPUESTO_YA_EXISTE` (hay uno
                enviado/aceptado ā usar UC-15); `FECHA_NO_DISPONIBLE` (carrera D4 sobre UNIQUE(tenant,fecha));
                `CONDICIONES_NO_CONFIGURADAS` (change `condiciones-idioma-e2-firma-banner`): el tenant no
                tiene condiciones particulares configuradas y desde este change se adjuntan en E2 al
                confirmar el presupuesto ā guard pre-tx sin efectos.
            motivo:
              type: string
              description: 'Mensaje legible para la UI (p. ej. "Fecha no disponible" o "Usa la ediciĆ³n del presupuesto").'

    # -------- Errores de dominio de US-015 (editar presupuesto en pre_reserva) --------
    PresupuestoEdicionValidacionError:
      # 422: validaciĆ³n de negocio de la ediciĆ³n sin efectos (no crea versiĆ³n ni lĆ­neas RESERVA_EXTRA). Un
      # `codigo` de dominio discrimina el caso. Mismo patrĆ³n allOf ErrorResponse + campo de dominio que US-014.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum: [DESCUENTO_INVALIDO, DURACION_INVALIDA]
              description: >-
                `DESCUENTO_INVALIDO` (`descuentoEur` negativo o mayor que la `baseImponible`);
                `DURACION_INVALIDA` (`duracionHoras` fuera de `{4,8,12}`).

    # -------- US-021: Confirmar pago de seĆ±al / activar reserva_confirmada (UC-17) --------
    ConfirmarSenalResponse:
      # Respuesta 200: la RESERVA elevada a reserva_confirmada + el DOCUMENTO justificante creado +
      # (opcional) la factura de seĆ±al en borrador disparada post-commit (US-022). Reutiliza los
      # schemas existentes Reserva / Documento / Factura; no se inventa contrato de US-022.
      type: object
      required: [reserva, justificante]
      properties:
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: >-
            RESERVA resultante: `estado='reserva_confirmada'`, `ttlExpiracion=null`, `importeSenal` e
            `importeLiquidacion` congelados (`senal + liquidacion = importeTotal`), y los tres
            sub-procesos `preEventoStatus`/`liquidacionStatus`/`fianzaStatus = 'pendiente'`.
        justificante:
          allOf: [{ $ref: '#/components/schemas/Documento' }]
          description: "DOCUMENTO creado con `tipo='justificante_pago'`, `url` y `mimeType` del fichero subido."
        facturaSenalBorrador:
          allOf: [{ $ref: '#/components/schemas/Factura' }]
          nullable: true
          description: >-
            OPCIONAL ā indicador de la factura de seĆ±al en borrador presentada al Gestor tras el commit
            (disparo de US-022/UC-18, `tipo='senal'`, `estado='borrador'`). Su generaciĆ³n/aprobaciĆ³n NO
            es de este change (US-021): si el disparo de US-022 aĆŗn no ha materializado el borrador en el
            momento de responder, se OMITE (`null`). El contrato definitivo de la factura lo fija US-022;
            aquĆ­ solo se reutiliza el schema `Factura` existente como referencia mĆ­nima.
    ConfirmarSenalValidacionError:
      # 422 (F5-02: guarda/validaciĆ³n de negocio sin efectos). Un `codigo` de dominio discrimina el caso.
      # Sin DOCUMENTO, sin mutaciĆ³n de RESERVA/FechaBloqueada, sin transiciĆ³n. Mismo patrĆ³n allOf
      # ErrorResponse + campo de dominio que US-014 (PresupuestoGuardaOrigenError).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum: [ORIGEN_INVALIDO, JUSTIFICANTE_REQUERIDO, FORMATO_NO_PERMITIDO, TAMANO_EXCEDIDO, IMPORTE_TOTAL_INVALIDO]
              description: >-
                `ORIGEN_INVALIDO` ā "La reserva no estĆ” en estado pre_reserva";
                `JUSTIFICANTE_REQUERIDO` ā "Es obligatorio adjuntar el justificante de pago";
                `FORMATO_NO_PERMITIDO` ā formato de fichero no permitido (no jpeg/png/pdf);
                `TAMANO_EXCEDIDO` ā fichero > 10 MB;
                `IMPORTE_TOTAL_INVALIDO` ā `importeTotal` 0/null (sin presupuesto aceptado previo).
    ConfirmarSenalConflictoError:
      # 409 (F5-02: conflicto de estado / carrera determinista). Rollback total, sin estado intermedio
      # observable. Mismo patrĆ³n allOf ErrorResponse + `codigo` + `motivo` que US-014.
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo, motivo]
          properties:
            codigo:
              type: string
              enum: [RESERVA_YA_CONFIRMADA, FECHA_NO_DISPONIBLE]
              description: >-
                `RESERVA_YA_CONFIRMADA` (doble clic / dos sesiones sobre la MISMA reserva: la segunda
                observa la RESERVA ya en `reserva_confirmada`) ā "La reserva ya ha sido confirmada";
                `FECHA_NO_DISPONIBLE` (la `(tenant_id, fecha)` ya estĆ” en bloqueo firme de OTRA reserva,
                `UNIQUE`/`P2002`) ā "Fecha no disponible".
            motivo:
              type: string
              description: 'Mensaje legible para la UI ("La reserva ya ha sido confirmada" o "Fecha no disponible").'

    # -------- US-024: Registro de la firma de condiciones particulares (confirmacion) --------
    # Respuesta 200 y errores del endpoint POST /reservas/{id}/condiciones-firmadas. Reutiliza los
    # schemas existentes Reserva / Documento (la Reserva ya expone condPartFirmadas + condPartFechaFirma,
    # lĆ­neas del schema Reserva) y el envelope ErrorResponse + `codigo` (mismo patrĆ³n que
    # ConfirmarSenalValidacionError / ConfirmarSenalConflictoError de US-021). No se inventa contrato.
    RegistrarCondicionesFirmadasResponse:
      # 200: la RESERVA con la firma registrada (condPartFirmadas=true, condPartFechaFirma) + el
      # DOCUMENTO firmado creado. El estado de la reserva NO cambia (design.md Ā§D-no-transicion).
      type: object
      required: [reserva, documentoFirmado]
      properties:
        reserva:
          allOf: [{ $ref: '#/components/schemas/Reserva' }]
          description: >-
            RESERVA resultante con `condPartFirmadas=true` y `condPartFechaFirma` (timestamp del
            registro de la firma). `estado` y los sub-procesos (`preEventoStatus`/`liquidacionStatus`/
            `fianzaStatus`) permanecen inalterados: la firma no es una transiciĆ³n de estado.
        documentoFirmado:
          allOf: [{ $ref: '#/components/schemas/Documento' }]
          description: >-
            DOCUMENTO creado con `tipo='condiciones_particulares'` (la copia firmada), `url` y `mimeType`
            del fichero subido. El DOCUMENTO original no firmado (US-023) permanece; en la re-firma
            (D-re-firma) esta es la versiĆ³n mĆ”s reciente, referencia de la firma.
    CondicionesFirmadasValidacionError:
      # 422 (guarda de estado o validaciĆ³n de fichero, sin efectos). Un `codigo` de dominio discrimina el
      # caso. Sin DOCUMENTO, sin mutaciĆ³n de RESERVA, sin AUDIT_LOG. Mismo patrĆ³n allOf(ErrorResponse) +
      # `codigo` que ConfirmarSenalValidacionError (US-021).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum: [ESTADO_INVALIDO, CONDICIONES_REQUERIDAS, FORMATO_NO_PERMITIDO, TAMANO_EXCEDIDO]
              description: >-
                `ESTADO_INVALIDO` ā la RESERVA estĆ” en estado terminal (`reserva_completada`,
                `reserva_cancelada`) o fuera de `{reserva_confirmada, evento_en_curso, post_evento}`
                ("No se puede registrar la firma en una reserva en estado terminal");
                `CONDICIONES_REQUERIDAS` ā no se adjuntĆ³ el fichero de las condiciones firmadas;
                `FORMATO_NO_PERMITIDO` ā mime no permitido (no jpeg/png/pdf);
                `TAMANO_EXCEDIDO` ā fichero > 10 MB.
    CondicionesFirmadasConflictoError:
      # 409 (prerequisito del flujo no cumplido: E3 no enviado). Sin efectos. Mismo patrĆ³n
      # allOf(ErrorResponse) + `codigo` que ConfirmarSenalConflictoError (US-021).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum: [CONDICIONES_NO_ENVIADAS]
              description: >-
                `CONDICIONES_NO_ENVIADAS` ā `RESERVA.cond_part_enviadas_fecha` es nulo: las condiciones
                particulares aĆŗn no se han enviado al cliente por E3 (US-023) ā "Las condiciones
                particulares no han sido enviadas al cliente aĆŗn".

    # -------- US-033: DocumentaciĆ³n obligatoria del evento (documentacion-evento) --------
    # Schemas del POST /reservas/{id}/documentos-evento y GET .../checklist. La respuesta reutiliza
    # el envelope ErrorResponse + `codigo` (mismo patrĆ³n que ConfirmarSenal/CondicionesFirmadas). Se
    # define un DocumentoEvento dedicado (no se reutiliza el schema Documento genĆ©rico) porque US-033
    # necesita exponer `fechaCreacion` (referencia del "mĆ”s reciente" del checklist) y `reservaId`
    # obligatorio, campos que el schema Documento genĆ©rico no modela; su `tipo` se acota al enum
    # TipoDocumentoEvento (design.md Ā§D-checklist / Ā§D-no-idempotencia).
    DocumentoEvento:
      type: object
      description: >-
        DOCUMENTO obligatorio del evento (er-diagram Ā§DOCUMENTO). `reservaId` es obligatorio para la
        documentaciĆ³n del evento; `tipo` es uno de los tres tipos obligatorios.
      required: [idDocumento, tipo, reservaId, url, mimeType, nombreArchivo, tamanoBytes, fechaCreacion]
      properties:
        idDocumento: { type: string, format: uuid }
        tipo: { $ref: '#/components/schemas/TipoDocumentoEvento' }
        reservaId: { type: string, format: uuid }
        url: { type: string, description: 'URL del fichero en el almacĆ©n de documentos durable.' }
        mimeType: { type: string, example: image/jpeg }
        nombreArchivo: { type: string }
        tamanoBytes:
          type: integer
          minimum: 1
          description: 'TamaĆ±o del fichero en bytes; siempre > 0 (rechazo de vacĆ­o/corrupto).'
        fechaCreacion:
          type: string
          format: date-time
          description: 'Instante de creaciĆ³n de la fila DOCUMENTO; ordena el "mĆ”s reciente" del checklist.'
    ChecklistItemDocumentacionEvento:
      type: object
      description: >-
        Estado de uno de los tres tipos obligatorios. `completado = existe ā„ 1 DOCUMENTO de ese tipo
        para la reserva (bajo RLS)`. `documento` (opcional) es el mĆ”s reciente por `fechaCreacion`.
      required: [tipo, completado]
      properties:
        tipo: { $ref: '#/components/schemas/TipoDocumentoEvento' }
        completado:
          type: boolean
          description: 'true si existe al menos un DOCUMENTO de este tipo para la reserva.'
        documento:
          allOf: [{ $ref: '#/components/schemas/DocumentoEvento' }]
          nullable: true
          description: >-
            Documento mĆ”s reciente (por `fechaCreacion`) de este tipo, cuando `completado=true`. Se
            omite/`null` si el Ć­tem estĆ” pendiente.
    ChecklistDocumentacionEvento:
      type: object
      description: >-
        Checklist derivado por lectura del estado de la documentaciĆ³n obligatoria del evento. Siempre
        contiene los tres Ć­tems (`dni_anverso`, `dni_reverso`, `clausula_responsabilidad`).
      required: [items]
      properties:
        items:
          type: array
          minItems: 3
          maxItems: 3
          items: { $ref: '#/components/schemas/ChecklistItemDocumentacionEvento' }
    SubirDocumentoEventoResponse:
      # 201: el DOCUMENTO creado + el checklist actualizado (refresco en tiempo real, sin round-trip).
      type: object
      required: [documento, checklist]
      properties:
        documento:
          allOf: [{ $ref: '#/components/schemas/DocumentoEvento' }]
          description: 'DOCUMENTO reciĆ©n creado con el `tipo` subido, `url` y `mimeType` del fichero.'
        checklist:
          allOf: [{ $ref: '#/components/schemas/ChecklistDocumentacionEvento' }]
          description: 'Checklist tras la subida: el Ć­tem del `tipo` subido queda `completado=true`.'
    SubirDocumentoEventoValidacionError:
      # 422 (guarda de estado / tipo no permitido / validaciĆ³n de fichero, sin efectos). Un `codigo` de
      # dominio discrimina el caso. Sin DOCUMENTO, sin subida al almacĆ©n, sin AUDIT_LOG. Mismo patrĆ³n
      # allOf(ErrorResponse) + `codigo` que ConfirmarSenalValidacionError (US-021).
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [codigo]
          properties:
            codigo:
              type: string
              enum:
                - ESTADO_NO_PERMITE_DOCUMENTACION
                - TIPO_DOCUMENTO_NO_PERMITIDO
                - ARCHIVO_REQUERIDO
                - FORMATO_NO_PERMITIDO
                - ARCHIVO_INVALIDO
                - TAMANO_EXCEDIDO
              description: >-
                `ESTADO_NO_PERMITE_DOCUMENTACION` ā la RESERVA no estĆ” en `evento_en_curso` ("La
                documentaciĆ³n del evento solo puede capturarse mientras el evento estĆ” en curso");
                `TIPO_DOCUMENTO_NO_PERMITIDO` ā `tipo` fuera de {dni_anverso, dni_reverso,
                clausula_responsabilidad};
                `ARCHIVO_REQUERIDO` ā no se adjuntĆ³ fichero;
                `FORMATO_NO_PERMITIDO` ā mime no permitido ("Formato no admitido. Por favor, usa JPEG,
                PNG o PDF.");
                `ARCHIVO_INVALIDO` ā fichero vacĆ­o o corrupto (`tamanoBytes = 0`) ("El archivo no pudo
                procesarse. Por favor, intĆ©ntalo de nuevo con un archivo vĆ”lido.");
                `TAMANO_EXCEDIDO` ā fichero > 10 MB.

    # -------- US-022: Factura de seĆ±al (facturacion) --------
    # [US-022 / UC-18] La FACTURA es el agregado raĆ­z de la capability `facturacion`. FacturaSenalDto
    # es la vista de lectura de la factura de seĆ±al (tipo='senal'): mapea los campos de la tabla
    # FACTURA (er-diagram Ā§3.12) + los flags DERIVADOS (esBorradorInvalido, pdfPendiente) que la UI
    # usa para habilitar/bloquear la aprobaciĆ³n. Reutiliza los wrappers monetarios (Importe/Porcentaje
    # como string, F2-01) y el enum EstadoFactura existente. Los request/error schemas siguen el mismo
    # patrĆ³n allOf(ErrorResponse) + `codigo`/`motivo`/`camposFaltantes` de US-014/US-021: no se inventan
    # formatos nuevos ni wrappers/paginaciĆ³n no respaldados.
    # [US-027 / D-5] Vista de lectura CANĆNICA y GENERALIZADA de una FACTURA (cualquier tipo:
    # senal, liquidacion, fianza). Generaliza el DTO de seĆ±al de US-022 para que la colecciĆ³n
    # `GET /reservas/{id}/facturas` exponga tambiĆ©n los borradores de liquidaciĆ³n y fianza SIN
    # duplicar ni redefinir el agregado. `FacturaSenalDto` (US-022) queda como un alias que
    # referencia este schema (allOf) para no romper el contrato ya congelado de la factura de seĆ±al.
    # Espejo de la tabla FACTURA (er-diagram Ā§3.12): importes Decimal(10,2) como string (`Importe`),
    # IVA Decimal(4,2) como string (`Porcentaje`).
    FacturaDto:
      type: object
      description: |
        FACTURA de una reserva (`tipo` ā {`senal`, `liquidacion`, `fianza`, `complementaria`}), con
        desglose fiscal, estado del ciclo de vida y flags derivados para la UI. Es el item de la
        colecciĆ³n `GET /reservas/{id}/facturas`. En `borrador`, `numeroFactura` y `fechaEmision` son
        `null`; la numeraciĆ³n `F-YYYY-NNNN` y la emisiĆ³n se asignan al enviar (US-028).
      required:
        - idFactura
        - reservaId
        - tipo
        - baseImponible
        - ivaPorcentaje
        - ivaImporte
        - total
        - estado
        - esBorradorInvalido
        - pdfPendiente
      properties:
        idFactura:
          type: string
          format: uuid
          description: 'Identificador de la FACTURA (er-diagram Ā§3.12 id_factura).'
        reservaId:
          type: string
          format: uuid
          description: 'RESERVA a la que pertenece la factura (Ćŗnica por `(reservaId, tipo)`).'
        numeroFactura:
          type: string
          nullable: true
          example: 'F-2026-0001'
          description: >-
            NĆŗmero fiscal `F-YYYY-NNNN` secuencial y Ćŗnico por `(tenant_id, aĆ±o)`. `null` mientras
            la factura estĆ” en `borrador`; se asigna al enviar (`estado='enviada'`, US-028).
        tipo:
          allOf: [{ $ref: '#/components/schemas/TipoFactura' }]
          description: >-
            Tipo de la factura: `senal` (40 %, US-022), `liquidacion` (60 % + extras pendientes,
            US-027), `fianza` (fianza_default_eur, US-027) o `complementaria`.
        baseImponible:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: 'Base imponible = round(total / 1.21, 2). Decimal(10,2) como string.'
        ivaPorcentaje:
          allOf: [{ $ref: '#/components/schemas/Porcentaje' }]
          description: "IVA general fijo del MVP: `21.00`. Decimal(4,2) como string."
        ivaImporte:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Importe de IVA = total ā baseImponible (por resta, no por doble redondeo), de modo que
            `baseImponible + ivaImporte = total` exactamente (design.md Ā§D-2).
        total:
          allOf: [{ $ref: '#/components/schemas/Importe' }]
          description: >-
            Total con IVA. Para `senal` = `RESERVA.importeSenal` (40 % MVP, US-021); para
            `liquidacion` = `importeLiquidacion + Ī£(RESERVA_EXTRA.subtotal WHERE factura_id IS NULL)`
            (US-027); para `fianza` = `TENANT_SETTINGS.fianza_default_eur` (US-027). Todos congelados;
            no se recalcula tarifa ni porcentaje.
        concepto:
          type: string
          nullable: true
          description: 'Concepto de la factura (p. ej. "SeĆ±al 40 % reserva SLO-2026-0001").'
        pdfUrl:
          type: string
          nullable: true
          description: >-
            URL del PDF generado (mecanismo de PDF de US-014/US-021, design.md Ā§D-5). `null` si el
            PDF aĆŗn no se ha generado (borrador invĆ”lido por datos fiscales o fallo transitorio).
        estado:
          allOf: [{ $ref: '#/components/schemas/EstadoFactura' }]
          description: "Ciclo de vida: `borrador` ā `enviada` (al enviar) ā `cobrada`."
        fechaEmision:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp de emisiĆ³n, fijado al enviar (estado='enviada'). null en borrador."
        fechaCreacion:
          type: string
          format: date-time
          description: 'Instante de creaciĆ³n de la factura (post-commit de la confirmaciĆ³n de US-021/US-027).'
        esBorradorInvalido:
          type: boolean
          description: >-
            Flag DERIVADO (design.md Ā§D-9), no columna de FACTURA. `true` cuando faltan datos
            fiscales del CLIENTE (dniNif o direcciĆ³n fiscal): el borrador NO puede aprobarse y el
            sistema NO reintenta solo (requiere que el Gestor complete los datos del cliente).
        pdfPendiente:
          type: boolean
          description: >-
            Flag DERIVADO (design.md Ā§D-9), no columna de FACTURA. `true` cuando `pdfUrl=null` por un
            fallo transitorio del servicio de PDF: la aprobaciĆ³n queda bloqueada y el sistema
            reintenta la generaciĆ³n automĆ”ticamente.
    FacturaSenalDto:
      # [US-022] Alias de lectura de la factura de seĆ±al (tipo='senal'). Referencia FacturaDto para
      # NO duplicar campos ni redefinir el agregado (US-027 Ā§Consistencia); el `tipo` es siempre
      # `senal` para las respuestas de los endpoints de la factura de seĆ±al (US-022).
      # [factura-senal-pdf-idioma-email-ux] AĆ±adido campo additive e3Enviado (D1).
      allOf:
        - $ref: '#/components/schemas/FacturaDto'
        - type: object
          required: [e3Enviado]
          properties:
            e3Enviado:
              type: boolean
              description: >-
                Flag DERIVADO. `true` cuando existe una COMUNICACION E3 con `estado='enviado'` y
                `es_reenvio=false` para la reserva. La UI usa este flag para mostrar sĆ³lo "Reenviar"
                tras el primer envĆ­o (no permite re-disparar el envĆ­o inicial).
      description: |
        Factura de seĆ±al (`tipo='senal'`) de una reserva. Misma forma que `FacturaDto`; se conserva
        como nombre estable de los endpoints de US-022 (obtener/aprobar/rechazar/regenerar-pdf).
    AprobarFacturaRequest:
      # [US-022 Ā§AprobaciĆ³n] Cuerpo vacĆ­o: el Gestor NO puede modificar importes ni datos fiscales
      # del borrador (provienen de RESERVA y CLIENTE). Se modela como objeto vacĆ­o para mantener un
      # requestBody JSON explĆ­cito coherente con las transiciones de la RESERVA (p. ej.
      # PendienteInvitadosRequest de US-007).
      type: object
      additionalProperties: false
      description: 'Cuerpo vacĆ­o. La aprobaciĆ³n no toma parĆ”metros (importes/datos fiscales inmutables).'
    RechazarFacturaRequest:
      # [US-022 Ā§Rechazo] Motivo obligatorio; se registra en AUDIT_LOG (no en columna de FACTURA).
      type: object
      required: [motivo]
      additionalProperties: false
      properties:
        motivo:
          type: string
          minLength: 1
          maxLength: 2000
          description: >-
            OBLIGATORIO, no vacĆ­o. Motivo del rechazo del borrador (p. ej. "Datos fiscales del tenant
            errĆ³neos"). Se registra en `AUDIT_LOG`; la FACTURA permanece en `borrador`.
    RegenerarPdfFacturaRequest:
      # [US-022 Ā§Error de generaciĆ³n del PDF] Reintento manual del PDF. Sin parĆ”metros; se modela como
      # objeto vacĆ­o para un requestBody JSON explĆ­cito coherente con el resto del contrato.
      type: object
      additionalProperties: false
      description: 'Cuerpo vacĆ­o. El reintento de PDF no toma parĆ”metros (idempotente sobre pdfUrl).'
    # [US-022] Errores de dominio de facturacion. Reutilizan el envelope NestJS (ErrorResponse:
    # statusCode/message) + `codigo` de dominio, mismo patrĆ³n que US-014/US-021. No se inventan
    # formatos nuevos.
