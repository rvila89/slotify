        `FICHA_OPERATIVA`, cobros, `FECHA_BLOQUEADA` ni la cola. No se envĆ­a ningĆŗn email.

        **Guarda de fecha (422)**: el forzado solo estĆ” disponible el **dĆ­a del evento**. Si
        `estado = reserva_confirmada` pero `date(fecha_evento) ā  date(hoy)` (fecha de calendario del
        servidor/tenant) ā **422** `code: 'fecha_evento_no_es_hoy'`, sin efectos. Es una precondiciĆ³n
        de negocio (fecha), distinta del conflicto de estado (409). Nota UX: el botĆ³n de la UI solo
        aparece con `fecha_evento = hoy`, asĆ­ que el 422 es una defensa de servidor no eludible por
        URL/shortcut.

        **Concurrencia**: dos peticiones concurrentes (cron US-031 vs gestor, o dos sesiones del
        gestor) se serializan por `SELECT ā¦ FOR UPDATE` sobre la fila RESERVA; exactamente una gana,
        la segunda observa `estado ā  reserva_confirmada` (UPDATE condicional afecta 0 filas) y termina
        como **409** sin doble transiciĆ³n ni doble AUDIT_LOG. Sin locks distribuidos (no toca
        `FECHA_BLOQUEADA` ni la cola).
      requestBody:
        # AcciĆ³n sin parĆ”metros de negocio: la Ćŗnica entrada es la identidad de la RESERVA (path)
        # y el actor Gestor (JWT). Body opcional y vacĆ­o, calcado de FinalizarEventoRequest (US-034).
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForzarInicioEventoRequest' }
      responses:
        '200':
          description: |
            Inicio forzado: RESERVA en `evento_en_curso`. Devuelve la RESERVA actualizada mĆ”s
            `forzadoPorGestor` (siempre `true`) y `precondicionesIncumplidas` (la lista de
            precondiciones que estaban incumplidas en el momento del forzado; `[]` si estaban las
            tres cumplidas).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ForzarInicioEventoResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # [US-032] Autenticado pero sin rol Gestor del tenant para la acciĆ³n manual.
          $ref: '#/components/responses/Forbidden'
        '404':
