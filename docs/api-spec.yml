  # ============================ US-034: FINALIZAR EVENTO ============================
  # [US-034 / UC-25] AcciĆ³n MANUAL del Gestor que cierra la ejecuciĆ³n del evento: transiciona
  # `RESERVA.estado: evento_en_curso ā post_evento` (irreversible) y, condicionalmente, dispara
  # el email E5 (solicitud de IBAN + agradecimiento + NPS). Contrapartida manual del inicio
  # automĆ”tico de US-031 (cron). DecisiĆ³n de contrato D-3 (Gate SDD aprobado): acciĆ³n POST
  # semĆ”ntica sobre el recurso (OpciĆ³n A), NO un PATCH genĆ©rico de estado. El reenvĆ­o/reintento
  # de E5 desde la ficha se DIFIERE a una US futura (D-7): NO se aĆ±ade endpoint de reenvĆ­o aquĆ­.
  /reservas/{id}/finalizar-evento:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Finalizar evento y disparar solicitud de IBAN (UC-25 / US-034)
      operationId: finalizarEvento
      description: |
        [US-034] El **Gestor** (JWT de usuario, rol gestor, RLS del tenant del JWT ā NUNCA
        `X-Cron-Token`: es acciĆ³n manual, no barrido de Sistema) marca como **finalizado** un
        evento en ejecuciĆ³n. Sobre una RESERVA en `estado='evento_en_curso'`, la acciĆ³n realiza
        **dos operaciones separadas** disparadas por el mismo click (design.md Ā§D-2):

        1. **Paso transaccional (crĆ­tico, all-or-nothing)**: bajo `SELECT ā¦ FOR UPDATE` de la
           fila RESERVA, re-evalĆŗa la guarda de origen (`estado='evento_en_curso'`), transiciona
           `evento_en_curso ā post_evento` (**irreversible**, incondicional respecto a fianza y
           email), marca la NPS como **programada** (T+3d, marca derivada; el envĆ­o real es US
           futura, fuera de MVP ā design.md Ā§D-6) y escribe `AUDIT_LOG accion='transicion'`,
           `entidad='RESERVA'`, `datos_anteriores.estado='evento_en_curso'`,
           `datos_nuevos.estado='post_evento'`, con el `usuarioId` del Gestor (origen **Usuario**,
           a diferencia del barrido de Sistema de US-031). Si `fianzaStatus='cobrada'` **y**
           `fianzaEur IS NULL` (dato anĆ³malo, D-4), registra una **alerta de dato anĆ³malo** en
           `AUDIT_LOG` (no bloquea, no envĆ­a E5). Commit.
        2. **Paso post-commit (best-effort)**: **solo si `fianzaEur > 0`** (guarda pura
           `debeEnviarseE5`: `NULL` y `0` colapsan a "sin fianza", D-4) invoca el motor de email
           de `comunicaciones` (US-045) con el trigger **E5** hacia `CLIENTE.email`, creando
           COMUNICACION (`codigoEmail='E5'`). El envĆ­o vive **fuera** de la transacciĆ³n de la
           transiciĆ³n: un fallo del proveedor deja `COMUNICACION.estado='fallido'` **SIN**
           revertir el estado ya commiteado (`post_evento` se mantiene).

        La respuesta expone el resultado para las alertas de los criterios de aceptaciĆ³n:
        `e5.resultado` (`enviado` / `fallido` / `no_aplica`) y `documentacionPendiente` (lista de
        Ć­tems del checklist de documentaciĆ³n sin subir ā advertencia informativa **no
        bloqueante**, consultada a la superficie de US-033; fail-open si aĆŗn no estĆ” expuesta,
        design.md Ā§D-7).

        **Concurrencia (D-8)**: dos peticiones concurrentes (doble click) se serializan por
        `SELECT ā¦ FOR UPDATE` sobre la fila RESERVA; exactamente una gana, la segunda observa
        `estado ā  evento_en_curso` y termina como **409** sin doble transiciĆ³n, doble AUDIT_LOG
        ni doble E5. Sin locks distribuidos (no toca `FECHA_BLOQUEADA` ni la cola).
      requestBody:
        # AcciĆ³n sin parĆ”metros de negocio: la Ćŗnica entrada es la identidad de la RESERVA (path)
        # y el actor (JWT). Body opcional y vacĆ­o, en lĆ­nea con las acciones de transiciĆ³n sin
        # payload del contrato (p. ej. POST /reservas/{id}/promover automĆ”tico, /salir-cola).
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinalizarEventoRequest' }
      responses:
        '200':
          description: |
            Evento finalizado: RESERVA en `post_evento`. Devuelve la RESERVA actualizada mĆ”s el
            resultado del disparo de E5 (`e5`) y la advertencia no bloqueante de documentaciĆ³n
            pendiente (`documentacionPendiente`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FinalizarEventoResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # [US-034 D-3] Autenticado pero sin rol Gestor del tenant para la acciĆ³n manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # RESERVA `{id}` inexistente o de otro tenant (RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (mapeo F5-02): la RESERVA `{id}` no estĆ” en `evento_en_curso`
            (transiciĆ³n `evento_en_curso ā post_evento` no permitida desde el estado actual, o
            carrera de doble finalizaciĆ³n perdida ā D-8). Sin efectos, sin doble transiciĆ³n.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FinalizarEventoConflictError' }

  # ============================ US-032: FORZAR INICIO DE EVENTO ============================
  # [US-032 / UC-23 FA-01] Endpoint de USUARIO dedicado, GEMELO ESTRICTO de
  # POST /reservas/{id}/finalizar-evento (US-034): acciĆ³n MANUAL del Gestor (JWT + rol gestor, RLS del
  # tenant del JWT ā NUNCA X-Cron-Token: no es el barrido de Sistema de US-031). Transiciona una Ćŗnica
  # RESERVA `reserva_confirmada ā evento_en_curso` FORZANDO la transiciĆ³n aunque alguna precondiciĆ³n del
  # inicio de evento estĆ© incumplida (`pre_evento_status ā  'cerrado'` O `liquidacion_status ā  'cobrada'`
  # O `fianza_status ā  'cobrada'`). Reutiliza la misma guarda de origen declarativa (`resolverInicioEvento`)
