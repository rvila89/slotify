  # ============================ US-022: FACTURA DE SEĆAL (facturacion) ============================
  # [US-022 / UC-18] La FACTURA es un agregado raĆ­z propio con ciclo de vida
  # (borrador ā enviada ā cobrada), numeraciĆ³n fiscal F-YYYY-NNNN por (tenant_id, aĆ±o) y desglose
  # contable (base/IVA/total). La CREACIĆN de la factura de seĆ±al NO tiene endpoint pĆŗblico:
  # es un efecto POST-COMMIT del disparo de US-021 (confirmar-senal) mĆ”s el reintento del PDF
  # (design.md Ā§D-1/Ā§D-6). Estos endpoints cubren la lectura del borrador y las acciones del
  # Gestor (aprobar/rechazar/regenerar-pdf). Mapeo HTTP heredado (F5-02): 409 = conflicto de
  # estado (factura no en borrador); 422 = guarda/validaciĆ³n de negocio (datos fiscales
  # incompletos, PDF pendiente); 404 = factura/reserva inexistente en el tenant (RLS).
  /reservas/{id}/factura-senal:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Facturacion]
      summary: Obtener la factura de seĆ±al de una reserva (UC-18 / US-022)
      operationId: obtenerFacturaSenal
      description: |
        [US-022] Devuelve la **factura de seĆ±al** (`tipo='senal'`) de la RESERVA `{id}`: nĆŗmero,
        estado, desglose fiscal (base + IVA 21 % + total), `pdfUrl` y los flags derivados que la UI
        usa para habilitar/bloquear la aprobaciĆ³n (`esBorradorInvalido`, `pdfPendiente`). Es una
        vista de **solo lectura**: no crea ni muta la FACTURA.

        La factura la crea el sistema como **efecto post-commit** de la confirmaciĆ³n de la reserva
        (US-021), no este endpoint. Aislada por `tenant_id` del JWT (RLS); nunca en el path.

        Los flags `esBorradorInvalido` y `pdfPendiente` se **derivan** (design.md Ā§D-9), no son
        columnas de la FACTURA: `esBorradorInvalido=true` cuando faltan datos fiscales del CLIENTE
        (bloqueo por datos, requiere acciĆ³n del Gestor); `pdfPendiente=true` cuando `pdfUrl=null`
        por un fallo transitorio del servicio de PDF (bloqueo temporal, el sistema reintenta solo).
        Cuando ambos son `false` y hay `pdfUrl`, el borrador es aprobable.
      responses:
        '200':
          description: |
            Factura de seĆ±al de la reserva (`FacturaSenalDto`). Incluye desglose fiscal, `estado`,
            `numeroFactura` (`null` mientras estĆ© en `borrador`), `pdfUrl` (`null` si aĆŗn no
            generado) y los flags `esBorradorInvalido`/`pdfPendiente`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FacturaSenalDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o **aĆŗn no tiene** factura de seĆ±al (el disparo
            post-commit de US-021 todavĆ­a no la materializĆ³). El cuerpo es el envelope estĆ”ndar
            `ErrorResponse`.
