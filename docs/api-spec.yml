  /reservas/{id}/extender-bloqueo:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Extender plazo del bloqueo blando ā prĆ³rroga pura del TTL (UC-05 / US-006)
      operationId: extenderBloqueo
      description: |
        [US-006] **Override manual del Gestor** que extiende el `ttlExpiracion` del **bloqueo
        blando vigente** de un agregado RESERVA **existente** antes de que expire, **sin liberar la
        fecha** ni disparar la promociĆ³n de cola. Aplica cuando hay bloqueo blando activo:
        `subEstado ā {2b, 2c, 2v}` O `estado = 'pre_reserva'`, con `ttlExpiracion > ahora` y **fila
        activa en `FechaBloqueada`** (`tipoBloqueo = 'blando'`).

        A diferencia de US-005/007/008 āque son **transiciones de mĆ”quina de estados** (cambian
        `subEstado`)ā esta operaciĆ³n es una **prĆ³rroga pura del TTL**: **NO** cambia `estado`,
        `subEstado`, `tipoBloqueo` ni `fecha`. En una **Ćŗnica transacciĆ³n** (`SELECT ā¦ FOR UPDATE`
        sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis ni locks distribuidos)
        ejecuta, all-or-nothing:
        1. RESERVA ā `ttlExpiracion = ttlExpiracion_actual + dias` (la base es el `ttlExpiracion`
           **actual**, no `now()`; `dias` lo indica el gestor, **no** se deriva de
           `ttl_consulta_dias`).
        2. **UPDATE** del `ttl_expiracion` de la fila de `FechaBloqueada` de esa RESERVA al **mismo
           nuevo valor** (no inserta; la fila ya existe).
        3. `AUDIT_LOG accion='actualizar'`, `entidad='RESERVA'`, con
           `datos_anteriores.ttl_expiracion` (valor previo) y `datos_nuevos.ttl_expiracion` (nuevo).

        Los recordatorios automĆ”ticos (A3/A4/A5) se **reprograman implĆ­citamente**: se derivan del
        `ttlExpiracion` y los dispara el barrido periĆ³dico (patrĆ³n estado-en-fila + barrido,
        `architecture.md Ā§2.5`; barrido US-012). No se introduce ni se toca ningĆŗn scheduler. No se
        envĆ­a email al cliente al extender (UC-05 no lo describe).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtenderBloqueoRequest'
      responses:
        '200':
          description: |
            ExtensiĆ³n aplicada. Devuelve la RESERVA actualizada con el **nuevo** `ttlExpiracion`
            (= `ttlExpiracion` anterior + `dias`); `estado`, `subEstado`, `tipoBloqueo` y `fecha`
            permanecen sin cambios.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            **Conflicto con el estado del bloqueo en BD** (D-3); la RESERVA no se modifica. El cuerpo
            aĆ±ade `motivo` al envelope de error estĆ”ndar. Casos:
            - **TTL ya expirado** (`ttlExpiracion < ahora`): el bloqueo ya caducĆ³; una extensiĆ³n no
              puede "deshacer" una expiraciĆ³n ya ejecutada por el barrido.
            - **Bloqueo firme** (`estado = 'reserva_confirmada'`, `tipoBloqueo = 'firme'`, **sin
              TTL**): no hay TTL que extender.
            - **Sin fila bloqueante blanda vigente**: la RESERVA no tiene una fila activa en
              `FechaBloqueada` para `(tenant_id, fechaEvento)`.
            (F5-02: 409 = conflicto/precondiciĆ³n de bloqueo; 422 = guarda de estado / validaciĆ³n.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtenderBloqueoConflictoError'
        '422':
          description: |
            **PrecondiciĆ³n de estado no extensible o cuerpo invĆ”lido** (D-3); la RESERVA no se muta.
            Casos:
            - **Estado sin bloqueo activo extensible**: `subEstado = '2a'` (sin fecha bloqueada) o un
              estado terminal (`2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`). El predicado
              declarativo `esEstadoConBloqueoBlandoExtensible` rechaza estos estados antes de tocar BD.
            - **`dias` invĆ”lido**: `0`, negativo o no entero (validaciĆ³n de cuerpo defensiva en
              servidor): "El nĆŗmero de dĆ­as de extensiĆ³n debe ser un entero positivo (ā„ 1)".
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/visita:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Programar visita al espacio ā transiciĆ³n 2.a/2.b/2.cā2.v (UC-07 / US-008)
      operationId: programarVisita
      description: |
        [US-008] TransiciĆ³n de un agregado RESERVA **existente** en sub-estado `2a`
        (exploratoria con `fechaEvento` definida), `2b` (con fecha + bloqueo blando) o `2c`
        (pendiente de invitados) hacia `2v` (visita programada). En una **Ćŗnica transacciĆ³n**
        (`SELECT ā¦ FOR UPDATE` sobre la fila bloqueante + `UNIQUE(tenant_id, fecha)`; sin Redis
        ni locks distribuidos) ejecuta, all-or-nothing:
        1. RESERVA ā `subEstado='2v'`, `visitaProgramadaFecha=fecha`, `visitaProgramadaHora=hora`,
           `visitaRealizada=false`.
        2. **INSERT-o-UPDATE** (upsert por `UNIQUE(tenant_id, fechaEvento)`) de `FechaBloqueada`
           con `ttlExpiracion = visitaProgramadaFecha + 1 dĆ­a (23:59:59)` y `tipoBloqueo='blando'`:
           si venĆ­a de `2b`/`2c` (fila existente) se **actualiza** el TTL; si venĆ­a de `2a` (sin
           bloqueo) se **crea** la fila. El TTL deriva de la fecha de visita, **no** del setting
           `ttl_consulta_dias` (reutiliza la primitiva `resolverPlanBloqueo({ fase: '2.v' })`,
           US-040). El setting `TENANT_SETTINGS.max_dias_programar_visita` solo acota la **ventana
           de entrada** de `fecha`, no el TTL.
        3. `AUDIT_LOG accion='transicion'` (`datos_anteriores.sub_estado` ā {2a,2b,2c},
           `datos_nuevos.sub_estado='2v'`, `datos_nuevos.visita_programada_fecha`).

        Tras el COMMIT se dispara (post-commit, **no bloqueante**, motor de email US-045) el email
        **E6** de confirmaciĆ³n de visita y se registra en `COMUNICACION` (`codigo_email='E6'`,
        `estado='enviado'`, `reservaId`, `clienteId`): un fallo de envĆ­o **no** revierte la
        transiciĆ³n ni el bloqueo (design.md Ā§D-6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramarVisitaRequest'
      responses:
        '200':
          description: |
            TransiciĆ³n aplicada. Devuelve la RESERVA actualizada: `subEstado='2v'`,
            `visitaProgramadaFecha`, `visitaProgramadaHora`, `visitaRealizada=false` y el nuevo
            `ttlExpiracion` del bloqueo (= fecha de visita + 1 dĆ­a 23:59:59).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          # Cuerpo mal formado: `fecha`/`hora` ausentes o con formato invĆ”lido (no `date` / `HH:mm`).
          # La validaciĆ³n de dominio (ventana de fecha / guarda de origen) se reporta como 422.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Consulta en cola (`subEstado='2d'`): no es posible programar una visita directamente;
            la consulta debe ser **promovida primero** (`POST /reservas/{id}/promover`, UC-12). La
            RESERVA no se modifica. El cuerpo aĆ±ade `motivo` al envelope de error estĆ”ndar (F5-02:
            409 = conflicto/precondiciĆ³n de estado; 422 = guarda de transiciĆ³n/validaciĆ³n invĆ”lida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProgramarVisitaConflictoError' }
        '422':
          description: |
            No se puede transicionar a `2v`. Casos (la RESERVA NO se modifica):
            - **Guarda de origen**: el sub-estado de origen no es `2a`/`2b`/`2c` (p. ej. `2v` ya
              programada, o un terminal `2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`,
              inmutables).
            - **`2a` sin `fechaEvento`**: debe introducirse la fecha del evento antes de programar
              la visita.
            - **Fecha fuera de ventana**: `fecha ā¤ hoy` (debe ser futura) o
              `fecha > hoy + TENANT_SETTINGS.max_dias_programar_visita` (fuera del lĆ­mite).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    patch:
      tags: [Reservas]
      summary: Registrar resultado de visita ā "interesado" (2.vā2.b) / "reserva inmediata" (2.vāpre_reserva) (UC-08/UC-14 Ā· US-009/US-010)
      operationId: registrarResultadoVisita
      description: |
        Endpoint **polimĆ³rfico** que registra el **resultado de una visita** sobre un agregado RESERVA
        **existente** en sub-estado `2v` (visita programada) y marca la visita como realizada. El
        desenlace se selecciona por el enum `resultado` (`ResultadoVisita`). Estado de implementaciĆ³n:

        - `interesado` ā **[US-009, implementado]** el cliente sigue interesado; la consulta vuelve a
          `2b` (con fecha + bloqueo blando) con un TTL **fresco** y se envĆ­a E7.
        - `reserva_inmediata` ā **[US-010, implementado]** el cliente confirma en la visita; la consulta
          transiciona directamente a `pre_reserva` (sin pasar por `2b`).
        - `descarta` ā **[US-011, RESERVADO]** aĆŗn no implementado; el servidor lo **rechaza con 422**
          hasta US-011. La forma polimĆ³rfica evita romper el contrato al aĆ±adirlo (solo se levanta la guarda).

        ---
        **`resultado='interesado'` (US-009 Ā· 2.vā2.b)** ā en una **Ćŗnica transacciĆ³n** (`SELECT ā¦ FOR
        UPDATE` sobre la fila bloqueante; sin Redis ni locks distribuidos), all-or-nothing:
        1. RESERVA ā `subEstado='2b'`, `visitaRealizada=true`,
           `ttlExpiracion = now + TENANT_SETTINGS.ttl_consulta_dias` (default 3). El TTL es **fresco**:
           se calcula desde el instante de la transiciĆ³n (`now`), **no** se acumula sobre el
           `ttlExpiracion` previo ni deriva de `visitaProgramadaFecha` (informativa). Reutiliza la
           primitiva `resolverPlanBloqueo({ fase: '2.b' })` (US-040).
        2. **UPDATE** del `ttlExpiracion` de la fila **existente** de `FechaBloqueada` de esa RESERVA
           al **mismo valor** que `RESERVA.ttlExpiracion`. La fila siempre existe (proviene de `2v`,
           US-008): es un UPDATE puro, sin INSERT ni DELETE. `tipoBloqueo` **permanece** `'blando'`.
        3. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'`
           (`datos_anteriores.sub_estado='2v'`, `datos_anteriores.visita_realizada=false`,
           `datos_nuevos.sub_estado='2b'`, `datos_nuevos.visita_realizada=true`).

        Tras el COMMIT se dispara (post-commit, **no bloqueante**, motor de email US-045) el email
        **E7** de confirmaciĆ³n de bloqueo post-visita (plazo de 3 dĆ­as para decidir) y se registra en
        `COMUNICACION` (`codigo_email='E7'`, `estado='enviado'`, `reservaId`, `clienteId`): un fallo
        del proveedor **no** revierte la transiciĆ³n y queda trazado con `estado='fallido'` para
        reintento (design.md Ā§D-4). Idempotencia `(reservaId, codigo_email)` de US-045.

        ---
        **`resultado='reserva_inmediata'` (US-010 Ā· 2.vāpre_reserva)** ā el cliente decide reservar en
        la propia visita. **Requiere datos completos** (validaciĆ³n UC-14, ver 422). En una **Ćŗnica
        transacciĆ³n** (`SELECT ā¦ FOR UPDATE` sobre la fila bloqueante; sin Redis ni locks distribuidos),
        all-or-nothing:
        1. RESERVA ā `estado='pre_reserva'`, `subEstado=null`, `visitaRealizada=true`,
           `ttlExpiracion = now + TENANT_SETTINGS.ttl_prereserva_dias` (default **7 dĆ­as**, nunca
           hardcodeado). TTL **fresco** desde `now`.
        2. **UPDATE** de la fila **existente** de `FechaBloqueada` de esa RESERVA:
           `tipoBloqueo='blando'` y `ttlExpiracion` al **mismo valor** que `RESERVA.ttlExpiracion`
           (7 dĆ­as). La fila siempre existe (proviene de `2v`, US-008): UPDATE puro, **sin INSERT ni
           DELETE**.
        3. **Vaciado de la cola A16** en la misma transacciĆ³n: las RESERVA en `2d` cuyo
           `consultaBloqueanteId` apunta a esta pasan a `subEstado='2y'` (`posicionCola=null`,
           `consultaBloqueanteId=null`). VĆ”lido con **0 filas** en cola. Los emails A16 a la cola estĆ”n
           **solo diseĆ±ados y NO se envĆ­an** en MVP.
        4. `AUDIT_LOG accion='transicion'`, `entidad='RESERVA'` para la principal
           (`datos_anteriores.sub_estado='2v'`, `datos_nuevos.estado='pre_reserva'`) + una entrada por
           cada consulta descartada de la cola (`2dā2y`).

        A diferencia de `interesado`, `reserva_inmediata` **NO envĆ­a email propio** (no dispara E7 ni
        E2). La atomicidad es all-or-nothing: nunca queda `pre_reserva` sin la `FechaBloqueada`
        actualizada ni la cola a medio vaciar, ni viceversa.

        ---
        El registro se permite **aunque `visitaProgramadaFecha > hoy`** (la fecha de visita es
        informativa, no una precondiciĆ³n estricta), para ambos desenlaces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResultadoVisitaRequest'
      responses:
        '200':
          description: |
            TransiciĆ³n aplicada. Devuelve la RESERVA actualizada. El estado resultante depende del
            `resultado` enviado:
            - `interesado` (US-009): `estado='consulta'`, `subEstado='2b'`, `visitaRealizada=true` y el
              nuevo `ttlExpiracion` fresco (`now + TENANT_SETTINGS.ttl_consulta_dias`), idĆ©ntico al de
              su fila de `FechaBloqueada`.
            - `reserva_inmediata` (US-010): `estado='pre_reserva'`, `subEstado=null`,
              `visitaRealizada=true` y `ttlExpiracion` fresco (`now + TENANT_SETTINGS.ttl_prereserva_dias`,
              7 dĆ­as por defecto), idĆ©ntico al de su fila de `FechaBloqueada` (ya en `tipoBloqueo='blando'`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '400':
          # Cuerpo mal formado: `resultado` ausente o no es string. La guarda de origen (estado) y el
          # valor de resultado no soportado se reportan como 422.
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: |
            No se puede registrar el resultado. Casos (la RESERVA NO se modifica ā rollback total):
            - **Guarda de origen**: el sub-estado de origen no es `2v` (p. ej. `2a`/`2b`/`2c`/`2d`, o
              un terminal `2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`, inmutables). Ambos
              desenlaces (`interesado`, `reserva_inmediata`) solo son vĆ”lidos desde `2v`; validaciĆ³n
              defensiva en servidor, re-evaluada bajo el lock (`FOR UPDATE`).
            - **Datos obligatorios incompletos (solo `reserva_inmediata`, validaciĆ³n UC-14)**: para
              transicionar a `pre_reserva` la RESERVA y su CLIENTE deben tener datos completos. Faltan
              datos fiscales del CLIENTE (`dniNif`, `direccion`, `codigoPostal`, `poblacion`,
              `provincia`) y/o de la RESERVA (`fechaEvento`, `duracionHoras`, `numAdultosNinosMayores4`,
              `tipoEvento`). El cuerpo enumera los que faltan en `camposFaltantes` (schema
              `PresupuestoDatosFiscalesError`, `codigo='DATOS_FISCALES_INCOMPLETOS'`, reutilizado de
              UC-14). La RESERVA permanece en `2v` sin cambios.
            - **Resultado no soportado**: `resultado='descarta'` (US-011, aĆŗn no implementado). Solo
              `interesado` (US-009) y `reserva_inmediata` (US-010) se aceptan.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ErrorResponse'
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'

  # ============================ COLA ============================
  /reservas/{id}/cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [Cola]
      summary: Visualizar cola de espera de la fecha de una reserva bloqueante (UC-11 / US-017)
      description: |
        Vista de **solo lectura** (US-017) que proyecta, para la RESERVA **bloqueante** `{id}`
        (la que posee la `FECHA_BLOQUEADA` activa), un read model con dos secciones:
        - **`bloqueante`**: cliente, `subEstado` (`2b`/`2c`/`2v`), `ttlExpiracion` (instante crudo)
          y `ttlRestante` (legible derivado en backend), mĆ”s `visitaProgramadaFecha` cuando estĆ”
          en `2v`.
        - **`cola`**: RESERVA en `subEstado='2d'` cuyo `consultaBloqueanteId` apunta a la
          bloqueante, ordenadas **ASC por `posicionCola`** (FIFO), con `fechaCreacion` (instante
          crudo) y `tiempoEnCola` (legible derivado en backend).

        NO muta estado (no promueve, no saca de cola, no registra AUDIT_LOG). Los derivados
        temporales (`ttlRestante = ttlExpiracion ā now()`, `tiempoEnCola = now() ā fechaCreacion`)
        se calculan en backend sobre instantes `timestamptz`, nunca formateando fechas.

        **FA-04** ā si la reserva `{id}` existe en el tenant pero **no** posee una
        `FECHA_BLOQUEADA` activa (no bloquea ninguna fecha), la respuesta es **200** con
        `estaBloqueada=false`, `bloqueante=null` y `cola=[]` (la UI muestra "Fecha disponible").
        El **404 se reserva exclusivamente** para reserva inexistente o de otro tenant (RLS).
      responses:
        '200':
          description: |
            Read model de la cola. Incluye tanto el caso con bloqueante activa (con o sin cola)
            como el caso FA-04 "fecha disponible" (`estaBloqueada=false`, `bloqueante=null`,
            `cola=[]`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ColaEsperaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /reservas/{id}/promover:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Promover una consulta de la cola a bloqueante (UC-12 ā automĆ”tica US-018 / manual US-019)
      operationId: promoverConsultaCola
      description: |
        Promueve una consulta en cola (`2.d ā 2.b`) a bloqueante de su fecha. Dos modos que
        comparten operaciĆ³n de dominio y superficie HTTP, discriminados por el body/actor
        (decisiĆ³n de contrato D-1, US-019):

        - **AutomĆ”tica (US-018, actor Sistema, SIN body)**: encadenamiento FIFO cuando la
          bloqueante se libera (`liberarFecha()`). El `{id}` es la **primera** de la cola
          (`posicionCola = 1`). No expira ninguna bloqueante (la fecha ya estĆ” libre).
        - **Manual (US-019, actor Gestor, body `PromoverManualRequest` con `confirmado: true`)**:
          acciĆ³n DELIBERADA y DESTRUCTIVA disparada desde la vista de cola (US-017). El `{id}`
          es la RESERVA en `2.d` que el Gestor elige, **cualquier `posicionCola`** (no solo la
          primera). Como parte indivisible de la operaciĆ³n: (1) **expira forzosamente** la
          bloqueante activa a `2.x` (`ttlExpiracion ā NULL`) si sigue viva; (2) promueve la
          elegida a `2.b` (`posicionCola`/`consultaBloqueanteId ā NULL`, `ttlExpiracion ā now() +
          tenant_settings.ttl_consulta_dias`); (3) **re-asigna** la fila de `FECHA_BLOQUEADA` a
          la promovida (una sola fila activa por `(tenant, fecha)` en todo momento); (4)
          **reordena la cola cerrando el hueco** (posiciones contiguas desde 1); (5) audita cada
          RESERVA modificada con `origen: 'promocion_manual'` y el `usuarioId` del Gestor.

        Todo en **una transacciĆ³n** serializada por `SELECT ā¦ FOR UPDATE` sobre la fila de
        `FECHA_BLOQUEADA`, bajo el contexto **RLS del tenant** del JWT (nunca del path). La
        garantĆ­a anti-doble-promociĆ³n reside **exclusivamente en PostgreSQL** (`UNIQUE(tenant_id,
        fecha)` + `FOR UPDATE`), NUNCA en locks distribuidos.

        **Arbitraje (D-4, FIFO estricto + "gana quien toma el lock primero", decisiĆ³n heredada de
        US-018 Ā§D-6, sin cesiĆ³n al Gestor)**: si el barrido automĆ”tico de US-018 āu otro Gestorā
        adquiere el lock primero y ya promoviĆ³, la promociĆ³n manual **aborta sin cambios** con
        **409** ("La cola ya fue actualizada automĆ”ticamente, por favor recarga la vista").

        La promociĆ³n manual requiere **rol Gestor** del tenant (autorizaciĆ³n por JWT); un actor
        sin rol suficiente recibe **403**.
      requestBody:
        # Opcional para preservar la compatibilidad con la promociĆ³n AUTOMĆTICA de US-018 (sin
        # body). Presente y con `confirmado: true` para la promociĆ³n MANUAL del Gestor (US-019).
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoverManualRequest' }
      responses:
        '200':
          description: |
            Consulta promovida a bloqueante (`2.b`). En la promociĆ³n manual, ademĆ”s, la bloqueante
            anterior quedĆ³ expirada a `2.x` y la cola reordenada; el cuerpo devuelve la RESERVA
            promovida.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # [US-019 D-4] Autenticado pero sin rol Gestor del tenant para la promociĆ³n manual.
          $ref: '#/components/responses/Forbidden'
        '404':
          # Reserva `{id}` inexistente o de otro tenant (RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de concurrencia/estado (mapeo F5-02: 409 = carrera perdida):
            - **Carrera perdida (US-019 D-4)**: el barrido automĆ”tico (US-018) u otro Gestor ya
              actualizĆ³ la cola bajo el lock ā "La cola ya fue actualizada automĆ”ticamente, por
              favor recarga la vista".
            - **Inconsistencia de bloqueo**: no existe una `FECHA_BLOQUEADA` activa para la fecha
              de la consulta elegida (una consulta en `2.d` sin fecha bloqueada).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: |
            Guarda de negocio inviolada (mapeo F5-02: 422 = transiciĆ³n/guarda invĆ”lida) sin efectos:
            - **Consulta ya no en cola (FA-05)**: la RESERVA `{id}` no estĆ” en `sub_estado = '2d'`
              (expirĆ³, es terminal `2x`/`2y`/`2z`, o es la propia bloqueante) ā "La consulta
              seleccionada ya no estĆ” en cola".
            - **ConfirmaciĆ³n ausente**: la promociĆ³n manual llegĆ³ sin `confirmado: true`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /reservas/{id}/salir-cola:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Cola]
      summary: Salir voluntariamente de la cola (UC-13)
      responses:
        '200':
          description: Reserva retirada de la cola
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }

  # ============================ US-013: DESCARTE POR CLIENTE ā 2z ============================
  # [US-013 / UC-10 Ā· A17] Endpoint de ACCIĆN dedicado (OpciĆ³n A confirmada en el Gate SDD, design.md
  # Ā§D-5), calcado del patrĆ³n de las demĆ”s transiciones de RESERVA (POST /reservas/{id}/finalizar-evento,
  # /archivar): acciĆ³n MANUAL del Gestor (JWT del usuario, RLS del tenant del JWT ā NUNCA X-Cron-Token:
  # no es el barrido de TTL de US-012 que produce `2x`). Transiciona una Ćŗnica RESERVA en
  # `estado='consulta'` con `subEstado ā {2a,2b,2c,2d,2v}` (no terminal) a `subEstado='2z'` (descartada
  # por cliente, terminal e inmutable). Los efectos secundarios por origen (liberar FECHA_BLOQUEADA vĆ­a
  # `liberarFecha()`, promociĆ³n FIFO A15 vĆ­a `promoverPrimeroEnCola` en 2b/2v con cola, reordenaciĆ³n de
  # cola en 2d) son INTERNOS al backend (seams US-018/US-040/US-041) y NO se exponen en el contrato: el
  # contrato solo declara la acciĆ³n y devuelve la RESERVA resultante. El `{id}` identifica la ĆNICA
  # RESERVA a descartar; `tenant_id` y `usuario_id` DERIVAN SIEMPRE del JWT, nunca del path ni del body.
  /reservas/{id}/descartar:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Descartar una RESERVA ā despacha por fase (consultaā2z / pre_reservaāreserva_cancelada) (UC-10 / US-013 + workstream B)
      operationId: descartarConsultaPorCliente
      description: |
        AcciĆ³n Ćŗnica de negocio "descartar una RESERVA" cuyo efecto **depende de la fase actual de la
        RESERVA** (D-2, presupuesto-prereserva-cta-descarte-y-e2: se REUTILIZA este endpoint de US-013,
        NO se crea uno dedicado). El endpoint **despacha por el `estado` actual**:
        - `estado='consulta'` (`subEstado ā {2a,2b,2c,2d,2v}`) ā **comportamiento US-013** (sin
          cambios): transiciĆ³n a `subEstado='2z'` (descartada por cliente, terminal).
        - `estado='pre_reserva'` (`subEstado=null`) ā **transiciĆ³n nueva** (workstream B): la RESERVA
          pasa a `estado='reserva_cancelada'` (`subEstado=null`, `ttlExpiracion=null`, terminal).
        - cualquier otro estado (`reserva_confirmada` y posteriores) ā **422** (origen invĆ”lido, sin
          efectos); una RESERVA ya terminal (`2x`/`2y`/`2z`/`reserva_cancelada`/`reserva_completada`) o
          una carrera perdida bajo el lock ā **409**.

        El despacho por fase vive en un **use-case orquestador** en el backend (no en condicionales de
        negocio dispersos en el controller): el controller elige el caso de uso segĆŗn `reserva.estado` y
        mapea los errores de dominio a HTTP. El body `{ motivo? }`, `@Roles('gestor')` y el
        `tenant_id`/`usuario_id` derivados del JWT se **conservan** para ambas fases; la firma HTTP no
        cambia (solo se amplĆ­a la semĆ”ntica). El `{id}` identifica la ĆNICA RESERVA a descartar.

        āā Fase `consulta` (US-013) āā
        El **Gestor** (JWT de usuario, RLS del tenant del JWT ā NUNCA `X-Cron-Token`) marca
        **en nombre del cliente** (no hay portal de cliente en el MVP) una RESERVA en
        `estado='consulta'` con `subEstado ā {2a,2b,2c,2d,2v}` como **descartada por cliente**,
        transicionĆ”ndola a `subEstado='2z'` (terminal e **inmutable**). `2z` es un terminal
        semĆ”nticamente distinto de `2x` (expiraciĆ³n por TTL, US-012) y `2y` (vaciado de cola al activar
        pre-reserva, US-014); la mĆ”quina de estados declarativa lo modela como arista propia.

        En una **Ćŗnica transacciĆ³n** atĆ³mica bajo el contexto RLS del tenant, serializada por
        `SELECT ā¦ FOR UPDATE` sobre la fila de `FECHA_BLOQUEADA` (cuando el origen tiene bloqueo) y/o
        sobre la fila RESERVA (sin Redis ni locks distribuidos), el sistema re-evalĆŗa **bajo el lock** la
        guarda de origen y ejecuta los efectos secundarios **segĆŗn el sub-estado de origen** (tabla
        declarativa design.md Ā§D-1) ā todo INTERNO al backend, no expuesto en el contrato:
        - `2a`: solo marca `2z` (no hay bloqueo ni cola).
        - `2b`/`2c`/`2v`: libera la FECHA_BLOQUEADA vĆ­a `liberarFecha()` (US-040/US-041).
        - `2b`/`2v` **con cola**: ademĆ”s dispara **una Ćŗnica vez** la promociĆ³n FIFO A15
          (`promoverPrimeroEnCola`, US-018/US-041): la primera en cola pasa a `2b` (nueva bloqueante) y
          el resto reordena. La respuesta refleja al menos el nuevo estado de la RESERVA descartada
          (`2z`); el frontend re-consulta la cola/pipeline para ver la promociĆ³n (mismo patrĆ³n que
          `POST /reservas/{id}/salir-cola` y `/promover`, que devuelven la RESERVA principal).
        - `2d`: sale de la cola (`posicionColaānull`, `consultaBloqueanteIdānull`) y **decrementa** la
          posiciĆ³n del resto de la cola de la misma bloqueante; NO libera fecha ni promueve.

        Si el Gestor aporta `motivo`, se **anexa** a `RESERVA.notas` dentro de la misma transacciĆ³n
        (decisiĆ³n del Gate; append, no sobrescritura); sin `motivo` la transiciĆ³n completa igual y
        `notas` no se toca. Se escribe `AUDIT_LOG` `accion='transicion'`, `entidad='RESERVA'`,
        `datos_anteriores.sub_estado=<origen>`, `datos_nuevos.sub_estado='2z'`. **NO** se envĆ­a ningĆŗn
        email al cliente (esta acciĆ³n no estĆ” mapeada a ningĆŗn cĆ³digo E1āE8). La auditorĆ­a de
        `liberarFecha()` y de la promociĆ³n las registran sus respectivos seams; esta acciĆ³n NO las
        duplica.

        āā Fase `pre_reserva` (workstream B) āā
        El **Gestor** descarta manualmente una RESERVA en `estado='pre_reserva'` (`subEstado=null`),
        transicionĆ”ndola al terminal `estado='reserva_cancelada'` (`subEstado=null`, `ttlExpiracion=null`)
        āel mismo destino que la expiraciĆ³n de TTL de la pre-reserva (`MAPA_EXPIRACION_TTL`), pero
        disparado deliberadamente por el Gestor. Es la transiciĆ³n **mono-origen** espejo de US-013 en la
        fase `pre_reserva`; el ĆNICO origen legal es `pre_reserva` (guarda declarativa
        `ORIGENES_TRANSICION_DESCARTAR_PRERESERVA`). En una **Ćŗnica transacciĆ³n** atĆ³mica bajo el contexto
        RLS del tenant, serializada por `SELECT ā¦ FOR UPDATE` sobre la fila de `FECHA_BLOQUEADA` y la fila
        RESERVA (sin Redis ni locks distribuidos), el sistema re-evalĆŗa **bajo el lock** la guarda de
        origen (detecta el doble clic / la carrera ā 409) y ejecuta ātodo INTERNO al backend, no expuesto
        en el contratoā la transiciĆ³n a `reserva_cancelada`, la liberaciĆ³n de la `FECHA_BLOQUEADA` vĆ­a la
        funciĆ³n canĆ³nica `liberarFecha()` (regla dura; nunca por otra vĆ­a) y, si existe cola activa
        (`2d` sobre esa fecha), la **misma** mecĆ”nica de promociĆ³n FIFO de US-018 (exactamente-una-vez).
        Todo es **all-or-nothing**: cualquier fallo revierte por completo (no queda fecha liberada sin la
        RESERVA cancelada, ni cola promovida a medias). Si el Gestor aporta `motivo`, se audita en el
        `AUDIT_LOG` (`datos_nuevos`) dentro de la misma transacciĆ³n; su ausencia NO bloquea la transiciĆ³n.
        Se escribe `AUDIT_LOG` `accion='transicion'`, `entidad='RESERVA'`, par
        `pre_reserva ā reserva_cancelada`.

        **Concurrencia (RC-1/RC-2/RC-3)**: el descarte, el barrido de TTL de US-012 y un doble clic del
        gestor se serializan por `SELECT ā¦ FOR UPDATE`; exactamente una operaciĆ³n gana. Un segundo
        descarte (o una carrera perdida contra el TTL) observa la RESERVA fuera de un sub-estado activo
        bajo el lock y termina como **409** (estado terminal inmutable), sin doble transiciĆ³n, sin doble
        AUDIT_LOG y sin doble liberaciĆ³n/promociĆ³n. La `UNIQUE(tenant_id, fecha)` impide dos bloqueos
        activos simultĆ”neos sobre la misma fecha.
      requestBody:
        # Motivo OPCIONAL (design.md Ā§D-5, Gate). Sin body ā o body vacĆ­o ā la transiciĆ³n completa
        # igual y no toca `RESERVA.notas`. `additionalProperties: false` cierra el shape.
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DescartarConsultaRequest' }
      responses:
        '200':
          description: |
            RESERVA descartada: devuelve la RESERVA actualizada tras el commit. El estado destino depende
            de la fase de origen:
            - origen `consulta` ā `estado='consulta'`, `subEstado='2z'` (terminal).
            - origen `pre_reserva` ā `estado='reserva_cancelada'`, `subEstado=null`, `ttlExpiracion=null`
              (terminal).
            Ambos destinos ya estĆ”n cubiertos por los enums de `Reserva` (`estado`/`subEstado`); el
            consumidor discrimina por el `estado` resultante. Si el origen (`2b`/`2v` con cola, o
            `pre_reserva` con cola) disparĆ³ la promociĆ³n A15, la RESERVA promovida cambia por separado; el
            frontend refleja ese cambio re-consultando la cola/pipeline (mismo patrĆ³n que `/salir-cola` y
            `/promover`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Reserva' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          # Autenticado pero sin rol/tenant para la acciĆ³n manual del Gestor.
          $ref: '#/components/responses/Forbidden'
        '404':
          # RESERVA `{id}` inexistente o de otro tenant (invisible bajo RLS).
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado (mapeo F5-02; RC-3 / RC-1): la RESERVA `{id}` ya estĆ” en un estado/sub-estado
            terminal, asĆ­ que ninguna transiciĆ³n de descarte es aplicable. Cubre ambas fases:
            - la RESERVA estĆ” en un sub-estado terminal (`2x`/`2y`/`2z`) o en un estado terminal
              (`reserva_cancelada`/`reserva_completada`);
            - el doble descarte concurrente (segunda peticiĆ³n) y la carrera perdida contra el barrido de
              TTL de US-012 (fase `consulta`) o contra la expiraciĆ³n de TTL de la pre-reserva (fase
              `pre_reserva`), que ya dejĆ³ la RESERVA en `reserva_cancelada`.
            Sin efectos, sin doble transiciĆ³n, sin liberar/promover.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DescartarConsultaConflictError' }
        '422':
          description: |
            Origen invĆ”lido (mapeo F5-02; workstream B): la RESERVA `{id}` estĆ” en un estado que **no es
            descartable** āni `consulta` (+sub-estados vĆ”lidos) ni `pre_reserva`ā sino `reserva_confirmada`
            o posteriores no terminales. La guarda de transiciĆ³n de descarte falla **sin efectos** (no muta
            ninguna entidad, no libera fecha ni promueve cola). Distinto del 409 (que es RESERVA ya
            terminal / carrera perdida).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DescartarReservaOrigenInvalidoError' }

  # ============================ PRESUPUESTOS / TARIFAS ============================
  /tarifas/calcular:
    post:
      tags: [Presupuestos]
      summary: Calcular tarifa segĆŗn configuraciĆ³n (UC-16 / US-016)
      description: >-
