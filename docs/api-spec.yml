  # [DECISIĆN F1-06] ELIMINADO `POST /reservas/{id}/fianza/solicitar-iban`.
  # Motivo: la solicitud de IBAN (E5) se dispara AUTOMĆTICAMENTE al entrar en post_evento (US-034/035),
  # no es una acciĆ³n manual del gestor. El gestor solo REGISTRA el IBAN vĆ­a PATCH /clientes/{id} (US-035),
  # y E8 confirma la recepciĆ³n. Restaura este endpoint solo si confirmas que existe una solicitud manual.

  # [US-036 / Gate 1 G1-2] Materializa la devoluciĆ³n de fianza como sub-recurso simĆ©trico al cobro
  # de US-030 (`POST /reservas/{id}/facturas/fianza/cobro`). Reemplaza el placeholder previo
  # `POST /reservas/{id}/fianza/devolver` (skeleton pre-US-036). El justificante NO es multipart
  # (G1-3): se sube antes por `POST /documentos` y aquĆ­ se referencia por `justificanteDocId`,
  # patrĆ³n idĆ©ntico a US-030/US-029.
  /reservas/{id}/fianza/devolucion:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Facturacion]
      summary: Registrar la devoluciĆ³n de la fianza (UC-27 pasos 4-8 / US-036)
      operationId: registrarDevolucionFianza
      description: |
        [US-036 / UC-27 pasos 4-8] El **Gestor registra la devoluciĆ³n** de la fianza (depĆ³sito
        reembolsable) de la RESERVA `{id}` tras ejecutarla externamente en su banca (Slotify
        **registra**, no procesa el pago; sin pasarela en MVP). Es el **paso simĆ©trico inverso** del
        cobro de US-030. PrecondiciĆ³n del happy path (triple): `RESERVA.estado='post_evento'` **Y**
        `RESERVA.fianzaStatus='cobrada'` **Y** `CLIENTE.iban_devolucion IS NOT NULL`.

        En una **Ćŗnica unidad de trabajo atĆ³mica** (tx + RLS del tenant del JWT), releyendo el estado
        de la RESERVA con `SELECT ... FOR UPDATE` para serializar el doble registro concurrente (lock
        de fila PostgreSQL, **nunca** locks distribuidos; design.md Ā§D-1/Ā§D-4):
        1. Valida importe (`importeDevuelto`, `0.00 ā¤ x ā¤ RESERVA.fianzaEur`) y fecha
           (`fechaCobro ā„ RESERVA.fianzaCobradaFecha`).
        2. Deriva el estado final: `importeDevuelto == fianzaEur` ā `fianzaStatus='devuelta'`;
           `importeDevuelto < fianzaEur` (incl. `"0.00"`) ā `fianzaStatus='retenida_parcial'`.
        3. Si `fianzaStatus` resulta `retenida_parcial`, `motivoRetencion` es **obligatorio**
           (validaciĆ³n de dominio) y se persiste en `RESERVA.motivoRetencion` (campo dedicado, G1-1);
           en `devuelta`, `motivoRetencion` se ignora / queda `null`.
        4. Si se referenciĆ³ `justificanteDocId` (opcional), lo **vincula** validando que el DOCUMENTO
           (`tipo='justificante_pago'`) exista en el tenant; NO es multipart (G1-3).
        5. Establece `RESERVA.fianzaDevueltaEur=importeDevuelto`,
           `RESERVA.fianzaDevueltaFecha=fechaCobro`, `RESERVA.fianzaStatus` al estado final y
           `RESERVA.motivoRetencion` (si parcial). NO transiciona `RESERVA.estado`.
        6. Registra `AUDIT_LOG` (`actualizar` de RESERVA; vĆ­nculo del DOCUMENTO si aplica).

        **Estado final irreversible** (MVP): una vez en `devuelta`/`retenida_parcial`, un nuevo
        intento se rechaza con 409 `DEVOLUCION_YA_REGISTRADA` (doble registro, incl. concurrentes:
        solo la primera aplica). **Justificante opcional (FA-04)**: si se omite `justificanteDocId`,
        la devoluciĆ³n se registra igualmente con `avisoSinJustificante=true`.

        Aislada por `tenant_id` del JWT (RLS); nunca en el path. Requiere rol Gestor.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrarDevolucionFianzaRequest' }
      responses:
        '200':
          description: |
            DevoluciĆ³n registrada. Devuelve la RESERVA actualizada (`fianzaStatus` derivado a
            `devuelta`|`retenida_parcial`, `fianzaDevueltaEur`, `fianzaDevueltaFecha`,
            `motivoRetencion` si parcial); el DOCUMENTO justificante si se referenciĆ³; y
            `avisoSinJustificante=true` si se registrĆ³ sin justificante (FA-04).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegistrarDevolucionFianzaResponse' }
        '400':
          description: |
            ValidaciĆ³n de entrada / dominio, sin efectos: `IMPORTE_SUPERA_FIANZA` (FA-02:
            `importeDevuelto > RESERVA.fianzaEur`; tambiĆ©n importe negativo o no Decimal(10,2)) o
            `FECHA_DEVOLUCION_INVALIDA` (FA-03: `fechaCobro < RESERVA.fianzaCobradaFecha` o mal
            formada), o `MOTIVO_RETENCION_REQUERIDO` (resultado parcial sin `motivoRetencion`).
            Cuerpo = envelope estĆ”ndar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevolucionFianzaError' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: |
            La RESERVA no existe en el tenant (RLS) o el `justificanteDocId` indicado no existe en el
            tenant (`JUSTIFICANTE_NO_ENCONTRADO`, misma semĆ”ntica que US-030). No se muta nada.
            Cuerpo + `codigo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevolucionFianzaError' }
        '409':
          description: |
            Conflicto de precondiciĆ³n / estado, sin efectos, releĆ­do bajo `SELECT ... FOR UPDATE`:
            - `PRECONDICION_NO_CUMPLIDA` ā la precondiciĆ³n triple no se cumple
              (`RESERVA.estado ā  post_evento`, `RESERVA.fianzaStatus ā  cobrada`, o
              `CLIENTE.iban_devolucion` ausente).
            - `DEVOLUCION_YA_REGISTRADA` ā la fianza ya estĆ” `devuelta`/`retenida_parcial` (**doble
              registro**, incl. dos peticiones concurrentes: solo la primera aplica; estado
              irreversible). Cuerpo = envelope estĆ”ndar + `codigo` y `motivo`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DevolucionFianzaError' }

  # ============================ FICHA OPERATIVA ============================
  # [US-025 / UC-20] CumplimentaciĆ³n progresiva y cierre de la FICHA_OPERATIVA de una RESERVA
  # confirmada, mĆ”s las transiciones de `RESERVA.pre_evento_status` (pendiente ā en_curso ā
  # cerrado). Endpoints anidados en el recurso reserva (design.md Ā§D-5). La FICHA_OPERATIVA vacĆ­a
  # la crea la confirmaciĆ³n de seĆ±al (US-021); US-025 no crea entidad ni enum. Se conserva el path
  # `{id}` (parĆ”metro IdReserva) por coherencia con el resto de endpoints anidados de la reserva.
  # Reemplaza el placeholder GET/PUT previo: el guardado es PATCH parcial (D-5) y se aĆ±ade el cierre.
  /reservas/{id}/ficha-operativa:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    get:
      tags: [FichaOperativa]
      summary: Consultar ficha operativa del evento (UC-20)
      operationId: leerFichaOperativa
      description: >-
        [US-025] Lee la FICHA_OPERATIVA de la RESERVA sin mutar ningĆŗn estado. Solo accesible con
        `RESERVA.estado ā {reserva_confirmada, evento_en_curso, post_evento}` y filtrada por el
        `tenant_id` del JWT (RLS). Si la RESERVA estĆ” en un estado anterior a `reserva_confirmada`
        (la ficha aĆŗn no existe), responde `409` con `code=ficha_no_disponible` (D-3), distinto del
        `404` que indica que la RESERVA no existe en el tenant.
      responses:
        '200':
          description: Ficha operativa
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativa' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: >-
            La RESERVA aĆŗn no estĆ” confirmada: la ficha operativa no estĆ” disponible
            (`code=ficha_no_disponible`, D-3).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FichaOperativaNoDisponibleError' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [FichaOperativa]
      summary: Guardar parcialmente la ficha operativa (UC-20)
      operationId: guardarFichaOperativa
      description: >-
        [US-025] Guardado **parcial/progresivo** de la ficha: todos los campos son opcionales y
        solo se persiste el subconjunto enviado. Efecto colateral en el backend (no es campo del
        contrato, D-2): el primer guardado que deje al menos un campo con dato transiciona
        `RESERVA.pre_evento_status` de `pendiente` a `en_curso`. Sirve tambiĆ©n para la ediciĆ³n
        post-cierre (D-4): si la ficha ya estĆ” cerrada, el backend reescribe `fechaCierre = now()`
        y mantiene `pre_evento_status = cerrado` (la ediciĆ³n no reabre el estado). Guardas de acceso
        y errores idĆ©nticos al GET.
        [reserva-viva] Ahora el PATCH acepta los campos ESTRUCTURADOS de la RESERVA
        (`duracionHoras`, `numAdultosNinosMayores4`, `numNinosMenores4`) y, si cambian respecto al
        vigente y la RESERVA estĆ” dentro de la **ventana viva** (`estado='reserva_confirmada'` AND
        `pre_evento_status != 'cerrado'` AND `liquidacion_status != 'cobrada'`), dispara el
        RECĆLCULO en cascada: re-congela `importe_total`/`importe_liquidacion` (NO `importe_senal`),
        genera una nueva versiĆ³n de PRESUPUESTO de modificaciĆ³n y regenera el borrador de FACTURA de
        liquidaciĆ³n. El resultado viaja en `recalculo` (o `null` si no hubo cambio estructural).
        Un cambio estructural FUERA de la ventana viva se rechaza con `422`
        (`code=fuera_de_ventana_viva`) sin mutar la RESERVA. El caso `numAdultosNinosMayores4 > 50`
        (o sin TARIFA) resuelve a `tarifaAConsultar=true` y exige `precioManualEur` (ausente ā 422).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuardarFichaOperativaRequest'
      responses:
        '200':
          description: Ficha guardada (con el resultado del recĆ”lculo si cambiĆ³ aforo/duraciĆ³n)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GuardarFichaOperativaResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
