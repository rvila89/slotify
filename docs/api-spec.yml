            `reserva_cancelada` + fecha liberada) en esta ejecuciĆ³n. Menor que `candidatas`
            cuando una candidata dejĆ³ de serlo bajo lock (idempotencia/US-006) o fallĆ³.
          example: 4
        promocionesDisparadas:
          type: integer
          minimum: 0
          description: >-
            NĀŗ de veces que el seam `PromocionColaPort` fue disparado, una por cada
