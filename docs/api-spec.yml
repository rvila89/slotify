            `enviada`/`cobrada`; p. ej. doble aprobaciĆ³n): `FACTURA_NO_BORRADOR`. No se muta nada. El
            cuerpo aĆ±ade `codigo` y `motivo` al envelope estĆ”ndar.
          content:
