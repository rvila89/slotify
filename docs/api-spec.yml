          description: >-
            Importe REAL cobrado (Importe string Decimal(10,2), p. ej. `"4100.00"`). DEBE ser `> 0`
            (`0`/negativo ā 400 `COBRO_INVALIDO`). Puede diferir de `Factura.total` (ā `alertaDiscrepancia`
            en la respuesta 200; no bloquea).
