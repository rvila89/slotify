  # [change solicitud-datos-presupuesto-borrador / UC-36] AcciĆ³n del gestor desde el modal
  # "Generar presupuesto": deja EN BORRADOR un E1 (`subtipo='solicitud_datos'`) que pide al
  # cliente los datos fiscales cuando aportĆ³ la fecha en la primera consulta sin pasar por la
  # transiciĆ³n `2a ā 2b`. Reutiliza la plantilla del E1 "disponible" (idioma de `Reserva.idioma`).
  # Sub-recurso de la RESERVA, coherente con el resto de `/reservas/{id}/comunicaciones/...`.
  /reservas/{id}/comunicaciones/solicitar-datos-presupuesto:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Comunicaciones]
      summary: Solicitar al cliente los datos fiscales para el presupuesto (borrador E1 solicitud_datos)
      operationId: solicitarDatosPresupuesto
      description: |
        [change solicitud-datos-presupuesto-borrador] Deja **EN BORRADOR** una `COMUNICACION`
        (`codigoEmail='E1'`, `subtipo='solicitud_datos'`, `estado='borrador'`, `fechaEnvio=null`)
        que solicita al cliente los datos fiscales (nombre y apellidos, DNI/NIF, direcciĆ³n y
        poblaciĆ³n) necesarios para generar el presupuesto. El cuerpo y el asunto se **renderizan en
        el backend** reutilizando **verbatim** la plantilla del E1 "disponible"
        (`renderMensajeTransicionFecha({ tipo: 'disponible', ā¦ })`); el **idioma** sale de
        `Reserva.idioma` (`'ca'` ā catalĆ”n; cualquier otro ā castellano). **Sin body**: el gestor no
        redacta nada. El borrador aparece en el listado de comunicaciones y se revisa/envĆ­a con el
        flujo de borradores existente (`enviar`). Scoped por el tenant del JWT (RLS); el `tenant_id`
        NUNCA viaja en el path. Registra `AUDIT_LOG`.

        **Idempotencia (una sola vez)**:
        - `201` ā no existĆ­a la terna `(reservaId, 'E1', 'solicitud_datos')`: se **crea** el borrador.
        - `200` ā ya existe un **borrador** sin enviar de esa terna: se **reutiliza** (no se duplica).
        - `409` ā ya existe una fila de esa terna en `estado='enviado'`: no se puede reenviar
          (`ComunicacionDuplicadaError`, respaldado por el Ć­ndice UNIQUE parcial sobre la terna con
          predicado `estado='enviado'`). Sin efectos.
        - `422` ā los datos fiscales del cliente ya estĆ”n **completos** (`dniNif`, `direccion`,
          `codigoPostal`, `poblacion`, `provincia`): no procede solicitar; no se crea ninguna fila
          (defensa en profundidad; el botĆ³n ya no deberĆ­a mostrarse en el frontend).

        **Invariantes**: no auto-envĆ­a (borrador), no muta `RESERVA.estado` ni `FECHA_BLOQUEADA`.
      responses:
        '200':
          description: |
            Borrador ya existente reutilizado. Devuelve la `COMUNICACION` en `estado='borrador'`
            (`codigoEmail='E1'`, `subtipo='solicitud_datos'`, `fechaEnvio` nulo).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comunicacion' }
        '201':
          description: |
            Borrador de solicitud de datos creado. Devuelve la `COMUNICACION` creada
            (`codigoEmail='E1'`, `subtipo='solicitud_datos'`, `estado='borrador'`, `fechaEnvio` nulo).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Comunicacion' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto (409). Ya existe una `COMUNICACION` de la terna
            `(reservaId, 'E1', 'solicitud_datos')` en `estado='enviado'`: la solicitud ya se enviĆ³ y
            no se puede reenviar (una sola vez). Sin efectos.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ComunicacionDuplicadaError' }
        '422':
          description: |
            No procede (422). Los datos fiscales del cliente ya estĆ”n completos (`dniNif`,
            `direccion`, `codigoPostal`, `poblacion`, `provincia`): no hay datos que solicitar. No se
            crea ninguna `COMUNICACION`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ComunicacionDatosCompletosError' }

