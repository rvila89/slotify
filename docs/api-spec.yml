              `TEMPORADA_NO_CONFIGURADA` (num_invitados ā¤ 50). El cuerpo lleva `codigo`.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PresupuestoDatosFiscalesError'
                  - $ref: '#/components/schemas/CalculoTarifaTarifaNoConfiguradaError'
                  - $ref: '#/components/schemas/CalculoTarifaTemporadaNoConfiguradaError'

  /reservas/{id}/presupuesto:
    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Presupuestos]
      summary: Confirmar presupuesto y activar pre-reserva (UC-14 / US-014)
      operationId: confirmarPresupuesto
      description: |
        [US-014] **Confirma** el borrador: en una **Ćŗnica transacciĆ³n de BD** (bajo el contexto RLS del
        tenant del JWT), all-or-nothing:
        1. Crea el PRESUPUESTO **congelado** (`version=1`, `tarifaCongelada=true`, `estado='enviado'`,
           `ivaPorcentaje='21.00'`, desglose fiscal `baseImponible`/`ivaImporte`/`total`, `tarifaId` de la
           TARIFA usada ā `null` en el caso `tarifa_a_consultar` con `precioManualEur`).
        2. Transiciona la RESERVA `{2a,2b,2c,2v} ā pre_reserva` y fija
           `ttlExpiracion = now() + TENANT_SETTINGS.ttl_prereserva_dias` (7 d por defecto, nunca
           hardcodeado).
        3. **Insert-o-update** de `FechaBloqueada(tenant_id, fechaEvento)` a `tipoBloqueo='blando'`,
           `ttlExpiracion` a 7 d (INSERT si venĆ­a de `2a` sin fila; UPDATE del TTL si venĆ­a de
           `2b`/`2c`/`2v`). `SELECT ā¦ FOR UPDATE` + `UNIQUE(tenant_id, fecha)`; sin locks distribuidos.
        4. **VacĆ­a la cola A16**: las RESERVA en `2d` que apuntan a esta (`consultaBloqueanteId`) pasan a
           `2y` (`posicionCola=NULL`, `consultaBloqueanteId=NULL`). Los emails A16 a la cola estĆ”n
           **solo diseĆ±ados y NO se envĆ­an** en MVP.
        5. `AUDIT_LOG accion='transicion'` para la RESERVA principal + una entrada por cada consulta
           descartada de la cola.

        Tras el COMMIT dispara (post-commit, **no bloqueante**, motor de email US-045, idempotente por
        `(reserva_id, codigo_email=E2)`) el email **E2** con el PDF del presupuesto adjunto por
        `pdfUrl`: un fallo de envĆ­o **no** revierte la pre-reserva (queda trazado en `COMUNICACION`).

        **Precio manual obligatorio** cuando el motor devuelve `tarifa_a_consultar=true` (>50
        invitados): el body DEBE incluir `precioManualEur`; su ausencia ā 422.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmarPresupuestoRequest' }
      responses:
        '201':
          description: |
            PRESUPUESTO congelado creado y RESERVA elevada a `pre_reserva`. Devuelve el PRESUPUESTO
            (desglose fiscal completo, `tarifaId`, `tarifaCongelada`, `ivaPorcentaje`, `total`, `pdfUrl`
            si aplica) y el estado/TTL resultante de la RESERVA.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConfirmarPresupuestoResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflicto de estado o de concurrencia (F5-02: 409 = conflicto/carrera determinista). Casos
            (la RESERVA no queda en estado intermedio observable ā rollback total):
            - **Fecha no disponible (race D4)**: otra transacciĆ³n ganĆ³ el `UNIQUE(tenant_id, fecha)` /
              el `SELECT ā¦ FOR UPDATE` sobre la misma `(tenant, fechaEvento)` ā "Fecha no disponible".
            - **Doble clic**: una confirmaciĆ³n simultĆ”nea del mismo presupuesto ya aplicĆ³ la transiciĆ³n;
              la RESERVA ya no estĆ” en `{2a,2b,2c,2v}`.
            - **Guarda de origen / presupuesto existente**: la RESERVA estĆ” en `2d`/terminal/`pre_reserva`+
              o ya tiene un PRESUPUESTO `enviado`/`aceptado` (remite a la ediciĆ³n, UC-15).
            - **Condiciones no configuradas** (change `condiciones-idioma-e2-firma-banner`):
              `CONDICIONES_NO_CONFIGURADAS` ā las condiciones particulares se adjuntan ahora en E2 (con el
              presupuesto), por lo que la confirmaciĆ³n exige que el tenant las tenga configuradas. Guard
              pre-tx sin efectos: alerta al gestor "Configura las condiciones particulares del espacio".
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PresupuestoGuardaOrigenError' }
        '422':
          description: |
            ValidaciĆ³n de negocio sin efectos (F5-02: 422 = guarda/validaciĆ³n invĆ”lida). Casos:
            - **Datos fiscales/de la reserva incompletos (FA-01)**: el cuerpo enumera `camposFaltantes`.
            - **Tarifario incompleto**: `TARIFA_NO_CONFIGURADA` / `TEMPORADA_NO_CONFIGURADA`.
            - **Precio manual requerido y ausente (FA-02)**: `tarifa_a_consultar=true` (>50 invitados)
