        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [code]
          properties:
            code:
              type: string
              enum: [estado_no_post_evento, sin_fianza]
              description: >-
                Discriminador del 409: `estado_no_post_evento` = la RESERVA no estĆ” en `post_evento`;
                `sin_fianza` = `fianzaEur <= 0` o `null` (no hay fianza que devolver, FA-04).
              example: sin_fianza

    # -------- US-014 #5: completar datos fiscales del CLIENTE --------
    # [US-014 #5 / design.md Ā§D-2] Cuerpo del PATCH /reservas/{id}/datos-fiscales. Los cinco campos
    # fiscales del CLIENTE, TODOS opcionales (PATCH parcial): solo los presentes se actualizan; los
