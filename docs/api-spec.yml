          description: 'Discriminador del aviso: el envĆ­o de E8 fallĆ³ en el proveedor (IBAN sĆ­ guardado).'
          example: e8_fallido
        mensaje:
          type: string
          description: Mensaje para mostrar al gestor.
          example: 'IBAN guardado, pero E8 no pudo enviarse. Puedes reenviarlo desde la ficha.'
        comunicacionId:
          type: string
