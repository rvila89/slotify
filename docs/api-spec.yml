    parameters:
      - { $ref: '#/components/parameters/IdReserva' }
    post:
      tags: [Reservas]
      summary: Forzar el inicio del evento a evento_en_curso (UC-23 FA-01 / US-032)
      operationId: forzarInicioEvento
      description: |
        [US-032] El **Gestor** (JWT de usuario, rol gestor, RLS del tenant del JWT ā NUNCA
        `X-Cron-Token`: es acciĆ³n manual, no el barrido de Sistema de US-031) **fuerza** el inicio
        de un evento sobre una RESERVA en `estado='reserva_confirmada'`, transicionĆ”ndola a
        `evento_en_curso` **aunque alguna precondiciĆ³n del inicio de evento estĆ© incumplida**
        (`pre_evento_status ā  'cerrado'` O `liquidacion_status ā  'cobrada'` O `fianza_status ā 
        'cobrada'`), asumiendo el riesgo. El `{id}` del path identifica la ĆNICA RESERVA a forzar
        (no es un barrido); el `tenant_id` y el `usuario_id` DERIVAN SIEMPRE del JWT, nunca del path
        ni del body.

        En una transacciĆ³n atĆ³mica bajo el contexto RLS del tenant del JWT, con `SELECT ā¦ FOR UPDATE`
        de la fila RESERVA, el sistema:

        1. **Re-evalĆŗa bajo el lock la guarda de origen** (`resolverInicioEvento`, reutilizada de
           US-031, regla dura anti-duplicaciĆ³n): si `estado ā  reserva_confirmada` (incluido ya
           `evento_en_curso` porque el cron de US-031 llegĆ³ primero, doble clic del gestor u otra
           acciĆ³n) ā **409** `code: 'conflicto_estado'`, sin transicionar ni auditar (cubre
           idempotencia y la carrera cronāgestor).
