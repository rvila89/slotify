            guardado pero E8 fallĆ³ (COMUNICACION.estado='fallido').

    # [US-035 FA-04] Error 409 de PATCH /reservas/{id}/iban-devolucion: la RESERVA no estĆ” en
    # `post_evento` o no tiene fianza que devolver (`fianzaEur <= 0` o `null`). Sigue el patrĆ³n
    # allOf(ErrorResponse) + `code` semĆ”ntico del resto del contrato (envelope NestJS).
    RegistrarIbanDevolucionConflictError:
