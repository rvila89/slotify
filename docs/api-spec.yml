      properties:
        nombre: { type: string, minLength: 1, maxLength: 100, description: 'Obligatorio, no vacĆ­o, mĆ”x 100.' }
        apellidos: { type: string, minLength: 1, maxLength: 100, description: 'Obligatorio, no vacĆ­o, mĆ”x 100.' }
        email:
          type: string
          format: email
          # RFC 5322 bĆ”sico (forma local@dominio.tld, sin espacios). ValidaciĆ³n dura adicional al format.
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          maxLength: 254
          description: 'Obligatorio. Formato email RFC 5322 bĆ”sico. Idempotencia de CLIENTE por (tenant_id, email).'
        telefono: { type: string, minLength: 1, description: 'Obligatorio, no vacĆ­o.' }
        dniNif: { type: string }
        direccion: { type: string }
        codigoPostal: { type: string }
        poblacion: { type: string }
        provincia: { type: string }
    UpdateClienteRequest:
      # PATCH parcial (US-035): todos los campos opcionales (p. ej. registrar solo el IBAN).
      # NO hereda los `required` de CreateClienteRequest a propĆ³sito.
      type: object
      properties:
        nombre: { type: string, minLength: 1, maxLength: 100 }
        apellidos: { type: string, minLength: 1, maxLength: 100 }
        email:
          type: string
          format: email
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          maxLength: 254
        telefono: { type: string, minLength: 1 }
        dniNif: { type: string }
        direccion: { type: string }
        codigoPostal: { type: string }
        poblacion: { type: string }
        provincia: { type: string }
        ibanDevolucion: { type: string }

    # -------- CatĆ”logo de extras [F2-04] --------
    Extra:
      type: object
