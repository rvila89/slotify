openapi: 3.0.0
info:
  title: Slotify API
  description: |
    API REST de **Slotify**, la plataforma SaaS de gestiÃģn integral para espacios
    boutique de eventos privados (masÃ­as, fincas, villas).

    La reserva es el agregado raÃ­z: recorre toda la mÃĄquina de estados, desde los
    sub-estados de consulta (2.aâ2.z) hasta `reserva_completada`. El bloqueo atÃģmico
    de fecha se garantiza con la restricciÃģn `UNIQUE(tenant_id, fecha)` en PostgreSQL
    y transacciones `SELECT ... FOR UPDATE`.

    La API sigue arquitectura hexagonal + DDD sobre NestJS, es multi-tenant (RLS) y
    expone este contrato OpenAPI como fuente de verdad para generar el cliente HTTP
    type-safe del frontend.

    ## Convenciones
    - Lenguaje ubicuo del dominio en espaÃąol (reservas, presupuestos, fianzaâĶ).
    - AutenticaciÃģn JWT Bearer (access token de vida corta) + refresh token en cookie httpOnly.
    - Identificadores en formato UUID.
    - [F2-01] Importes monetarios como `string` decimal de 2 decimales (Decimal(10,2)), NUNCA coma flotante,
      para evitar errores de redondeo en facturaciÃģn; porcentajes como `string` Decimal(4,2).
    - Todas las operaciones estÃĄn aisladas por tenant (derivado del JWT, no del path).

    ## Salud / documentaciÃģn
    - [DECISIÃN F1-03] `GET /api/health` y `GET /api/docs` son endpoints operativos/infra (US-000) y
      quedan FUERA de este contrato de negocio a propÃģsito. Confirma si prefieres documentarlos aquÃ­.

  version: 1.2.0
  contact:
    name: Equipo Slotify
  license:
    name: UNLICENSED

