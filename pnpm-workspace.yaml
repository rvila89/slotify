packages:
  - "apps/*"
allowBuilds:
  '@nestjs/core': false
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  argon2: true
  esbuild: true
  prisma: true
  # Resolver nativo (dep transitiva de jest). No requiere build para los tests
  # de Slotify; se deja sin compilar para mantener verde el deps-check de pnpm.
  unrs-resolver: false
